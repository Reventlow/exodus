<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="8" fill="#0f172a"/>
  <!-- E in white — shifted right so it overlaps with X -->
  <g fill="none" stroke="#e2e8f0" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="14" x2="12" y2="50"/>
    <line x1="12" y1="14" x2="32" y2="14"/>
    <line x1="12" y1="32" x2="28" y2="32"/>
    <line x1="12" y1="50" x2="32" y2="50"/>
  </g>
  <!-- X in cyan — shifted left to overlap with E -->
  <g fill="none" stroke="#38bdf8" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="28" y1="14" x2="52" y2="50"/>
    <line x1="52" y1="14" x2="28" y2="50"/>
  </g>
</svg>
