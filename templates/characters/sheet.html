                {merits.length === 0 && !showPicker && (
                    <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                        No merits acquired.
                    </p>
                )}
            </div>
        );
    };

    // --- CREATION ALLOCATION & XP COMPUTATION ---
    // WoD 2.0 creation: attributes 5/4/3, skills 11/7/4, 3 specialisations, 7 merit dots.
    // Dots beyond creation cost XP. Free dots assumed placed optimally (cheapest first).
    const computeCreation = (char) => {
        const cats = ['mental', 'physical', 'social'];

        // Attribute dots per category (each attr starts at 1)
        const attrDots = {};
        cats.forEach(c => {
            attrDots[c] = (char.attributes.power[c] - 1)
                        + (char.attributes.finesse[c] - 1)
                        + (char.attributes.resistance[c] - 1);
        });

        // Skill dots per category (each starts at 0)
        const skillDots = {};
        cats.forEach(c => {
            skillDots[c] = Object.values(char.skills[c]).reduce((a, b) => a + b, 0);
        });

        // Optimally assign allocations: sort categories by dots descending, match with sorted allocs
        const assign = (dots, allocs) => {
            const sorted = [...cats].sort((a, b) => dots[b] - dots[a]);
            const sortedA = [...allocs].sort((a, b) => b - a);
            const r = {};
            sorted.forEach((c, i) => { r[c] = { dots: dots[c], alloc: sortedA[i] }; });
            return r;
        };

        const attrAssign = assign(attrDots, [5, 4, 3]);
        const skillAssign = assign(skillDots, [11, 7, 4]);

        // XP cost for excess dots in a category.
        // Collect per-dot costs, sort ascending. Free dots cover cheapest, excess = most expensive.
        const calcCategoryXp = (catAssign, getValues, costPerDot) => {
            let xp = 0;
            cats.forEach(c => {
                const { dots, alloc } = catAssign[c];
                if (dots <= alloc) return;
                const values = getValues(c);
                const dotCosts = [];
                values.forEach(val => {
                    const base = costPerDot === 5 ? 2 : 1; // attrs start counting from 2, skills from 1
                    for (let i = base; i <= val; i++) dotCosts.push(i * costPerDot);
                });
                dotCosts.sort((a, b) => a - b);
                const excess = dots - alloc;
                dotCosts.slice(-excess).forEach(c => { xp += c; });
            });
            return xp;
        };

        const attrXp = calcCategoryXp(attrAssign,
            c => [char.attributes.power[c], char.attributes.finesse[c], char.attributes.resistance[c]], 5);
        const skillXp = calcCategoryXp(skillAssign,
            c => Object.values(char.skills[c]), 3);

        // Specialisations: 3 free, each extra = 3 XP
        const specCount = (char.specialisations || []).length;
        const specXp = Math.max(0, specCount - 3) * 3;

        // Merits: 7 free dots, excess costs new_rating × 2
        const meritDots = (char.merits || []).reduce((s, m) => s + (m.rating || 0), 0);
        let meritXp = 0;
        if (meritDots > 7) {
            const meritCosts = [];
            (char.merits || []).forEach(m => {
                for (let i = 1; i <= (m.rating || 0); i++) meritCosts.push(i * 2);
            });
            meritCosts.sort((a, b) => a - b);
            meritCosts.slice(-(meritDots - 7)).forEach(c => { meritXp += c; });
        }

        // Unspent creation messages
        const msgs = [];
        cats.forEach(c => {
            const u = Math.max(0, attrAssign[c].alloc - attrAssign[c].dots);
            if (u) msgs.push(`${u} attribute dot${u > 1 ? 's' : ''} (${c})`);
        });
        cats.forEach(c => {
            const u = Math.max(0, skillAssign[c].alloc - skillAssign[c].dots);
            if (u) msgs.push(`${u} skill dot${u > 1 ? 's' : ''} (${c})`);
        });
        const specU = Math.max(0, 3 - specCount);
        if (specU) msgs.push(`${specU} specialisation${specU > 1 ? 's' : ''}`);
        const meritU = Math.max(0, 7 - meritDots);
        if (meritU) msgs.push(`${meritU} merit dot${meritU > 1 ? 's' : ''}`);

        return {
            totalXp: attrXp + skillXp + specXp + meritXp,
            attrXp, skillXp, specXp, meritXp,
            messages: msgs,
        };
    };

    // --- EXPERIENCE MODULE ---
    const ExperienceModule = ({ char, update, agencies, onTransferDone }) => {
        const creation = useMemo(() => computeCreation(char), [
            char.attributes, char.skills, char.specialisations, char.merits
        ]);
        const psCost = char.pullingStringsCost || 0;
        const autoXp = psCost + creation.totalXp;
        const totalUsed = (char.experienceUsed || 0) + autoXp;
        const remaining = (char.experience || 0) - totalUsed;

        const [transferAmount, setTransferAmount] = useState(1);
        const [transferAgency, setTransferAgency] = useState('');
        const [transferStatus, setTransferStatus] = useState(null);

        const doTransfer = async () => {
            if (!transferAgency || transferAmount < 1) return;
            if (transferAmount > (char.experience || 0)) {
                setTransferStatus('Insufficient XP.');
                return;
            }
            setTransferStatus('Transferring...');
            try {
                const resp = await fetch(`/api/characters/${char.id}/transfer-xp/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ amount: transferAmount, agencyId: parseInt(transferAgency) }),
                });
                const data = await resp.json();
                if (resp.ok) {
                    setTransferStatus(`Transferred ${data.transferred} XP → ${data.agencyReceived} agency XP`);
                    if (onTransferDone) onTransferDone();
                } else {
                    setTransferStatus(data.error || 'Transfer failed.');
                }
            } catch (err) {
                setTransferStatus('Transfer failed.');
            }
        };

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>EXPERIENCE</h3>

                {creation.messages.length > 0 && (
                    <div style={{
                        background: 'rgba(255,200,0,0.1)', border: '1px solid var(--accent-warning)',
                        borderRadius: '4px', padding: '0.75rem', marginBottom: '1rem',
                        fontSize: '0.8rem', color: 'var(--accent-warning)'
                    }}>
                        <strong className="mono-text">CREATION INCOMPLETE</strong>
                        <span style={{ marginLeft: '0.5rem' }}>
                            You still need to set: {creation.messages.join(', ')}
                        </span>
                    </div>
                )}

                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(4, 1fr)',
                    gap: '1rem'
                }}>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>TOTAL</div>
                        <input type="number" value={char.experience || 0}
                            onChange={e => update({ experience: parseInt(e.target.value) || 0 })}
                            disabled={!IS_OWNER}
                            style={{
                                background: 'transparent', border: 'none',
                                color: 'var(--text-accent)', width: '100%',
                                textAlign: 'center', fontSize: '1.5rem'
                            }} />
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>MANUAL</div>
                        <input type="number" value={char.experienceUsed || 0}
                            onChange={e => update({ experienceUsed: parseInt(e.target.value) || 0 })}
                            disabled={!IS_OWNER}
                            style={{
                                background: 'transparent', border: 'none',
                                color: 'var(--text-primary)', width: '100%',
                                textAlign: 'center', fontSize: '1.5rem'
                            }} />
                    </div>
                    <div className="tech-border text-center" style={{
                        padding: '0.5rem', position: 'relative', cursor: 'default'
                    }}
                        title={[
                            `Attributes: ${creation.attrXp} XP (above 5/4/3 creation)`,
                            `Skills: ${creation.skillXp} XP (above 11/7/4 creation)`,
                            `Specialisations: ${creation.specXp} XP (above 3 free)`,
                            `Merits: ${creation.meritXp} XP (above 7 free dots)`,
                            `Pulling Strings: ${psCost} XP`,
                            `─────────`,
                            `Total Auto: ${autoXp} XP`,
                        ].join('\n')}
                    >
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>AUTO</div>
                        <div style={{ fontSize: '1.5rem', color: 'var(--text-primary)' }}>
                            {autoXp}
                        </div>
                        <div style={{ fontSize: '0.65rem', color: 'var(--text-muted)' }}>
                            Hover for details
                        </div>
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>REMAINING</div>
                        <div style={{
                            fontSize: '1.5rem',
                            color: remaining < 0 ? 'var(--accent-danger)' : 'var(--text-accent)'
                        }}>{remaining}</div>
                        <div style={{ fontSize: '0.65rem', color: 'var(--text-muted)' }}>
                            {totalUsed} used
                        </div>
                    </div>
                </div>

                {/* XP Transfer to Agency */}
                {IS_OWNER && agencies.length > 0 && (
                    <div style={{
                        marginTop: '1rem', paddingTop: '1rem',
                        borderTop: '1px solid var(--border-color)'
                    }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem', marginBottom: '0.5rem' }}>
                            TRANSFER TO AGENCY <span className="text-muted">(1 XP → 10 agency XP)</span>
                        </div>
                        <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center', flexWrap: 'wrap' }}>
                            <input type="number" min="1" value={transferAmount}
                                onChange={e => setTransferAmount(Math.max(1, parseInt(e.target.value) || 1))}
                                style={{
                                    background: 'transparent', border: '1px solid var(--border-color)',
                                    color: 'var(--text-primary)', width: '60px', padding: '0.25rem 0.5rem',
                                    textAlign: 'center', fontFamily: 'var(--font-mono)', borderRadius: '3px'
                                }} />
                            <span className="text-muted">XP →</span>
                            <select value={transferAgency}
                                onChange={e => setTransferAgency(e.target.value)}
                                style={{
                                    background: 'transparent', border: '1px solid var(--border-color)',
                                    color: 'var(--text-primary)', padding: '0.25rem 0.5rem',
                                    fontFamily: 'var(--font-mono)', cursor: 'pointer', borderRadius: '3px'
                                }}>
                                <option value="" style={{ background: 'var(--bg-dark)' }}>Select agency...</option>
                                {agencies.map(a => (
                                    <option key={a.id} value={a.id} style={{ background: 'var(--bg-dark)' }}>
                                        {a.name}
                                    </option>
                                ))}
                            </select>
                            <span className="mono-text text-accent" style={{ fontSize: '0.85rem' }}>
                                = {transferAmount * 10} agency XP
                            </span>
                            <button onClick={doTransfer}
                                disabled={!transferAgency}
                                style={{
                                    background: transferAgency ? 'var(--accent-primary)' : 'transparent',
                                    border: '1px solid var(--accent-primary)',
                                    color: transferAgency ? 'var(--bg-dark)' : 'var(--text-muted)',
                                    padding: '0.25rem 0.75rem', borderRadius: '3px',
                                    cursor: transferAgency ? 'pointer' : 'default',
                                    fontFamily: 'var(--font-mono)', fontSize: '0.8rem'
                                }}>
                                TRANSFER
                            </button>
                        </div>
                        {transferStatus && (
                            <div className="mono-text" style={{
                                fontSize: '0.75rem', marginTop: '0.5rem',
                                color: transferStatus.includes('Transferred') ? 'var(--text-accent)' : 'var(--accent-danger)'
                            }}>
                                {transferStatus}
                            </div>
                        )}
                    </div>
                )}
            </div>
        );
    };

    // --- MENTAL LOAD PENALTIES ---
    const getMentalLoadPenalties = (level) => {
        let social = 0, cognitive = 0;
        if (level >= 3) social -= 2;
        if (level >= 4) cognitive -= 2;
        if (level >= 5) { social -= 1; cognitive -= 1; }
        if (level >= 6) { social -= 2; cognitive -= 2; }
        return { social, cognitive };
    };

    // --- HEALTH MODULE ---
    const HealthModule = ({ health, max, mentalLoad, update, onMentalLoadChange }) => {
        const deadlyFill = (health.lethal || 0) + (health.aggravated || 0);
        const isFlatline = max > 0 && deadlyFill >= max;

        // EKG speed: 2s base, faster with more mental load, flatline = no animation
        const ekgSpeed = isFlatline ? 0 : Math.max(0.3, 2 - mentalLoad * 0.25);
        const ekgPath = isFlatline
            ? "M0,30 L300,30"
            : "M0,30 L20,30 L25,10 L35,50 L40,30 L300,30";
        const ekgColor = isFlatline ? 'var(--text-muted)' : 'var(--accent-danger)';

        const penalties = getMentalLoadPenalties(mentalLoad);

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                border: '1px solid var(--accent-danger)'
            }}>
                <div style={{
                    display: 'flex', justifyContent: 'space-between',
                    alignItems: 'center', marginBottom: '1rem',
                    flexWrap: 'wrap', gap: '0.5rem'
                }}>
                    <h3 className="mono-text text-danger">BIOSIGN MONITOR</h3>
                    <div className="text-danger mono-text" style={{
                        animation: isFlatline ? 'none' : 'pulse 2s infinite'
                    }}>
                        {isFlatline ? 'NO VITAL SIGNS DETECTED' : 'Tracking vital signs...'}
                    </div>
                </div>

                {/* EKG Visual */}
                <div style={{
                    height: '60px', background: 'rgba(0,0,0,0.3)',
                    marginBottom: '1rem', position: 'relative', overflow: 'hidden',
                    borderLeft: '2px solid ' + ekgColor
                }}>
                    <svg width="100%" height="100%" viewBox="0 0 300 60" preserveAspectRatio="none">
                        <path d={ekgPath}
                            fill="none" stroke={ekgColor} strokeWidth="2"
                            vectorEffect="non-scaling-stroke"
                            style={isFlatline ? {} : { animation: 'dash ' + ekgSpeed + 's linear infinite' }}
                        />
                    </svg>
                </div>

                {/* Health boxes visual */}
                <div style={{ display: 'flex', justifyContent: 'center', gap: '0.5rem', flexWrap: 'wrap' }}>
                    {[...Array(max)].map((_, i) => {
                        let symbol = '';
                        let color = 'var(--border-color)';
                        if (i < (health.aggravated || 0)) {
                            symbol = '*';
                            color = 'var(--accent-danger)';
                        } else if (i < (health.aggravated || 0) + (health.lethal || 0)) {
                            symbol = 'X';
                            color = 'var(--accent-warning)';
                        } else if (i < (health.aggravated || 0) + (health.lethal || 0) + (health.bashing || 0)) {
                            symbol = '/';
                            color = 'var(--text-secondary)';
                        }
                        return (
                            <div key={i} style={{
                                width: '24px', height: '24px',
                                border: '1px solid var(--accent-danger)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                color: color, fontWeight: 'bold', fontSize: '0.9rem'
                            }}>
                                {symbol}
                            </div>
                        );
                    })}
                </div>

                {/* Numeric damage counters */}
                <div style={{ display: 'flex', gap: '2rem', justifyContent: 'center', marginTop: '1rem', flexWrap: 'wrap' }}>
                    <div className="text-center">
                        <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>BASHING</label>
                        <input type="number" value={health.bashing || 0}
                            onChange={e => update({ ...health, bashing: parseInt(e.target.value) || 0 })}
                            disabled={!IS_OWNER}
                            style={{
                                display: 'block', background: 'transparent',
                                border: '1px solid var(--accent-danger)',
                                color: 'var(--accent-danger)', width: '60px',
                                textAlign: 'center', fontSize: '1.2rem'
                            }} />
                    </div>
                    <div className="text-center">
                        <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>LETHAL</label>
                        <input type="number" value={health.lethal || 0}
                            onChange={e => update({ ...health, lethal: parseInt(e.target.value) || 0 })}
                            disabled={!IS_OWNER}
                            style={{
                                display: 'block', background: 'transparent',
                                border: '1px solid var(--accent-danger)',
                                color: 'var(--accent-danger)', width: '60px',
                                textAlign: 'center', fontSize: '1.2rem'
                            }} />
                    </div>
                    <div className="text-center">
                        <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>AGGRAVATED</label>
                        <input type="number" value={health.aggravated || 0}
                            onChange={e => update({ ...health, aggravated: parseInt(e.target.value) || 0 })}
                            disabled={!IS_OWNER}
                            style={{
                                display: 'block', background: 'transparent',
                                border: '1px solid var(--accent-danger)',
                                color: 'var(--accent-danger)', width: '60px',
                                textAlign: 'center', fontSize: '1.2rem'
                            }} />
                    </div>
                </div>

                {/* Mental Load */}
                <div style={{
                    marginTop: '1.5rem', paddingTop: '1rem',
                    borderTop: '1px solid var(--border-color)'
                }}>
                    <div style={{
                        display: 'flex', justifyContent: 'space-between',
                        alignItems: 'center', marginBottom: '0.75rem',
                        flexWrap: 'wrap', gap: '0.5rem'
                    }}>
                        <span className="mono-text text-danger" style={{ fontSize: '0.9rem' }}>
                            MENTAL LOAD
                        </span>
                        {(penalties.social !== 0 || penalties.cognitive !== 0) && (
                            <div style={{ display: 'flex', gap: '0.75rem' }}>
                                {penalties.social !== 0 && (
                                    <span className="mono-text" style={{
                                        fontSize: '0.75rem', color: 'var(--accent-warning)'
                                    }}>
                                        SOCIAL {penalties.social}
                                    </span>
                                )}
                                {penalties.cognitive !== 0 && (
                                    <span className="mono-text" style={{
                                        fontSize: '0.75rem', color: 'var(--accent-warning)'
                                    }}>
                                        COGNITIVE {penalties.cognitive}
                                    </span>
                                )}
                            </div>
                        )}
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'center', gap: '0.5rem' }}>
                        {[...Array(6)].map((_, i) => {
                            const filled = i < mentalLoad;
                            const level = i + 1;
                            let boxColor = 'var(--border-color)';
                            if (filled && level <= 2) boxColor = 'var(--accent-primary)';
                            else if (filled && level <= 4) boxColor = 'var(--accent-warning)';
                            else if (filled) boxColor = 'var(--accent-danger)';
                            return (
                                <div key={i}
                                    onClick={() => {
                                        if (!IS_OWNER) return;
                                        onMentalLoadChange(mentalLoad === level ? level - 1 : level);
                                    }}
                                    style={{
                                        width: '28px', height: '28px',
                                        border: '1px solid var(--accent-danger)',
                                        background: filled ? boxColor : 'transparent',
                                        cursor: IS_OWNER ? 'pointer' : 'default',
                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        transition: 'all 0.2s',
                                        boxShadow: filled ? '0 0 6px ' + boxColor : 'none'
                                    }}
                                    title={'Level ' + level + (level <= 2 ? ' (no effect)' : level === 3 ? ' (-2 social)' : level === 4 ? ' (-2 cognitive)' : level === 5 ? ' (-1 social, -1 cognitive)' : ' (-2 social, -2 cognitive)')}
                                >
                                    {filled && (
                                        <span style={{
                                            color: 'var(--bg-dark)', fontWeight: 'bold', fontSize: '0.7rem'
                                        }}>{level}</span>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
        );
    };

    // --- EXPANDABLE LIST MODULE (Merits, Pulling Strings) ---
    const ExpandableListModule = ({ title, items, onAdd, onRemove, onUpdate, onQuietSave, itemLabel = "Item" }) => (
        <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
            <h3 className="mono-text text-accent" style={{
                borderBottom: '1px solid var(--border-color)',
                paddingBottom: '0.5rem', marginBottom: '1rem',
                display: 'flex', justifyContent: 'space-between', alignItems: 'center'
            }}>
                {title}
                {IS_OWNER && (
                    <button onClick={onAdd} title="Add New" style={{
                        background: 'transparent', border: '1px solid var(--accent-primary)',
                        color: 'var(--accent-primary)', width: '24px', height: '24px',
                        borderRadius: '4px', cursor: 'pointer',
                        display: 'flex', alignItems: 'center', justifyContent: 'center'
                    }}>
                        <Icon name="plus" size={14} />
                    </button>
                )}
            </h3>
            {items.map((item, idx) => (
                <div key={idx} className="tech-border" style={{
                    padding: '0.5rem', marginBottom: '0.5rem', background: 'rgba(0,0,0,0.2)'
                }}>
                    <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                        <AutoSaveInput
                            type="text"
                            placeholder={itemLabel + ' Name'}
                            defaultValue={item.name}
                            onSave={onQuietSave ? (val => onQuietSave(idx, { ...item, name: val })) : (val => onUpdate(idx, { ...item, name: val }))}
                            disabled={!IS_OWNER}
                            style={{
                                background: 'transparent', border: 'none',
                                borderBottom: '1px solid var(--text-muted)',
                                color: 'var(--text-primary)', flex: 1,
                                fontFamily: 'var(--font-mono)'
                            }}
                        />
                        <StatDots value={item.rating} max={5}
                            onChange={v => onUpdate(idx, { ...item, rating: v })} editable={IS_OWNER} />
                        {IS_OWNER && (
                            <button onClick={() => onRemove(idx)} style={{
                                background: 'transparent', border: 'none',
                                color: 'var(--accent-danger)', cursor: 'pointer'
                            }}>
                                <Icon name="x" size={14} />
                            </button>
                        )}
                    </div>
                    <AutoSaveInput
                        component="textarea"
                        placeholder="Description / Effects..."
                        defaultValue={item.description || ""}
                        onSave={onQuietSave ? (val => onQuietSave(idx, { ...item, description: val })) : (val => onUpdate(idx, { ...item, description: val }))}
                        disabled={!IS_OWNER}
                        style={{
                            width: '100%', background: 'transparent', border: 'none',
                            color: 'var(--text-secondary)', fontSize: '0.8rem',
                            marginTop: '0.5rem', minHeight: '40px',
                            fontFamily: 'inherit', resize: 'vertical'
                        }}
                    />
                </div>
            ))}
            {items.length === 0 && (
                <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                    No data recorded.
                </p>
            )}
        </div>
    );

    // --- INVENTORY MODULE ---
    const InventoryModule = ({ inventory, update, quietUpdate, getFreshItems }) => (
        <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
            <h3 className="mono-text text-accent" style={{
                borderBottom: '1px solid var(--border-color)',
                paddingBottom: '0.5rem', marginBottom: '1rem',
                display: 'flex', justifyContent: 'space-between', alignItems: 'center'
            }}>
                INVENTORY / ASSETS
                {IS_OWNER && (
                    <button onClick={() => {
                        document.activeElement?.blur();
                        const fresh = getFreshItems ? getFreshItems() : inventory;
                        update([...fresh, { name: "", bonus: 0, description: "" }]);
                    }}
                        title="Add Item" style={{
                            background: 'transparent', border: '1px solid var(--accent-primary)',
                            color: 'var(--accent-primary)', width: '24px', height: '24px',
                            borderRadius: '4px', cursor: 'pointer',
                            display: 'flex', alignItems: 'center', justifyContent: 'center'
                        }}>
                        <Icon name="plus" size={14} />
                    </button>
                )}
            </h3>
            <div style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fill, minmax(250px, 1fr))',
                gap: '1rem'
            }}>
                {inventory.map((item, idx) => (
                    <div key={idx} className="tech-border" style={{
                        padding: '0.5rem', background: 'rgba(0,0,0,0.2)'
                    }}>
                        <div style={{
                            display: 'flex', gap: '0.5rem',
                            alignItems: 'center', marginBottom: '0.5rem'
                        }}>
                            <AutoSaveInput
                                type="text"
                                placeholder="Item Name"
                                defaultValue={item.name}
                                onSave={val => (quietUpdate || update)(inventory.map((it, i) =>
                                    i === idx ? { ...it, name: val } : it))}
                                disabled={!IS_OWNER}
                                style={{
                                    background: 'transparent', border: 'none',
                                    borderBottom: '1px solid var(--text-muted)',
                                    color: 'var(--text-primary)', flex: 1,
                                    fontFamily: 'var(--font-mono)'
                                }}
                            />
                            <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                                <span className="text-muted" style={{ fontSize: '0.8rem' }}>+</span>
                                <input
                                    type="number"
                                    placeholder="Dice"
                                    title="Equipment Bonus Dice"
                                    value={item.bonus}
                                    onChange={e => update(inventory.map((it, i) =>
                                        i === idx ? { ...it, bonus: parseInt(e.target.value) || 0 } : it))}
                                    disabled={!IS_OWNER}
                                    style={{
                                        background: 'transparent', border: '1px solid var(--border-color)',
                                        color: 'var(--accent-success)', width: '40px', textAlign: 'center'
                                    }}
                                />
                            </div>
                            {IS_OWNER && (
                                <button onClick={() => {
                                    document.activeElement?.blur();
                                    const fresh = getFreshItems ? getFreshItems() : inventory;
                                    update(fresh.filter((_, i) => i !== idx));
                                }}
                                    style={{
                                        background: 'transparent', border: 'none',
                                        color: 'var(--accent-danger)', cursor: 'pointer'
                                    }}>
                                    <Icon name="x" size={14} />
                                </button>
                            )}
                        </div>
                        <AutoSaveInput
                            type="text"
                            placeholder="Notes..."
                            defaultValue={item.description}
                            onSave={val => (quietUpdate || update)(inventory.map((it, i) =>
                                i === idx ? { ...it, description: val } : it))}
                            disabled={!IS_OWNER}
                            style={{
                                width: '100%', background: 'transparent', border: 'none',
                                color: 'var(--text-secondary)', fontSize: '0.8rem'
                            }}
                        />
                    </div>
                ))}
            </div>
        </div>
    );

    // --- DICE ROLLER ---
    const DiceRoller = () => {
        const [pool, setPool] = useState(1);
        const [again, setAgain] = useState(10);
        const [results, setResults] = useState(null);

        const roll = () => {
            const newResults = [];
            let successes = 0;
            let diceToRoll = pool;

            if (diceToRoll > 50) diceToRoll = 50;
            if (diceToRoll < 1) diceToRoll = 1;

            while (diceToRoll > 0) {
                const die = Math.floor(Math.random() * 10) + 1;
                let isSuccess = die >= 8;
                let explode = die >= again;

                newResults.push({ value: die, success: isSuccess, exploded: explode });
                if (isSuccess) successes++;

                if (explode) {
                    diceToRoll++;
                    if (newResults.length > 100) break;
                }
                diceToRoll--;
            }
            setResults({ rolls: newResults, totalSuccesses: successes });
        };

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                borderTop: '2px solid var(--accent-primary)'
            }}>
                <h3 className="mono-text text-accent" style={{ marginBottom: '1rem' }}>
                    TACTICAL DICE ROLLER
                </h3>

                <div style={{
                    display: 'flex', gap: '1rem', alignItems: 'flex-end',
                    justifyContent: 'center', marginBottom: '1rem',
                    flexWrap: 'wrap'
                }}>
                    <div>
                        <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>POOL SIZE</label>
                        <input type="number" value={pool}
                            onChange={e => setPool(parseInt(e.target.value) || 1)}
                            style={{
                                display: 'block', width: '80px', height: '50px',
                                fontSize: '2rem', textAlign: 'center',
                                background: 'var(--bg-input)', color: 'var(--text-primary)',
                                border: '1px solid var(--accent-primary)'
                            }} />
                    </div>
                    <div>
                        <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>AGAIN</label>
                        <select value={again} onChange={e => setAgain(parseInt(e.target.value))}
                            style={{
                                display: 'block', height: '50px',
                                background: 'var(--bg-input)', color: 'var(--text-primary)',
                                border: '1px solid var(--border-color)'
                            }}>
                            <option value={10}>10-Again</option>
                            <option value={9}>9-Again</option>
                            <option value={8}>8-Again</option>
                        </select>
                    </div>
                    <button onClick={roll} style={{
                        height: '50px', padding: '0 2rem',
                        background: 'var(--accent-primary)', color: 'var(--bg-dark)',
                        border: 'none', fontWeight: 'bold', cursor: 'pointer', fontSize: '1.2rem'
                    }}>
                        EXECUTE
                    </button>
                </div>

                {results && (
                    <div className="tech-border" style={{ padding: '1rem', background: 'rgba(0,0,0,0.3)' }}>
                        <div style={{ textAlign: 'center', marginBottom: '0.5rem' }}>
                            <span className="mono-text text-muted">OUTCOME: </span>
                            <span style={{
                                fontSize: '1.5rem', fontWeight: 'bold',
                                color: results.totalSuccesses > 0 ? 'var(--accent-success)' : 'var(--text-secondary)'
                            }}>
                                {results.totalSuccesses} SUCCESSES
                            </span>
                        </div>
                        <div style={{
                            display: 'flex', flexWrap: 'wrap', gap: '4px', justifyContent: 'center'
                        }}>
                            {results.rolls.map((r, i) => (
                                <div key={i} style={{
                                    width: '24px', height: '24px',
                                    borderRadius: '2px',
                                    background: r.success ? 'var(--accent-primary)' : 'var(--bg-panel)',
                                    color: r.success ? 'var(--bg-dark)' : 'var(--text-secondary)',
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    fontWeight: 'bold',
                                    border: r.exploded ? '1px solid var(--accent-warning)' : 'none'
                                }}>
                                    {r.value}
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // --- SAVE STATUS INDICATOR ---
    const SaveStatus = ({ status }) => {
        const labels = {
            saved: 'SAVED',
            saving: 'SAVING...',
            unsaved: 'UNSAVED CHANGES',
            error: 'SAVE ERROR'
        };
        return (
            <span className={'save-status ' + status}>
                {labels[status] || status}
            </span>
        );
    };

    // --- MAIN APP ---
    const CharacterSheet = () => {
        const [char, setChar] = useState(null);
        const [loading, setLoading] = useState(true);
        const [saveStatus, setSaveStatus] = useState('saved');
        const [psCatalog, setPsCatalog] = useState([]);
        const [agencies, setAgencies] = useState([]);
        const [npcList, setNpcList] = useState([]);
        const [meritCatalog, setMeritCatalog] = useState([]);
        const saveTimerRef = useRef(null);
        const charRef = useRef(null);

        // Load character data, catalogs, agencies, and NPCs on mount
        useEffect(() => {
            fetchCharacter();
            fetch('/api/pulling-strings/')
                .then(r => r.json())
                .then(data => setPsCatalog(data))
                .catch(err => console.error('Failed to load pulling strings catalog:', err));
            fetch('/api/merits/')
                .then(r => r.json())
                .then(data => setMeritCatalog(data))
                .catch(err => console.error('Failed to load merits catalog:', err));
            fetch('/api/agencies/')
                .then(r => r.json())
                .then(data => setAgencies(data.filter(a => a.isPlayerAgency)))
                .catch(err => console.error('Failed to load agencies:', err));
            fetch('/api/npcs/')
                .then(r => r.json())
                .then(data => setNpcList(data.filter(n => !n.isNpcDossier)))
                .catch(err => console.error('Failed to load NPCs:', err));
        }, []);

        const fetchCharacter = async () => {
            try {
                const response = await fetch('/api/characters/' + CHARACTER_ID + '/');
                if (response.ok) {
                    const data = await response.json();
                    // Merge with defaults to ensure all fields exist
                    const merged = {
                        ...DEFAULT_CHARACTER,
                        ...data,
                        attributes: {
                            power: { ...DEFAULT_CHARACTER.attributes.power, ...(data.attributes?.power || {}) },
                            finesse: { ...DEFAULT_CHARACTER.attributes.finesse, ...(data.attributes?.finesse || {}) },
                            resistance: { ...DEFAULT_CHARACTER.attributes.resistance, ...(data.attributes?.resistance || {}) }
                        },
                        skills: {
                            mental: { ...DEFAULT_CHARACTER.skills.mental, ...(data.skills?.mental || {}) },
                            physical: { ...DEFAULT_CHARACTER.skills.physical, ...(data.skills?.physical || {}) },
                            social: { ...DEFAULT_CHARACTER.skills.social, ...(data.skills?.social || {}) }
                        },
                        health: { ...DEFAULT_CHARACTER.health, ...(data.health || {}) },
                        merits: data.merits || [],
                        flaws: data.flaws || [],
                        pullingStrings: data.pullingStrings || data.pulling_strings || [],
                        inventory: data.inventory || [],
                        specialisations: data.specialisations || [],
                    };
                    setChar(merged);
                    charRef.current = merged;
                } else {
                    console.error('Failed to load character');
                }
            } catch (err) {
                console.error('Failed to load character:', err);
            } finally {
                setLoading(false);
            }
        };

        // Debounced auto-save
        const saveCharacter = useCallback(async (data) => {
            setSaveStatus('saving');
            try {
                const response = await fetch('/api/characters/' + CHARACTER_ID + '/', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify(data),
                });
                if (response.ok) {
                    setSaveStatus('saved');
                } else {
                    setSaveStatus('error');
                    console.error('Save failed:', response.status);
                }
            } catch (err) {
                setSaveStatus('error');
                console.error('Save error:', err);
            }
        }, []);

        // Full update: sets state (re-renders) + ref + schedules save.
        // Use for structural changes (add/remove rows, dot clicks).
        const updateCharacter = (updates) => {
            if (!IS_OWNER) return;
            const updated = { ...charRef.current, ...updates };
            setChar(updated);
            charRef.current = updated;
            setSaveStatus('unsaved');

            if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
            saveTimerRef.current = setTimeout(() => {
                saveCharacter(charRef.current);
            }, 1000);
        };

        // Silent save: updates ref + state and sends to server.
        // Safe with uncontrolled inputs (defaultValue) — typing is never interrupted.
        const quietSaveTimerRef = useRef(null);
        const saveCharacterQuiet = useCallback((updates) => {
            if (!IS_OWNER) return;
            const updated = { ...charRef.current, ...updates };
            charRef.current = updated;
            setChar(updated);

            if (quietSaveTimerRef.current) clearTimeout(quietSaveTimerRef.current);
            quietSaveTimerRef.current = setTimeout(async () => {
                try {
                    const response = await fetch('/api/characters/' + CHARACTER_ID + '/', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                        },
                        body: JSON.stringify(charRef.current),
                    });
                    if (!response.ok) console.error('Quiet save failed:', response.status);
                } catch (err) {
                    console.error('Quiet save error:', err);
                }
            }, 500);
        }, []);

        if (loading) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-accent" style={{ animation: 'pulse 1.5s infinite' }}>
                        DECRYPTING PERSONNEL RECORD...
                    </h2>
                </div>
            );
        }

        if (!char) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-danger">ERROR: RECORD NOT FOUND</h2>
                    <p className="text-muted" style={{ marginTop: '1rem' }}>
                        The requested personnel record could not be retrieved.
                    </p>
                </div>
            );
        }

        return (
            <div className="fade-in">
                {/* Sub-header with save status */}
                <div style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    marginBottom: '1rem', paddingBottom: '0.5rem',
                    borderBottom: '1px solid var(--border-color)',
                    flexWrap: 'wrap', gap: '0.5rem'
                }}>
                    <h2 className="mono-text text-accent" style={{ fontSize: '1.2rem' }}>
                        PERSONNEL RECORD
                    </h2>
                    <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                        {IS_OWNER && <SaveStatus status={saveStatus} />}
                        <a href="/"
                            className="mono-text"
                            style={{
                                background: 'transparent', border: '1px solid var(--accent-primary)',
                                color: 'var(--accent-primary)', padding: '0.5rem 1rem',
                                cursor: 'pointer', textDecoration: 'none', fontSize: '0.9rem'
                            }}>
                            &lt; CLOSE RECORD
                        </a>
                    </div>
                </div>

                <ProfilePictureModule
                    profilePicture={char.profilePicture}
                    onUpload={url => {
                        charRef.current = { ...charRef.current, profilePicture: url };
                        setChar({ ...charRef.current });
                    }}
                />

                <HeaderModule char={char} onSave={saveCharacterQuiet} />

                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))',
                    gap: '1rem', marginBottom: '1rem'
                }}>
                    <AttributesModule
                        attributes={char.attributes}
                        update={attrs => updateCharacter({ attributes: attrs })} />
                    <SkillsModule
                        skills={char.skills}
                        update={skills => updateCharacter({ skills })} />
                </div>

                <SpecialisationsModule
                    specialisations={char.specialisations || []}
                    update={specs => updateCharacter({ specialisations: specs })}
                    quietUpdate={specs => saveCharacterQuiet({ specialisations: specs })}
                    getFresh={() => charRef.current.specialisations || []}
                />

                <DerivedTraitsModule char={char} update={updateCharacter} />

                <ExperienceModule char={char} update={updateCharacter}
                    agencies={agencies} onTransferDone={fetchCharacter} />

                <InventoryModule
                    inventory={char.inventory || []}
                    update={inv => updateCharacter({ inventory: inv })}
                    quietUpdate={inv => saveCharacterQuiet({ inventory: inv })}
                    getFreshItems={() => charRef.current.inventory || []}
                />

                <HealthModule
                    health={char.health}
                    max={(() => {
                        const me = computeMeritEffects(char.merits);
                        return char.attributes.resistance.physical + (char.size || 5) + me.sizeMod + me.extraHealth;
                    })()}
                    mentalLoad={char.mentalLoad || 0}
                    update={h => updateCharacter({ health: h })}
                    onMentalLoadChange={v => updateCharacter({ mentalLoad: v })} />

                <DossierModule dossier={char.dossier || ""} onSave={saveCharacterQuiet} />

                <DiceRoller />

                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))',
                    gap: '1rem'
                }}>
                    <PullingStringsModule
                        pullingStrings={char.pullingStrings || []}
                        catalog={psCatalog}
                        characterClass={char.characterClass || ""}
                        npcs={npcList.filter(n => n.assignedTo === char.owner)}
                        onAdd={psId => {
                            saveCharacter({ addPullingString: { pullingStringId: psId } });
                            // Reload to get accurate through-table IDs
                            setTimeout(fetchCharacter, 300);
                        }}
                        onRemove={cpsId => {
                            const current = charRef.current.pullingStrings || [];
                            const updated = current.filter(ps => ps.id !== cpsId);
                            const newCost = updated.reduce((sum, ps) => sum + (ps.cost || 0), 0);
                            setChar(prev => ({ ...prev, pullingStrings: updated, pullingStringsCost: newCost }));
                            charRef.current = { ...charRef.current, pullingStrings: updated, pullingStringsCost: newCost };
                            saveCharacter({ removePullingString: cpsId });
                        }}
                        onLinkNpc={(cpsId, npcId) => {
                            saveCharacter({ linkNpc: { id: cpsId, npcId } });
                            setTimeout(fetchCharacter, 300);
                        }}
                    />
                    <MeritsModule
                        merits={char.merits || []}
                        catalog={meritCatalog}
                        onAdd={(meritId, maxRating) => {
                            saveCharacter({ addMerit: { meritId, rating: maxRating } });
                            setTimeout(fetchCharacter, 300);
                        }}
                        onRemove={cmId => {
                            const updated = (charRef.current.merits || []).filter(m => m.id !== cmId);
                            setChar(prev => ({ ...prev, merits: updated }));
                            charRef.current = { ...charRef.current, merits: updated };
                            saveCharacter({ removeMerit: cmId });
                        }}
                        onUpdateRating={(cmId, rating) => {
                            saveCharacter({ updateMeritRating: { id: cmId, rating } });
                            setTimeout(fetchCharacter, 300);
                        }}
                    />
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<CharacterSheet />);
</script>
