{% extends "base.html" %}

{% block title %}PERSONNEL RECORD // BLACKLOG.NET{% endblock %}

{% block content %}
<div id="app-root">
    <div class="loading-screen">
        <h1 class="mono-text">DECRYPTING PERSONNEL RECORD...</h1>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Django context variables — outside verbatim block
    const CHARACTER_ID = {{ character_id }};
    const IS_OWNER = {{ is_owner|yesno:"true,false" }};
    const IS_SUPERUSER = {{ is_superuser|yesno:"true,false" }};
    const CSRF_TOKEN = '{{ csrf_token }}';
</script>
{% verbatim %}
<script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // --- CSRF ---
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // --- DEFAULT CHARACTER STRUCTURE ---
    const DEFAULT_CHARACTER = {
        id: null,
        name: "UNKNOWN AGENT",
        characterClass: "",
        concept: "",
        chronicle: "",
        virtue: "",
        vice: "",
        attributes: {
            power: { mental: 1, physical: 1, social: 1 },
            finesse: { mental: 1, physical: 1, social: 1 },
            resistance: { mental: 1, physical: 1, social: 1 }
        },
        skills: {
            mental: {
                Academics: 0, Computer: 0, Crafts: 0, Investigation: 0,
                Medicine: 0, Occult: 0, Politics: 0, Science: 0
            },
            physical: {
                Athletics: 0, Brawl: 0, Drive: 0, Firearms: 0,
                Larceny: 0, Stealth: 0, Survival: 0, Weaponry: 0
            },
            social: {
                AnimalKen: 0, Empathy: 0, Expression: 0, Intimidation: 0,
                Persuasion: 0, Socialize: 0, Streetwise: 0, Subterfuge: 0
            }
        },
        merits: [],
        flaws: [],
        pullingStrings: [],
        inventory: [],
        specialisations: [],
        health: { bashing: 0, lethal: 0, aggravated: 0 },
        willpower: { current: 0, max_mod: 0 },
        size: 5,
        mentalLoad: 0,
        experience: 0,
        experienceUsed: 0,
        pullingStringsCost: 0,
        dossier: "",
        profilePicture: null
    };

    // --- ICON COMPONENT (debounced createIcons to avoid per-render overhead) ---
    let _iconTimer = null;
    const _refreshIcons = () => {
        if (_iconTimer) clearTimeout(_iconTimer);
        _iconTimer = setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 50);
    };
    const Icon = ({ name, size = 16, className = "" }) => {
        useEffect(() => { _refreshIcons(); }, [name]);
        return <i data-lucide={name} width={size} height={size} className={className}></i>;
    };

    // --- AUTO-SAVE INPUT (uncontrolled) ---
    // Uses defaultValue so React never touches the DOM input after mount.
    // The DOM manages typing; we just read values via onChange to update
    // the data ref and schedule a background save.
    const AutoSaveInput = ({ defaultValue, onSave, delay = 1500, component = 'input', ...props }) => {
        const timerRef = useRef(null);

        const handleChange = (e) => {
            const val = e.target.value;
            if (timerRef.current) clearTimeout(timerRef.current);
            timerRef.current = setTimeout(() => {
                onSave(val);
            }, delay);
        };

        const handleBlur = (e) => {
            if (timerRef.current) {
                clearTimeout(timerRef.current);
                timerRef.current = null;
            }
            onSave(e.target.value);
        };

        const Tag = component;
        return <Tag {...props} defaultValue={defaultValue} onChange={handleChange} onBlur={handleBlur} />;
    };

    // --- STAT DOTS ---
    const StatDots = ({ value, max = 5, onChange, editable }) => {
        return (
            <div style={{ display: 'flex', gap: '4px' }}>
                {[...Array(max)].map((_, i) => (
                    <div
                        key={i}
                        onClick={() => editable && onChange(i + 1 === value && value === 1 ? 0 : i + 1)}
                        style={{
                            width: '12px', height: '12px', borderRadius: '50%',
                            border: '1px solid var(--text-muted)',
                            background: i < value ? 'var(--accent-primary)' : 'transparent',
                            cursor: editable ? 'pointer' : 'default',
                            boxShadow: i < value ? '0 0 5px var(--accent-glow)' : 'none'
                        }}
                    />
                ))}
            </div>
        );
    };

    // --- PROFILE PICTURE MODULE ---
    const ProfilePictureModule = ({ profilePicture, onUpload }) => {
        const [uploading, setUploading] = useState(false);
        const fileRef = useRef(null);

        const handleUpload = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setUploading(true);
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch('/api/characters/' + CHARACTER_ID + '/image/', {
                    method: 'POST',
                    headers: { 'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN },
                    body: formData,
                });
                if (response.ok) {
                    const data = await response.json();
                    onUpload(data.profilePicture);
                }
            } catch (err) {
                console.error('Upload error:', err);
            } finally {
                setUploading(false);
                if (fileRef.current) fileRef.current.value = '';
            }
        };

        return (
            <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '1rem' }}>
                <div
                    onClick={() => IS_OWNER && fileRef.current?.click()}
                    style={{
                        width: '150px', height: '150px', borderRadius: '50%',
                        border: '2px solid var(--accent-primary)',
                        overflow: 'hidden', cursor: IS_OWNER ? 'pointer' : 'default',
                        position: 'relative',
                        background: profilePicture ? `url(${profilePicture}) center/cover` : 'var(--bg-panel)',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                    }}
                    title={IS_OWNER ? 'Click to upload portrait' : ''}
                >
                    {!profilePicture && !uploading && (
                        <Icon name="user" size={48} className="text-muted" />
                    )}
                    {uploading && (
                        <div style={{
                            position: 'absolute', inset: 0,
                            background: 'rgba(0,0,0,0.7)',
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                        }}>
                            <span className="mono-text text-accent" style={{ fontSize: '0.8rem' }}>UPLOADING...</span>
                        </div>
                    )}
                    {IS_OWNER && !uploading && (
                        <div style={{
                            position: 'absolute', bottom: 0, left: 0, right: 0,
                            background: 'rgba(0,0,0,0.6)', textAlign: 'center',
                            padding: '4px 0', fontSize: '0.7rem',
                            fontFamily: 'var(--font-mono)', color: 'var(--accent-primary)',
                        }}>
                            {profilePicture ? 'CHANGE' : 'UPLOAD'}
                        </div>
                    )}
                </div>
                <input ref={fileRef} type="file" accept="image/*"
                    onChange={handleUpload} style={{ display: 'none' }} />
            </div>
        );
    };

    // --- DOSSIER MODULE ---
    const DossierModule = ({ dossier, onSave }) => {
        const [editing, setEditing] = useState(false);
        const textareaRef = useRef(null);

        const handleSave = () => {
            if (textareaRef.current) {
                onSave({ dossier: textareaRef.current.value });
            }
            setEditing(false);
        };

        const renderMarkdown = (text) => {
            if (!text) return '<p style="color: var(--text-muted); font-style: italic;">No dossier recorded.</p>';
            try { return window.marked.parse(text); } catch { return text; }
        };

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <div style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>
                    <h3 className="mono-text text-accent">OPERATIVE DOSSIER</h3>
                    {IS_OWNER && (
                        <button onClick={() => editing ? handleSave() : setEditing(true)}
                            style={{
                                background: 'transparent',
                                border: '1px solid var(--accent-primary)',
                                color: 'var(--accent-primary)',
                                padding: '0.25rem 0.75rem', cursor: 'pointer',
                                fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                            }}>
                            {editing ? 'SAVE' : 'EDIT'}
                        </button>
                    )}
                </div>
                {editing ? (
                    <textarea ref={textareaRef} defaultValue={dossier}
                        placeholder="Write operative dossier in markdown..."
                        style={{
                            width: '100%', minHeight: '200px', background: 'var(--bg-input)',
                            border: '1px solid var(--border-color)', color: 'var(--text-primary)',
                            padding: '1rem', fontFamily: 'var(--font-mono)', fontSize: '0.9rem',
                            resize: 'vertical', borderRadius: 'var(--radius-sm)',
                        }} />
                ) : (
                    <div className="dossier-content"
                        dangerouslySetInnerHTML={{ __html: renderMarkdown(dossier) }} />
                )}
            </div>
        );
    };

    // --- HEADER MODULE ---
    const HeaderModule = ({ char, onSave }) => (
        <div className="glass-panel" style={{
            padding: '1.5rem', marginBottom: '1rem',
            display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem'
        }}>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>CODENAME</label>
                <AutoSaveInput type="text" defaultValue={char.name}
                    onSave={val => onSave({ name: val })}
                    style={{
                        background: 'transparent', border: 'none',
                        borderBottom: '1px solid var(--accent-primary)',
                        color: 'var(--text-primary)', width: '100%',
                        fontSize: '1.2rem', fontFamily: 'var(--font-mono)'
                    }} />
            </div>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>CLASS</label>
                <select value={char.characterClass || ""}
                    onChange={e => onSave({ characterClass: e.target.value })}
                    disabled={!IS_OWNER}
                    style={{
                        background: 'transparent', border: 'none',
                        borderBottom: '1px solid var(--border-color)',
                        color: 'var(--text-primary)', width: '100%',
                        fontFamily: 'var(--font-mono)', cursor: 'pointer'
                    }}>
                    <option value="" style={{ background: 'var(--bg-dark)' }}>— SELECT —</option>
                    <option value="fixer" style={{ background: 'var(--bg-dark)' }}>Fixer</option>
                    <option value="soldier" style={{ background: 'var(--bg-dark)' }}>Soldier</option>
                    <option value="science" style={{ background: 'var(--bg-dark)' }}>Science</option>
                    <option value="engineer" style={{ background: 'var(--bg-dark)' }}>Engineer</option>
                    {IS_SUPERUSER && <option value="ai" style={{ background: 'var(--bg-dark)' }}>AI</option>}
                </select>
            </div>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>CONCEPT</label>
                <AutoSaveInput type="text" defaultValue={char.concept}
                    onSave={val => onSave({ concept: val })}
                    style={{
                        background: 'transparent', border: 'none',
                        borderBottom: '1px solid var(--border-color)',
                        color: 'var(--text-primary)', width: '100%'
                    }} />
            </div>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>CHRONICLE</label>
                <AutoSaveInput type="text" defaultValue={char.chronicle}
                    onSave={val => onSave({ chronicle: val })}
                    style={{
                        background: 'transparent', border: 'none',
                        borderBottom: '1px solid var(--border-color)',
                        color: 'var(--text-primary)', width: '100%'
                    }} />
            </div>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>VIRTUE / VICE</label>
                <div style={{ display: 'flex', gap: '0.5rem' }}>
                    <AutoSaveInput type="text" placeholder="Virtue" defaultValue={char.virtue}
                        onSave={val => onSave({ virtue: val })}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--border-color)',
                            color: 'var(--text-primary)', width: '50%'
                        }} />
                    <span className="text-muted">/</span>
                    <AutoSaveInput type="text" placeholder="Vice" defaultValue={char.vice}
                        onSave={val => onSave({ vice: val })}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--border-color)',
                            color: 'var(--text-primary)', width: '50%'
                        }} />
                </div>
            </div>
        </div>
    );

    // --- ATTRIBUTES MODULE ---
    const AttributesModule = ({ attributes, update }) => {
        const updateAttr = (cat, type, val) => {
            update({ ...attributes, [cat]: { ...attributes[cat], [type]: val } });
        };

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>ATTRIBUTES</h3>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '2rem' }}>
                    <div>
                        <div className="text-center text-muted mono-text" style={{ marginBottom: '0.5rem' }}>MENTAL</div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                            <span>Intelligence</span>
                            <StatDots value={attributes.power.mental}
                                onChange={v => updateAttr('power', 'mental', v)} editable={IS_OWNER} />
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                            <span>Wits</span>
                            <StatDots value={attributes.finesse.mental}
                                onChange={v => updateAttr('finesse', 'mental', v)} editable={IS_OWNER} />
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span>Resolve</span>
                            <StatDots value={attributes.resistance.mental}
                                onChange={v => updateAttr('resistance', 'mental', v)} editable={IS_OWNER} />
                        </div>
                    </div>
                    <div>
                        <div className="text-center text-muted mono-text" style={{ marginBottom: '0.5rem' }}>PHYSICAL</div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                            <span>Strength</span>
                            <StatDots value={attributes.power.physical}
                                onChange={v => updateAttr('power', 'physical', v)} editable={IS_OWNER} />
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                            <span>Dexterity</span>
                            <StatDots value={attributes.finesse.physical}
                                onChange={v => updateAttr('finesse', 'physical', v)} editable={IS_OWNER} />
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span>Stamina</span>
                            <StatDots value={attributes.resistance.physical}
                                onChange={v => updateAttr('resistance', 'physical', v)} editable={IS_OWNER} />
                        </div>
                    </div>
                    <div>
                        <div className="text-center text-muted mono-text" style={{ marginBottom: '0.5rem' }}>SOCIAL</div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                            <span>Presence</span>
                            <StatDots value={attributes.power.social}
                                onChange={v => updateAttr('power', 'social', v)} editable={IS_OWNER} />
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                            <span>Manipulation</span>
                            <StatDots value={attributes.finesse.social}
                                onChange={v => updateAttr('finesse', 'social', v)} editable={IS_OWNER} />
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span>Composure</span>
                            <StatDots value={attributes.resistance.social}
                                onChange={v => updateAttr('resistance', 'social', v)} editable={IS_OWNER} />
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    // --- SKILLS MODULE ---
    const SkillsModule = ({ skills, update }) => {
        const updateSkill = (cat, name, val) => {
            update({ ...skills, [cat]: { ...skills[cat], [name]: val } });
        };

        const SkillCol = ({ category, title }) => (
            <div>
                <h4 className="text-center text-muted mono-text" style={{
                    marginBottom: '1rem', textTransform: 'uppercase'
                }}>{title}</h4>
                {Object.entries(skills[category]).map(([name, val]) => (
                    <div key={name} style={{
                        display: 'flex', justifyContent: 'space-between',
                        alignItems: 'center', marginBottom: '0.5rem'
                    }}>
                        <span style={{
                            fontSize: '0.9rem',
                            color: val === 0 ? 'var(--text-muted)' : 'var(--text-primary)'
                        }}>
                            {name.replace(/([A-Z])/g, ' $1').trim()}
                            {val === 0 && <span style={{
                                fontSize: '0.7em', marginLeft: '4px', opacity: 0.5
                            }}>(-{category === 'mental' ? 3 : 1})</span>}
                        </span>
                        <StatDots value={val}
                            onChange={v => updateSkill(category, name, v)} editable={IS_OWNER} />
                    </div>
                ))}
            </div>
        );

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>SKILLS</h3>
                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))',
                    gap: '2rem'
                }}>
                    <SkillCol category="mental" title="Mental (-3 Unskilled)" />
                    <SkillCol category="physical" title="Physical (-1 Unskilled)" />
                    <SkillCol category="social" title="Social (-1 Unskilled)" />
                </div>
            </div>
        );
    };

    // --- SPECIALISATIONS MODULE ---
    const ALL_SKILLS = [
        'Academics', 'Computer', 'Crafts', 'Investigation', 'Medicine', 'Occult', 'Politics', 'Science',
        'Athletics', 'Brawl', 'Drive', 'Firearms', 'Larceny', 'Stealth', 'Survival', 'Weaponry',
        'Animal Ken', 'Empathy', 'Expression', 'Intimidation', 'Persuasion', 'Socialize', 'Streetwise', 'Subterfuge'
    ];

    const SpecialisationsModule = ({ specialisations, update, quietUpdate, getFresh }) => (
        <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
            <h3 className="mono-text text-accent" style={{
                borderBottom: '1px solid var(--border-color)',
                paddingBottom: '0.5rem', marginBottom: '1rem',
                display: 'flex', justifyContent: 'space-between', alignItems: 'center'
            }}>
                SPECIALISATIONS
                {IS_OWNER && (
                    <button onClick={() => {
                        document.activeElement?.blur();
                        const fresh = getFresh ? getFresh() : specialisations;
                        update([...fresh, { skill: "", name: "" }]);
                    }}
                        title="Add Specialisation" style={{
                            background: 'transparent', border: '1px solid var(--accent-primary)',
                            color: 'var(--accent-primary)', width: '24px', height: '24px',
                            borderRadius: '4px', cursor: 'pointer',
                            display: 'flex', alignItems: 'center', justifyContent: 'center'
                        }}>
                        <Icon name="plus" size={14} />
                    </button>
                )}
            </h3>
            {specialisations.map((spec, idx) => (
                <div key={idx} className="tech-border" style={{
                    padding: '0.5rem', marginBottom: '0.5rem', background: 'rgba(0,0,0,0.2)',
                    display: 'flex', gap: '0.5rem', alignItems: 'center'
                }}>
                    <select
                        value={spec.skill}
                        onChange={e => {
                            const fresh = getFresh ? getFresh() : specialisations;
                            update(fresh.map((s, i) => i === idx ? { ...s, skill: e.target.value } : s));
                        }}
                        disabled={!IS_OWNER}
                        style={{
                            background: 'var(--bg-input)', border: '1px solid var(--border-color)',
                            color: 'var(--accent-primary)', padding: '0.25rem',
                            fontFamily: 'var(--font-mono)', fontSize: '0.85rem',
                            minWidth: '120px'
                        }}
                    >
                        <option value="">— Skill —</option>
                        {ALL_SKILLS.map(s => (
                            <option key={s} value={s}>{s}</option>
                        ))}
                    </select>
                    <AutoSaveInput
                        type="text"
                        placeholder="Specialisation name..."
                        defaultValue={spec.name}
                        onSave={val => {
                            const fresh = getFresh ? getFresh() : specialisations;
                            (quietUpdate || update)(fresh.map((s, i) => i === idx ? { ...s, name: val } : s));
                        }}
                        disabled={!IS_OWNER}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--text-muted)',
                            color: 'var(--text-primary)', flex: 1,
                            fontFamily: 'var(--font-mono)'
                        }}
                    />
                    {IS_OWNER && (
                        <button onClick={() => {
                            document.activeElement?.blur();
                            const fresh = getFresh ? getFresh() : specialisations;
                            update(fresh.filter((_, i) => i !== idx));
                        }}
                            style={{
                                background: 'transparent', border: 'none',
                                color: 'var(--accent-danger)', cursor: 'pointer'
                            }}>
                            <Icon name="x" size={14} />
                        </button>
                    )}
                </div>
            ))}
            {specialisations.length === 0 && (
                <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                    No specialisations recorded.
                </p>
            )}
        </div>
    );

    // --- DERIVED TRAITS MODULE ---
    const DerivedTraitsModule = ({ char, update }) => {
        const me = useMemo(() => computeMeritEffects(char.merits), [char.merits]);
        const effectiveSize = (char.size || 5) + me.sizeMod;
        const speed = 5 + char.attributes.power.physical + char.attributes.finesse.physical + effectiveSize + me.speedMod;
        const initMod = char.attributes.finesse.physical + char.attributes.resistance.social;
        const defense = Math.min(char.attributes.finesse.physical, char.attributes.finesse.mental);
        const willpowerMax = char.attributes.resistance.mental + char.attributes.resistance.social + me.willpowerMod;
        const healthMax = char.attributes.resistance.physical + effectiveSize + me.extraHealth;

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>DERIVED TRAITS</h3>
                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))',
                    gap: '1rem'
                }}>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>HEALTH</div>
                        <div className="text-accent" style={{ fontSize: '1.5rem' }}>{healthMax}</div>
                        <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>Stamina + Size</div>
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>WILLPOWER</div>
                        <div className="text-accent" style={{ fontSize: '1.5rem' }}>{willpowerMax}</div>

    // --- MERIT EFFECTS COMPUTATION ---
    // Aggregates all mechanical effects from a character's merits.
    const computeMeritEffects = (merits) => {
        const effects = {
            extraHealth: 0, sizeMod: 0, speedMod: 0, willpowerMod: 0,
            statBonuses: {}, skillBonuses: {}, difficultyMods: {}, customs: [],
        };
        (merits || []).forEach(m => {
            const e = m.effects || {};
            if (e.extra_health) effects.extraHealth += e.extra_health;
            if (e.size_mod) effects.sizeMod += e.size_mod;
            if (e.speed_mod) effects.speedMod += e.speed_mod;
            if (e.willpower_mod) effects.willpowerMod += e.willpower_mod;
            if (e.stat_bonus) {
                Object.entries(e.stat_bonus).forEach(([k, v]) => {
                    effects.statBonuses[k] = (effects.statBonuses[k] || 0) + v;
                });
            }
            if (e.skill_bonus) {
                Object.entries(e.skill_bonus).forEach(([k, v]) => {
                    effects.skillBonuses[k] = (effects.skillBonuses[k] || 0) + v;
                });
            }
            if (e.difficulty_mod) {
                Object.entries(e.difficulty_mod).forEach(([k, v]) => {
                    effects.difficultyMods[k] = (effects.difficultyMods[k] || 0) + v;
                });
            }
            if (e.custom) effects.customs.push(`${m.name}: ${e.custom}`);
        });
        return effects;
    };

    // --- MERITS MODULE (catalog-based) ---
    const MeritsModule = ({ merits, catalog, onAdd, onRemove, onUpdateRating }) => {
        const [showPicker, setShowPicker] = useState(false);

        const categories = {};
        merits.forEach(m => {

            if (!categories[cat]) categories[cat] = [];
            categories[cat].push(m);

        return (

                    paddingBottom: '0.5rem', marginBottom: '1rem',
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                }}>

                            color: 'var(--accent-primary)', width: '24px', height: '24px',

                {showPicker && (

                        background: 'rgba(0,0,0,0.3)', maxHeight: '300px', overflowY: 'auto'

                        </div>

                                No additional merits available.
                            </p>

                                    {catMerits.map(m => (

                                            </span>

                {catOrder.filter(c => categories[c]).map(cat => (

                        }}>{catLabel(cat).toUpperCase()}</div>

                            }}>

                                    </span>

                                {m.effects && Object.keys(m.effects).length > 0 && (
                                    <div style={{ fontSize: '0.7rem', color: 'var(--text-accent)', marginTop: '0.25rem' }}>

                                        {m.effects.speed_mod && `Speed ${m.effects.speed_mod > 0 ? '+' : ''}${m.effects.speed_mod} `}
                                        {m.effects.custom && m.effects.custom}
