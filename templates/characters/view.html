{% extends "base.html" %}

{% block title %}PERSONNEL RECORD // BLACKLOG.NET{% endblock %}

{% block content %}
<div id="app-root">
    <div class="loading-screen">
        <h1 class="mono-text">DECRYPTING PERSONNEL RECORD...</h1>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Django context variables — outside verbatim block
    const CHARACTER_ID = {{ character_id }};
    const IS_OWNER = false;
    const CSRF_TOKEN = '{{ csrf_token }}';
</script>
{% verbatim %}
<script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- DEFAULT CHARACTER STRUCTURE ---
    const DEFAULT_CHARACTER = {
        id: null,
        name: "UNKNOWN AGENT",
        characterClass: "",
        concept: "",
        chronicle: "",
        virtue: "",
        vice: "",
        attributes: {
            power: { mental: 1, physical: 1, social: 1 },
            finesse: { mental: 1, physical: 1, social: 1 },
            resistance: { mental: 1, physical: 1, social: 1 }
        },
        skills: {
            mental: {
                Academics: 0, Computer: 0, Crafts: 0, Investigation: 0,
                Medicine: 0, Occult: 0, Politics: 0, Science: 0
            },
            physical: {
                Athletics: 0, Brawl: 0, Drive: 0, Firearms: 0,
                Larceny: 0, Stealth: 0, Survival: 0, Weaponry: 0
            },
            social: {
                AnimalKen: 0, Empathy: 0, Expression: 0, Intimidation: 0,
                Persuasion: 0, Socialize: 0, Streetwise: 0, Subterfuge: 0
            }
        },
        merits: [],
        flaws: [],
        pullingStrings: [],
        inventory: [],
        specialisations: [],
        health: { bashing: 0, lethal: 0, aggravated: 0 },
        willpower: { current: 0, max_mod: 0 },
        size: 5,
        experience: 0,
        dossier: "",
        profilePicture: null
    };

    // --- ICON COMPONENT ---
    const Icon = ({ name, size = 16, className = "" }) => {
        useEffect(() => {
            if (window.lucide) window.lucide.createIcons();
        }, [name]);
        return <i data-lucide={name} width={size} height={size} className={className}></i>;
    };

    // --- STAT DOTS (read-only) ---
    const StatDots = ({ value, max = 5 }) => {
        return (
            <div style={{ display: 'flex', gap: '4px' }}>
                {[...Array(max)].map((_, i) => (
                    <div
                        key={i}
                        style={{
                            width: '12px', height: '12px', borderRadius: '50%',
                            border: '1px solid var(--text-muted)',
                            background: i < value ? 'var(--accent-primary)' : 'transparent',
                            cursor: 'default',
                            boxShadow: i < value ? '0 0 5px var(--accent-glow)' : 'none'
                        }}
                    />
                ))}
            </div>
        );
    };

    // Image lightbox modal
    const ImageLightbox = ({ src, alt, onClose }) => {
        if (!src) return null;
        return ReactDOM.createPortal(
            <div onClick={onClose} style={{
                position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                background: 'rgba(0,0,0,0.85)', display: 'flex',
                alignItems: 'center', justifyContent: 'center', zIndex: 2000, cursor: 'pointer',
            }}>
                <img src={src} alt={alt || 'Image'} onClick={e => e.stopPropagation()} style={{
                    maxWidth: '90vw', maxHeight: '90vh', objectFit: 'contain',
                    border: '2px solid var(--c-dim)', borderRadius: 0, cursor: 'default',
                }} />
            </div>,
            document.body
        );
    };

    // --- PROFILE PICTURE (read-only with lightbox) ---
    const ProfilePictureReadOnly = ({ profilePicture }) => {
        const [showLightbox, setShowLightbox] = useState(false);
        return (
            <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '1rem' }}>
                <div
                    onClick={() => profilePicture && setShowLightbox(true)}
                    style={{
                        width: '150px', height: '150px', borderRadius: '50%',
                        border: '2px solid var(--accent-primary)',
                        overflow: 'hidden', cursor: profilePicture ? 'pointer' : 'default',
                        background: profilePicture ? `url(${profilePicture}) center/cover` : 'var(--bg-panel)',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                    }}
                    title={profilePicture ? 'Click to enlarge' : ''}
                >
                    {!profilePicture && (
                        <Icon name="user" size={48} className="text-muted" />
                    )}
                </div>
                {showLightbox && (
                    <ImageLightbox src={profilePicture} alt="Portrait"
                        onClose={() => setShowLightbox(false)} />
                )}
            </div>
        );
    };

    // --- DOSSIER MODULE (read-only) ---
    // Wave 2A: legacy h3 with hard border swapped for block-head section pattern.
    const DossierReadOnly = ({ dossier }) => {
        const renderMarkdown = (text) => {
            if (!text) return '<p style="color: var(--text-muted); font-style: italic;">No dossier recorded.</p>';
            try { return window.marked.parse(text); } catch { return text; }
        };

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>OPERATIVE DOSSIER</h3>
                    <span className="block-line"></span>
                </header>
                <div className="dossier-content"
                    dangerouslySetInnerHTML={{ __html: renderMarkdown(dossier) }} />
            </div>
        );
    };

    // --- HEADER MODULE (read-only) ---
    const HeaderModule = ({ char }) => (
        <div className="glass-panel" style={{
            padding: '1.5rem', marginBottom: '1rem',
            display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem'
        }}>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>CODENAME</label>
                <div style={{
                    borderBottom: '1px solid var(--accent-primary)',
                    color: 'var(--text-primary)', width: '100%',
                    fontSize: '1.2rem', fontFamily: 'var(--font-mono)',
                    paddingBottom: '0.25rem'
                }}>
                    {char.name}
                </div>
            </div>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>CLASS</label>
                <div style={{
                    borderBottom: '1px solid var(--border-color)',
                    color: 'var(--text-primary)', width: '100%',
                    paddingBottom: '0.25rem'
                }}>
                    {char.characterClass
                        ? char.characterClass.charAt(0).toUpperCase() + char.characterClass.slice(1)
                        : <span className="text-muted">—</span>}
                </div>
            </div>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>CONCEPT</label>
                <div style={{
                    borderBottom: '1px solid var(--border-color)',
                    color: 'var(--text-primary)', width: '100%',
                    paddingBottom: '0.25rem'
                }}>
                    {char.concept || <span className="text-muted">—</span>}
                </div>
            </div>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>CHRONICLE</label>
                <div style={{
                    borderBottom: '1px solid var(--border-color)',
                    color: 'var(--text-primary)', width: '100%',
                    paddingBottom: '0.25rem'
                }}>
                    {char.chronicle || <span className="text-muted">—</span>}
                </div>
            </div>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>VIRTUE / VICE</label>
                <div style={{
                    borderBottom: '1px solid var(--border-color)',
                    color: 'var(--text-primary)', width: '100%',
                    paddingBottom: '0.25rem'
                }}>
                    {char.virtue || <span className="text-muted">—</span>}
                    <span className="text-muted"> / </span>
                    {char.vice || <span className="text-muted">—</span>}
                </div>
            </div>
        </div>
    );

    // --- ATTRIBUTES MODULE (read-only) ---
    const AttributesModule = ({ attributes }) => {
        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>ATTRIBUTES</h3>
                    <span className="block-line"></span>
                </header>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '2rem' }}>
                    <div>
                        <div className="text-center text-muted mono-text" style={{ marginBottom: '0.5rem' }}>MENTAL</div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                            <span>Intelligence</span>
                            <StatDots value={attributes.power.mental} />
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                            <span>Wits</span>
                            <StatDots value={attributes.finesse.mental} />
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span>Resolve</span>
                            <StatDots value={attributes.resistance.mental} />
                        </div>
                    </div>
                    <div>
                        <div className="text-center text-muted mono-text" style={{ marginBottom: '0.5rem' }}>PHYSICAL</div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                            <span>Strength</span>
                            <StatDots value={attributes.power.physical} />
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                            <span>Dexterity</span>
                            <StatDots value={attributes.finesse.physical} />
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span>Stamina</span>
                            <StatDots value={attributes.resistance.physical} />
                        </div>
                    </div>
                    <div>
                        <div className="text-center text-muted mono-text" style={{ marginBottom: '0.5rem' }}>SOCIAL</div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                            <span>Presence</span>
                            <StatDots value={attributes.power.social} />
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                            <span>Manipulation</span>
                            <StatDots value={attributes.finesse.social} />
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span>Composure</span>
                            <StatDots value={attributes.resistance.social} />
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    // --- SKILLS MODULE (read-only) ---
    const SkillsModule = ({ skills }) => {
        const SkillCol = ({ category, title }) => (
            <div>
                <h4 className="text-center text-muted mono-text" style={{
                    marginBottom: '1rem', textTransform: 'uppercase'
                }}>{title}</h4>
                {Object.entries(skills[category]).map(([name, val]) => (
                    <div key={name} style={{
                        display: 'flex', justifyContent: 'space-between',
                        alignItems: 'center', marginBottom: '0.5rem'
                    }}>
                        <span style={{
                            fontSize: '0.9rem',
                            color: val === 0 ? 'var(--text-muted)' : 'var(--text-primary)'
                        }}>
                            {name.replace(/([A-Z])/g, ' $1').trim()}
                            {val === 0 && <span style={{
                                fontSize: '0.7em', marginLeft: '4px', opacity: 0.5
                            }}>(-{category === 'mental' ? 3 : 1})</span>}
                        </span>
                        <StatDots value={val} />
                    </div>
                ))}
            </div>
        );

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>SKILLS</h3>
                    <span className="block-line"></span>
                </header>
                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))',
                    gap: '2rem'
                }}>
                    <SkillCol category="mental" title="Mental (-3 Unskilled)" />
                    <SkillCol category="physical" title="Physical (-1 Unskilled)" />
                    <SkillCol category="social" title="Social (-1 Unskilled)" />
                </div>
            </div>
        );
    };

    // --- SPECIALISATIONS MODULE (read-only) ---
    const SpecialisationsModule = ({ specialisations }) => (
        <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
            <header className="block-head" style={{ marginBottom: '1rem' }}>
                <span className="block-bullet">■</span>
                <h3>SPECIALISATIONS</h3>
                <span className="block-line"></span>
                <span className="block-badge">{specialisations.length}</span>
            </header>
            {specialisations.map((spec, idx) => (
                <div key={idx} className="tech-border" style={{
                    padding: '0.5rem', marginBottom: '0.5rem', background: 'rgba(0,0,0,0.2)',
                    display: 'flex', gap: '0.5rem', alignItems: 'center'
                }}>
                    <span style={{
                        color: 'var(--accent-primary)',
                        fontFamily: 'var(--font-mono)', fontSize: '0.85rem',
                        minWidth: '120px'
                    }}>
                        {spec.skill || <span className="text-muted">—</span>}
                    </span>
                    <span style={{ color: 'var(--text-primary)', fontFamily: 'var(--font-mono)' }}>
                        {spec.name || <span className="text-muted">Unnamed</span>}
                    </span>
                </div>
            ))}
            {specialisations.length === 0 && (
                <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                    No specialisations recorded.
                </p>
            )}
        </div>
    );

    // --- DERIVED TRAITS MODULE (read-only) ---
    const DerivedTraitsModule = ({ char }) => {
        const speed = 5 + char.attributes.power.physical + char.attributes.finesse.physical + (char.size || 5);
        const initMod = char.attributes.finesse.physical + char.attributes.resistance.social;
        const defense = Math.min(char.attributes.finesse.physical, char.attributes.finesse.mental);
        const willpowerMax = char.attributes.resistance.mental + char.attributes.resistance.social;
        const healthMax = char.attributes.resistance.physical + (char.size || 5);

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>DERIVED TRAITS</h3>
                    <span className="block-line"></span>
                </header>
                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))',
                    gap: '1rem'
                }}>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>HEALTH</div>
                        <div className="text-accent" style={{ fontSize: '1.5rem' }}>{healthMax}</div>
                        <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>Stamina + Size</div>
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>WILLPOWER</div>
                        <div className="text-accent" style={{ fontSize: '1.5rem' }}>{willpowerMax}</div>
                        <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>Resolve + Composure</div>
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>INITIATIVE</div>
                        <div style={{ fontSize: '1.5rem', color: 'var(--text-primary)' }}>{initMod}</div>
                        <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>Dex + Comp</div>
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>DEFENSE</div>
                        <div style={{ fontSize: '1.5rem', color: 'var(--text-primary)' }}>{defense}</div>
                        <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>Lowest(Wits, Dex)</div>
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>SPEED</div>
                        <div style={{ fontSize: '1.5rem', color: 'var(--text-primary)' }}>{speed}</div>
                        <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>Str + Dex + 5</div>
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>SIZE</div>
                        <div style={{ fontSize: '1.5rem', color: 'var(--text-primary)' }}>{char.size || 5}</div>
                    </div>
                </div>
            </div>
        );
    };

    // --- HEALTH MODULE (read-only) ---
    const HealthModule = ({ health, max }) => {
        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                border: '1px solid var(--accent-danger)'
            }}>
                <div style={{
                    display: 'flex', justifyContent: 'space-between',
                    alignItems: 'center', marginBottom: '1rem',
                    flexWrap: 'wrap', gap: '0.5rem'
                }}>
                    {/* Wave 2A: block-head pattern, status-pill for monitoring state. */}
                    <header className="block-head" style={{ flex: 1, color: 'var(--accent-danger)' }}>
                        <span className="block-bullet">●</span>
                        <h3 style={{ color: 'var(--ink)' }}>BIOSIGN MONITOR</h3>
                        <span className="block-line" style={{ background: 'linear-gradient(90deg, var(--accent-danger), transparent)' }}></span>
                    </header>
                    <span className="status-pill s-burned" style={{ animation: 'pulse 2s infinite' }}>
                        TRACKING
                    </span>
                </div>

                {/* EKG Visual */}
                <div style={{
                    height: '60px', background: 'rgba(0,0,0,0.3)',
                    marginBottom: '1rem', position: 'relative', overflow: 'hidden',
                    borderLeft: '2px solid var(--accent-danger)'
                }}>
                    <svg width="100%" height="100%" viewBox="0 0 300 60" preserveAspectRatio="none">
                        <path d="M0,30 L20,30 L25,10 L35,50 L40,30 L300,30"
                            fill="none" stroke="var(--accent-danger)" strokeWidth="2"
                            vectorEffect="non-scaling-stroke"
                            style={{ animation: 'dash 2s linear infinite' }}
                        />
                    </svg>
                </div>

                {/* Health boxes visual */}
                <div style={{ display: 'flex', justifyContent: 'center', gap: '0.5rem', flexWrap: 'wrap' }}>
                    {[...Array(max)].map((_, i) => {
                        let symbol = '';
                        let color = 'var(--border-color)';
                        if (i < (health.aggravated || 0)) {
                            symbol = '*';
                            color = 'var(--accent-danger)';
                        } else if (i < (health.aggravated || 0) + (health.lethal || 0)) {
                            symbol = 'X';
                            color = 'var(--accent-warning)';
                        } else if (i < (health.aggravated || 0) + (health.lethal || 0) + (health.bashing || 0)) {
                            symbol = '/';
                            color = 'var(--text-secondary)';
                        }
                        return (
                            <div key={i} style={{
                                width: '24px', height: '24px',
                                border: '1px solid var(--accent-danger)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                color: color, fontWeight: 'bold', fontSize: '0.9rem'
                            }}>
                                {symbol}
                            </div>
                        );
                    })}
                </div>

                {/* Numeric damage display (read-only) */}
                <div style={{ display: 'flex', gap: '2rem', justifyContent: 'center', marginTop: '1rem', flexWrap: 'wrap' }}>
                    <div className="text-center">
                        <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>BASHING</label>
                        <div style={{
                            color: 'var(--accent-danger)', fontSize: '1.2rem',
                            textAlign: 'center', fontFamily: 'var(--font-mono)'
                        }}>{health.bashing || 0}</div>
                    </div>
                    <div className="text-center">
                        <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>LETHAL</label>
                        <div style={{
                            color: 'var(--accent-danger)', fontSize: '1.2rem',
                            textAlign: 'center', fontFamily: 'var(--font-mono)'
                        }}>{health.lethal || 0}</div>
                    </div>
                    <div className="text-center">
                        <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>AGGRAVATED</label>
                        <div style={{
                            color: 'var(--accent-danger)', fontSize: '1.2rem',
                            textAlign: 'center', fontFamily: 'var(--font-mono)'
                        }}>{health.aggravated || 0}</div>
                    </div>
                </div>
            </div>
        );
    };

    // --- PULLING STRINGS MODULE (read-only, catalog-based) ---
    const PullingStringsReadOnly = ({ pullingStrings }) => {
        const catOrder = ['general', 'fixer', 'soldier', 'science', 'engineer', 'ai'];
        const catLabel = c => c.charAt(0).toUpperCase() + c.slice(1);
        const categories = {};
        pullingStrings.forEach(ps => {
            const cat = ps.category || 'general';
            if (!categories[cat]) categories[cat] = [];
            categories[cat].push(ps);
        });

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>PULLING STRINGS</h3>
                    <span className="block-line"></span>
                    <span className="block-badge">{pullingStrings.length}</span>
                </header>
                {catOrder.filter(c => categories[c]).map(cat => (
                    <div key={cat}>
                        <div className="text-muted mono-text" style={{
                            fontSize: '0.7rem', marginBottom: '0.25rem', marginTop: '0.5rem'
                        }}>{catLabel(cat).toUpperCase()}</div>
                        {categories[cat].map(ps => (
                            <div key={ps.id} className="tech-border" style={{
                                padding: '0.5rem', marginBottom: '0.5rem', background: 'rgba(0,0,0,0.2)'
                            }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <span className="mono-text" style={{ color: 'var(--text-primary)' }}>{ps.name}</span>
                                    <span className="mono-text text-accent" style={{ fontSize: '0.8rem' }}>{ps.cost} XP</span>
                                </div>
                                {ps.description && (
                                    <p className="text-secondary" style={{ fontSize: '0.8rem', margin: '0.25rem 0 0 0' }}>
                                        {ps.description}
                                    </p>
                                )}
                                {ps.linkedNpc && (
                                    <div style={{ marginTop: '0.25rem', fontSize: '0.8rem' }}>
                                        <span className="text-muted">Linked: </span>
                                        <a href={`/npcs/${ps.linkedNpc.id}/`} style={{ color: 'var(--text-accent)' }}>
                                            {ps.linkedNpc.name}
                                        </a>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                ))}
                {pullingStrings.length === 0 && (
                    <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                        No pulling strings acquired.
                    </p>
                )}
            </div>
        );
    };

    // --- EXPANDABLE LIST MODULE (read-only) ---
    const ExpandableListModule = ({ title, items, itemLabel = "Item" }) => (
        <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
            <header className="block-head" style={{ marginBottom: '1rem' }}>
                <span className="block-bullet">■</span>
                <h3>{title}</h3>
                <span className="block-line"></span>
                <span className="block-badge">{items.length}</span>
            </header>
            {items.map((item, idx) => (
                <div key={idx} className="tech-border" style={{
                    padding: '0.5rem', marginBottom: '0.5rem', background: 'rgba(0,0,0,0.2)'
                }}>
                    <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                        <span style={{
                            color: 'var(--text-primary)', flex: 1,
                            fontFamily: 'var(--font-mono)'
                        }}>
                            {item.name || <span className="text-muted">Unnamed</span>}
                        </span>
                        <StatDots value={item.rating} max={5} />
                    </div>
                    {item.description && (
                        <div style={{
                            color: 'var(--text-secondary)', fontSize: '0.8rem',
                            marginTop: '0.5rem'
                        }}>
                            {item.description}
                        </div>
                    )}
                </div>
            ))}
            {items.length === 0 && (
                <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                    No data recorded.
                </p>
            )}
        </div>
    );

    // --- INVENTORY MODULE (read-only) ---
    const InventoryModule = ({ inventory }) => (
        <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
            <header className="block-head" style={{ marginBottom: '1rem' }}>
                <span className="block-bullet">■</span>
                <h3>INVENTORY / ASSETS</h3>
                <span className="block-line"></span>
                <span className="block-badge">{(inventory || []).length}</span>
            </header>
            <div style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fill, minmax(250px, 1fr))',
                gap: '1rem'
            }}>
                {inventory.map((item, idx) => (
                    <div key={idx} className="tech-border" style={{
                        padding: '0.5rem', background: 'rgba(0,0,0,0.2)'
                    }}>
                        <div style={{
                            display: 'flex', gap: '0.5rem',
                            alignItems: 'center', marginBottom: '0.5rem'
                        }}>
                            <span style={{
                                color: 'var(--text-primary)', flex: 1,
                                fontFamily: 'var(--font-mono)'
                            }}>
                                {item.name || <span className="text-muted">Unnamed</span>}
                            </span>
                            {item.bonus > 0 && (
                                <span style={{ color: 'var(--accent-success)', fontFamily: 'var(--font-mono)' }}>
                                    +{item.bonus}
                                </span>
                            )}
                        </div>
                        {item.description && (
                            <div style={{ color: 'var(--text-secondary)', fontSize: '0.8rem' }}>
                                {item.description}
                            </div>
                        )}
                    </div>
                ))}
            </div>
            {(!inventory || inventory.length === 0) && (
                <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                    No items recorded.
                </p>
            )}
        </div>
    );

    // --- DICE ROLLER (always available) ---
    const DiceRoller = () => {
        const [pool, setPool] = useState(1);
        const [again, setAgain] = useState(10);
        const [results, setResults] = useState(null);

        const roll = () => {
            const newResults = [];
            let successes = 0;
            let diceToRoll = pool;

            if (diceToRoll > 50) diceToRoll = 50;
            if (diceToRoll < 1) diceToRoll = 1;

            while (diceToRoll > 0) {
                const die = Math.floor(Math.random() * 10) + 1;
                let isSuccess = die >= 8;
                let explode = die >= again;

                newResults.push({ value: die, success: isSuccess, exploded: explode });
                if (isSuccess) successes++;

                if (explode) {
                    diceToRoll++;
                    if (newResults.length > 100) break;
                }
                diceToRoll--;
            }
            setResults({ rolls: newResults, totalSuccesses: successes });
        };

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                borderTop: '2px solid var(--accent-primary)'
            }}>
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>TACTICAL DICE ROLLER</h3>
                    <span className="block-line"></span>
                </header>

                <div style={{
                    display: 'flex', gap: '1rem', alignItems: 'flex-end',
                    justifyContent: 'center', marginBottom: '1rem',
                    flexWrap: 'wrap'
                }}>
                    <div>
                        <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>POOL SIZE</label>
                        <input type="number" value={pool}
                            onChange={e => setPool(parseInt(e.target.value) || 1)}
                            style={{
                                display: 'block', width: '80px', height: '50px',
                                fontSize: '2rem', textAlign: 'center',
                                background: 'var(--bg-input)', color: 'var(--text-primary)',
                                border: '1px solid var(--accent-primary)'
                            }} />
                    </div>
                    <div>
                        <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>AGAIN</label>
                        <select value={again} onChange={e => setAgain(parseInt(e.target.value))}
                            style={{
                                display: 'block', height: '50px',
                                background: 'var(--bg-input)', color: 'var(--text-primary)',
                                border: '1px solid var(--border-color)'
                            }}>
                            <option value={10}>10-Again</option>
                            <option value={9}>9-Again</option>
                            <option value={8}>8-Again</option>
                        </select>
                    </div>
                    <button onClick={roll} style={{
                        height: '50px', padding: '0 2rem',
                        background: 'var(--accent-primary)', color: 'var(--bg-dark)',
                        border: 'none', fontWeight: 'bold', cursor: 'pointer', fontSize: '1.2rem'
                    }}>
                        EXECUTE
                    </button>
                </div>

                {results && (
                    <div className="tech-border" style={{ padding: '1rem', background: 'rgba(0,0,0,0.3)' }}>
                        <div style={{ textAlign: 'center', marginBottom: '0.5rem' }}>
                            <span className="mono-text text-muted">OUTCOME: </span>
                            <span style={{
                                fontSize: '1.5rem', fontWeight: 'bold',
                                color: results.totalSuccesses > 0 ? 'var(--accent-success)' : 'var(--text-secondary)'
                            }}>
                                {results.totalSuccesses} SUCCESSES
                            </span>
                        </div>
                        <div style={{
                            display: 'flex', flexWrap: 'wrap', gap: '4px', justifyContent: 'center'
                        }}>
                            {results.rolls.map((r, i) => (
                                <div key={i} style={{
                                    width: '24px', height: '24px',
                                    borderRadius: 0,
                                    background: r.success ? 'var(--accent-primary)' : 'var(--bg-panel)',
                                    color: r.success ? 'var(--bg-dark)' : 'var(--text-secondary)',
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    fontWeight: 'bold',
                                    border: r.exploded ? '1px solid var(--accent-warning)' : 'none'
                                }}>
                                    {r.value}
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // --- MAIN APP (read-only view) ---
    const CharacterView = () => {
        const [char, setChar] = useState(null);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
            fetchCharacter();
        }, []);

        const fetchCharacter = async () => {
            try {
                const response = await fetch('/api/characters/' + CHARACTER_ID + '/');
                if (response.ok) {
                    const data = await response.json();
                    const merged = {
                        ...DEFAULT_CHARACTER,
                        ...data,
                        attributes: {
                            power: { ...DEFAULT_CHARACTER.attributes.power, ...(data.attributes?.power || {}) },
                            finesse: { ...DEFAULT_CHARACTER.attributes.finesse, ...(data.attributes?.finesse || {}) },
                            resistance: { ...DEFAULT_CHARACTER.attributes.resistance, ...(data.attributes?.resistance || {}) }
                        },
                        skills: {
                            mental: { ...DEFAULT_CHARACTER.skills.mental, ...(data.skills?.mental || {}) },
                            physical: { ...DEFAULT_CHARACTER.skills.physical, ...(data.skills?.physical || {}) },
                            social: { ...DEFAULT_CHARACTER.skills.social, ...(data.skills?.social || {}) }
                        },
                        health: { ...DEFAULT_CHARACTER.health, ...(data.health || {}) },
                        merits: data.merits || [],
                        flaws: data.flaws || [],
                        pullingStrings: data.pullingStrings || data.pulling_strings || [],
                        inventory: data.inventory || [],
                        specialisations: data.specialisations || [],
                    };
                    setChar(merged);
                } else {
                    console.error('Failed to load character');
                }
            } catch (err) {
                console.error('Failed to load character:', err);
            } finally {
                setLoading(false);
            }
        };

        if (loading) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-accent" style={{ animation: 'pulse 1.5s infinite' }}>
                        DECRYPTING PERSONNEL RECORD...
                    </h2>
                </div>
            );
        }

        if (!char) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-danger">ERROR: RECORD NOT FOUND</h2>
                    <p className="text-muted" style={{ marginTop: '1rem' }}>
                        The requested personnel record could not be retrieved.
                    </p>
                </div>
            );
        }

        return (
            <div className="fade-in">
                {/* Wave 2A: brackets-card outer chrome — corner cuts + display title.
                    Inner section panels remain glass-panel; their headers were
                    swapped to block-head pattern in this same wave. */}
                <div className="brackets" style={{ position: 'relative', padding: '28px 32px', marginBottom: '1rem' }}>
                    <span className="bk tl"></span><span className="bk tr"></span>
                    <span className="bk bl"></span><span className="bk br"></span>

                    <div style={{
                        display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
                        flexWrap: 'wrap', gap: '0.75rem'
                    }}>
                        <div>
                            <div className="kicker">// PERSONNEL RECORD</div>
                            <h2 className="title" style={{ fontSize: '44px', marginBottom: '6px' }}>
                                <span>{char.name || 'UNKNOWN'}</span>
                            </h2>
                            {char.owner && (
                                <div className="sub" style={{ marginBottom: 0 }}>
                                    HANDLER · {char.owner}
                                </div>
                            )}
                        </div>
                        <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center', flexWrap: 'wrap' }}>
                            {/* Read-only badge -> dormant status pill (idle / non-editable). */}
                            <span className="status-pill s-dormant">READ ONLY</span>
                            <a href="/" className="btn-cyber">
                                &lt; CLOSE RECORD
                            </a>
                        </div>
                    </div>
                </div>

                <ProfilePictureReadOnly profilePicture={char.profilePicture} />

                <HeaderModule char={char} />

                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))',
                    gap: '1rem', marginBottom: '1rem'
                }}>
                    <AttributesModule attributes={char.attributes} />
                    <SkillsModule skills={char.skills} />
                </div>

                <SpecialisationsModule specialisations={char.specialisations || []} />

                <DerivedTraitsModule char={char} />

                <InventoryModule inventory={char.inventory || []} />

                <HealthModule
                    health={char.health}
                    max={char.attributes.resistance.physical + (char.size || 5)}
                />

                <DossierReadOnly dossier={char.dossier || ""} />

                <DiceRoller />

                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))',
                    gap: '1rem'
                }}>
                    <PullingStringsReadOnly
                        pullingStrings={char.pullingStrings || []}
                    />
                    <ExpandableListModule
                        title="MERITS" itemLabel="Merit Name"
                        items={char.merits || []}
                    />
                </div>
                {(char.flaws || []).length > 0 && (
                    <ExpandableListModule
                        title="FLAWS" itemLabel="Flaw Name"
                        items={char.flaws || []}
                    />
                )}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<CharacterView />);
</script>
