{% extends "base.html" %}
{% load static %}
{% block title %}TIMELINE // EXODUS{% endblock %}
{# Command surface — splash class for vignette + scanlines. #}
{% block body_class %}surface-splash{% endblock %}

{% block content %}
<style>
    /* Timeline command surface — clearance-gate chrome.
       Wrapper holds the .brackets frame; inputs use square corners
       and palette tokens so theme/palette flips cascade. */
    .gm-shell-wrap {
        max-width: 1500px; margin: 1.5rem auto; padding: 0 1rem;
    }
    .gm-shell {
        display: flex;
        min-height: calc(100vh - 180px);
        position: relative;
        padding: 24px;
    }
    .gm-shell .bk { z-index: 2; }
    .gm-main { flex: 1; display: flex; min-width: 0; }
    .gm-list {
        width: 360px; flex-shrink: 0;
        border-right: 1px solid var(--c-dim);
        display: flex; flex-direction: column;
    }
    .gm-list-header {
        padding: 0.75rem; border-bottom: 1px solid var(--c-dim);
        display: flex; gap: 0.5rem; flex-direction: column;
    }
    .gm-list-scroll { overflow-y: auto; flex: 1; }
    .gm-event-item {
        padding: 0.75rem; cursor: pointer;
        border-bottom: 1px solid var(--c-dim);
        position: relative;
        border-left: 2px solid transparent;
    }
    .gm-event-item:hover { background: var(--c-soft); }
    .gm-event-item.active {
        background: var(--c-soft);
        border-left: 2px solid var(--c-primary);
    }
    .gm-editor { flex: 1; padding: 1.25rem; overflow-y: auto; }
    .gm-input, .gm-select {
        background: rgba(0,0,0,0.45); border: 1px solid var(--c-dim);
        color: var(--text-primary); padding: 0.5rem;
        font-family: var(--font-mono); width: 100%;
        border-radius: 0; font-size: 0.9rem;
    }
    .gm-input:focus, .gm-select:focus {
        border-color: var(--c-primary);
        box-shadow: 0 0 0 1px var(--c-primary), 0 0 12px var(--c-glow);
        outline: none;
    }
    .gm-select { cursor: pointer; }
    .gm-textarea {
        background: rgba(0,0,0,0.45); border: 1px solid var(--c-dim);
        color: var(--text-primary); padding: 0.75rem;
        font-family: var(--font-mono); width: 100%;
        min-height: 400px; resize: vertical;
        border-radius: 0; font-size: 0.85rem;
        line-height: 1.5;
    }
    .gm-textarea:focus {
        border-color: var(--c-primary);
        box-shadow: 0 0 0 1px var(--c-primary), 0 0 12px var(--c-glow);
        outline: none;
    }
    .gm-btn {
        background: transparent; border: 1px solid var(--c-dim);
        color: var(--text-secondary); padding: 0.35rem 0.75rem;
        cursor: pointer; font-family: var(--font-mono);
        font-size: 0.75rem; letter-spacing: 1px; border-radius: 0;
    }
    .gm-btn.primary { border-color: var(--c-primary); color: var(--c-primary); }
    .gm-btn.danger { border-color: var(--accent-danger); color: var(--accent-danger); }
    .gm-btn:hover:not(:disabled) { background: var(--c-soft); }
    .gm-chip {
        display: inline-block; padding: 0.1rem 0.4rem;
        background: var(--c-soft); color: var(--c-primary);
        border: 1px solid var(--c-primary); border-radius: 0;
        font-family: var(--font-mono); font-size: 0.65rem;
        margin-right: 0.25rem; letter-spacing: 1px;
    }
    .gm-preview {
        background: rgba(0,0,0,0.35); border: 1px solid var(--c-dim);
        border-radius: 0; padding: 1rem;
        color: var(--text-primary); line-height: 1.6;
    }
    .gm-preview h1, .gm-preview h2, .gm-preview h3 {
        color: var(--accent-primary); font-family: var(--font-mono);
        margin-top: 1rem; margin-bottom: 0.5rem;
        text-shadow: 0 0 6px var(--c-glow);
    }
    .gm-preview a { color: var(--accent-primary); }
    .gm-preview blockquote {
        border-left: 3px solid var(--accent-primary);
        padding-left: 1rem; color: var(--text-secondary);
    }
</style>

<div class="gm-shell-wrap">
    <div class="gm-shell brackets">
        <span class="bk tl"></span><span class="bk tr"></span>
        <span class="bk bl"></span><span class="bk br"></span>
        {% include "gm_workspace/_sidebar.html" %}
        <div id="timeline-root" style="flex: 1; display: flex; min-width: 0;"></div>
    </div>
</div>

<script>
  window.__CSRF__ = "{{ csrf_token }}";
</script>

<script type="text/babel">
{% verbatim %}
const { useState, useEffect, useMemo, useRef } = React;
const CSRF = window.__CSRF__;

function api(url, opts = {}) {
    return fetch(url, {
        headers: { "Content-Type": "application/json", "X-CSRFToken": CSRF },
        ...opts,
    }).then(r => {
        if (!r.ok) return r.text().then(t => Promise.reject({ status: r.status, body: t }));
        return r.json();
    });
}

function useDebouncedEffect(fn, deps, ms) {
    const tRef = useRef();
    useEffect(() => {
        clearTimeout(tRef.current);
        tRef.current = setTimeout(fn, ms);
        return () => clearTimeout(tRef.current);
    }, deps);
}

const TYPE_LABELS = { session: "SESSION", plot: "PLOT", world: "WORLD", note: "NOTE" };
// Map event types to status-pill semantic classes.
//   session → s-active   (the "happened, on-record" state)
//   plot    → s-standby  (queued/in-progress narrative beat)
//   world   → s-burned   (red — world-altering, stands out)
//   note    → s-inactive (low-key marginalia)
const TYPE_PILL = {
    session: "s-active",
    plot:    "s-standby",
    world:   "s-burned",
    note:    "s-inactive",
};

function EventItem({ ev, active, onClick }) {
    const tags = (ev.tags || "").split(",").map(t => t.trim()).filter(Boolean);
    const pillClass = TYPE_PILL[ev.eventType] || "s-inactive";
    return (
        <div className={`gm-event-item ${active ? "active" : ""}`} onClick={onClick}>
            <div style={{ display: "flex", alignItems: "center", marginBottom: "0.25rem", gap: "0.3rem" }}>
                <span className={`status-pill ${pillClass}`}>{TYPE_LABELS[ev.eventType]}</span>
                <span className="mono-text" style={{ color: "var(--text-primary)", fontSize: "0.85rem", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>
                    {ev.title || "Untitled"}
                </span>
            </div>
            <div className="text-muted" style={{ fontSize: "0.7rem", fontFamily: "var(--font-mono)" }}>
                {ev.gameDate || "—"}
            </div>
            {ev.excerpt && (
                <div className="text-muted" style={{ fontSize: "0.7rem", lineHeight: 1.3, marginTop: "0.25rem" }}>
                    {ev.excerpt}
                </div>
            )}
            {tags.length > 0 && (
                <div style={{ marginTop: "0.3rem" }}>
                    {tags.map(t => <span key={t} className="gm-chip">{t}</span>)}
                </div>
            )}
        </div>
    );
}

function Editor({ ev, onSave, onDelete, saveStatus }) {
    const [title, setTitle] = useState(ev.title || "");
    const [description, setDescription] = useState(ev.description || "");
    const [eventType, setEventType] = useState(ev.eventType || "note");
    const [gameDate, setGameDate] = useState(ev.gameDate || "");
    const [tags, setTags] = useState(ev.tags || "");
    const [viewMode, setViewMode] = useState(() => {
        try { return localStorage.getItem("gm_view_mode") || "edit"; } catch (e) { return "edit"; }
    });
    const setView = (m) => {
        setViewMode(m);
        try { localStorage.setItem("gm_view_mode", m); } catch (e) {}
    };

    const lastId = useRef(ev.id);
    useEffect(() => {
        if (ev.id !== lastId.current) {
            setTitle(ev.title || "");
            setDescription(ev.description || "");
            setEventType(ev.eventType || "note");
            setGameDate(ev.gameDate || "");
            setTags(ev.tags || "");
            lastId.current = ev.id;
        }
    }, [ev.id]);

    useDebouncedEffect(() => {
        if (ev.id == null) return;
        onSave({ title, description, eventType, gameDate, tags });
    }, [title, description, eventType, gameDate, tags], 1500);

    const rendered = useMemo(() => {
        try { return window.marked ? window.marked.parse(description || "") : description; }
        catch (e) { return description; }
    }, [description]);

    return (
        <div className="gm-editor">
            <div style={{ display: "flex", gap: "0.5rem", marginBottom: "0.5rem", alignItems: "center" }}>
                <input className="gm-input" value={title} onChange={e => setTitle(e.target.value)}
                    placeholder="Event title"
                    style={{ flex: 1, fontSize: "1.1rem", fontWeight: "bold" }} />
                <div style={{ display: "inline-flex", border: "1px solid var(--c-dim)", borderRadius: 0, overflow: "hidden" }}>
                    {["edit", "split", "preview"].map(m => (
                        <button key={m} onClick={() => setView(m)} className="mono-text"
                            style={{
                                background: viewMode === m ? "var(--c-soft)" : "transparent",
                                color: viewMode === m ? "var(--c-primary)" : "var(--text-secondary)",
                                border: "none", padding: "0.35rem 0.75rem", cursor: "pointer",
                                fontSize: "0.75rem", letterSpacing: "1px",
                                borderRight: m !== "preview" ? "1px solid var(--c-dim)" : "none",
                            }}>{m.toUpperCase()}</button>
                    ))}
                </div>
                <button className="gm-btn danger" onClick={onDelete}>DELETE</button>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "150px 200px 1fr auto", gap: "0.5rem", marginBottom: "0.75rem", alignItems: "center" }}>
                <select className="gm-select" value={eventType} onChange={e => setEventType(e.target.value)}>
                    <option value="session">Session</option>
                    <option value="plot">Plot Beat</option>
                    <option value="world">World Event</option>
                    <option value="note">Note</option>
                </select>
                <input className="gm-input" value={gameDate} onChange={e => setGameDate(e.target.value)}
                    placeholder="In-game date (e.g. 13 May 2036)" style={{ fontSize: "0.8rem" }} />
                <input className="gm-input" value={tags} onChange={e => setTags(e.target.value)}
                    placeholder="tags, comma, separated" style={{ fontSize: "0.8rem" }} />
                <span className="mono-text text-muted" style={{ fontSize: "0.7rem" }}>{saveStatus}</span>
            </div>

            {viewMode === "edit" && (
                <textarea className="gm-textarea" value={description}
                    onChange={e => setDescription(e.target.value)}
                    placeholder="Describe the event in markdown..." />
            )}
            {viewMode === "preview" && (
                <div className="gm-preview" style={{ minHeight: "400px" }}
                    dangerouslySetInnerHTML={{ __html: rendered }} />
            )}
            {viewMode === "split" && (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.75rem" }}>
                    <textarea className="gm-textarea" value={description}
                        onChange={e => setDescription(e.target.value)}
                        placeholder="Describe the event in markdown..."
                        style={{ minHeight: "500px" }} />
                    <div className="gm-preview" style={{ minHeight: "500px", overflowY: "auto" }}
                        dangerouslySetInnerHTML={{ __html: rendered }} />
                </div>
            )}
        </div>
    );
}

function EmptyState({ onCreate }) {
    return (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: "1rem", color: "var(--text-muted)" }}>
            <div className="mono-text" style={{ fontSize: "0.9rem", letterSpacing: "2px" }}>NO EVENT SELECTED</div>
            <button className="gm-btn primary" onClick={onCreate}>+ NEW EVENT</button>
        </div>
    );
}

function App() {
    const [events, setEvents] = useState([]);
    const [activeId, setActiveId] = useState(null);
    const [activeEvent, setActiveEvent] = useState(null);
    const [filter, setFilter] = useState("");
    const [typeFilter, setTypeFilter] = useState("all");
    const [loading, setLoading] = useState(true);
    const [saveStatus, setSaveStatus] = useState("");

    const loadList = () => api("/api/gm/timeline/").then(d => { setEvents(d.events || []); return d; });
    const loadDetail = (id) => {
        if (id == null) { setActiveEvent(null); return; }
        api(`/api/gm/timeline/${id}/`).then(setActiveEvent);
    };

    useEffect(() => {
        loadList().then(d => {
            setLoading(false);
            if (d.events && d.events.length > 0) setActiveId(d.events[0].id);
        });
    }, []);

    useEffect(() => { loadDetail(activeId); }, [activeId]);

    const create = () => {
        setSaveStatus("creating...");
        api("/api/gm/timeline/", {
            method: "POST",
            body: JSON.stringify({ title: "New event", description: "", eventType: "note", gameDate: "", tags: "" }),
        }).then(d => { setSaveStatus(""); loadList(); setActiveId(d.id); });
    };

    const save = (payload) => {
        if (activeId == null) return;
        setSaveStatus("saving...");
        api(`/api/gm/timeline/${activeId}/`, { method: "PUT", body: JSON.stringify(payload) })
            .then(d => { setSaveStatus("saved"); setActiveEvent(d); loadList(); setTimeout(() => setSaveStatus(""), 1500); })
            .catch(() => setSaveStatus("save failed"));
    };

    const del = () => {
        if (activeId == null) return;
        if (!confirm("Delete this event permanently?")) return;
        api(`/api/gm/timeline/${activeId}/`, { method: "DELETE" }).then(() => {
            setActiveId(null); setActiveEvent(null); loadList();
        });
    };

    const filtered = useMemo(() => {
        let list = events;
        if (typeFilter !== "all") list = list.filter(e => e.eventType === typeFilter);
        if (filter.trim()) {
            const f = filter.toLowerCase();
            list = list.filter(e =>
                (e.title || "").toLowerCase().includes(f) ||
                (e.tags || "").toLowerCase().includes(f) ||
                (e.excerpt || "").toLowerCase().includes(f) ||
                (e.gameDate || "").toLowerCase().includes(f)
            );
        }
        return list;
    }, [events, filter, typeFilter]);

    return (
        <div className="gm-main">
            <div className="gm-list">
                <div className="gm-list-header">
                    <header className="block-head" style={{ marginBottom: 0 }}>
                        <span className="block-bullet">■</span>
                        <h3>TIMELINE</h3>
                        <span className="block-line"></span>
                        <span className="block-badge">{filtered.length.toString().padStart(2, "0")}</span>
                    </header>
                    <div style={{ display: "flex", justifyContent: "flex-end" }}>
                        <button className="gm-btn primary" onClick={create}>+ NEW</button>
                    </div>
                    <input className="gm-input" value={filter} onChange={e => setFilter(e.target.value)}
                        placeholder="Filter..." style={{ fontSize: "0.8rem" }} />
                    <select className="gm-select" value={typeFilter} onChange={e => setTypeFilter(e.target.value)}
                        style={{ fontSize: "0.75rem" }}>
                        <option value="all">All types</option>
                        <option value="session">Sessions</option>
                        <option value="plot">Plot beats</option>
                        <option value="world">World events</option>
                        <option value="note">Notes</option>
                    </select>
                </div>
                <div className="gm-list-scroll">
                    {loading && <div className="text-muted" style={{ padding: "1rem", fontSize: "0.8rem", fontStyle: "italic" }}>Loading...</div>}
                    {!loading && filtered.length === 0 && (
                        <div className="text-muted" style={{ padding: "1rem", fontSize: "0.8rem", fontStyle: "italic" }}>
                            {events.length === 0 ? "No events yet." : "Nothing matches the filter."}
                        </div>
                    )}
                    {filtered.map(ev => (
                        <EventItem key={ev.id} ev={ev} active={ev.id === activeId} onClick={() => setActiveId(ev.id)} />
                    ))}
                </div>
            </div>
            {activeEvent
                ? <Editor key={activeEvent.id} ev={activeEvent} onSave={save} onDelete={del} saveStatus={saveStatus} />
                : <EmptyState onCreate={create} />}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("timeline-root")).render(<App />);
{% endverbatim %}
</script>
{% endblock %}
