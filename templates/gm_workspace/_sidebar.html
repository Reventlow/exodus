<style>
    .gm-sidebar {
        width: 220px; flex-shrink: 0;
        border-right: 1px solid var(--border-color);
        padding: 1rem; background: rgba(0,0,0,0.15);
    }
    .gm-sidebar-group-label {
        font-family: var(--font-mono); color: var(--text-muted);
        font-size: 0.65rem; letter-spacing: 2px;
        padding: 0.5rem 0.4rem; margin-top: 0.5rem;
        border-bottom: 1px solid var(--border-color);
    }
    .gm-sidebar-item {
        display: block; width: 100%;
        background: transparent; border: none;
        color: var(--text-secondary);
        font-family: var(--font-mono); font-size: 0.8rem;
        text-align: left; padding: 0.5rem 0.6rem;
        cursor: pointer; border-radius: 3px;
        margin-top: 0.25rem; letter-spacing: 1px;
        text-decoration: none;
    }
    .gm-sidebar-item:hover { background: rgba(56,189,248,0.05); }
    .gm-sidebar-item.active {
        background: rgba(56,189,248,0.08);
        color: var(--accent-primary);
        border-left: 2px solid var(--accent-primary);
        padding-left: 0.4rem;
    }
</style>

<div class="gm-sidebar">
    <div class="gm-sidebar-group-label">CAMPAIGN</div>
    <a href="/gm/story-ideas/"
       class="gm-sidebar-item {% if active_tool == 'ideas' %}active{% endif %}">Story Ideas</a>
    <a href="/gm/timeline/"
       class="gm-sidebar-item {% if active_tool == 'timeline' %}active{% endif %}">Timeline</a>
    <a href="/gm/campaign-log/"
       class="gm-sidebar-item {% if active_tool == 'log' %}active{% endif %}">Campaign Log</a>
</div>
