{% extends "base.html" %}
{% load static %}
{% block title %}CAMPAIGN LOG // EXODUS{% endblock %}
{# Command surface — splash class for vignette + scanlines. #}
{% block body_class %}surface-splash{% endblock %}

{% block content %}
<style>
    /* Campaign-log command surface — clearance-gate chrome.
       Outer wrap holds the .brackets frame; sessions live in a list
       column with a session-number badge. Inputs use square corners
       and palette tokens so theme/palette swaps cascade. */
    .gm-shell-wrap {
        max-width: 1500px; margin: 1.5rem auto; padding: 0 1rem;
    }
    .gm-shell {
        display: flex;
        min-height: calc(100vh - 180px);
        position: relative;
        padding: 24px;
    }
    .gm-shell .bk { z-index: 2; }
    .gm-main { flex: 1; display: flex; min-width: 0; }
    .gm-list {
        width: 340px; flex-shrink: 0;
        border-right: 1px solid var(--c-dim);
        display: flex; flex-direction: column;
    }
    .gm-list-header {
        padding: 0.75rem; border-bottom: 1px solid var(--c-dim);
        display: flex; gap: 0.5rem; flex-direction: column;
    }
    .gm-list-scroll { overflow-y: auto; flex: 1; }
    .gm-session-item {
        padding: 0.75rem; cursor: pointer;
        border-bottom: 1px solid var(--c-dim);
        border-left: 2px solid transparent;
    }
    .gm-session-item:hover { background: var(--c-soft); }
    .gm-session-item.active {
        background: var(--c-soft);
        border-left: 2px solid var(--c-primary);
    }
    .gm-editor { flex: 1; padding: 1.25rem; overflow-y: auto; }
    .gm-input {
        background: rgba(0,0,0,0.45); border: 1px solid var(--c-dim);
        color: var(--text-primary); padding: 0.5rem;
        font-family: var(--font-mono); width: 100%;
        border-radius: 0; font-size: 0.9rem;
    }
    .gm-input:focus {
        border-color: var(--c-primary);
        box-shadow: 0 0 0 1px var(--c-primary), 0 0 12px var(--c-glow);
        outline: none;
    }
    .gm-textarea {
        background: rgba(0,0,0,0.45); border: 1px solid var(--c-dim);
        color: var(--text-primary); padding: 0.75rem;
        font-family: var(--font-mono); width: 100%;
        min-height: 400px; resize: vertical;
        border-radius: 0; font-size: 0.85rem;
        line-height: 1.5;
    }
    .gm-textarea:focus {
        border-color: var(--c-primary);
        box-shadow: 0 0 0 1px var(--c-primary), 0 0 12px var(--c-glow);
        outline: none;
    }
    .gm-btn {
        background: transparent; border: 1px solid var(--c-dim);
        color: var(--text-secondary); padding: 0.35rem 0.75rem;
        cursor: pointer; font-family: var(--font-mono);
        font-size: 0.75rem; letter-spacing: 1px; border-radius: 0;
    }
    .gm-btn.primary { border-color: var(--c-primary); color: var(--c-primary); }
    .gm-btn.danger { border-color: var(--accent-danger); color: var(--accent-danger); }
    .gm-btn:hover:not(:disabled) { background: var(--c-soft); }
    .gm-chip {
        display: inline-block; padding: 0.1rem 0.4rem;
        background: var(--c-soft); color: var(--c-primary);
        border: 1px solid var(--c-primary); border-radius: 0;
        font-family: var(--font-mono); font-size: 0.65rem;
        margin-right: 0.25rem; letter-spacing: 1px;
    }
    .gm-preview {
        background: rgba(0,0,0,0.35); border: 1px solid var(--c-dim);
        border-radius: 0; padding: 1rem;
        color: var(--text-primary); line-height: 1.6;
    }
    .gm-preview h1, .gm-preview h2, .gm-preview h3 {
        color: var(--accent-primary); font-family: var(--font-mono);
        margin-top: 1rem; margin-bottom: 0.5rem;
        text-shadow: 0 0 6px var(--c-glow);
    }
    .gm-preview a { color: var(--accent-primary); }
    .gm-preview blockquote {
        border-left: 3px solid var(--accent-primary);
        padding-left: 1rem; color: var(--text-secondary);
    }
</style>

<div class="gm-shell-wrap">
    <div class="gm-shell brackets">
        <span class="bk tl"></span><span class="bk tr"></span>
        <span class="bk bl"></span><span class="bk br"></span>
        {% include "gm_workspace/_sidebar.html" %}
        <div id="log-root" style="flex: 1; display: flex; min-width: 0;"></div>
    </div>
</div>

<script>
  window.__CSRF__ = "{{ csrf_token }}";
</script>

<script type="text/babel">
{% verbatim %}
const { useState, useEffect, useMemo, useRef } = React;
const CSRF = window.__CSRF__;

function api(url, opts = {}) {
    return fetch(url, {
        headers: { "Content-Type": "application/json", "X-CSRFToken": CSRF },
        ...opts,
    }).then(r => {
        if (!r.ok) return r.text().then(t => Promise.reject({ status: r.status, body: t }));
        return r.json();
    });
}

function useDebouncedEffect(fn, deps, ms) {
    const tRef = useRef();
    useEffect(() => {
        clearTimeout(tRef.current);
        tRef.current = setTimeout(fn, ms);
        return () => clearTimeout(tRef.current);
    }, deps);
}

function SessionItem({ session, active, onClick }) {
    const tags = (session.tags || "").split(",").map(t => t.trim()).filter(Boolean);
    return (
        <div className={`gm-session-item ${active ? "active" : ""}`} onClick={onClick}>
            <div style={{ display: "flex", alignItems: "center", marginBottom: "0.25rem", gap: "0.3rem" }}>
                {session.sessionNumber != null && (
                    /* Session-number pill: amber/standby — draws the eye but isn't critical state. */
                    <span className="status-pill s-standby">SES {String(session.sessionNumber).padStart(2, "0")}</span>
                )}
                <span className="mono-text" style={{ color: "var(--text-primary)", fontSize: "0.85rem", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    {session.title || "Untitled"}
                </span>
            </div>
            <div className="text-muted" style={{ fontSize: "0.7rem", fontFamily: "var(--font-mono)" }}>
                {session.playedAt ? `Played ${session.playedAt}` : ""}
                {session.playedAt && session.gameDate ? " · " : ""}
                {session.gameDate ? `In-game: ${session.gameDate}` : ""}
            </div>
            {session.excerpt && (
                <div className="text-muted" style={{ fontSize: "0.7rem", lineHeight: 1.3, marginTop: "0.3rem" }}>
                    {session.excerpt}
                </div>
            )}
            {tags.length > 0 && (
                <div style={{ marginTop: "0.3rem" }}>
                    {tags.map(t => <span key={t} className="gm-chip">{t}</span>)}
                </div>
            )}
        </div>
    );
}

function Editor({ session, onSave, onDelete, saveStatus }) {
    const [sessionNumber, setSessionNumber] = useState(session.sessionNumber != null ? String(session.sessionNumber) : "");
    const [title, setTitle] = useState(session.title || "");
    const [summary, setSummary] = useState(session.summary || "");
    const [playedAt, setPlayedAt] = useState(session.playedAt || "");
    const [gameDate, setGameDate] = useState(session.gameDate || "");
    const [tags, setTags] = useState(session.tags || "");
    const [viewMode, setViewMode] = useState(() => {
        try { return localStorage.getItem("gm_view_mode") || "edit"; } catch (e) { return "edit"; }
    });
    const setView = (m) => {
        setViewMode(m);
        try { localStorage.setItem("gm_view_mode", m); } catch (e) {}
    };

    const lastId = useRef(session.id);
    useEffect(() => {
        if (session.id !== lastId.current) {
            setSessionNumber(session.sessionNumber != null ? String(session.sessionNumber) : "");
            setTitle(session.title || "");
            setSummary(session.summary || "");
            setPlayedAt(session.playedAt || "");
            setGameDate(session.gameDate || "");
            setTags(session.tags || "");
            lastId.current = session.id;
        }
    }, [session.id]);

    useDebouncedEffect(() => {
        if (session.id == null) return;
        onSave({
            sessionNumber: sessionNumber === "" ? null : parseInt(sessionNumber) || null,
            title, summary, playedAt: playedAt || null, gameDate, tags,
        });
    }, [sessionNumber, title, summary, playedAt, gameDate, tags], 1500);

    const rendered = useMemo(() => {
        try { return window.marked ? window.marked.parse(summary || "") : summary; }
        catch (e) { return summary; }
    }, [summary]);

    return (
        <div className="gm-editor">
            <header className="block-head" style={{ marginBottom: "0.75rem" }}>
                <span className="block-bullet">■</span>
                <h3>SESSION{session.sessionNumber != null ? ` ${String(session.sessionNumber).padStart(2, "0")}` : ""}</h3>
                <span className="block-line"></span>
                {session.playedAt && <span className="block-badge">{session.playedAt}</span>}
            </header>
            <div style={{ display: "flex", gap: "0.5rem", marginBottom: "0.5rem", alignItems: "center" }}>
                <input className="gm-input" value={sessionNumber} onChange={e => setSessionNumber(e.target.value.replace(/[^0-9]/g, ""))}
                    placeholder="#" style={{ width: "70px", textAlign: "center", fontSize: "1rem", fontWeight: "bold" }} />
                <input className="gm-input" value={title} onChange={e => setTitle(e.target.value)}
                    placeholder="Session title"
                    style={{ flex: 1, fontSize: "1.1rem", fontWeight: "bold" }} />
                <div style={{ display: "inline-flex", border: "1px solid var(--c-dim)", borderRadius: 0, overflow: "hidden" }}>
                    {["edit", "split", "preview"].map(m => (
                        <button key={m} onClick={() => setView(m)} className="mono-text"
                            style={{
                                background: viewMode === m ? "var(--c-soft)" : "transparent",
                                color: viewMode === m ? "var(--c-primary)" : "var(--text-secondary)",
                                border: "none", padding: "0.35rem 0.75rem", cursor: "pointer",
                                fontSize: "0.75rem", letterSpacing: "1px",
                                borderRight: m !== "preview" ? "1px solid var(--c-dim)" : "none",
                            }}>{m.toUpperCase()}</button>
                    ))}
                </div>
                <button className="gm-btn danger" onClick={onDelete}>DELETE</button>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr auto", gap: "0.5rem", marginBottom: "0.75rem", alignItems: "center" }}>
                <label style={{ display: "flex", gap: "0.4rem", alignItems: "center" }}>
                    <span className="mono-text text-muted" style={{ fontSize: "0.7rem", letterSpacing: "1px", minWidth: "70px" }}>PLAYED</span>
                    <input className="gm-input" type="date" value={playedAt || ""}
                        onChange={e => setPlayedAt(e.target.value)} style={{ fontSize: "0.8rem" }} />
                </label>
                <label style={{ display: "flex", gap: "0.4rem", alignItems: "center" }}>
                    <span className="mono-text text-muted" style={{ fontSize: "0.7rem", letterSpacing: "1px", minWidth: "80px" }}>IN-GAME</span>
                    <input className="gm-input" value={gameDate} onChange={e => setGameDate(e.target.value)}
                        placeholder="e.g. 13-14 May 2036" style={{ fontSize: "0.8rem" }} />
                </label>
                <label style={{ display: "flex", gap: "0.4rem", alignItems: "center" }}>
                    <span className="mono-text text-muted" style={{ fontSize: "0.7rem", letterSpacing: "1px", minWidth: "50px" }}>TAGS</span>
                    <input className="gm-input" value={tags} onChange={e => setTags(e.target.value)}
                        placeholder="comma, separated" style={{ fontSize: "0.8rem" }} />
                </label>
                <span className="mono-text text-muted" style={{ fontSize: "0.7rem" }}>{saveStatus}</span>
            </div>

            {viewMode === "edit" && (
                <textarea className="gm-textarea" value={summary}
                    onChange={e => setSummary(e.target.value)}
                    placeholder="Recap the session in markdown..." />
            )}
            {viewMode === "preview" && (
                <div className="gm-preview" style={{ minHeight: "400px" }}
                    dangerouslySetInnerHTML={{ __html: rendered }} />
            )}
            {viewMode === "split" && (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.75rem" }}>
                    <textarea className="gm-textarea" value={summary}
                        onChange={e => setSummary(e.target.value)}
                        placeholder="Recap the session in markdown..."
                        style={{ minHeight: "500px" }} />
                    <div className="gm-preview" style={{ minHeight: "500px", overflowY: "auto" }}
                        dangerouslySetInnerHTML={{ __html: rendered }} />
                </div>
            )}
        </div>
    );
}

function EmptyState({ onCreate }) {
    return (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: "1rem", color: "var(--text-muted)" }}>
            <div className="mono-text" style={{ fontSize: "0.9rem", letterSpacing: "2px" }}>NO SESSION SELECTED</div>
            <button className="gm-btn primary" onClick={onCreate}>+ NEW SESSION</button>
        </div>
    );
}

function App() {
    const [sessions, setSessions] = useState([]);
    const [activeId, setActiveId] = useState(null);
    const [activeSession, setActiveSession] = useState(null);
    const [filter, setFilter] = useState("");
    const [loading, setLoading] = useState(true);
    const [saveStatus, setSaveStatus] = useState("");

    const loadList = () => api("/api/gm/campaign-log/").then(d => { setSessions(d.sessions || []); return d; });
    const loadDetail = (id) => {
        if (id == null) { setActiveSession(null); return; }
        api(`/api/gm/campaign-log/${id}/`).then(setActiveSession);
    };

    useEffect(() => {
        loadList().then(d => {
            setLoading(false);
            if (d.sessions && d.sessions.length > 0) setActiveId(d.sessions[0].id);
        });
    }, []);

    useEffect(() => { loadDetail(activeId); }, [activeId]);

    const create = () => {
        const nextNumber = sessions.length > 0
            ? (Math.max(...sessions.map(s => s.sessionNumber || 0)) + 1)
            : 1;
        setSaveStatus("creating...");
        api("/api/gm/campaign-log/", {
            method: "POST",
            body: JSON.stringify({
                sessionNumber: nextNumber, title: `Session ${nextNumber}`,
                summary: "", playedAt: null, gameDate: "", tags: "",
            }),
        }).then(d => { setSaveStatus(""); loadList(); setActiveId(d.id); });
    };

    const save = (payload) => {
        if (activeId == null) return;
        setSaveStatus("saving...");
        api(`/api/gm/campaign-log/${activeId}/`, { method: "PUT", body: JSON.stringify(payload) })
            .then(d => { setSaveStatus("saved"); setActiveSession(d); loadList(); setTimeout(() => setSaveStatus(""), 1500); })
            .catch(() => setSaveStatus("save failed"));
    };

    const del = () => {
        if (activeId == null) return;
        if (!confirm("Delete this session recap permanently?")) return;
        api(`/api/gm/campaign-log/${activeId}/`, { method: "DELETE" }).then(() => {
            setActiveId(null); setActiveSession(null); loadList();
        });
    };

    const filtered = useMemo(() => {
        if (!filter.trim()) return sessions;
        const f = filter.toLowerCase();
        return sessions.filter(s =>
            (s.title || "").toLowerCase().includes(f) ||
            (s.tags || "").toLowerCase().includes(f) ||
            (s.excerpt || "").toLowerCase().includes(f) ||
            (s.gameDate || "").toLowerCase().includes(f) ||
            (s.playedAt || "").toLowerCase().includes(f)
        );
    }, [sessions, filter]);

    return (
        <div className="gm-main">
            <div className="gm-list">
                <div className="gm-list-header">
                    <header className="block-head" style={{ marginBottom: 0 }}>
                        <span className="block-bullet">■</span>
                        <h3>CAMPAIGN LOG</h3>
                        <span className="block-line"></span>
                        <span className="block-badge">{filtered.length.toString().padStart(2, "0")}</span>
                    </header>
                    <div style={{ display: "flex", justifyContent: "flex-end" }}>
                        <button className="gm-btn primary" onClick={create}>+ NEW</button>
                    </div>
                    <input className="gm-input" value={filter} onChange={e => setFilter(e.target.value)}
                        placeholder="Filter..." style={{ fontSize: "0.8rem" }} />
                </div>
                <div className="gm-list-scroll">
                    {loading && <div className="text-muted" style={{ padding: "1rem", fontSize: "0.8rem", fontStyle: "italic" }}>Loading...</div>}
                    {!loading && filtered.length === 0 && (
                        <div className="text-muted" style={{ padding: "1rem", fontSize: "0.8rem", fontStyle: "italic" }}>
                            {sessions.length === 0 ? "No sessions yet." : "Nothing matches the filter."}
                        </div>
                    )}
                    {filtered.map(s => (
                        <SessionItem key={s.id} session={s} active={s.id === activeId} onClick={() => setActiveId(s.id)} />
                    ))}
                </div>
            </div>
            {activeSession
                ? <Editor key={activeSession.id} session={activeSession} onSave={save} onDelete={del} saveStatus={saveStatus} />
                : <EmptyState onCreate={create} />}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("log-root")).render(<App />);
{% endverbatim %}
</script>
{% endblock %}
