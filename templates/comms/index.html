{% verbatim %}
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const CURRENT_USER_ID = window.__COMMS_CONFIG__.currentUserId;
const IS_STAFF = window.__COMMS_CONFIG__.isStaff;
const CSRF_TOKEN = window.__COMMS_CONFIG__.csrfToken;

// ---------------------------------------------------------------------------
// API helpers
// ---------------------------------------------------------------------------

function api(url, opts = {}) {
  return fetch(url, {
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": CSRF_TOKEN,
      ...opts.headers,
    },
    ...opts,
  }).then(r => {
    if (!r.ok) return r.json().then(e => Promise.reject(e));
    return r.json();
  });
}

// ---------------------------------------------------------------------------
// WebSocket hook
// ---------------------------------------------------------------------------

function useCommsSocket(onMessage) {
  const wsRef = useRef(null);
  const onMessageRef = useRef(onMessage);
  onMessageRef.current = onMessage;

  useEffect(() => {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const ws = new WebSocket(`${proto}//${location.host}/ws/comms/`);
    wsRef.current = ws;

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      onMessageRef.current(data);
    };

    ws.onclose = () => {
      setTimeout(() => {
        if (wsRef.current === ws) {
          wsRef.current = null;
        }
      }, 3000);
    };

    return () => ws.close();
  }, []);

  return wsRef;
}

// Shared styles
// ---------------------------------------------------------------------------

};

const inputStyle = {

  border: "1px solid var(--border-color)", borderRadius: "var(--radius-sm)",

};

const sectionHeader = {

};

const sectionBody = {
  padding: "1rem", display: "flex", flexDirection: "column", gap: "0.75rem", overflow: "auto",

// ---------------------------------------------------------------------------
// NewThreadModal
// ---------------------------------------------------------------------------

function NewThreadModal({ users, dossiers, onClose, onCreate }) {
  const [title, setTitle] = useState("");
  const [selectedIds, setSelectedIds] = useState([]);
  const [search, setSearch] = useState("");
  const [persona, setPersona] = useState(IS_STAFF ? GM_PERSONA : null);
  const [npcParticipant, setNpcParticipant] = useState(null);

  const filtered = users.filter(u =>
    u.id !== CURRENT_USER_ID &&
    u.displayName.toLowerCase().includes(search.toLowerCase())
  );

  function toggle(id) {
    setSelectedIds(prev =>
      prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
    );
  }

  function handleCreate() {
    if (selectedIds.length === 0 && !npcParticipant && !IS_STAFF) return;
    onCreate(title, selectedIds, persona, npcParticipant);
  }

  return (
    <div style={modalOverlay} onClick={onClose}>
      <div style={modalPanel} onClick={e => e.stopPropagation()}>
        <div style={sectionHeader}>
          <h3 className="mono-text text-accent" style={S.modalTitle}>
            NEW THREAD
          </h3>
        </div>
        <div style={sectionBody}>
          <input
            style={inputStyle}
            type="text"
            placeholder="Thread title (optional)"
            value={title}
            onChange={e => setTitle(e.target.value)}
          />
          {IS_STAFF && dossiers && (
            <div style={{display: "flex", alignItems: "center", gap: "0.5rem"}}>
              <label className="mono-text text-muted" style={{fontSize: "0.7rem", flexShrink: 0}}>POST AS:</label>
              <select
                value={persona ? `${persona.type}:${persona.id}` : "self:0"}
                onChange={e => {
                  if (e.target.value === "self:0") { setPersona(null); return; }
                  if (e.target.value === "gm:0") { setPersona(GM_PERSONA); return; }
                  const [type, id] = e.target.value.split(":");
                  const d = dossiers.find(d => d.type === type && d.id === parseInt(id));
                  if (d) setPersona(d);
                }}
                style={Object.assign({}, inputStyle, {flex: 1})}
              >
                <option value="gm:0">GM</option>
                <option value="self:0">SELF</option>
                {dossiers.map(d => (
                  <option key={`${d.type}:${d.id}`} value={`${d.type}:${d.id}`}>
                    [{d.type === "character" ? "PC" : "NPC"}] {d.name}
                  </option>
                ))}
              </select>
            </div>
          )}
          {IS_STAFF && dossiers && (
            <div style={{display: "flex", alignItems: "center", gap: "0.5rem"}}>
              <label className="mono-text text-muted" style={{fontSize: "0.7rem", flexShrink: 0}}>NPC TARGET:</label>
              <select
                value={npcParticipant ? `${npcParticipant.type}:${npcParticipant.id}` : ""}
                onChange={e => {
                  if (!e.target.value) { setNpcParticipant(null); return; }
                  const [type, id] = e.target.value.split(":");
                  const d = dossiers.find(d => d.type === type && d.id === parseInt(id));
                  if (d) setNpcParticipant(d);
                }}
                style={Object.assign({}, inputStyle, {flex: 1})}
              >
                <option value="">None (player thread)</option>
                {dossiers.filter(d => d.type === "npc").map(d => (
                  <option key={`npc:${d.id}`} value={`npc:${d.id}`}>{d.name}</option>
                ))}
              </select>
            </div>
          )}
          <input
            style={inputStyle}
            type="text"
            placeholder="Search operatives..."
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
          <div style={S.scrollList}>
            {filtered.map(u => (
              <label key={u.id} style={S.checkLabel}
                onMouseOver={e => e.currentTarget.style.background = "rgba(255,255,255,0.05)"}
                onMouseOut={e => e.currentTarget.style.background = "transparent"}>
                <input
                  type="checkbox"
                  checked={selectedIds.includes(u.id)}
                  onChange={() => toggle(u.id)}
                  style={S.checkbox}
                />
                <span style={S.userName}>{u.displayName}</span>
              </label>
            ))}
          </div>
        </div>
        <div style={sectionFooter}>
          <button style={btnGhost} onClick={onClose}>CANCEL</button>
          <button
            style={Object.assign({}, btnPrimary, {opacity: (selectedIds.length === 0 && !IS_STAFF) ? 0.4 : 1})}
            onClick={handleCreate}
            disabled={selectedIds.length === 0 && !IS_STAFF}
          >TRANSMIT</button>
        </div>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// MemberManager
// ---------------------------------------------------------------------------

function MemberManager({ thread, users, onClose, onAddMember, onRemoveMember }) {
  const [search, setSearch] = useState("");
  const isOwner = thread.creator === CURRENT_USER_ID;
  const canManage = isOwner || IS_STAFF;
  const memberIds = thread.members.map(m => m.id);

  const nonMembers = users.filter(u =>
    !memberIds.includes(u.id) &&
    u.displayName.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div style={modalOverlay} onClick={onClose}>
      <div style={modalPanel} onClick={e => e.stopPropagation()}>
        <div style={sectionHeader}>
          <h3 className="mono-text text-accent" style={S.modalTitle}>MEMBERS</h3>
        </div>
        <div style={Object.assign({}, sectionBody, {gap: "0.5rem"})}>
          {thread.members.map(m => (
            <div key={m.id} style={S.memberRow}>
              <span style={S.userName}>
                {m.displayName}
                {m.id === thread.creator && (
                  <span className="text-accent" style={S.ownerBadge}>OWNER</span>
                )}
              </span>
              {canManage && m.id !== thread.creator && (
                <button onClick={() => onRemoveMember(thread.id, m.id)} style={S.dangerBtn}>
                  REMOVE
                </button>
              )}
              {!canManage && m.id === CURRENT_USER_ID && m.id !== thread.creator && (
                <button onClick={() => onRemoveMember(thread.id, m.id)} style={S.dangerBtn}>
                  LEAVE
                </button>
              )}
            </div>
          ))}

          {canManage && (
            <React.Fragment>
              <input
                style={Object.assign({}, inputStyle, {marginTop: "0.5rem"})}
                type="text"
                placeholder="Add operative..."
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
              {search && (
                <div style={S.shortScrollList}>
                  {nonMembers.map(u => (
                    <button key={u.id}
                      onClick={() => { onAddMember(thread.id, u.id); setSearch(""); }}
                      style={S.addUserBtn}
                      onMouseOver={e => e.currentTarget.style.background = "rgba(255,255,255,0.05)"}
                      onMouseOut={e => e.currentTarget.style.background = "transparent"}>
                      + {u.displayName}
                    </button>
                  ))}
                </div>
              )}
            </React.Fragment>
          )}
        </div>
        <div style={sectionFooter}>
          <button style={btnGhost} onClick={onClose}>CLOSE</button>
        </div>
      </div>
    </div>
  );
}

function CyberTerminal({ thread, members, onClose, postingAs }) {
  const [eligible, setEligible] = useState(null);
  const [action, setAction] = useState(null);
  const [deployAction, setDeployAction] = useState("");
  const [targetId, setTargetId] = useState("");
  const [targetAgencyId, setTargetAgencyId] = useState("");
  const [targetBaseId, setTargetBaseId] = useState("");
  const [infraTarget, setInfraTarget] = useState("");
  const [useZeroDay, setUseZeroDay] = useState(false);
  const [agencies, setAgencies] = useState([]);
  const [bases, setBases] = useState([]);
  const [gmMod, setGmMod] = useState(0);
  const [rolling, setRolling] = useState(false);
  const [lastResult, setLastResult] = useState(null);
  const [cyberLog, setCyberLog] = useState([]);
  const [showRules, setShowRules] = useState(false);
  const [effects, setEffects] = useState([]);
  const [session, setSession] = useState(null);
  const [connectionClosed, setConnectionClosed] = useState(false);
  const [defenderAgency, setDefenderAgency] = useState(null);
  const [defenderBases, setDefenderBases] = useState([]);
  const [defenderProjects, setDefenderProjects] = useState([]);
  const [targetProjectIdx, setTargetProjectIdx] = useState("");
  const [selectedHelper, setSelectedHelper] = useState("");
  const [defenseActive, setDefenseActive] = useState(false);
  const [defenseBonusVal, setDefenseBonusVal] = useState(0);

  function refreshStatus() {
    api("/api/comms/threads/" + thread.id + "/cyber/").then(data => {
      setCyberLog(data.actions || []);
      setEffects(data.effects || []);
      setSession(data.session || null);
      setConnectionClosed(data.isConnectionClosed || false);
      if (data.defenderAgency) setDefenderAgency(data.defenderAgency);
      if (data.defenderBases) setDefenderBases(data.defenderBases);
      if (data.defenderProjects) setDefenderProjects(data.defenderProjects);
      setDefenseActive(data.defenseActive || false);
      setDefenseBonusVal(data.defenseBonus || 0);
    });
  }

  useEffect(() => {
    const params = new URLSearchParams();
    if (postingAs && postingAs.type === "npc") {
      params.set("personaType", "npc");
      params.set("personaId", postingAs.id);
    }
    api("/api/comms/cyber/eligible/?" + params).then(setEligible);
    api("/api/agencies/").then(data => setAgencies(data.agencies || data || [])).catch(() => {});
    api("/api/agencies/bases/").then(data => setBases(data.bases || data || [])).catch(() => {});
    refreshStatus();
  }, [thread.id]);

  function handleRoll() {
    if (!action) return;
    setRolling(true);
    const payload = {
      actionType: action,
      deployAction: action === "deploy" ? deployAction : "",
      targetUserId: targetId ? parseInt(targetId) : null,
      targetAgencyId: defenderAgency ? defenderAgency.id : (targetAgencyId ? parseInt(targetAgencyId) : null),
      targetBaseId: targetBaseId ? parseInt(targetBaseId) : null,
      infraTarget: infraTarget || "",
      targetProjectIndex: targetProjectIdx !== "" ? parseInt(targetProjectIdx) : null,
      helperNpcId: selectedHelper ? parseInt(selectedHelper) : null,
      personaType: postingAs ? postingAs.type : "",
      personaId: postingAs ? postingAs.id : null,
      personaName: postingAs ? postingAs.name : "",
      gmModifier: gmMod,
      useZeroDay: useZeroDay,
    };
    api("/api/comms/threads/" + thread.id + "/cyber/roll/", {
      method: "POST",
      body: JSON.stringify(payload),
    }).then(data => {
      console.log("cyber roll response:", data);
      setLastResult(data.action || { outcome: "No response", roll: null });
      if (data.session) setSession(data.session);
      setRolling(false);
      refreshStatus();
    }).catch(err => {
      console.error("cyber roll error:", err);
      setRolling(false);
      setLastResult({ outcome: (err && err.error) || "Request failed", roll: null, actionType: action, poolDescription: "" });
    });
  }

  const hasGainedAccess = cyberLog.some(e => e.actionType === "gain_access" && e.successes > 0);

  const actions = [
    { key: "gain_access", label: "GAIN ACCESS", desc: "Int + Computer" },
    { key: "deploy", label: "DEPLOY", desc: "Wits + Computer", locked: !hasGainedAccess || !session || (!session.hasBackdoor && session.deploysRemaining <= 0) },
    { key: "defend", label: defenseActive ? "DEFEND [ACTIVE]" : "DEFEND", desc: defenseActive ? `Defense systems running (+${defenseBonusVal})` : "Res + Computer", locked: defenseActive },
    { key: "detect", label: "DETECT", desc: "Res + Computer" },
  ];

  const needsTarget = action === "gain_access";
  const zdMod = eligible && eligible.modifiers ? eligible.modifiers.find(m => m.name === "Zero-Day Repository") : null;
  const showZeroDay = (action === "gain_access" || action === "deploy") && zdMod;
  const zdRemaining = zdMod ? (zdMod.remaining || 0) : 0;
  const zdDisabled = zdRemaining <= 0;

  return (
    <div style={termStyle.overlay}>
      <div style={termStyle.header}>
        <span style={termStyle.title}>&gt;_ CYBER TERMINAL</span>
        <div style={{display: "flex", gap: "0.5rem"}}>
          <button onClick={() => setShowRules(!showRules)} style={{...termStyle.closeBtn, color: showRules ? "#0f0" : "#064"}}>RULES</button>
          <button onClick={onClose} style={termStyle.closeBtn}>ESC</button>
        </div>
      </div>
      <div style={termStyle.body}>
        {eligible && !eligible.eligible && !IS_STAFF && (
          <div style={{color: "#a33"}}>ACCESS DENIED — {eligible.reason}</div>
        )}

        {showRules && (eligible?.eligible || IS_STAFF) && (
          <div style={{marginBottom: "1rem", padding: "0.75rem", border: "1px solid #042", background: "rgba(0,255,0,0.02)"}}>
            <div style={{...termStyle.label, marginBottom: "0.5rem", fontSize: "0.75rem", color: "#0f0"}}>TERMINAL OPERATIONS MANUAL</div>
            <div style={{fontSize: "0.7rem", lineHeight: "1.6", color: "#0a3"}}>

              <div style={{marginBottom: "0.75rem", borderBottom: "1px solid #042", paddingBottom: "0.5rem"}}>
                <span style={{color: "#0f0", fontWeight: "bold"}}>ACCESS REQUIREMENT</span><br/>
                Computer 4+ required. Terminal icon appears next to the message input when eligible.
                Not available when posting as GM persona.
              </div>

              <div style={{marginBottom: "0.75rem", borderBottom: "1px solid #042", paddingBottom: "0.5rem"}}>
                <span style={{color: "#0f0", fontWeight: "bold"}}>GAIN ACCESS</span> — <span style={{color: "#064"}}>Intelligence + Computer</span><br/>
                Breach target's comm encryption. On success, gain hidden read-only access
                to all threads the target participates in (excluding direct GM channels).
                You will not appear in their roster. Intercepted channels appear in a separate
                section of your channel list.<br/><br/>
                <span style={{color: "#064"}}>1-4 successes:</span> Access granted. The target gets a passive detection roll
                (Resolve + Computer) against your successes as difficulty. If they detect you, a system
                alert appears in the chat. Unskilled defenders (Computer 0) get no passive roll.<br/>
                <span style={{color: "#064"}}>5+ successes (exceptional):</span> Undetected breach — no passive detection triggered.<br/>
                <span style={{color: "#064"}}>Deploy actions:</span> You receive successes ÷ 2 (rounded down) deploy actions.<br/>
                <span style={{color: "#064"}}>Re-entry:</span> Each closed connection adds +1 difficulty to the next Gain Access attempt.
              </div>

              <div style={{marginBottom: "0.75rem", borderBottom: "1px solid #042", paddingBottom: "0.5rem"}}>

                Each operation costs one deploy action and triggers a new passive detection roll on the defender.
                When all deploy actions are used, the connection auto-closes.<br/><br/>
                <span style={{color: "#064"}}>Operations:</span><br/>
                • <span style={{color: "#0f0"}}>Permanent Backdoor</span> (Wits + Computer) — unlimited deploy actions until connection closed<br/>
                • <span style={{color: "#0f0"}}>Ransomware</span> (Wits + Computer) — lock target base systems until swept<br/>
                • <span style={{color: "#0f0"}}>Force Bad Deals</span> (Manipulation + Computer) — fraudulent UTC trade orders on behalf of target agency<br/>
                • <span style={{color: "#0f0"}}>Steal Intel</span> (Intelligence + Computer) — reveal a random classified field on target agency<br/>
                • <span style={{color: "#0f0"}}>Discover Hidden Base</span> (Intelligence + Investigation) — unhide a random hidden base<br/>
                • <span style={{color: "#0f0"}}>Gain Base System Access</span> (Intelligence + Computer) — reveal hidden sections of a target base<br/>
                • <span style={{color: "#0f0"}}>Plant False Intel</span> (Manipulation + Computer) — inject disinformation (GM narrates)<br/>
                • <span style={{color: "#0f0"}}>Sabotage Project</span> (Wits + Computer) — reduce project completion by successes (min 0)<br/>
                • <span style={{color: "#0f0"}}>Shut Down Infrastructure</span> (Wits + Computer) — disable power, water, logistics, transport, media, or comms<br/>
                • <span style={{color: "#0f0"}}>Close Connection &amp; Remove Traces</span> — no roll, removes all backdoors and hidden access silently
              </div>

              <div style={{marginBottom: "0.75rem", borderBottom: "1px solid #042", paddingBottom: "0.5rem"}}>
                <span style={{color: "#0f0", fontWeight: "bold"}}>DEFEND</span> — <span style={{color: "#064"}}>Resolve + Computer</span><br/>
                Activate defense systems on this channel. Can only be executed <span style={{color: "#0f0"}}>once per thread</span>.
                Each success adds +1 to ALL detection rolls (passive and active) on this thread

function MessageInput({ onSend, dossiers, postingAs, onPostingAsChange, cyberEligible, onOpenTerminal }) {
  const [text, setText] = useState("");
  const setPostingAs = onPostingAsChange;
  const [pendingImage, setPendingImage] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const fileRef = useRef(null);

  function handleKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      submit();
    }
  }

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    setPendingImage(file);
    const reader = new FileReader();
    reader.onload = ev => setImagePreview(ev.target.result);
    reader.readAsDataURL(file);
    if (fileRef.current) fileRef.current.value = "";
  }

  function clearImage() {
    setPendingImage(null);
    setImagePreview(null);
  }

  function submit() {
    const trimmed = text.trim();
    if (!trimmed && !pendingImage) return;
    onSend(trimmed, postingAs, pendingImage);
    setText("");
    clearImage();
  }

  return (
    <div style={S.inputBarWrap}>
      {IS_STAFF && dossiers && dossiers.length > 0 && (
        <div style={S.postingAsBar}>
          <label className="mono-text text-muted" style={S.postingAsLabel}>POST AS:</label>
          <select
            value={postingAs ? `${postingAs.type}:${postingAs.id}` : "self:0"}
            onChange={e => {
              if (e.target.value === "self:0") { setPostingAs(null); return; }
              if (e.target.value === "gm:0") { setPostingAs(GM_PERSONA); return; }
              const [type, id] = e.target.value.split(":");
              const d = dossiers.find(d => d.type === type && d.id === parseInt(id));
              if (d) setPostingAs(d);
            }}
            style={S.postingAsSelect}
          >
            <option value="gm:0">GM</option>
            <option value="self:0">SELF</option>
            {dossiers.map(d => (
              <option key={`${d.type}:${d.id}`} value={`${d.type}:${d.id}`}>
                [{d.type === "character" ? "PC" : "NPC"}] {d.name}
              </option>
            ))}
          </select>
        </div>
      )}
      {imagePreview && (
        <div style={{
          padding: "0.5rem", background: "rgba(0,0,0,0.3)",
          borderBottom: "1px solid var(--border-color)",
          display: "flex", alignItems: "center", gap: "0.5rem"
        }}>
          <img src={imagePreview} style={{
            maxHeight: "60px", maxWidth: "100px", borderRadius: "4px",
            border: "1px solid var(--border-color)"
          }} />
          <span className="mono-text text-muted" style={{ fontSize: "0.75rem", flex: 1 }}>
            {pendingImage?.name}
          </span>
          <button onClick={clearImage} style={{
            background: "transparent", border: "none",
            color: "var(--accent-danger)", cursor: "pointer",
            fontFamily: "var(--font-mono)", fontSize: "0.8rem"
          }}>X</button>
        </div>
      )}
      <div style={S.inputBar}>
        <button onClick={() => fileRef.current?.click()} title="Attach image" style={{
          background: "transparent", border: "1px solid var(--border-color)",
          color: "var(--text-muted)", padding: "0.4rem 0.6rem", cursor: "pointer",
          borderRadius: "4px", fontSize: "1rem", lineHeight: 1,
        }}>&#128247;</button>
        {cyberEligible && !(postingAs && postingAs.type === "gm") && (
          <button onClick={onOpenTerminal} title="Cyber Terminal" style={{
            background: "transparent", border: "1px solid #0a3",
            color: "#0f0", padding: "0.4rem 0.6rem", cursor: "pointer",
            borderRadius: "4px", fontFamily: "var(--font-mono)", fontSize: "0.8rem",
            lineHeight: 1,
          }}>&gt;_</button>
        )}
        <input ref={fileRef} type="file" accept="image/*"
          onChange={handleFileSelect} style={{ display: "none" }} />
        <textarea
          value={text}
          onChange={e => setText(e.target.value)}
          onKeyDown={handleKeyDown}
          placeholder={postingAs ? `Posting as ${postingAs.name}...` : "Type message..."}
          rows={1}
          style={Object.assign({}, inputStyle, {flex: 1, resize: "none"})}
        />
        <button onClick={submit} style={btnPrimary}>TRANSMIT</button>
      </div>
    </div>
  );
}

  if (!thread) {
    return (
      <div style={S.emptyState}>SELECT CHANNEL</div>

  const threadTitle = thread.title ||
    thread.members.filter(m => m.id !== CURRENT_USER_ID).map(m => m.displayName).join(", ") ||
    "CHANNEL";

  return (

                {m.portrait ? (
                  <img src={m.portrait} alt={m.displayName} style={S.portraitImg} />

                  <span style={S.portraitInitial}>
                    {m.displayName.charAt(0).toUpperCase()}

            ))}
          </div>
        </div>
        <button onClick={onOpenMembers} style={S.rosterBtn}>ROSTER</button>
        {!thread.isConnectionClosed && (
          <button
            title="Closes this connection permanently. No party will be able to add messages or access the terminal on this thread."
            onClick={() => {
              if (confirm("Close this connection permanently? No party will be able to add messages or access the terminal on this thread.")) {
                api("/api/comms/threads/" + thread.id + "/cyber/close/", { method: "POST" }).then(() => {
                  api("/api/comms/threads/" + thread.id + "/").then(data => {
                    window.location.reload();
                  });
                });
              }
            }} style={{...S.rosterBtn, color: "#c0392b", borderColor: "#c0392b"}}>CLOSE</button>
        )}
        {IS_STAFF && (
          <button onClick={() => { if (confirm("Delete this thread and all messages?")) onDeleteThread(thread.id); }} style={S.deleteThreadBtn}>&#10005;</button>
        )}
      </div>

      {/* Messages */}
      <div style={S.messageList}>
        {(thread.messages || []).map(msg => {
          const isSystem = msg.postedAs && msg.postedAs.type === "system";
          const isOwn = !isSystem && msg.sender.id === CURRENT_USER_ID && !msg.postedAs;
          const displayName = msg.postedAs ? msg.postedAs.name : msg.sender.displayName;
          const dossierUrl = msg.postedAs && !["gm", "system"].includes(msg.postedAs.type)
            ? (msg.postedAs.type === "character" ? `/character/${msg.postedAs.id}/` : `/npcs/${msg.postedAs.id}/`)
            : null;

          if (isSystem) {
            return (
              <div key={msg.id} style={S.systemMsgRow}>
                <div style={S.systemMsgBubble}>
                  <span style={S.systemMsgText}>{msg.content}</span>
                </div>
              </div>
            );
          }

          return (
            <div key={msg.id} style={isOwn ? S.msgRowOwn : S.msgRowOther}>
              <div style={isOwn ? S.msgBubbleOwn : S.msgBubbleOther}>
                {!isOwn && (
                  <div className="mono-text text-accent" style={S.msgSender}>
                    {dossierUrl ? (
                      <a href={dossierUrl} style={S.postedAsLink}>{displayName}</a>
                    ) : displayName}
                    {msg.postedAs && (
                      <span style={S.postedAsBadge}>
                        {msg.postedAs.type === "gm" ? "GM" : msg.postedAs.type === "character" ? "PC" : "NPC"}
                      </span>
                    )}
                  </div>
                )}
                {msg.content && <div style={S.msgContent}>{msg.content}</div>}
                {msg.image && (
                  <img src={msg.image} onClick={e => {
                    e.stopPropagation();
                    setLightboxImage(msg.image);
                  }} style={{
                    maxWidth: "250px", maxHeight: "200px", borderRadius: "4px",
                    marginTop: msg.content ? "0.4rem" : 0,
                    cursor: "pointer", border: "1px solid var(--border-color)",
                  }} />
                )}
                <div className="text-muted" style={isOwn ? S.msgTimeRight : S.msgTimeLeft}>
                  {new Date(msg.createdAt).toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" })}
                </div>
              </div>
            </div>
          );
        })}
        <div ref={messagesEndRef} />
      </div>

      {/* Cyber Terminal overlay */}
      {showTerminal && (
        <CyberTerminal
          thread={thread}
          members={thread.members || []}
          onClose={() => setShowTerminal(false)}
          postingAs={postingAs}
        />
      )}

      {/* Input */}
      {thread.isConnectionClosed ? (
        <div style={{padding: "0.75rem", textAlign: "center", borderTop: "1px solid #a33", background: "rgba(170,51,51,0.05)"}}>
          <span className="mono-text" style={{color: "#f44", fontSize: "0.8rem", letterSpacing: "1px"}}>CONNECTION CLOSED</span>
        </div>
      ) : (
        <MessageInput onSend={onSend} dossiers={dossiers} postingAs={postingAs} onPostingAsChange={onPostingAsChange}
          cyberEligible={cyberEligible} onOpenTerminal={() => setShowTerminal(true)} />
      )}

      {/* Image lightbox */}
      {lightboxImage && ReactDOM.createPortal(
        <div onClick={() => setLightboxImage(null)} style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
          background: "rgba(0,0,0,0.85)", display: "flex",
          alignItems: "center", justifyContent: "center", zIndex: 2000, cursor: "pointer",
        }}>
          <img src={lightboxImage} onClick={e => e.stopPropagation()} style={{
            maxWidth: "90vw", maxHeight: "90vh", objectFit: "contain",
            border: "2px solid var(--border-color)", borderRadius: "4px", cursor: "default",
          }} />
        </div>,
        document.body
      )}
    </div>
  );
}

function ThreadList({ threads, activeId, onSelect, onNewThread, intercepted }) {
  return (
    <div style={S.threadListContainer}>
      <div style={S.threadListHeader}>
        <span className="mono-text text-accent" style={S.threadListTitle}>CHANNELS</span>
        <button onClick={onNewThread} style={Object.assign({}, btnPrimary, {padding: "0.3rem 0.75rem", fontSize: "0.7rem"})}>
          + NEW
        </button>
      </div>
      <div style={S.threadListBody}>
        {threads.length === 0 && (
          <div className="text-muted" style={S.noThreads}>No active channels</div>
        )}
        {threads.map(t => {
          const title = t.title ||
            t.members.filter(m => m.id !== CURRENT_USER_ID).map(m => m.displayName).join(", ") ||
            "Channel";
          const isActive = t.id === activeId;
          const itemStyle = Object.assign({}, S.threadItem, {
            borderLeft: isActive ? "2px solid var(--accent-primary)" : "2px solid transparent",
            background: isActive ? "rgba(56, 189, 248, 0.05)" : "transparent",
          });
          return (
            <div key={t.id}
              onClick={() => onSelect(t.id)}
              style={itemStyle}
              onMouseOver={e => { if (!isActive) e.currentTarget.style.background = "rgba(255,255,255,0.02)"; }}
              onMouseOut={e => { if (!isActive) e.currentTarget.style.background = isActive ? "rgba(56, 189, 248, 0.05)" : "transparent"; }}>
              <div style={S.threadItemRow}>
                <span style={Object.assign({}, S.threadItemTitle, {fontWeight: t.unreadCount > 0 ? "bold" : "normal"})}>
                  {title}
                </span>
                {t.unreadCount > 0 && (
                  <span style={S.unreadBadge}>{t.unreadCount}</span>
                )}
              </div>
              {t.lastMessage && (
                <div className="text-muted" style={S.threadPreview}>
                  {t.lastMessage.sender}: {t.lastMessage.content}
                </div>
              )}
            </div>
          );
        })}
        {intercepted && intercepted.length > 0 && (
          <React.Fragment>
            <div style={{padding: "0.75rem 1rem 0.25rem", borderTop: "1px solid #300"}}>
              <span className="mono-text" style={{color: "#f44", fontSize: "0.7rem", letterSpacing: "1px"}}>
                INTERCEPTED
              </span>
            </div>
            {intercepted.map(t => {
              const title = t.title ||
                t.members.filter(m => m.id !== CURRENT_USER_ID).map(m => m.displayName).join(", ") ||
                "Channel";
              const isActive = t.id === activeId;
              return (
                <div key={"int-" + t.id}
                  onClick={() => onSelect(t.id)}
                  style={Object.assign({}, S.threadItem, {
                    borderLeft: isActive ? "2px solid #f44" : "2px solid transparent",
                    background: isActive ? "rgba(255,68,68,0.05)" : "transparent",
                  })}
                  onMouseOver={e => { if (!isActive) e.currentTarget.style.background = "rgba(255,68,68,0.03)"; }}
                  onMouseOut={e => { if (!isActive) e.currentTarget.style.background = "transparent"; }}>
                  <div style={S.threadItemRow}>
                    <span style={Object.assign({}, S.threadItemTitle, {color: "#c66"})}>
                      {title}
                    </span>
                  </div>
                  {t.lastMessage && (
                    <div style={Object.assign({}, S.threadPreview, {color: "#833"})}>
                      {t.lastMessage.sender}: {t.lastMessage.content}
                    </div>
                  )}
                </div>
              );
            })}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// CommsApp
// ---------------------------------------------------------------------------

function CommsApp() {
  const [threads, setThreads] = useState([]);
  const [activeThreadId, setActiveThreadId] = useState(null);
  const [activeThread, setActiveThread] = useState(null);
  const [users, setUsers] = useState([]);
  const [showNewThread, setShowNewThread] = useState(false);
  const [showMembers, setShowMembers] = useState(false);
  const [mobileShowThread, setMobileShowThread] = useState(false);
  const [dossiers, setDossiers] = useState([]);
  const [threadPersonas, setThreadPersonas] = useState({});
  const [cyberEligible, setCyberEligible] = useState(false);
  const [interceptedThreads, setInterceptedThreads] = useState([]);

  useEffect(() => {
    api("/api/comms/threads/").then(setThreads);
    api("/api/comms/users/").then(setUsers);
    if (IS_STAFF) {
      api("/api/comms/dossiers/").then(setDossiers).catch(() => {});
    }
    api("/api/comms/cyber/eligible/").then(d => setCyberEligible(d.eligible)).catch(() => {});
    api("/api/comms/cyber/intercepted/").then(setInterceptedThreads).catch(() => {});
    // Poll thread list every 15 seconds for changes (new threads, deletions, alias updates)
    const interval = setInterval(() => {
      api("/api/comms/threads/").then(setThreads).catch(() => {});
    }, 15000);
    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    if (!activeThreadId) {
      setActiveThread(null);
      return;
    }
    api("/api/comms/threads/" + activeThreadId + "/").then(data => {
      setActiveThread(data);
      api("/api/comms/threads/" + activeThreadId + "/read/", { method: "POST" });
      setThreads(prev => prev.map(t =>
        t.id === activeThreadId ? Object.assign({}, t, {unreadCount: 0}) : t
      ));
      // Restore persona from server alias if not already set locally
      if (IS_STAFF && !(activeThreadId in threadPersonas)) {
        const myMember = (data.members || []).find(m => m.id === CURRENT_USER_ID);
        if (myMember && myMember.alias) {
          const a = myMember.alias;
          setThreadPersonas(prev => ({...prev, [activeThreadId]:
            a.type === "gm" ? GM_PERSONA :
            a.type === "self" || !a.type ? null :
            { type: a.type, id: a.id, name: a.name }
          }));
        }
      }
    });
  }, [activeThreadId]);

  const handleWsMessage = useCallback((data) => {
    if (data.type === "new_message") {
      const msg = data.message;
      setActiveThread(prev => {
        if (prev && prev.id === msg.threadId) {
          api("/api/comms/threads/" + msg.threadId + "/read/", { method: "POST" });
          return Object.assign({}, prev, {messages: (prev.messages || []).concat(msg)});
        }
        return prev;
      });
      setThreads(prev => {
        const updated = prev.map(t => {
          if (t.id === msg.threadId) {
            return Object.assign({}, t, {
              lastMessage: { sender: msg.sender.displayName, content: msg.content, createdAt: msg.createdAt },
              updatedAt: msg.createdAt,
            });
          }
          return t;
        });
        return updated.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      });
    } else if (data.type === "unread_update") {
      setThreads(prev => prev.map(t =>
        t.id === data.threadId ? Object.assign({}, t, {unreadCount: data.unreadCount}) : t
      ));
      var badge = document.getElementById("comms-badge");
      if (badge) {
        api("/api/comms/unread/").then(d => {
          badge.textContent = d.unreadCount || "";
          badge.style.display = d.unreadCount > 0 ? "inline-flex" : "none";
        });
      }
    } else if (data.type === "membership_change") {
      api("/api/comms/threads/").then(setThreads);
      if (data.action === "removed" && data.threadId === activeThreadId) {
        setActiveThreadId(null);
        setActiveThread(null);
      }
    }
  }, [activeThreadId]);

  useCommsSocket(handleWsMessage);

  function handleSelectThread(id) {
    setActiveThreadId(id);
    setMobileShowThread(true);
  }

  function handleCreateThread(title, memberIds, persona, npcTarget) {
    const payload = { title: title, members: memberIds };
    if (persona && IS_STAFF) {
      payload.aliasType = persona.type;
      payload.aliasId = persona.id || null;
      payload.aliasName = persona.name || "";
    }
    if (npcTarget && IS_STAFF) {
      payload.npcParticipant = { type: npcTarget.type, id: npcTarget.id, name: npcTarget.name };
    }
    api("/api/comms/threads/", {
      method: "POST",
      body: JSON.stringify(payload),
    }).then(data => {
      setThreads(prev => [data].concat(prev));
      setActiveThreadId(data.id);
      setActiveThread(data);
      setShowNewThread(false);
      setMobileShowThread(true);
      if (persona !== undefined) {
        setThreadPersonas(prev => ({...prev, [data.id]: persona}));
      }
    });
  }

  function handleSendMessage(content, postingAs, image) {
    if (!activeThreadId) return;

    if (image) {
      // Use FormData for image uploads
      const formData = new FormData();
      formData.append("content", content || "");
      formData.append("image", image);
      if (postingAs) {
        formData.append("postedAsType", postingAs.type);
        formData.append("postedAsId", postingAs.id);
      } else if (IS_STAFF) {
        formData.append("postedAsType", "self");
      }
      fetch("/api/comms/threads/" + activeThreadId + "/messages/", {
        method: "POST",
        headers: { "X-CSRFToken": CSRF_TOKEN },
        body: formData,
      });
    } else {
      const payload = { content: content };
      if (postingAs) {
        payload.postedAsType = postingAs.type;
        payload.postedAsId = postingAs.id;
      } else if (IS_STAFF) {
        payload.postedAsType = "self";
      }
      api("/api/comms/threads/" + activeThreadId + "/messages/", {
        method: "POST",
        body: JSON.stringify(payload),
      });
    }
  }

  function handleDeleteThread(threadId) {
    api("/api/comms/threads/" + threadId + "/delete/", {
      method: "DELETE",
    }).then(() => {
      setActiveThreadId(null);
      setActiveThread(null);
      setMobileShowThread(false);
      api("/api/comms/threads/").then(setThreads);
    });
  }

  function handleAddMember(threadId, userId) {
    api("/api/comms/threads/" + threadId + "/members/", {
      method: "POST",
      body: JSON.stringify({ userId: userId }),
    }).then(() => {
      api("/api/comms/threads/" + threadId + "/").then(setActiveThread);
      api("/api/comms/threads/").then(setThreads);
    });
  }

  function handleRemoveMember(threadId, userId) {
    api("/api/comms/threads/" + threadId + "/members/" + userId + "/", {
      method: "DELETE",
    }).then(() => {
      if (userId === CURRENT_USER_ID) {
        setActiveThreadId(null);
        setActiveThread(null);
        setShowMembers(false);
        api("/api/comms/threads/").then(setThreads);
      } else {
        api("/api/comms/threads/" + threadId + "/").then(setActiveThread);
        api("/api/comms/threads/").then(setThreads);
      }
    });
  }

  return (
    <div className="glass-panel" style={S.appContainer}>
      <div style={S.sidePanel}>
        <ThreadList
          threads={threads}
          activeId={activeThreadId}
          onSelect={handleSelectThread}
          onNewThread={() => setShowNewThread(true)}
          intercepted={interceptedThreads}
        />
      </div>
      <div style={S.mainPanel}>
        <ThreadView
          thread={activeThread}
          onSend={handleSendMessage}
          onBack={() => setMobileShowThread(false)}
          onOpenMembers={() => setShowMembers(true)}
          onDeleteThread={handleDeleteThread}
          dossiers={dossiers}
          postingAs={activeThreadId ? (threadPersonas[activeThreadId] !== undefined ? threadPersonas[activeThreadId] : (IS_STAFF ? GM_PERSONA : null)) : null}
          onPostingAsChange={persona => {
            if (!activeThreadId) return;
            setThreadPersonas(prev => ({...prev, [activeThreadId]: persona}));
            if (IS_STAFF) {
              const aliasPayload = persona
                ? { aliasType: persona.type, aliasId: persona.id || null, aliasName: persona.name || "" }
                : { aliasType: "self" };
              api("/api/comms/threads/" + activeThreadId + "/alias/", {
                method: "POST",
                body: JSON.stringify(aliasPayload),
              }).then(() => {
                api("/api/comms/threads/" + activeThreadId + "/").then(setActiveThread);
                api("/api/comms/threads/").then(setThreads);
              });
            }
          }}
          cyberEligible={cyberEligible}
        />
      </div>
      {showNewThread && (
        <NewThreadModal
          users={users}
          dossiers={dossiers}
          onClose={() => setShowNewThread(false)}
          onCreate={handleCreateThread}
        />
      )}
      {showMembers && activeThread && (
        <MemberManager
          thread={activeThread}
          users={users}
          onClose={() => setShowMembers(false)}
          onAddMember={handleAddMember}
          onRemoveMember={handleRemoveMember}
        />
      )}
    </div>
  );
}
