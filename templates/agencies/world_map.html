{% extends "base.html" %}

{% block title %}WORLD MAP // BLACKLOG.NET{% endblock %}

{% block content %}
<div id="app-root">
    <div class="loading-screen">
        <h1 class="mono-text">LOADING GLOBAL INTELLIGENCE MAP...</h1>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- Leaflet CSS & JS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const IS_ADMIN = {{ is_admin|yesno:"true,false" }};
    const CSRF_TOKEN = '{{ csrf_token }}';
</script>
{% verbatim %}
<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Country name aliases for matching GeoJSON names to agency alliance entries
    const COUNTRY_ALIASES = {
        'usa': 'united states of america',
        'us': 'united states of america',
        'united states': 'united states of america',
        'uk': 'united kingdom',
        'britain': 'united kingdom',
        'great britain': 'united kingdom',
        'russia': 'russian federation',
        'south korea': 'republic of korea',
        'north korea': "democratic people's republic of korea",
        'iran': 'islamic republic of iran',
        'nova judea': 'islamic republic of iran',
        'new texas': 'islamic republic of iran',
        'syria': 'syrian arab republic',
        'vietnam': 'viet nam',
        'laos': "lao people's democratic republic",
        'bolivia': 'plurinational state of bolivia',
        'venezuela': 'bolivarian republic of venezuela',
        'new america': 'bolivarian republic of venezuela',
        'new americ': 'bolivarian republic of venezuela',
        'tanzania': 'united republic of tanzania',
        'czech republic': 'czechia',
        'ivory coast': "cote d'ivoire",
        'cape verde': 'cabo verde',
        'swaziland': 'eswatini',
        'macedonia': 'north macedonia',
        'congo': 'republic of the congo',
        'dr congo': 'democratic republic of the congo',
        'drc': 'democratic republic of the congo',
    };

    const normalizeCountryName = (name) => {
        const lower = (name || '').toLowerCase().trim();
        return COUNTRY_ALIASES[lower] || lower;
    };

    const WorldMap = () => {
        const mapRef = useRef(null);
        const mapInstance = useRef(null);
        const geoLayer = useRef(null);
        const markersLayer = useRef(null);
        const labelsLayer = useRef(null);
        const [agencies, setAgencies] = useState([]);
        const [loading, setLoading] = useState(true);
        const [geoJson, setGeoJson] = useState(null);
        const [error, setError] = useState(null);
        const [selectedIds, setSelectedIds] = useState(null); // null = show all

        // Fetch map data and GeoJSON in parallel
        useEffect(() => {
            const loadData = async () => {
                try {
                    const [mapRes, geoRes] = await Promise.all([
                        fetch('/api/map-data/'),
                        fetch('https://r2.datahub.io/clvyjaryy0000la0cxieg4o8o/main/raw/data/countries.geojson'),
                    ]);
                    if (mapRes.ok) setAgencies(await mapRes.json());
                    if (geoRes.ok) setGeoJson(await geoRes.json());
                    else setError('Failed to load country boundaries.');
                } catch (err) {
                    console.error('Map load error:', err);
                    setError('Failed to load map data.');
                } finally {
                    setLoading(false);
                }
            };
            loadData();
        }, []);

        // Initialize Leaflet map
        useEffect(() => {
            if (!mapRef.current || mapInstance.current) return;
            const map = L.map(mapRef.current, {
                center: [20, 0],
                zoom: 3,
                minZoom: 2,
                maxZoom: 10,
                zoomControl: true,
                attributionControl: false,
            });
            // Dark tile layer
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 19,
            }).addTo(map);
            L.control.attribution({ position: 'bottomright', prefix: false })
                .addAttribution('&copy; <a href="https://carto.com/">CARTO</a>')
                .addTo(map);
            mapInstance.current = map;
            return () => { map.remove(); mapInstance.current = null; };
        }, [loading]);

        // Render GeoJSON + base markers when data or selection changes
        useEffect(() => {
            if (!mapInstance.current || !geoJson || agencies.length === 0) return;
            const map = mapInstance.current;

            // Determine which agencies to show
            const visibleAgencies = selectedIds === null
                ? agencies
                : agencies.filter(a => selectedIds.has(a.id));

            // Build country -> agencies lookup (multiple agencies can share a polygon)
            // Also track the original name each agency used for the tooltip
            const countryMap = {}; // geoName -> [{agency, originalName}]
            visibleAgencies.forEach(agency => {
                (agency.countries || []).forEach(c => {
                    const geoName = normalizeCountryName(c);
                    if (!countryMap[geoName]) countryMap[geoName] = [];
                    countryMap[geoName].push({ agency, originalName: c });
                });
            });

            // Remove old layers
            if (geoLayer.current) map.removeLayer(geoLayer.current);
            if (markersLayer.current) map.removeLayer(markersLayer.current);
            if (labelsLayer.current) map.removeLayer(labelsLayer.current);

            // Add country polygons
            geoLayer.current = L.geoJSON(geoJson, {
                style: (feature) => {
                    const name = normalizeCountryName(feature.properties.ADMIN || feature.properties.name);
                    const entries = countryMap[name];
                    if (entries && entries.length > 0) {
                        const primary = entries[0].agency;
                        return {
                            fillColor: primary.color,
                            fillOpacity: entries.length > 1 ? 0.25 : 0.35,
                            color: entries.length > 1 ? '#ffffff' : primary.color,
                            weight: entries.length > 1 ? 2 : 1,
                            opacity: 0.7,
                            dashArray: entries.length > 1 ? '6 4' : null,
                        };
                    }
                    return {
                        fillColor: 'transparent',
                        fillOpacity: 0,
                        color: '#333',
                        weight: 0.5,
                        opacity: 0.3,
                    };
                },
                onEachFeature: (feature, layer) => {
                    const name = normalizeCountryName(feature.properties.ADMIN || feature.properties.name);
                    const entries = countryMap[name];
                    if (entries && entries.length > 0) {
                        const displayName = entries.map(e => e.originalName).join(' / ');
                        const lines = entries.map(e =>
                            `<span style="color:${e.agency.color}">\u25A0</span> ${e.originalName} — ${e.agency.name}`
                        ).join('<br/>');
                        layer.bindTooltip(
                            `<strong>${displayName}</strong><br/>${lines}`,
                            { sticky: true, className: 'map-tooltip' }
                        );
                    }
                },
            }).addTo(map);

            // Compute centroid of the largest ring in a GeoJSON geometry.
            // This avoids overseas territories pulling the label off the mainland.
            const getMainlandCentroid = (geometry) => {
                let rings = [];
                if (geometry.type === 'Polygon') {
                    rings = [geometry.coordinates[0]];
                } else if (geometry.type === 'MultiPolygon') {
                    rings = geometry.coordinates.map(poly => poly[0]);
                }
                if (rings.length === 0) return null;
                // Pick the ring with the most points (largest landmass)
                let largest = rings[0];
                for (let i = 1; i < rings.length; i++) {
                    if (rings[i].length > largest.length) largest = rings[i];
                }
                // Average of coordinates
                let sumLat = 0, sumLng = 0;
                for (const [lng, lat] of largest) {
                    sumLat += lat;
                    sumLng += lng;
                }
                return L.latLng(sumLat / largest.length, sumLng / largest.length);
            };

            // Add country name labels at mainland centroid
            labelsLayer.current = L.layerGroup().addTo(map);
            geoLayer.current.eachLayer((layer) => {
                const feature = layer.feature;
                const name = normalizeCountryName(feature.properties.ADMIN || feature.properties.name);
                const entries = countryMap[name];
                if (!entries || entries.length === 0) return;

                const center = getMainlandCentroid(feature.geometry);
                if (!center) return;

                // Use original names (e.g. "Nova Judea" instead of "Iran")
                const labelText = entries.map(e => e.originalName).join(' / ');
                const primaryColor = entries[0].agency.color;

                const label = L.marker(center, {
                    icon: L.divIcon({
                        className: 'country-label',
                        html: `<span style="color:${primaryColor}">${labelText}</span>`,
                        iconSize: null,
                    }),
                    interactive: false,
                });
                label.addTo(labelsLayer.current);
            });

            // Add base markers
            markersLayer.current = L.layerGroup().addTo(map);
            visibleAgencies.forEach(agency => {
                (agency.bases || []).forEach(base => {
                    if (base.lat == null || base.lng == null) return;
                    const marker = L.circleMarker([base.lat, base.lng], {
                        radius: 6,
                        fillColor: agency.color,
                        fillOpacity: 0.9,
                        color: '#fff',
                        weight: 1.5,
                    });
                    marker.bindTooltip(
                        `<strong>${base.name}</strong><br/>${agency.name}`,
                        { className: 'map-tooltip' }
                    );
                    marker.addTo(markersLayer.current);
                });
            });
        }, [geoJson, agencies, selectedIds]);

        if (loading) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-accent" style={{ animation: 'pulse 1.5s infinite' }}>
                        LOADING GLOBAL INTELLIGENCE MAP...
                    </h2>
                </div>
            );
        }

        if (error) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-danger">{error}</h2>
                </div>
            );
        }

        // Agencies that have at least one country or one base with coords
        const activeAgencies = agencies.filter(a =>
            (a.countries && a.countries.length > 0) ||
            (a.bases && a.bases.length > 0)
        );

        return (
            <div className="fade-in">
                <div style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    marginBottom: '0.75rem', flexWrap: 'wrap', gap: '0.5rem'
                }}>
                    <h2 className="mono-text text-accent" style={{ fontSize: '1.2rem' }}>
                        GLOBAL INTELLIGENCE MAP
                    </h2>
                </div>

                {/* Map container */}
                <div ref={mapRef} style={{
                    width: '100%', height: 'calc(100vh - 200px)', minHeight: '400px',
                    borderRadius: 'var(--radius-sm)',
                    border: '1px solid var(--border-color)',
                }} />

                {/* Legend / Agency Filter */}
                {activeAgencies.length > 0 && (
                    <div className="glass-panel" style={{
                        padding: '1rem', marginTop: '0.75rem',
                        display: 'flex', flexWrap: 'wrap', gap: '0.5rem', alignItems: 'center',
                    }}>
                        <button
                            onClick={() => setSelectedIds(null)}
                            className="mono-text"
                            style={{
                                background: selectedIds === null ? 'rgba(255,255,255,0.1)' : 'transparent',
                                border: '1px solid ' + (selectedIds === null ? 'var(--accent-primary)' : 'var(--border-color)'),
                                color: selectedIds === null ? 'var(--accent-primary)' : 'var(--text-muted)',
                                padding: '0.3rem 0.7rem', cursor: 'pointer', fontSize: '0.8rem',
                                borderRadius: 'var(--radius-sm)',
                            }}>
                            ALL
                        </button>
                        {activeAgencies.map(a => {
                            const isActive = selectedIds === null || selectedIds.has(a.id);
                            return (
                                <button key={a.id}
                                    onClick={() => {
                                        if (selectedIds === null) {
                                            // From "all" -> select only this one
                                            setSelectedIds(new Set([a.id]));
                                        } else if (selectedIds.has(a.id) && selectedIds.size === 1) {
                                            // Deselecting the only one -> back to all
                                            setSelectedIds(null);
                                        } else if (selectedIds.has(a.id)) {
                                            // Remove from selection
                                            const next = new Set(selectedIds);
                                            next.delete(a.id);
                                            setSelectedIds(next);
                                        } else {
                                            // Add to selection
                                            setSelectedIds(new Set([...selectedIds, a.id]));
                                        }
                                    }}
                                    className="mono-text"
                                    style={{
                                        background: isActive ? a.color + '22' : 'transparent',
                                        border: '1px solid ' + (isActive ? a.color : 'var(--border-color)'),
                                        color: isActive ? a.color : 'var(--text-muted)',
                                        padding: '0.3rem 0.7rem', cursor: 'pointer', fontSize: '0.8rem',
                                        borderRadius: 'var(--radius-sm)',
                                        display: 'flex', alignItems: 'center', gap: '0.4rem',
                                        opacity: isActive ? 1 : 0.4,
                                    }}>
                                    <div style={{
                                        width: '10px', height: '10px', borderRadius: '2px',
                                        background: a.color,
                                    }} />
                                    {a.name}
                                </button>
                            );
                        })}
                    </div>
                )}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<WorldMap />);
</script>

<style>
    .map-tooltip {
        background: var(--bg-panel, #1a1a2e) !important;
        color: var(--text-primary, #e0e0e0) !important;
        border: 1px solid var(--border-color, #333) !important;
        font-family: var(--font-mono, monospace) !important;
        font-size: 0.8rem !important;
        padding: 0.4rem 0.6rem !important;
        border-radius: 2px !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5) !important;
    }
    .map-tooltip::before {
        border-top-color: var(--border-color, #333) !important;
    }
    .leaflet-container {
        background: #0a0a1a !important;
    }
    .country-label {
        background: none !important;
        border: none !important;
        box-shadow: none !important;
        white-space: nowrap;
        text-align: center;
        pointer-events: none;
    }
    .country-label span {
        font-family: var(--font-mono, monospace);
        font-size: 0.7rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.7), 1px 1px 2px rgba(0,0,0,0.9);
    }
</style>
{% endverbatim %}
{% endblock %}
