{% extends "base.html" %}

{% block title %}UNITED INTERSTELLAR COUNCIL // BLACKLOG.NET{% endblock %}

{% block content %}
<div id="app-root">
    <div class="loading-screen">
        <h1 class="mono-text">LOADING COUNCIL REGISTRY...</h1>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const IS_ADMIN = {{ user.is_superuser|yesno:"true,false" }};
    const CSRF_TOKEN = '{{ csrf_token }}';
    const USER_AGENCY_ID = {{ user_agency_id }};
    const USER_AGENCY_NAME = '{{ user_agency_name|escapejs }}';
    const IS_CHAIRMAN = {{ is_chairman|yesno:"true,false" }};
    const ALL_AGENCIES = {{ agencies_json|safe }};
</script>
{% verbatim %}
<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const COUNCIL_ACCENT = '#a855f7';
    const CAN_REORDER = IS_ADMIN || IS_CHAIRMAN;
    const CAN_CREATE = IS_ADMIN || USER_AGENCY_ID > 0;

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    const Icon = ({ name, size = 16, className = "" }) => {
        useEffect(() => {
            if (window.lucide) window.lucide.createIcons();
        }, [name]);
        return <i data-lucide={name} width={size} height={size} className={className}></i>;
    };

    const EditableCell = ({ value, field, itemId, onSave, type = "text", style = {} }) => {
        const ref = useRef(null);
        return (
            <input
                ref={ref}
                type={type}
                defaultValue={value}
                className="mono-text"
                style={{
                    background: 'rgba(255,255,255,0.03)',
                    border: '1px solid var(--border-color)',
                    color: 'var(--text-primary)',
                    padding: '0.4rem 0.6rem',
                    fontSize: '0.85rem',
                    width: '100%',
                    boxSizing: 'border-box',
                    borderRadius: 'var(--radius-sm)',
                    ...style,
                }}
                onBlur={() => {
                    const v = type === 'number' ? parseInt(ref.current.value, 10) || 0 : ref.current.value;
                    onSave(itemId, field, v);
                }}
            />
        );
    };

    const EditableTextArea = ({ value, field, itemId, onSave }) => {
        const ref = useRef(null);
        return (
            <textarea
                ref={ref}
                defaultValue={value}
                className="mono-text"
                rows={3}
                style={{
                    background: 'rgba(255,255,255,0.03)',
                    border: '1px solid var(--border-color)',
                    color: 'var(--text-primary)',
                    padding: '0.4rem 0.6rem',
                    fontSize: '0.85rem',
                    width: '100%',
                    boxSizing: 'border-box',
                    borderRadius: 'var(--radius-sm)',
                    resize: 'vertical',
                    fontFamily: 'var(--font-mono)',
                }}
                onBlur={() => {
                    onSave(itemId, field, ref.current.value);
                }}
            />
        );
    };

    const SelectField = ({ value, field, itemId, onSave, options }) => {
        const ref = useRef(null);
        return (
            <select
                ref={ref}
                defaultValue={value}
                className="mono-text"
                style={{
                    background: 'rgba(255,255,255,0.03)',
                    border: '1px solid var(--border-color)',
                    color: 'var(--text-primary)',
                    padding: '0.4rem 0.6rem',
                    fontSize: '0.85rem',
                    width: '100%',
                    boxSizing: 'border-box',
                    borderRadius: 'var(--radius-sm)',
                }}
                onChange={() => {
                    onSave(itemId, field, ref.current.value);
                }}
            >
                {options.map(opt => (
                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                ))}
            </select>
        );
    };

    const TYPE_OPTIONS = [
        { value: 'agreement', label: 'Agreement' },
        { value: 'initiative', label: 'Initiative' },
        { value: 'law', label: 'Law' },
    ];

    const STATUS_OPTIONS = [
        { value: 'proposed', label: 'Proposed' },
        { value: 'voting', label: 'Voting' },
        { value: 'active', label: 'Active' },
        { value: 'suspended', label: 'Suspended' },
        { value: 'repealed', label: 'Repealed' },
        { value: 'emergency_suspended', label: 'Emergency Suspended' },
    ];

    const STATUS_COLORS = {
        proposed: '#facc15',
        voting: '#f97316',
        active: 'var(--accent-primary)',
        suspended: 'var(--accent-warning)',
        repealed: 'var(--accent-danger)',
        emergency_suspended: '#ef4444',
    };

    const TYPE_ICONS = {
        agreement: 'handshake',
        initiative: 'target',
        law: 'scale',
    };

    const AGENCY_OPTIONS = ALL_AGENCIES.map(a => ({ value: a.name, label: a.name }));

    const ReadOnlyField = ({ value, style = {} }) => (
        <span className="mono-text" style={{
            color: 'var(--text-primary)', fontSize: '0.85rem',
            display: 'block', padding: '0.4rem 0',
            ...style,
        }}>
            {value || '—'}
        </span>
    );

    const RESULT_LABELS = {
        passed: 'PASSED',
        passed_chairman: 'PASSED (CHAIRMAN TIE-BREAK)',
        failed: 'FAILED',
        failed_chairman: 'FAILED (CHAIRMAN TIE-BREAK)',
        tied: 'TIED — AWAITING CHAIRMAN',
        no_quorum: 'NO QUORUM',
        emergency_suspended: 'EMERGENCY SUSPENDED',
    };

    const RESULT_COLORS = {
        passed: 'var(--accent-success)',
        passed_chairman: 'var(--accent-success)',
        failed: 'var(--accent-danger)',
        failed_chairman: 'var(--accent-danger)',
        tied: 'var(--accent-warning)',
        no_quorum: 'var(--text-muted)',
        emergency_suspended: '#ef4444',
    };

    const VotingPanel = ({ item, members, onVote }) => {
        const tally = item.tally;
        const votes = item.votes || [];
        if (!tally) return null;

        const getVote = (agencyId) => {
            const v = votes.find(v => v.agencyId === agencyId);
            return v ? v.vote : null;
        };

        const voteBtn = (agencyId, voteValue, label, color) => {
            const current = getVote(agencyId);
            const isActive = current === voteValue;
            return (
                <button
                    onClick={() => onVote(item.id, agencyId, voteValue)}
                    className="mono-text"
                    style={{
                        background: isActive ? color : 'transparent',
                        border: `1px solid ${color}`,
                        color: isActive ? 'var(--bg-dark)' : color,
                        padding: '2px 8px',
                        cursor: 'pointer',
                        fontSize: '0.7rem',
                        fontFamily: 'var(--font-mono)',
                        fontWeight: isActive ? 'bold' : 'normal',
                        borderRadius: 'var(--radius-sm)',
                    }}
                >
                    {label}
                </button>
            );
        };

        return (
            <div style={{
                marginTop: '0.75rem',
                padding: '0.75rem',
                background: 'rgba(168, 85, 247, 0.05)',
                border: `1px solid ${COUNCIL_ACCENT}`,
                borderRadius: 'var(--radius-sm)',
            }}>
                <label className="mono-text" style={{
                    fontSize: '0.75rem', color: COUNCIL_ACCENT, display: 'block',
                    marginBottom: '0.5rem', fontWeight: 'bold',
                }}>
                    VOTES
                </label>

                {/* Vote rows per member agency */}
                <div style={{ marginBottom: '0.75rem' }}>
                    {/* Use members list for live voting, or votes array for frozen records */}
                    {(item.status === 'voting' ? members : (votes || []).map(v => ({ id: v.agencyId, name: v.agencyName }))).map(m => {
                        const currentVote = getVote(m.id);
                        const canVoteForThis = item.status === 'voting' && (IS_ADMIN || (USER_AGENCY_ID === m.id));
                        const voteLabel = currentVote === 'did_not_vote' ? 'DID NOT VOTE'
                            : currentVote ? currentVote.toUpperCase()
                            : 'NOT VOTED';
                        const voteColor = currentVote === 'for' ? 'var(--accent-success)'
                            : currentVote === 'against' ? 'var(--accent-danger)'
                            : currentVote === 'abstain' ? 'var(--accent-warning)'
                            : 'var(--text-muted)';

                        return (
                            <div key={m.id} style={{
                                display: 'flex', justifyContent: 'space-between',
                                alignItems: 'center', padding: '0.3rem 0',
                                borderBottom: '1px solid rgba(255,255,255,0.04)',
                            }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                    <span className="mono-text" style={{
                                        fontSize: '0.8rem', color: 'var(--text-primary)',
                                        fontWeight: m.id === tally.chairmanAgencyId ? 'bold' : 'normal',
                                    }}>
                                        {m.name}
                                    </span>
                                    {m.id === tally.chairmanAgencyId && (
                                        <span className="mono-text" style={{
                                            fontSize: '0.55rem', padding: '1px 3px',
                                            background: COUNCIL_ACCENT, color: 'var(--bg-dark)',
                                            borderRadius: '2px',
                                        }}>CHAIR</span>
                                    )}
                                </div>
                                {canVoteForThis ? (
                                    <div style={{ display: 'flex', gap: '0.25rem' }}>
                                        {voteBtn(m.id, 'for', 'FOR', 'var(--accent-success)')}
                                        {voteBtn(m.id, 'against', 'AGAINST', 'var(--accent-danger)')}
                                        {voteBtn(m.id, 'abstain', 'ABSTAIN', 'var(--accent-warning)')}
                                    </div>
                                ) : (
                                    <span className="mono-text" style={{
                                        fontSize: '0.75rem', color: voteColor,
                                    }}>
                                        {voteLabel}
                                    </span>
                                )}
                            </div>
                        );
                    })}
                </div>

                {/* Tally bar */}
                <div style={{ marginBottom: '0.5rem' }}>
                    <div style={{
                        display: 'flex', justifyContent: 'space-between',
                        marginBottom: '0.25rem',
                    }}>
                        <span className="mono-text text-muted" style={{ fontSize: '0.7rem' }}>
                            TALLY: {tally.votesFor} FOR / {tally.votesAgainst} AGAINST / {tally.votesAbstain} ABSTAIN
                        </span>
                        <span className="mono-text text-muted" style={{ fontSize: '0.7rem' }}>
                            {tally.totalVoted} / {tally.totalMembers} VOTED
                        </span>
                    </div>
                    {tally.totalMembers > 0 && (
                        <div style={{
                            width: '100%', height: '8px', display: 'flex',
                            borderRadius: '4px', overflow: 'hidden',
                            border: '1px solid var(--border-color)',
                            background: 'rgba(255,255,255,0.05)',
                        }}>
                            {tally.votesFor > 0 && <div style={{
                                width: `${(tally.votesFor / tally.totalMembers) * 100}%`,
                                background: 'var(--accent-success)', height: '100%',
                            }} />}
                            {tally.votesAgainst > 0 && <div style={{
                                width: `${(tally.votesAgainst / tally.totalMembers) * 100}%`,
                                background: 'var(--accent-danger)', height: '100%',
                            }} />}
                            {tally.votesAbstain > 0 && <div style={{
                                width: `${(tally.votesAbstain / tally.totalMembers) * 100}%`,
                                background: 'var(--accent-warning)', height: '100%',
                            }} />}
                        </div>
                    )}
                </div>

                {/* Quorum + Result */}
                <div style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                }}>
                    <span className="mono-text" style={{
                        fontSize: '0.7rem',
                        color: tally.quorumMet ? 'var(--accent-success)' : 'var(--text-muted)',
                    }}>
                        QUORUM: {tally.quorumMet ? 'MET' : 'NOT MET'} ({tally.totalPresent || 0} present, {tally.quorumNeeded} needed)
                    </span>
                    <span className="mono-text" style={{
                        fontSize: '0.75rem', fontWeight: 'bold',
                        color: RESULT_COLORS[tally.result] || 'var(--text-muted)',
                        padding: '2px 6px',
                        border: `1px solid ${RESULT_COLORS[tally.result] || 'var(--text-muted)'}`,
                        borderRadius: 'var(--radius-sm)',
                    }}>
                        {RESULT_LABELS[tally.result] || tally.result}
                    </span>
                </div>
            </div>
        );
    };

    const CouncilItemCard = ({ item, onSave, onDelete, saving, dragHandlers, members, onVote }) => {
        const statusLabel = STATUS_OPTIONS.find(o => o.value === item.status)?.label || item.status;
        const typeLabel = TYPE_OPTIONS.find(o => o.value === item.itemType)?.label || item.itemType;
        const isOwnProposal = !IS_ADMIN && item.proposedBy === USER_AGENCY_NAME && item.status === 'proposed';
        const canEdit = IS_ADMIN || isOwnProposal;

        return (
            <div
                className="tech-border"
                {...dragHandlers}
                style={{
                    padding: '1.25rem',
                    marginBottom: '1rem',
                    borderLeft: `3px solid ${COUNCIL_ACCENT}`,
                    opacity: saving ? 0.7 : 1,
                    transition: 'opacity 0.2s',
                    cursor: CAN_REORDER ? 'grab' : 'default',
                }}
            >
                {/* Header: Name + Type badge + Delete */}
                <div style={{
                    display: 'flex', justifyContent: 'space-between',
                    alignItems: 'flex-start', marginBottom: '0.75rem'
                }}>
                    <div style={{ flex: 1, marginRight: '1rem' }}>
                        <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>
                            ITEM NAME
                        </label>
                        {canEdit ? (
                            <EditableCell
                                value={item.name}
                                field="name"
                                itemId={item.id}
                                onSave={onSave}
                                style={{ fontSize: '1rem', fontWeight: 'bold' }}
                            />
                        ) : (
                            <ReadOnlyField value={item.name} style={{ fontSize: '1rem', fontWeight: 'bold' }} />
                        )}
                    </div>
                    {(IS_ADMIN || (!IS_ADMIN && item.proposedBy === USER_AGENCY_NAME && item.status === 'proposed')) && (
                        <button
                            onClick={() => onDelete(item.id)}
                            title={IS_ADMIN ? "Delete council item" : "Withdraw proposal"}
                            style={{
                                background: 'transparent', border: '1px solid var(--accent-danger)',
                                color: 'var(--accent-danger)', cursor: 'pointer',
                                padding: '0.3rem 0.6rem', fontSize: '0.75rem',
                                fontFamily: 'var(--font-mono)', borderRadius: 'var(--radius-sm)',
                                marginTop: '1rem',
                            }}
                        >
                            {IS_ADMIN ? 'DELETE' : 'WITHDRAW'}
                        </button>
                    )}
                </div>

                {/* Type + Status + Order + Proposed By */}
                <div style={{
                    display: 'grid',
                    gridTemplateColumns: IS_ADMIN ? '1fr 1fr 80px 1fr' : '1fr 1fr 1fr',
                    gap: '0.75rem',
                    marginBottom: '0.75rem',
                }}>
                    <div>
                        <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>
                            TYPE
                        </label>
                        {canEdit ? (
                            <SelectField
                                value={item.itemType}
                                field="itemType"
                                itemId={item.id}
                                onSave={onSave}
                                options={TYPE_OPTIONS}
                            />
                        ) : (
                            <ReadOnlyField value={typeLabel} />
                        )}
                    </div>
                    <div>
                        <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>
                            STATUS
                        </label>
                        {IS_ADMIN ? (
                            <SelectField
                                value={item.status}
                                field="status"
                                itemId={item.id}
                                onSave={onSave}
                                options={STATUS_OPTIONS}
                            />
                        ) : (
                            <span className="mono-text" style={{
                                fontSize: '0.8rem', padding: '2px 6px',
                                border: `1px solid ${STATUS_COLORS[item.status] || 'var(--text-muted)'}`,
                                color: STATUS_COLORS[item.status] || 'var(--text-muted)',
                            }}>
                                {statusLabel.toUpperCase()}
                            </span>
                        )}
                    </div>
                    {IS_ADMIN && (
                        <div>
                            <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>
                                ORDER
                            </label>
                            <EditableCell
                                value={item.order}
                                field="order"
                                itemId={item.id}
                                onSave={onSave}
                                type="number"
                            />
                        </div>
                    )}
                    <div>
                        <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>
                            PROPOSED BY
                        </label>
                        {IS_ADMIN ? (
                            <SelectField
                                value={item.proposedBy}
                                field="proposedBy"
                                itemId={item.id}
                                onSave={onSave}
                                options={[{ value: '', label: '— Select Agency —' }, ...AGENCY_OPTIONS]}
                            />
                        ) : (
                            <ReadOnlyField value={item.proposedBy} />
                        )}
                    </div>
                </div>

                {/* Description */}
                <div style={{ marginBottom: '0.75rem' }}>
                    <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>
                        DESCRIPTION
                    </label>
                    {canEdit ? (
                        <EditableTextArea
                            value={item.description}
                            field="description"
                            itemId={item.id}
                            onSave={onSave}
                        />
                    ) : (
                        <p className="text-secondary" style={{ fontSize: '0.85rem', margin: 0, whiteSpace: 'pre-wrap' }}>
                            {item.description || '—'}
                        </p>
                    )}
                </div>

                {/* Notes */}
                <div>
                    <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>
                        NOTES
                    </label>
                    {canEdit ? (
                        <EditableTextArea
                            value={item.notes}
                            field="notes"
                            itemId={item.id}
                            onSave={onSave}
                        />
                    ) : (
                        <p className="text-secondary" style={{ fontSize: '0.85rem', margin: 0, whiteSpace: 'pre-wrap' }}>
                            {item.notes || '—'}
                        </p>
                    )}
                </div>

                {/* Chairman actions */}
                {(IS_ADMIN || IS_CHAIRMAN) && item.status === 'proposed' && (
                    <div style={{ marginTop: '0.75rem' }}>
                        <button
                            onClick={() => onSave(item.id, 'status', 'voting')}
                            className="mono-text"
                            style={{
                                background: 'rgba(168, 85, 247, 0.15)',
                                border: `1px solid ${COUNCIL_ACCENT}`,
                                color: COUNCIL_ACCENT,
                                padding: '0.4rem 1rem',
                                cursor: 'pointer',
                                fontSize: '0.8rem',
                                fontFamily: 'var(--font-mono)',
                                fontWeight: 'bold',
                                borderRadius: 'var(--radius-sm)',
                            }}
                        >
                            CALL VOTE
                        </button>
                    </div>
                )}

                {(IS_ADMIN || IS_CHAIRMAN) && item.status === 'voting' && (
                    <div style={{ marginTop: '0.5rem' }}>
                        <button
                            onClick={() => {
                                if (confirm('Emergency suspend this vote? All current votes will be recorded.')) {
                                    onSave(item.id, 'status', 'emergency_suspended');
                                }
                            }}
                            className="mono-text"
                            style={{
                                background: 'rgba(239, 68, 68, 0.1)',
                                border: '1px solid var(--accent-danger)',
                                color: 'var(--accent-danger)',
                                padding: '0.3rem 0.75rem',
                                cursor: 'pointer',
                                fontSize: '0.75rem',
                                fontFamily: 'var(--font-mono)',
                                borderRadius: 'var(--radius-sm)',
                            }}
                        >
                            EMERGENCY SUSPEND
                        </button>
                    </div>
                )}

                {/* Voting panel — shown when item has votes/tally data */}
                {item.tally && (
                    <VotingPanel item={item} members={members} onVote={onVote} />
                )}
            </div>
        );
    };

    const CouncilMembersPanel = ({ onPresenceChange }) => {
        const [members, setMembers] = useState([]);
        const [loading, setLoading] = useState(true);
        const [settingChairman, setSettingChairman] = useState(null);

        const fetchMembers = async () => {
            const res = await fetch('/api/council/members/', {
                headers: { 'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN }
            });
            if (res.ok) {
                const data = await res.json();
                setMembers(data);
                if (onPresenceChange) onPresenceChange(data);
            }
            setLoading(false);
        };

        useEffect(() => { fetchMembers(); }, []);

        const setChairman = async (agencyId) => {
            setSettingChairman(agencyId);
            await fetch(`/api/council/chairman/${agencyId}/`, {
                method: 'POST',
                headers: { 'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN },
            });
            await fetchMembers();
            setSettingChairman(null);
        };

        const togglePresence = async (agencyId) => {
            await fetch(`/api/council/presence/${agencyId}/`, {
                method: 'POST',
                headers: { 'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN },
            });
            await fetchMembers();
        };

        const chairman = members.find(m => m.isCouncilChairman);
        const presentCount = members.filter(m => m.isPresent).length;
        const quorumNeeded = Math.floor(members.length / 2) + 1;
        const quorumMet = presentCount >= quorumNeeded;

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1.5rem' }}>
                <h2 className="mono-text" style={{
                    color: COUNCIL_ACCENT, fontSize: '1rem', letterSpacing: '1px',
                    borderBottom: `1px solid ${COUNCIL_ACCENT}`, paddingBottom: '0.5rem',
                    marginBottom: '1rem',
                }}>
                    COUNCIL MEMBERS
                    <span className="text-muted" style={{ fontSize: '0.7rem', marginLeft: '0.5rem' }}>
                        ({members.length} member{members.length !== 1 ? 's' : ''})
                    </span>
                </h2>

                {chairman && (
                    <div style={{
                        background: 'rgba(168, 85, 247, 0.12)',
                        border: `1px solid ${COUNCIL_ACCENT}`,
                        borderRadius: 'var(--radius-sm)',
                        padding: '0.75rem',
                        marginBottom: '1rem',
                        display: 'flex', alignItems: 'center', gap: '0.5rem',
                    }}>
                        <Icon name="crown" size={16} />
                        <span className="mono-text" style={{ color: COUNCIL_ACCENT, fontWeight: 'bold', fontSize: '0.85rem' }}>
                            CHAIRMAN: {chairman.name}
                        </span>
                    </div>
                )}

                {/* Quorum indicator */}
                {members.length > 0 && (
                    <div style={{
                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                        padding: '0.5rem 0.75rem', marginBottom: '0.75rem',
                        background: quorumMet ? 'rgba(34, 197, 94, 0.08)' : 'rgba(239, 68, 68, 0.08)',
                        border: `1px solid ${quorumMet ? 'var(--accent-success)' : 'var(--accent-danger)'}`,
                        borderRadius: 'var(--radius-sm)',
                    }}>
                        <span className="mono-text" style={{
                            fontSize: '0.75rem',
                            color: quorumMet ? 'var(--accent-success)' : 'var(--accent-danger)',
                        }}>
                            PRESENT: {presentCount} / {members.length}
                        </span>
                        <span className="mono-text" style={{
                            fontSize: '0.75rem', fontWeight: 'bold',
                            color: quorumMet ? 'var(--accent-success)' : 'var(--accent-danger)',
                        }}>
                            {quorumMet ? 'QUORUM MET' : `QUORUM NOT MET (${quorumNeeded} needed)`}
                        </span>
                    </div>
                )}

                {loading ? (
                    <p className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>Loading members...</p>
                ) : members.length === 0 ? (
                    <p className="text-muted mono-text" style={{
                        textAlign: 'center', padding: '1rem 0', fontStyle: 'italic', fontSize: '0.85rem'
                    }}>
                        No agencies have joined the council yet. Agencies can join via their agency sheet.
                    </p>
                ) : (
                    <div>
                        {members.map(member => (
                            <div key={member.id} className="tech-border" style={{
                                padding: '0.6rem 0.75rem', marginBottom: '0.25rem',
                                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                background: member.isCouncilChairman ? 'rgba(168, 85, 247, 0.08)' : 'rgba(0,0,0,0.2)',
                                opacity: member.isPresent ? 1 : 0.5,
                            }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                    {/* Presence indicator */}
                                    <span style={{
                                        width: '8px', height: '8px', borderRadius: '50%',
                                        background: member.isPresent ? 'var(--accent-success)' : 'var(--text-muted)',
                                        display: 'inline-block', flexShrink: 0,
                                    }} />
                                    <a href={`/agencies/${member.id}/`} className="mono-text" style={{
                                        color: 'var(--text-primary)', textDecoration: 'none',
                                        fontSize: '0.85rem', fontWeight: member.isCouncilChairman ? 'bold' : 'normal',
                                    }}>
                                        {member.name}
                                    </a>
                                    {member.isPlayerAgency && (
                                        <span className="mono-text" style={{
                                            fontSize: '0.6rem', padding: '1px 4px',
                                            border: '1px solid var(--accent-primary)',
                                            color: 'var(--accent-primary)',
                                        }}>PLAYER</span>
                                    )}
                                    {member.isCouncilChairman && (
                                        <span className="mono-text" style={{
                                            fontSize: '0.6rem', padding: '1px 4px',
                                            background: COUNCIL_ACCENT, color: 'var(--bg-dark)',
                                            borderRadius: 'var(--radius-sm)', fontWeight: 'bold',
                                        }}>CHAIRMAN</span>
                                    )}
                                </div>
                                <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                                    {(IS_ADMIN || IS_CHAIRMAN) && (
                                        <button
                                            onClick={() => togglePresence(member.id)}
                                            className="mono-text"
                                            title={member.isPresent ? 'Mark absent' : 'Mark present'}
                                            style={{
                                                background: member.isPresent ? 'rgba(34, 197, 94, 0.15)' : 'transparent',
                                                border: `1px solid ${member.isPresent ? 'var(--accent-success)' : 'var(--border-color)'}`,
                                                color: member.isPresent ? 'var(--accent-success)' : 'var(--text-muted)',
                                                padding: '0.2rem 0.6rem',
                                                cursor: 'pointer',
                                                fontSize: '0.7rem',
                                                fontFamily: 'var(--font-mono)',
                                                borderRadius: 'var(--radius-sm)',
                                            }}
                                        >
                                            {member.isPresent ? 'PRESENT' : 'ABSENT'}
                                        </button>
                                    )}
                                    {IS_ADMIN && !member.isCouncilChairman && (
                                        <button
                                            onClick={() => setChairman(member.id)}
                                            disabled={settingChairman !== null}
                                            className="mono-text"
                                            title="Designate as Chairman"
                                            style={{
                                                background: 'transparent',
                                                border: `1px solid ${COUNCIL_ACCENT}`,
                                                color: COUNCIL_ACCENT,
                                                padding: '0.2rem 0.6rem',
                                                cursor: settingChairman ? 'wait' : 'pointer',
                                                fontSize: '0.7rem',
                                                fontFamily: 'var(--font-mono)',
                                                borderRadius: 'var(--radius-sm)',
                                                opacity: settingChairman ? 0.6 : 1,
                                            }}
                                        >
                                            {settingChairman === member.id ? 'SETTING...' : 'SET CHAIRMAN'}
                                        </button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        );
    };

    const CouncilManager = () => {
        const [items, setItems] = useState([]);
        const [members, setMembers] = useState([]);
        const [loading, setLoading] = useState(true);
        const [saving, setSaving] = useState(null);
        const [creating, setCreating] = useState(false);
        const [filterType, setFilterType] = useState('all');
        const dragItem = useRef(null);
        const dragOverItem = useRef(null);

        const fetchItems = async () => {
            const res = await fetch('/api/council/', {
                headers: { 'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN }
            });
            if (res.ok) {
                setItems(await res.json());
            }
            setLoading(false);
        };

        useEffect(() => {
            fetchItems();

            // WebSocket for live vote updates
            const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${proto}//${window.location.host}/ws/council/`);
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'council_update' && data.item) {
                    setItems(prev => prev.map(i =>
                        i.id === data.item.id ? data.item : i
                    ));
                }
            };
            ws.onclose = () => {
                // Reconnect after a short delay
                setTimeout(() => {
                    const reconnect = new WebSocket(`${proto}//${window.location.host}/ws/council/`);
                    reconnect.onmessage = ws.onmessage;
                }, 3000);
            };
            return () => ws.close();
        }, []);

        const castVote = async (itemId, agencyId, vote) => {
            const res = await fetch(`/api/council/${itemId}/vote/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                },
                body: JSON.stringify({ agencyId, vote }),
            });
            if (res.ok) {
                const updated = await res.json();
                setItems(prev => prev.map(i => i.id === itemId ? updated : i));
            }
        };

        const saveItem = async (id, field, value) => {
            setSaving(id);
            await fetch(`/api/council/${id}/`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                },
                body: JSON.stringify({ [field]: value }),
            });
            await fetchItems();
            setSaving(null);
        };

        const createItem = async (itemType) => {
            setCreating(true);
            const typeLabels = { agreement: 'AGREEMENT', initiative: 'INITIATIVE', law: 'LAW' };
            const body = {
                name: `NEW ${typeLabels[itemType]}`,
                itemType: itemType,
                order: items.length,
            };
            // Admin selects proposedBy via dropdown on the card after creation;
            // players auto-set via the backend
            if (!IS_ADMIN && USER_AGENCY_NAME) {
                body.proposedBy = USER_AGENCY_NAME;
            }
            const res = await fetch('/api/council/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                },
                body: JSON.stringify(body),
            });
            if (res.ok) {
                await fetchItems();
            }
            setCreating(false);
        };

        const deleteItem = async (id) => {
            await fetch(`/api/council/${id}/`, {
                method: 'DELETE',
                headers: { 'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN },
            });
            setItems(prev => prev.filter(i => i.id !== id));
        };

        // --- Drag and drop reorder ---
        const handleDragStart = (idx) => {
            dragItem.current = idx;
        };

        const handleDragEnter = (idx) => {
            dragOverItem.current = idx;
        };

        const handleDragOver = (e) => {
            e.preventDefault();
        };

        const handleDrop = async (e) => {
            e.preventDefault();
            if (dragItem.current === null || dragOverItem.current === null) return;
            if (dragItem.current === dragOverItem.current) return;

            const reordered = [...filtered];
            const [dragged] = reordered.splice(dragItem.current, 1);
            reordered.splice(dragOverItem.current, 0, dragged);

            // Assign new order values
            const updates = reordered.map((item, idx) => ({ id: item.id, order: idx }));

            // Optimistic update
            const newItems = items.map(item => {
                const upd = updates.find(u => u.id === item.id);
                return upd ? { ...item, order: upd.order } : item;
            });
            newItems.sort((a, b) => a.order - b.order || a.name.localeCompare(b.name));
            setItems(newItems);

            dragItem.current = null;
            dragOverItem.current = null;

            // Persist to backend
            await fetch('/api/council/reorder/', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                },
                body: JSON.stringify({ items: updates }),
            });
        };

        const handleDragEnd = () => {
            dragItem.current = null;
            dragOverItem.current = null;
        };

        if (loading) {
            return (
                <div className="loading-screen">
                    <h1 className="mono-text">LOADING COUNCIL REGISTRY...</h1>
                </div>
            );
        }

        const filtered = filterType === 'all' ? items : items.filter(i => i.itemType === filterType);

        const counts = {
            all: items.length,
            agreement: items.filter(i => i.itemType === 'agreement').length,
            initiative: items.filter(i => i.itemType === 'initiative').length,
            law: items.filter(i => i.itemType === 'law').length,
        };

        return (
            <div style={{ maxWidth: '1000px', margin: '0 auto', padding: '2rem 1rem' }}>
                {/* Header */}
                <div style={{ marginBottom: '2rem' }}>
                    <a href="/agencies/" className="mono-text text-muted"
                        style={{ textDecoration: 'none', fontSize: '0.8rem', display: 'block', marginBottom: '0.5rem' }}>
                        &lt; BACK TO AGENCIES
                    </a>
                    <h1 className="mono-text" style={{
                        color: COUNCIL_ACCENT,
                        fontSize: '1.5rem',
                        letterSpacing: '2px',
                        borderBottom: `2px solid ${COUNCIL_ACCENT}`,
                        paddingBottom: '0.5rem'
                    }}>
                        <Icon name="landmark" size={22} /> UNITED INTERSTELLAR COUNCIL
                    </h1>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginTop: '0.5rem' }}>
                        <p className="text-muted mono-text" style={{ fontSize: '0.75rem', margin: 0 }}>
                            Agreements, common goal initiatives, and laws established by the council. Visible on all agency sheets.
                        </p>
                        <a href="/agencies/council/charter/" className="mono-text" style={{
                            textDecoration: 'none',
                            border: `1px solid ${COUNCIL_ACCENT}`,
                            color: COUNCIL_ACCENT,
                            padding: '0.4rem 1rem',
                            fontSize: '0.8rem',
                            fontWeight: 'bold',
                            letterSpacing: '1px',
                            borderRadius: 'var(--radius-sm)',
                            whiteSpace: 'nowrap',
                        }}>
                            <Icon name="scroll-text" size={14} /> CHARTER
                        </a>
                    </div>
                </div>

                {/* Council Members */}
                <CouncilMembersPanel onPresenceChange={setMembers} />

                {/* Reorder hint for chairman */}
                {CAN_REORDER && !IS_ADMIN && (
                    <div style={{
                        background: 'rgba(168, 85, 247, 0.08)',
                        border: `1px solid ${COUNCIL_ACCENT}`,
                        borderRadius: 'var(--radius-sm)',
                        padding: '0.5rem 0.75rem',
                        marginBottom: '1rem',
                        display: 'flex', alignItems: 'center', gap: '0.5rem',
                    }}>
                        <Icon name="grip-vertical" size={14} />
                        <span className="mono-text text-muted" style={{ fontSize: '0.75rem' }}>
                            As chairman, drag proposals to reorder them.
                        </span>
                    </div>
                )}

                {/* Filter tabs */}
                <div style={{
                    display: 'flex', gap: '0.5rem', marginBottom: '1.5rem', flexWrap: 'wrap'
                }}>
                    {[
                        { key: 'all', label: 'ALL' },
                        { key: 'agreement', label: 'AGREEMENTS' },
                        { key: 'initiative', label: 'INITIATIVES' },
                        { key: 'law', label: 'LAWS' },
                    ].map(tab => (
                        <button
                            key={tab.key}
                            onClick={() => setFilterType(tab.key)}
                            className="mono-text"
                            style={{
                                background: filterType === tab.key ? COUNCIL_ACCENT : 'transparent',
                                border: `1px solid ${COUNCIL_ACCENT}`,
                                color: filterType === tab.key ? 'var(--bg-dark)' : COUNCIL_ACCENT,
                                padding: '0.4rem 1rem',
                                cursor: 'pointer',
                                fontWeight: 'bold',
                                fontSize: '0.8rem',
                                letterSpacing: '1px',
                                borderRadius: 'var(--radius-sm)',
                            }}
                        >
                            {tab.label} ({counts[tab.key]})
                        </button>
                    ))}
                </div>

                {/* Items */}
                <div className="glass-panel" style={{ padding: '1.5rem' }}>
                    {filtered.length === 0 && (
                        <p className="text-muted mono-text" style={{
                            textAlign: 'center', padding: '2rem 0', fontStyle: 'italic', fontSize: '0.85rem'
                        }}>
                            No council items registered{filterType !== 'all' ? ` of type "${filterType}"` : ''}.
                        </p>
                    )}

                    {filtered.map((item, idx) => (
                        <CouncilItemCard
                            key={item.id}
                            item={item}
                            onSave={saveItem}
                            onDelete={deleteItem}
                            saving={saving === item.id}
                            dragHandlers={CAN_REORDER ? {
                                draggable: true,
                                onDragStart: () => handleDragStart(idx),
                                onDragEnter: () => handleDragEnter(idx),
                                onDragOver: handleDragOver,
                                onDrop: handleDrop,
                                onDragEnd: handleDragEnd,
                            } : {}}
                            members={members}
                            onVote={castVote}
                        />
                    ))}

                    {/* Create buttons — admin or player with agency */}
                    {CAN_CREATE && (
                        <div style={{
                            textAlign: 'center', marginTop: '1rem',
                            display: 'flex', gap: '0.75rem', justifyContent: 'center', flexWrap: 'wrap'
                        }}>
                            {[
                                { type: 'agreement', label: '+ AGREEMENT', icon: 'handshake' },
                                { type: 'initiative', label: '+ INITIATIVE', icon: 'target' },
                                { type: 'law', label: '+ LAW', icon: 'scale' },
                            ].map(btn => (
                                <button
                                    key={btn.type}
                                    onClick={() => createItem(btn.type)}
                                    disabled={creating}
                                    className="mono-text"
                                    style={{
                                        background: 'transparent',
                                        border: `1px solid ${COUNCIL_ACCENT}`,
                                        color: COUNCIL_ACCENT,
                                        padding: '0.6rem 1.5rem',
                                        cursor: creating ? 'wait' : 'pointer',
                                        fontWeight: 'bold',
                                        fontFamily: 'var(--font-mono)',
                                        fontSize: '0.85rem',
                                        letterSpacing: '1px',
                                        borderRadius: 'var(--radius-sm)',
                                        opacity: creating ? 0.6 : 1,
                                    }}
                                >
                                    {creating ? 'CREATING...' : btn.label}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<CouncilManager />);
</script>
