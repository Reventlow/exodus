{% extends "base.html" %}

{% block title %}AGENCIES // BLACKLOG.NET{% endblock %}

{% block content %}
<div id="app-root">
    <div class="loading-screen">
        <h1 class="mono-text">LOADING AGENCY DATABASE...</h1>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Django context variables — outside verbatim block
    const CURRENT_USER = '{{ user.username }}';
    const IS_ADMIN = {{ user.is_superuser|yesno:"true,false" }};
    const CSRF_TOKEN = '{{ csrf_token }}';
</script>
{% verbatim %}
<script type="text/babel">
    const { useState, useEffect } = React;

    // CSRF cookie reader for fetch requests
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // Icon component using Lucide
    const Icon = ({ name, size = 16, className = "" }) => {
        useEffect(() => {
            if (window.lucide) window.lucide.createIcons();
        }, [name]);
        return <i data-lucide={name} width={size} height={size} className={className}></i>;
    };

    const AgencyCard = ({ agency, onClick }) => (
        <div
            className="tech-border glitch-hover"
            style={{
                padding: '1rem',
                background: agency.isPlayerAgency
                    ? 'linear-gradient(135deg, var(--bg-panel), rgba(var(--accent-primary-rgb, 0,255,136), 0.05))'
                    : 'var(--bg-panel)',
                cursor: 'pointer',
                transition: 'all 0.2s',
                borderLeft: agency.isPlayerAgency ? '3px solid var(--accent-primary)' : 'none'
            }}
            onClick={onClick}
        >
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '0.5rem' }}>
                <h3 className="text-accent mono-text" style={{ fontSize: '1.1rem' }}>
                    {agency.name}
                </h3>
                {/* Wave 2A: ad-hoc bordered spans -> .status-pill recipe.
                    HIDDEN = s-burned (compromised/admin-only); PLAYER = s-active. */}
                <div style={{ display: 'flex', gap: '0.3rem', flexWrap: 'wrap' }}>
                    {agency.isHidden && (
                        <span className="status-pill s-burned">HIDDEN</span>
                    )}
                    {agency.isPlayerAgency && (
                        <span className="status-pill s-active">PLAYER</span>
                    )}
                </div>
            </div>
            <p className="text-secondary" style={{ fontSize: '0.85rem', marginTop: '0.25rem' }}>
                {agency.alliance === 'CLASSIFIED' ? <span className="classified">CLASSIFIED</span> :
                    (() => {
                        const a = agency.alliance || {};
                        const all = [...(a.countries || []), ...(a.companies || []), ...(a.organizations || [])];
                        return all.length > 0
                            ? all.filter(Boolean).join(', ')
                            : <span className="text-muted" style={{ fontStyle: 'italic' }}>No Alliance</span>;
                    })()
                }
            </p>
            {agency.motto && agency.motto !== 'CLASSIFIED' && (
                <p className="text-muted" style={{ fontSize: '0.8rem', fontStyle: 'italic', marginTop: '0.5rem' }}>
                    "{agency.motto}"
                </p>
            )}
            {agency.motto === 'CLASSIFIED' && (
                <p className="classified" style={{ fontSize: '0.8rem', marginTop: '0.5rem' }}>
                    CLASSIFIED
                </p>
            )}
        </div>
    );

    const NotificationBadge = ({ count }) => {
        if (!count) return null;
        return (
            <span style={{
                background: 'var(--accent-danger)',
                color: 'var(--bg-dark)',
                borderRadius: '50%',
                width: '20px', height: '20px',
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                fontSize: '0.7rem', fontWeight: 'bold', marginLeft: '0.5rem'
            }}>{count}</span>
        );
    };

    const Dashboard = () => {
        const [agencies, setAgencies] = useState([]);
        const [loading, setLoading] = useState(true);
        const [creating, setCreating] = useState(false);
        const [notifications, setNotifications] = useState({});

        useEffect(() => {
            fetchAgencies();
            fetchNotifications();
        }, []);

        const fetchAgencies = async () => {
            try {
                const response = await fetch('/api/agencies/');
                if (response.ok) {
                    const data = await response.json();
                    setAgencies(data);
                }
            } catch (err) {
                console.error('Failed to fetch agencies:', err);
            } finally {
                setLoading(false);
            }
        };

        const fetchNotifications = async () => {
            try {
                const response = await fetch('/api/agencies/notifications/');
                if (response.ok) {
                    setNotifications(await response.json());
                }
            } catch (err) {
                console.error('Failed to fetch notifications:', err);
            }
        };

        const createAgency = async (isPlayer) => {
            setCreating(true);
            try {
                const response = await fetch('/api/agencies/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({
                        name: isPlayer ? 'NEW PLAYER AGENCY' : 'NEW NPC AGENCY',
                        isPlayerAgency: isPlayer,
                    }),
                });
                if (response.ok) {
                    const newAgency = await response.json();
                    window.location.href = '/agencies/' + newAgency.id + '/';
                } else {
                    const err = await response.json();
                    alert(err.error || 'Failed to create agency');
                }
            } catch (err) {
                console.error('Failed to create agency:', err);
            } finally {
                setCreating(false);
            }
        };

        if (loading) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-accent" style={{ animation: 'pulse 1.5s infinite' }}>
                        ACCESSING AGENCY DATABASE...
                    </h2>
                </div>
            );
        }

        const playerAgencies = agencies.filter(a => a.isPlayerAgency);
        const npcAgencies = agencies.filter(a => !a.isPlayerAgency);
        const notifCount = (notifications.pendingRequests || 0) + (notifications.reviewedRequests || 0);

        return (
            <div>
                {/* Wave 2A: brackets-card chrome with corner cuts replaces glass-panel. */}
                <div className="brackets" style={{ position: 'relative', padding: '32px 36px', maxWidth: '900px', margin: '2rem auto' }}>
                    <span className="bk tl"></span><span className="bk tr"></span>
                    <span className="bk bl"></span><span className="bk br"></span>

                    <div className="kicker">// AGENCY REGISTRY</div>
                    <h2 className="title" style={{ fontSize: '52px', marginBottom: '8px' }}>
                        <span><Icon name="building-2" size={28} /> AGENCIES</span>
                        <NotificationBadge count={notifCount} />
                    </h2>
                    <div className="sub" style={{ marginBottom: '1.5rem' }}>
                        Faction roster · UIC membership · {agencies.length} RECORD{agencies.length !== 1 ? 'S' : ''}
                    </div>

                    {/* Player Agency Section — Wave 2A block-head pattern. */}
                    {playerAgencies.length > 0 && (
                        <div style={{ marginBottom: '2rem' }}>
                            <header className="block-head" style={{ marginBottom: '1rem' }}>
                                <span className="block-bullet">■</span>
                                <h3>PLAYER AGENCY</h3>
                                <span className="block-line"></span>
                                <span className="block-badge">{playerAgencies.length}</span>
                            </header>
                            <div style={{
                                display: 'grid',
                                gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
                                gap: '1rem'
                            }}>
                                {playerAgencies.map(agency => (
                                    <AgencyCard
                                        key={agency.id}
                                        agency={agency}
                                        onClick={() => { window.location.href = '/agencies/' + agency.id + '/'; }}
                                    />
                                ))}
                            </div>
                        </div>
                    )}

                    {/* NPC Agencies Section — Wave 2A block-head pattern. */}
                    {npcAgencies.length > 0 && (
                        <div style={{ marginBottom: '2rem' }}>
                            <header className="block-head" style={{ marginBottom: '1rem' }}>
                                <span className="block-bullet">■</span>
                                <h3>NPC AGENCIES</h3>
                                <span className="block-line"></span>
                                <span className="block-badge">{npcAgencies.length}</span>
                            </header>
                            <div style={{
                                display: 'grid',
                                gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
                                gap: '1rem'
                            }}>
                                {npcAgencies.map(agency => (
                                    <AgencyCard
                                        key={agency.id}
                                        agency={agency}
                                        onClick={() => { window.location.href = '/agencies/' + agency.id + '/'; }}
                                    />
                                ))}
                            </div>
                        </div>
                    )}

                    {agencies.length === 0 && (
                        <p className="text-muted text-center mono-text" style={{ fontStyle: 'italic', padding: '2rem 0' }}>
                            No agency records in database.
                        </p>
                    )}

                    {/* Admin: Create buttons */}
                    {IS_ADMIN && (
                        <div style={{ textAlign: 'center', padding: '1rem 0', display: 'flex', gap: '1rem', justifyContent: 'center' }}>
                            <button
                                onClick={() => createAgency(true)}
                                disabled={creating}
                                style={{
                                    background: 'var(--accent-primary)',
                                    border: 'none',
                                    color: 'var(--bg-dark)',
                                    padding: '0.75rem 2rem',
                                    cursor: creating ? 'wait' : 'pointer',
                                    fontWeight: 'bold',
                                    fontFamily: 'var(--font-mono)',
                                    fontSize: '0.9rem',
                                    letterSpacing: '1px',
                                    borderRadius: 0,
                                    opacity: creating ? 0.6 : 1
                                }}
                            >
                                {creating ? 'CREATING...' : 'CREATE PLAYER AGENCY'}
                            </button>
                            <button
                                onClick={() => createAgency(false)}
                                disabled={creating}
                                style={{
                                    background: 'transparent',
                                    border: '1px solid var(--accent-primary)',
                                    color: 'var(--accent-primary)',
                                    padding: '0.75rem 2rem',
                                    cursor: creating ? 'wait' : 'pointer',
                                    fontWeight: 'bold',
                                    fontFamily: 'var(--font-mono)',
                                    fontSize: '0.9rem',
                                    letterSpacing: '1px',
                                    borderRadius: 0,
                                    opacity: creating ? 0.6 : 1
                                }}
                            >
                                {creating ? 'CREATING...' : 'CREATE NPC AGENCY'}
                            </button>
                            <a href="/agencies/global-flaws/"
                                className="mono-text"
                                style={{
                                    background: 'transparent',
                                    border: '1px solid var(--accent-warning)',
                                    color: 'var(--accent-warning)',
                                    padding: '0.75rem 2rem',
                                    textDecoration: 'none',
                                    fontWeight: 'bold',
                                    fontSize: '0.9rem',
                                    letterSpacing: '1px',
                                    borderRadius: 0,
                                    display: 'inline-block',
                                }}
                            >MANAGE GLOBAL FLAWS</a>
                            <a href="/agencies/ftl-projects/"
                                className="mono-text"
                                style={{
                                    background: 'transparent',
                                    border: '1px solid #3b82f6',
                                    color: '#3b82f6',
                                    padding: '0.75rem 2rem',
                                    textDecoration: 'none',
                                    fontWeight: 'bold',
                                    fontSize: '0.9rem',
                                    letterSpacing: '1px',
                                    borderRadius: 0,
                                    display: 'inline-block',
                                }}
                            >MANAGE FTL PROJECTS</a>
                            <a href="/agencies/base-config/"
                                className="mono-text"
                                style={{
                                    background: 'transparent',
                                    border: '1px solid #22c55e',
                                    color: '#22c55e',
                                    padding: '0.75rem 2rem',
                                    textDecoration: 'none',
                                    fontWeight: 'bold',
                                    fontSize: '0.9rem',
                                    letterSpacing: '1px',
                                    borderRadius: 0,
                                    display: 'inline-block',
                                }}
                            >CONFIGURE BASES</a>
                        </div>
                    )}

                    {/* Council link — visible to all */}
                    <div style={{ textAlign: 'center', padding: '0.5rem 0' }}>
                        <a href="/agencies/council/"
                            className="mono-text"
                            style={{
                                background: 'transparent',
                                border: '1px solid #a855f7',
                                color: '#a855f7',
                                padding: '0.75rem 2rem',
                                textDecoration: 'none',
                                fontWeight: 'bold',
                                fontSize: '0.9rem',
                                letterSpacing: '1px',
                                borderRadius: 0,
                                display: 'inline-block',
                            }}
                        >INTERSTELLAR COUNCIL</a>
                    </div>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<Dashboard />);
</script>
{% endverbatim %}
{% endblock %}
