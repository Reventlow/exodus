<script type="text/babel">
// STAR INTEL — agency star-database scanning panel (Phase 1b).
// Lists the agency's observatories (one scan each per open scanning turn) and
// the accumulated private scan database with uncertainty% + approximate readout.
const StarIntelModule = ({ observatories = [], scanGrant = 0, starScans = [], publicRecord = [], publishedSystemIds = [], agencyId, fetchAgency }) => {
    const { useState, useEffect } = React;
    const { getCookie } = window;
    const ACCENT = '#7fdcff';
    const isGM = (typeof IS_ADMIN !== 'undefined') && IS_ADMIN;

    const [systems, setSystems] = useState([]);
    const [picks, setPicks] = useState({});   // { baseId: starSystemId }
    const [msg, setMsg] = useState('');
    const [busy, setBusy] = useState(false);
    const [grantInput, setGrantInput] = useState(scanGrant);

    const grantScans = () => {
        const n = Math.max(0, parseInt(grantInput, 10) || 0);
        fetch(`/api/agencies/${agencyId}/`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify({ scanGrant: n }),
        }).then(r => r.json().then(d => ({ ok: r.ok, d }))).then(({ ok, d }) => {
            if (!ok) { setMsg((d && d.error) || 'Grant failed.'); return; }
            setMsg(`Granted ${n} scan${n === 1 ? '' : 's'} per observatory.`);
            if (fetchAgency) fetchAgency();
        });
    };
    const [hiddenAgencies, setHiddenAgencies] = useState({});  // { agencyId: true } = filtered out
    const [falsifyPick, setFalsifyPick] = useState('');
    const [falsifyUnc, setFalsifyUnc] = useState(0);
    const publishedSet = new Set(publishedSystemIds);

    // Distinct contributor agencies on the board (for the filter chips).
    const contributors = (() => {
        const m = {};
        publicRecord.forEach(sys => sys.contributions.forEach(c => { m[c.agencyId] = c.agencyName; }));
        return Object.entries(m).map(([id, name]) => ({ id: parseInt(id, 10), name }));
    })();
    const toggleAgency = (id) => setHiddenAgencies({ ...hiddenAgencies, [id]: !hiddenAgencies[id] });

    const post = (url, body) => fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
        body: JSON.stringify(body),
    }).then(r => r.json().then(d => ({ ok: r.ok, d })));

    const publish = (starSystemId, unpublish) => {
        const url = `/api/agencies/${agencyId}/${unpublish ? 'unpublish-scan' : 'publish-scan'}/`;
        post(url, { starSystemId }).then(({ ok, d }) => {
            if (!ok) { setMsg(d.error || 'Failed.'); return; }
            setMsg(unpublish ? 'Removed from public record.' : 'Published to public record.');
            if (fetchAgency) fetchAgency();
        });
    };

    const falsify = () => {
        if (!falsifyPick) { setMsg('Pick a system to falsify.'); return; }
        const sys = systems.find(s => s.id === parseInt(falsifyPick, 10));
        post(`/api/agencies/${agencyId}/publish-scan/`, {
            starSystemId: parseInt(falsifyPick, 10),
            isFalse: true,
            uncertainty: Math.max(0, Math.min(100, parseInt(falsifyUnc, 10) || 0)),
            payload: { resources: {}, livable: null, label: sys ? sys.name : '' },
        }).then(({ ok, d }) => {
            if (!ok) { setMsg(d.error || 'Failed.'); return; }
            setMsg('False data planted — scan difficulty raised for that system.');
            if (fetchAgency) fetchAgency();
        });
    };

    useEffect(() => {
        // Any system can be scanned — the first scan discovers it. Exclude only
        // unreachable endgame beacons.
        fetch('/api/starmap/systems/').then(r => (r.ok ? r.json() : []))
            .then(data => setSystems((data || []).filter(s => !s.isEndgame)
                .sort((a, b) => (a.dist || 0) - (b.dist || 0))))
            .catch(() => {});
    }, []);

    const scan = (baseId) => {
        const starId = picks[baseId];
        if (!starId) { setMsg('Pick a system to scan first.'); return; }
        setBusy(true); setMsg('');
        fetch(`/api/agencies/${agencyId}/observatory-scan/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify({ baseId, starSystemId: starId }),
        }).then(r => r.json().then(d => ({ ok: r.ok, d })))
          .then(({ ok, d }) => {
              setBusy(false);
              if (!ok) { setMsg(d.error || 'Scan failed.'); return; }
              setMsg(`${d.pool} dice → ${d.successes} successes · now ${d.uncertainty}% uncertain (${d.accumulated}/${d.target}).`);
              if (fetchAgency) fetchAgency();
          }).catch(() => { setBusy(false); setMsg('Network error.'); });
    };

    return (
        <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
            <header className="block-head" style={{ marginBottom: '1rem' }}>
                <span className="block-bullet">■</span>
                <h3>STAR INTEL</h3>
                <span className="block-line"></span>
                <span className="block-badge">{scanGrant} / OBS</span>
            </header>

            {/* GM grant — give the agency N scans per observatory (like project rolls) */}
            {isGM && (
                <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'flex-end', marginBottom: '0.8rem', flexWrap: 'wrap' }}>
                    <div style={{ display: 'flex', flexDirection: 'column' }}>
                        <label className="text-muted mono-text" style={{ fontSize: '0.55rem' }}>GRANT SCANS / OBSERVATORY</label>
                        <input type="number" min="0" value={grantInput} onChange={e => setGrantInput(e.target.value)} className="mono-input" style={{ width: '90px' }} />
                    </div>
                    <button onClick={grantScans} className="mono-text"
                        style={{ background: 'transparent', border: `1px solid var(--accent-primary)`, color: 'var(--accent-primary)', padding: '0.3rem 0.7rem', cursor: 'pointer', borderRadius: 0 }}>
                        GRANT
                    </button>
                    <span className="text-muted mono-text" style={{ fontSize: '0.62rem', alignSelf: 'center' }}>Resets usage — each observatory gets a fresh allowance.</span>
                </div>
            )}

            {/* Observatories — each may scan scan_grant times */}
            <div className="mono-text text-muted" style={{ fontSize: '0.65rem', letterSpacing: '1px', marginBottom: '0.45rem' }}>OBSERVATORIES</div>
            {observatories.length === 0 && (
                <div className="text-muted" style={{ fontSize: '0.8rem', marginBottom: '0.75rem' }}>
                    No observatories. Build an Observatory facility on a base (Ground Telescope = +5, Deep-Space Tracking = +5 dice).
                </div>
            )}
            {observatories.map(o => {
                const out = (o.remaining || 0) <= 0;
                return (
                    <div key={o.baseId} style={{ display: 'flex', gap: '0.5rem', alignItems: 'center', marginBottom: '0.4rem', flexWrap: 'wrap' }}>
                        <span className="mono-text" style={{ fontSize: '0.8rem', flex: '1 1 150px' }}>
                            {o.baseName} <span className="text-muted">({o.dice}d · {o.remaining}/{scanGrant} left)</span>
                        </span>
                        <select
                            value={picks[o.baseId] || ''}
                            disabled={out}
                            onChange={e => setPicks({ ...picks, [o.baseId]: e.target.value ? parseInt(e.target.value, 10) : null })}
                            className="mono-input" style={{ flex: '1 1 170px' }}>
                            <option value="">— system —</option>
                            {systems.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                        </select>
                        <button onClick={() => scan(o.baseId)} disabled={busy || out}
                            className="mono-text"
                            style={{ background: 'transparent', border: `1px solid ${ACCENT}`, color: ACCENT, padding: '0.3rem 0.7rem', cursor: 'pointer', borderRadius: 0, opacity: out ? 0.4 : 1 }}>
                            {out ? 'NO SCANS' : 'SCAN'}
                        </button>
                    </div>
                );
            })}
            {msg && <div className="mono-text" style={{ fontSize: '0.7rem', marginTop: '0.35rem', color: ACCENT }}>{msg}</div>}
            {scanGrant <= 0 && observatories.length > 0 && (
                <div className="text-muted" style={{ fontSize: '0.7rem', marginTop: '0.35rem' }}>No scans granted yet — the GM grants scans above.</div>
            )}

            {/* Star database — accumulated private readouts */}
            <div className="mono-text text-muted" style={{ fontSize: '0.65rem', letterSpacing: '1px', margin: '1rem 0 0.45rem' }}>STAR DATABASE</div>
            {starScans.length === 0 && <div className="text-muted" style={{ fontSize: '0.8rem' }}>No scan data yet.</div>}
            {starScans.map(sc => {
                const u = sc.uncertainty;
                const col = u <= 0 ? '#22c55e' : (u <= 60 ? '#f59e0b' : '#ef4444');
                const barW = Math.max(0, 100 - u);  // uncertainty can exceed 100%
                const res = sc.scannedResources || {};
                return (
                    <div key={sc.id} style={{ borderTop: '1px solid var(--c-dim)', padding: '0.5rem 0' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '0.5rem' }}>
                            <span className="mono-text" style={{ fontSize: '0.85rem' }}>{sc.starSystemName}</span>
                            <span style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                <span className="mono-text" style={{ fontSize: '0.7rem', color: col }}>{u}% uncertain · {sc.accumulated}/{sc.target}</span>
                                <button onClick={() => publish(sc.starSystemId, publishedSet.has(sc.starSystemId))}
                                    className="mono-text"
                                    style={{ background: 'transparent', border: `1px solid ${publishedSet.has(sc.starSystemId) ? 'var(--accent-warning)' : ACCENT}`, color: publishedSet.has(sc.starSystemId) ? 'var(--accent-warning)' : ACCENT, padding: '0.15rem 0.45rem', cursor: 'pointer', borderRadius: 0, fontSize: '0.6rem' }}>
                                    {publishedSet.has(sc.starSystemId) ? 'UNPUBLISH' : 'PUBLISH'}
                                </button>
                            </span>
                        </div>
                        <div style={{ height: '4px', background: 'var(--bg-input)', marginTop: '0.3rem' }}>
                            <div style={{ height: '100%', width: `${barW}%`, background: col }}></div>
                        </div>
                        {Object.keys(res).length > 0 && (
                            <div className="text-muted" style={{ fontSize: '0.65rem', marginTop: '0.3rem' }}>
                                {Object.entries(res).map(([k, v]) => `${k}: ${v.min}–${v.max}`).join('  ·  ')}
                            </div>
                        )}
                    </div>
                );
            })}

            {/* Disinformation — plant false data to raise a system's difficulty */}
            <div className="mono-text text-muted" style={{ fontSize: '0.65rem', letterSpacing: '1px', margin: '1rem 0 0.45rem' }}>DISINFORMATION</div>
            <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'flex-end', flexWrap: 'wrap' }}>
                <select value={falsifyPick} onChange={e => setFalsifyPick(e.target.value)} className="mono-input" style={{ flex: '1 1 160px' }}>
                    <option value="">— system to falsify —</option>
                    {systems.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
                <div style={{ display: 'flex', flexDirection: 'column' }}>
                    <label className="text-muted mono-text" style={{ fontSize: '0.55rem' }}>STATED %</label>
                    <input type="number" min="0" max="100" value={falsifyUnc} onChange={e => setFalsifyUnc(e.target.value)} className="mono-input" style={{ width: '70px' }} />
                </div>
                <button onClick={falsify} className="mono-text" style={{ background: 'transparent', border: '1px solid #ef4444', color: '#ef4444', padding: '0.3rem 0.7rem', cursor: 'pointer', borderRadius: 0 }}>FALSIFY</button>
            </div>
            <div className="text-muted" style={{ fontSize: '0.62rem', marginTop: '0.25rem' }}>Plants a false public record. Raises that system's scan difficulty for everyone. Looks authentic to other players.</div>

            {/* Public record — every agency's contributions, with per-agency filter */}
            <div className="mono-text text-muted" style={{ fontSize: '0.65rem', letterSpacing: '1px', margin: '1rem 0 0.45rem' }}>PUBLIC RECORD</div>
            {contributors.length > 0 && (
                <div style={{ display: 'flex', gap: '0.3rem', flexWrap: 'wrap', marginBottom: '0.5rem' }}>
                    <span className="text-muted mono-text" style={{ fontSize: '0.6rem', alignSelf: 'center' }}>FILTER:</span>
                    {contributors.map(a => (
                        <button key={a.id} onClick={() => toggleAgency(a.id)} className="mono-text"
                            style={{ fontSize: '0.6rem', padding: '0.1rem 0.4rem', cursor: 'pointer', borderRadius: 0,
                                     border: `1px solid ${hiddenAgencies[a.id] ? 'var(--c-dim)' : ACCENT}`,
                                     background: 'transparent', color: hiddenAgencies[a.id] ? 'var(--text-muted)' : ACCENT,
                                     textDecoration: hiddenAgencies[a.id] ? 'line-through' : 'none' }}>
                            {a.name}
                        </button>
                    ))}
                </div>
            )}
            {publicRecord.length === 0 && <div className="text-muted" style={{ fontSize: '0.8rem' }}>The public board is empty.</div>}
            {publicRecord.map(sys => {
                const visible = sys.contributions.filter(c => !hiddenAgencies[c.agencyId]);
                if (visible.length === 0) return null;
                return (
                    <div key={sys.starSystemId} style={{ borderTop: '1px solid var(--c-dim)', padding: '0.5rem 0' }}>
                        <div className="mono-text" style={{ fontSize: '0.8rem', marginBottom: '0.2rem' }}>{sys.starSystemName}</div>
                        {visible.map((c, i) => (
                            <div key={i} className="mono-text text-muted" style={{ fontSize: '0.68rem', display: 'flex', justifyContent: 'space-between', gap: '0.5rem', paddingLeft: '0.5rem' }}>
                                <span>{c.agencyName}{c.isFalse ? <span style={{ color: '#ef4444' }}> [FALSE]</span> : null}</span>
                                <span>stated {c.uncertainty}% uncertain</span>
                            </div>
                        ))}
                    </div>
                );
            })}
        </div>
    );
};
window.StarIntelModule = StarIntelModule;
</script>
{% endverbatim %}
