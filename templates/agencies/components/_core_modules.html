<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const {
    Icon, AutoSaveInput, Classified, VisibilityToggle, XpProtester,
    getCookie, getCsrfToken, useSectionSave,
} = window;

// ----------------------------------------------------------------------
// Phase 3 (multi-player concurrency) — wiring summary
//
// All `onSave` props passed into the modules below come from AgencySheet's
// `saveAgencyQuiet` (in _app.html), which in Phase 3 became a transitional
// dispatcher. It routes payloads of shape {field: value, ...} to the
// matching per-section PATCH endpoint (with If-Match optimistic concurrency
// + 409 conflict banner). Field -> section mapping lives in SECTION_FIELD_MAP.
//
//   {name, motto, headquarters} -> /section/header/
//   {alliance}                  -> /section/alliance/
//   {notes}                     -> /section/notes/
//   {integrity}                 -> /section/integrity/
//   {attributes}                -> /section/attributes/
//   {specializations}           -> /section/specializations/
//   {merits}                    -> /section/merits/
//   {flaws}                     -> /section/flaws/
//   {assets}                    -> /section/assets/
//   {fleet}                     -> /section/fleet/
//   {history}                   -> /section/history/
//   {mapColor, isNuclearPower, isHidden, sweepPool, zeroDayPool}
//                               -> /section/admin-flags/
//
// Anything not in that map (eg. `projects`, `experience`, `isCouncilMember`,
// `projectRolls`) falls back to the legacy /api/agencies/<id>/ PUT — this
// is the documented transitional path until Phase 4 ships endpoints for
// those domains.
// ----------------------------------------------------------------------

    // --- ALLIANCE MODULE (3-column: countries, companies, organizations) ---
    const AllianceModule = ({ alliance, agencyRef, update, onSave, visibility, onToggleVis }) => {
        const isClassified = alliance === 'CLASSIFIED';

        if (isClassified && !IS_ADMIN) return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                {/* Wave 3A: classified placeholder uses block-head pattern. */}
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>ALLIANCE / BLOC</h3>
                    <span className="block-line"></span>
                </header>
                <Classified />
            </div>
        );

        const data = (typeof alliance === 'object' && alliance !== null)
            ? { countries: [], companies: [], organizations: [], ...alliance }
            : { countries: [], companies: [], organizations: [] };

        const addItem = (category) => {
            document.activeElement?.blur();
            const fresh = agencyRef.current.alliance || { countries: [], companies: [], organizations: [] };
            update({ ...fresh, [category]: [...(fresh[category] || []), ''] });
        };

        const removeItem = (category, idx) => {
            document.activeElement?.blur();
            const fresh = agencyRef.current.alliance || { countries: [], companies: [], organizations: [] };
            update({ ...fresh, [category]: fresh[category].filter((_, i) => i !== idx) });
        };

        const Column = ({ category, title, icon }) => (
            <div>
                <h4 className="text-muted mono-text" style={{
                    fontSize: '0.8rem', marginBottom: '0.75rem',
                    borderBottom: '1px solid var(--border-color)', paddingBottom: '0.25rem'
                }}>
                    {title}
                    <span className="text-muted" style={{ marginLeft: '0.5rem', fontSize: '0.7rem' }}>
                        ({data[category].length})
                    </span>
                </h4>
                {data[category].map((item, idx) => (
                    <div key={idx} style={{
                        display: 'flex', alignItems: 'center', gap: '0.25rem', marginBottom: '0.25rem'
                    }}>
                        <AutoSaveInput
                            type="text"
                            defaultValue={item}
                            placeholder={`Add ${title.toLowerCase().slice(0, -1)}...`}
                            onSave={val => onSave({
                                ...data,
                                [category]: data[category].map((it, i) => i === idx ? val : it)
                            })}
                            disabled={!IS_ADMIN}
                            style={{
                                background: 'transparent', border: 'none',
                                borderBottom: '1px solid var(--border-color)',
                                color: 'var(--text-primary)', flex: 1,
                                fontSize: '0.85rem', padding: '0.25rem 0'
                            }}
                        />
                        {IS_ADMIN && (
                            <button onClick={() => removeItem(category, idx)} style={{
                                background: 'transparent', border: 'none',
                                color: 'var(--accent-danger)', cursor: 'pointer', padding: '2px'
                            }}>
                                <Icon name="x" size={12} />
                            </button>
                        )}
                    </div>
                ))}
                {IS_ADMIN && (
                    <button onClick={() => addItem(category)} style={{
                        background: 'transparent', border: '1px dashed var(--border-color)',
                        color: 'var(--text-muted)', width: '100%', padding: '0.25rem',
                        cursor: 'pointer', fontSize: '0.8rem', marginTop: '0.25rem'
                    }}>+ Add</button>
                )}
                {data[category].length === 0 && !IS_ADMIN && (
                    <p className="text-muted" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>None</p>
                )}
            </div>
        );

        const totalAllies = (data.countries || []).length + (data.companies || []).length + (data.organizations || []).length;
        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                {/* Wave 3A: block-head with member count badge. */}
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>ALLIANCE / BLOC</h3>
                    <span className="block-line"></span>
                    {totalAllies > 0 && (
                        <span className="block-badge">{totalAllies} MEMBER{totalAllies === 1 ? '' : 'S'}</span>
                    )}
                    <VisibilityToggle field="alliance" visibility={visibility} onToggle={onToggleVis} />
                </header>
                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))',
                    gap: '1.5rem'
                }}>
                    <Column category="countries" title="COUNTRIES" />
                    <Column category="companies" title="COMPANIES" />
                    <Column category="organizations" title="ORGANIZATIONS" />
                </div>
            </div>
        );
    };

    // --- HEADER MODULE ---
    // Phase 3 wiring note: the `onSave` prop comes from AgencySheet's
    // saveAgencyQuiet, which routes by field name to the per-section PATCH
    // endpoints (header for name/motto/headquarters, admin-flags for the
    // hidden/mapColor toggles). Optimistic concurrency + 409 conflict
    // handling is centralised there, so this module just emits semantic
    // {field: value} blobs and lets the dispatcher pick the right endpoint.
    const HeaderModule = ({ agency, onSave, visibility, onToggleVis }) => (
        /* Wave 3A: AGENCY HEADER is the authority surface — wrapped in .brackets
           bracket-frame chrome (corner pieces) instead of plain glass-panel. */
        <div className="brackets" style={{
            position: 'relative',
            padding: '1.75rem 2rem', marginBottom: '1rem',
            display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem'
        }}>
            <span className="bk tl"></span><span className="bk tr"></span>
            <span className="bk bl"></span><span className="bk br"></span>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                    AGENCY NAME
                    {IS_ADMIN && agency.isHidden && (
                        /* Wave 3A: HIDDEN flag now uses status-pill burned variant. */
                        <span className="status-pill s-burned" style={{ marginLeft: '0.5rem' }}>HIDDEN</span>
                    )}
                </label>
                <AutoSaveInput type="text" defaultValue={agency.name}
                    onSave={val => onSave({ name: val })}
                    disabled={!IS_ADMIN}
                    style={{
                        background: 'transparent', border: 'none',
                        borderBottom: '1px solid var(--accent-primary)',
                        color: 'var(--text-primary)', width: '100%',
                        fontSize: '1.2rem', fontFamily: 'var(--font-mono)'
                    }} />
                {IS_ADMIN && (
                    <label style={{
                        display: 'flex', alignItems: 'center', gap: '0.5rem',
                        cursor: 'pointer', fontFamily: 'var(--font-mono)',
                        fontSize: '0.8rem', marginTop: '0.5rem',
                        color: agency.isHidden ? 'var(--accent-danger)' : 'var(--text-secondary)',
                    }}>
                        <input
                            type="checkbox"
                            checked={agency.isHidden || false}
                            onChange={e => onSave({ isHidden: e.target.checked })}
                            style={{ accentColor: 'var(--accent-danger)' }}
                        />
                        HIDDEN (only visible to admins)
                    </label>
                )}
            </div>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                    MOTTO
                    <VisibilityToggle field="motto" visibility={visibility} onToggle={onToggleVis} />
                </label>
                {agency.motto === 'CLASSIFIED' ? <Classified /> : (
                    <AutoSaveInput type="text" defaultValue={agency.motto}
                        onSave={val => onSave({ motto: val })}
                        disabled={!IS_ADMIN}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--border-color)',
                            color: 'var(--text-primary)', width: '100%'
                        }} />
                )}
            </div>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                    HEADQUARTERS
                    <VisibilityToggle field="headquarters" visibility={visibility} onToggle={onToggleVis} />
                </label>
                {agency.headquarters === 'CLASSIFIED' ? <Classified /> : (
                    <AutoSaveInput type="text" defaultValue={agency.headquarters}
                        onSave={val => onSave({ headquarters: val })}
                        disabled={!IS_ADMIN}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--border-color)',
                            color: 'var(--text-primary)', width: '100%'
                        }} />
                )}
            </div>
            {IS_ADMIN && (
                <div>
                    <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>MAP COLOR</label>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                        <input type="color"
                            defaultValue={agency.mapColor || '#00ff88'}
                            onChange={e => onSave({ mapColor: e.target.value })}
                            style={{ width: '40px', height: '30px', border: 'none', cursor: 'pointer', background: 'transparent' }}
                        />
                        <span className="mono-text text-muted" style={{ fontSize: '0.8rem' }}>
                            {agency.mapColor || '#00ff88'}
                        </span>
                    </div>
                </div>
            )}
        </div>
    );

    // --- NOTES MODULE ---
    const NotesModule = ({ notes, onSave, visibility, onToggleVis }) => {
        const [editing, setEditing] = useState(false);
        const textareaRef = useRef(null);

        const handleSave = () => {
            if (textareaRef.current) {
                onSave({ notes: textareaRef.current.value });
            }
            setEditing(false);
        };

        const renderMarkdown = (text) => {
            if (!text) return '<p style="color: var(--text-muted); font-style: italic;">No notes recorded.</p>';
            try { return window.marked.parse(text); } catch { return text; }
        };

        const noteLen = typeof notes === 'string' ? notes.length : 0;
        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                {/* Wave 3A: block-head with character-count badge + inline edit button. */}
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>NOTES</h3>
                    <span className="block-line"></span>
                    {noteLen > 0 && notes !== 'CLASSIFIED' && (
                        <span className="block-badge">{noteLen} CHARS</span>
                    )}
                    <VisibilityToggle field="notes" visibility={visibility} onToggle={onToggleVis} />
                    {IS_ADMIN && notes !== 'CLASSIFIED' && (
                        <button onClick={() => editing ? handleSave() : setEditing(true)}
                            style={{
                                background: 'transparent',
                                border: '1px solid var(--accent-primary)',
                                color: 'var(--accent-primary)',
                                padding: '0.25rem 0.75rem', cursor: 'pointer',
                                fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                marginLeft: '0.5rem',
                            }}>
                            {editing ? 'SAVE' : 'EDIT'}
                        </button>
                    )}
                </header>
                {notes === 'CLASSIFIED' ? <Classified /> : editing ? (
                    <textarea ref={textareaRef} defaultValue={notes}
                        placeholder="Write notes in markdown..."
                        style={{
                            width: '100%', minHeight: '200px', background: 'var(--bg-input)',
                            border: '1px solid var(--border-color)', color: 'var(--text-primary)',
                            padding: '1rem', fontFamily: 'var(--font-mono)', fontSize: '0.9rem',
                            resize: 'vertical', borderRadius: 0,
                        }} />
                ) : (
                    <div className="dossier-content"
                        dangerouslySetInnerHTML={{ __html: renderMarkdown(notes) }} />
                )}
            </div>
        );
    };

    // --- INTEGRITY & EXPERIENCE MODULE ---
    const getWorkspaceConfig = (baseConfig, baseConfigLookup) => {
        const fts = (baseConfigLookup && baseConfigLookup.facilityTypes) || baseConfig.facilityTypes || [];
        return fts.find(f => f.key === 'workspace');
    };

    const calcTotalBaseExp = (bases, baseConfig, baseConfigLookup) => {
        if (!bases || !baseConfig) return 0;
        const lk = baseConfigLookup || {};
        const getLocationType = (key) => (lk.locationTypes || baseConfig.locationTypes || []).find(lt => lt.key === key);
        const getMerit = (key) => (lk.locationMerits || baseConfig.locationMerits || []).find(m => m.key === key);
        const getFacilityType = (key) => (lk.facilityTypes || baseConfig.facilityTypes || []).find(f => f.key === key);
        const getEquipment = (key) => (lk.equipmentTypes || baseConfig.equipmentTypes || []).find(e => e.key === key);
        const wsConfig = getWorkspaceConfig(baseConfig, lk);
        let total = 0;
        (bases || []).forEach(base => {
            const loc = getLocationType(base.locationType);
            if (loc) total += loc.exp;
            (base.merits || []).forEach(mk => { const m = getMerit(mk); if (m) total += m.exp; });
            (base.facilities || []).forEach(f => {
                const ft = getFacilityType(f.key);
                if (ft) { const lvl = ft.levels.find(l => l.level === f.level); if (lvl) total += lvl.exp; }
            });
            (base.workspaces || []).forEach(w => {
                if (wsConfig) { const lvl = wsConfig.levels.find(l => l.level === w.level); if (lvl) total += lvl.exp; }
            });
            (base.equipment || []).forEach(ek => { const eq = getEquipment(ek); if (eq) total += eq.exp; });
        });
        return total;
    };

    var StatLogButton = function(slProps) {
        var filterPath = slProps.filterPath || '';
        var label = slProps.label || 'LOG';
        var stateArr = React.useState(false);
        var open = stateArr[0];
        var setOpen = stateArr[1];
        var logsState = React.useState(null);
        var logs = logsState[0];
        var setLogs = logsState[1];

        var loadLogs = function() {
            fetch('/api/agencies/' + AGENCY_ID + '/stat-logs/').then(function(r) { return r.json(); }).then(function(data) {
                var all = data.logs || [];
                if (filterPath) {
                    all = all.filter(function(l) { return l.statPath === filterPath || (filterPath === 'attributes' && l.statType === 'attribute'); });
                }
                setLogs(all);
            });
        };

        return (
            <span style={{ display: 'inline-block', marginLeft: '0.4rem' }}>
                <button onClick={function() {
                    if (!open) loadLogs();
                    setOpen(!open);
                }} style={{
                    background: 'transparent', border: '1px solid var(--border-color)', borderRadius: 0,
                    color: 'var(--text-muted)', cursor: 'pointer', fontFamily: 'var(--font-mono)',
                    fontSize: '0.55rem', padding: '0.1rem 0.35rem', verticalAlign: 'middle',
                }}>{label}</button>
                {open ? (
                    <div style={{
                        marginTop: '0.5rem', padding: '0.5rem', background: 'rgba(0,0,0,0.2)',
                        border: '1px solid var(--border-color)', borderRadius: 0, maxHeight: '200px', overflowY: 'auto',
                    }}>
                        {logs === null ? (
                            <div className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>Loading...</div>
                        ) : logs.length === 0 ? (
                            <div className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>No changes logged</div>
                        ) : logs.map(function(log) {
                            return (
                                <div key={log.id} style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.7rem', padding: '0.15rem 0', borderBottom: '1px solid rgba(255,255,255,0.03)' }}>
                                    <span>
                                        <span className="mono-text" style={{ color: log.amount > 0 ? '#2ecc71' : '#e74c3c' }}>
                                            {log.amount > 0 ? '+' : ''}{log.amount}
                                        </span>
                                        <span className="text-muted" style={{ marginLeft: '0.3rem' }}>{log.statPath}</span>
                                    </span>
                                    <span>
                                        <span className="text-muted" style={{ fontSize: '0.6rem' }}>{log.reason}</span>
                                        <span className="text-muted" style={{ fontSize: '0.55rem', marginLeft: '0.3rem' }}>
                                            {new Date(log.date).toLocaleDateString()}
                                        </span>
                                    </span>
                                </div>
                            );
                        })}
                    </div>
                ) : null}
            </span>
        );
    };

    const IntegrityModule = ({ agency, update, fetchAgency, visibility, onToggleVis }) => {
        const expPool = typeof agency.experience === 'number' ? agency.experience : 0;
        const basesExp = calcTotalBaseExp(agency.bases, agency.baseConfig, agency.baseConfigLookup);
        const available = expPool - basesExp;

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                {available < 0 && (
                    <div className="xp-protester-zone"><XpProtester /></div>
                )}
                {/* Wave 3A: CORE STATS block-head with available-EXP badge. */}
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>CORE STATS</h3>
                    <span className="block-line"></span>
                    <span className={`status-pill ${available < 0 ? 's-burned' : 's-active'}`}>
                        XP {available}
                    </span>
                </header>
                <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center', flexWrap: 'wrap' }}>
                    <div className="tech-border text-center" style={{ padding: '1rem', minWidth: '120px', flex: '1 1 0' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                            INTEGRITY
                            <VisibilityToggle field="integrity" visibility={visibility} onToggle={onToggleVis} />
                            <StatLogButton filterPath="integrity" label="LOG" />
                        </div>
                        {agency.integrity === 'CLASSIFIED' ? <Classified /> : (
                            <input type="number" value={agency.integrity}
                                onChange={e => update({ integrity: parseInt(e.target.value) || 0 })}
                                disabled={!IS_ADMIN}
                                style={{
                                    background: 'transparent', border: 'none',
                                    color: 'var(--accent-primary)', width: '100%',
                                    textAlign: 'center', fontSize: '2rem',
                                    fontFamily: 'var(--font-mono)'
                                }} />
                        )}
                    </div>
                    <div className="tech-border text-center" style={{ padding: '1rem', minWidth: '120px', flex: '1 1 0' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                            AVAILABLE EXP
                            <VisibilityToggle field="experience" visibility={visibility} onToggle={onToggleVis} />
                        </div>
                        {agency.experience === 'CLASSIFIED' ? <Classified /> : (
                            <>
                                <div style={{
                                    color: available < 0 ? 'var(--accent-danger)' : 'var(--accent-primary)',
                                    fontSize: '2rem', fontFamily: 'var(--font-mono)',
                                }}>
                                    {available}
                                </div>
                                <div style={{
                                    marginTop: '0.25rem', fontFamily: 'var(--font-mono)',
                                    color: 'var(--text-muted)', fontSize: '0.8rem',
                                }}>
                                    {basesExp} used / {expPool} total
                                </div>
                                {IS_ADMIN && (
                                    <button
                                        onClick={() => {
                                            const input = prompt('Add EXP amount (use negative to subtract):');
                                            if (input === null) return;
                                            const amount = parseInt(input);
                                            if (isNaN(amount)) return;
                                            update({ experience: expPool + amount });
                                        }}
                                        className="btn-cyber"
                                        style={{ marginTop: '0.5rem', fontSize: '0.75rem', padding: '0.25rem 0.75rem' }}
                                    >
                                        + ADD EXP
                                    </button>
                                )}
                            </>
                        )}
                    </div>
                    <div className="tech-border text-center" style={{ padding: '1rem', minWidth: '120px', flex: '1 1 0' }}>
                        <label className="mono-text" style={{
                            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.5rem',
                            cursor: IS_ADMIN ? 'pointer' : 'default', fontSize: '0.85rem',
                            color: agency.isNuclearPower ? '#22c55e' : 'var(--text-muted)',
                        }}>
                            {IS_ADMIN ? (
                                <input type="checkbox" checked={!!agency.isNuclearPower}
                                    onChange={e => update({ isNuclearPower: e.target.checked })}
                                    style={{ accentColor: '#22c55e' }} />
                            ) : null}
                            ☢ {agency.isNuclearPower ? 'NUCLEAR POWER' : 'NO NUCLEAR ACCESS'}
                        </label>
                        <div style={{ fontFamily: 'var(--font-mono)', color: 'var(--text-muted)', fontSize: '0.6rem', marginTop: '0.25rem' }}>
                            {agency.isNuclearPower ? 'Council approved' : 'Requires council approval'}
                        </div>
                    </div>
                    {IS_ADMIN && (
                    <div className="tech-border text-center" style={{ padding: '1rem', minWidth: '120px', flex: '1 1 0' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                            ZERO-DAY POOL
                        </div>
                        <input type="number" value={agency.zeroDayPool || 0}
                            onChange={e => update({ zeroDayPool: parseInt(e.target.value) || 0 })}
                            style={{
                                background: 'transparent', border: 'none',
                                color: '#0f0', width: '100%',
                                textAlign: 'center', fontSize: '2rem',
                                fontFamily: 'var(--font-mono)'
                            }} />
                        <div style={{
                            marginTop: '0.25rem', fontFamily: 'var(--font-mono)',
                            color: 'var(--text-muted)', fontSize: '0.7rem',
                        }}>
                            Gov Zero-Day Repository
                        </div>
                    </div>
                    )}
                </div>

                {/* Project Roll Allocations */}
                {IS_ADMIN ? (
                    <div style={{ marginTop: '1rem', paddingTop: '0.75rem', borderTop: '1px solid var(--border-color)' }}>
                        <div className="text-muted mono-text" style={{ fontSize: '0.7rem', marginBottom: '0.5rem', textAlign: 'center' }}>PROJECT ROLL ALLOCATIONS</div>
                        {(function() {
                            var pr = agency.projectRolls || {};
                            var chars = (agency.assignableCharacters || []);
                            var inputStyle = { background: 'transparent', border: 'none', borderBottom: '1px solid var(--border-color)', color: 'var(--text-primary)', width: '40px', textAlign: 'center', fontSize: '0.8rem', fontFamily: 'var(--font-mono)' };
                            var updateRolls = function(key, field, val) {
                                var updated = {};
                                for (var k in pr) updated[k] = typeof pr[k] === 'object' ? Object.assign({}, pr[k]) : pr[k];
                                if (!updated[key]) updated[key] = {};
                                updated[key][field] = parseInt(val) || 0;
                                update({ projectRolls: updated });
                            };
                            var setAll = function(field, val) {
                                var updated = {};
                                for (var k in pr) updated[k] = typeof pr[k] === 'object' ? Object.assign({}, pr[k]) : pr[k];
                                var v = parseInt(val) || 0;
                                chars.forEach(function(c) {
                                    if (!updated[c.name]) updated[c.name] = {};
                                    updated[c.name][field] = v;
                                });
                                update({ projectRolls: updated });
                            };
                            var resetAll = function() {
                                var updated = {};
                                for (var k in pr) updated[k] = typeof pr[k] === 'object' ? Object.assign({}, pr[k]) : pr[k];
                                chars.forEach(function(c) {
                                    if (!updated[c.name]) updated[c.name] = {};
                                    updated[c.name].free = 0;
                                    updated[c.name].spare = 0;
                                });

                ) : agency.projectRolls ? (
                    <div style={{ marginTop: '1rem', paddingTop: '0.75rem', borderTop: '1px solid var(--border-color)' }}>

                            <span className="mono-text" style={{ fontSize: '0.85rem', color: (agency.projectRolls.free || 0) > 0 ? 'var(--accent-primary)' : 'var(--text-muted)', opacity: (agency.projectRolls.free || 0) > 0 ? 1 : 0.4 }}>Free: {agency.projectRolls.free || 0}</span>

                        {(function() {

                            var btnStyle = function(enabled) {

                                    flex: 1, padding: '0.4rem', cursor: enabled ? 'pointer' : 'not-allowed',

                            var npcState = React.useState('');

                                        </div>
                                    ) : null}
                                </div>
                            );
                        })()}
                    </div>
                ) : null}

                {/* XP Transfer Log */}
                {(agency.xpTransfers || []).length > 0 && (
                    <div style={{
                        marginTop: '1rem', paddingTop: '0.75rem',
                        borderTop: '1px solid var(--border-color)'

                            fontSize: '0.7rem', marginBottom: '0.5rem', textAlign: 'center'

                                    display: 'flex', justifyContent: 'space-between',
                                    fontSize: '0.75rem', color: 'var(--text-secondary)',

                                    <span>
                                        <span style={{ color: 'var(--text-primary)' }}>{t.characterName}</span>
                                        <span className="text-muted"> ({t.playerName})</span>

                                        <span className="text-muted" style={{ fontSize: '0.65rem', marginLeft: '0.5rem' }}>

                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* Base XP Log */}
                {(agency.baseXpLogs || []).length > 0 && (
                    <div style={{
                        marginTop: '1rem', paddingTop: '0.75rem',
                        borderTop: '1px solid var(--border-color)'
                    }}>
                        <div className="text-muted mono-text" style={{
                            fontSize: '0.7rem', marginBottom: '0.5rem', textAlign: 'center'
                        }}>BASE XP LOG</div>
                        <div style={{ maxHeight: '150px', overflowY: 'auto' }}>
                            {(agency.baseXpLogs || []).map((log, i) => (
                                <div key={log.id} style={{

                                    fontSize: '0.75rem', color: 'var(--text-secondary)',
                                    padding: '0.2rem 0.5rem',

                                    <span style={{ flex: 1 }}>

                                        <span className="text-muted" style={{ fontSize: '0.65rem', marginLeft: '0.5rem' }}>

    // --- DOSSIERS MODULE ---
    const DossiersModule = ({ dossiers }) => {

        var filter = filterState[0];
        var setFilter = filterState[1];

        // Build unique agency list from NPC dossiers

        dossiers.forEach(function(d) {

                agencies[d.agencyName] = true;

        });
        var agencyNames = Object.keys(agencies).sort();

        var filtered = filter === 'all' ? dossiers :
            filter === 'pc' ? dossiers.filter(function(d) { return d.type === 'character'; }) :
            dossiers.filter(function(d) { return d.agencyName === filter; });

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>

                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>DOSSIERS</h3>
                    <span className="block-line"></span>

                    <select value={filter} onChange={function(e) { setFilter(e.target.value); }} style={{

                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem' }}>
                    {filtered.map(function(d) {
                        return (
                            <a key={d.type + '-' + d.id}
                                href={d.type === 'character' ? '/character/' + d.id + '/' : '/npcs/' + d.id + '/'}
                                className="btn-cyber mono-text"
                                style={{
                                    textDecoration: 'none', fontSize: '0.85rem',
                                    padding: '0.4rem 0.75rem',
                                    display: 'inline-flex', alignItems: 'center', gap: '0.5rem',
                                }}>
                                <span style={{
                                    fontSize: '0.6rem', opacity: 0.7,
                                    border: '1px solid currentColor',
                                    padding: '0.1rem 0.3rem', borderRadius: 0,
                                }}>{d.type === 'character' ? 'PC' : d.agencyName || 'NPC'}</span>
                                {d.name}
                            </a>
                        );
                    })}
                    {filtered.length === 0 ? (
                        <div className="text-muted mono-text" style={{ fontSize: '0.8rem', padding: '0.5rem' }}>No dossiers</div>
                    ) : null}
                </div>
            </div>
        );
    };

    // --- ATTRIBUTES MODULE ---
    const AttributesModule = ({ attributes, update, visibility, onToggleVis }) => {
        const isClassified = attributes === 'CLASSIFIED';
        if (isClassified && !IS_ADMIN) return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                {/* Wave 3A: classified placeholder uses block-head pattern. */}
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>ATTRIBUTES</h3>
                    <span className="block-line"></span>
                </header>
                <Classified />
            </div>
        );

        const updateAttr = (cat, skill, val) => {
            const updated = { ...attributes, [cat]: { ...attributes[cat], [skill]: val } };
            update(updated);
        };

        const addCustomSkill = (category) => {
            const name = prompt('Enter new skill name:');
            if (name && name.trim()) {
                const updated = { ...attributes, [category]: { ...attributes[category], [name.trim()]: 0 } };
                update(updated);
            }
        };

        const CategorySection = ({ category, title }) => {
            const skills = attributes[category] || {};
            return (
                <div>
                    <h4 className="text-center text-muted mono-text" style={{
                        marginBottom: '1rem', textTransform: 'uppercase',
                        borderBottom: '1px solid var(--border-color)', paddingBottom: '0.25rem'
                    }}>{title}</h4>
                    {Object.entries(skills).map(([skill, val]) => {
                        const fieldPath = `attributes.${category}.${skill}`;
                        const classified = val === 'CLASSIFIED';
                        return (
                            <div key={skill} style={{
                                display: 'flex', justifyContent: 'space-between',
                                alignItems: 'center', marginBottom: '0.5rem'
                            }}>
                                <span style={{ fontSize: '0.9rem', color: 'var(--text-primary)' }}>
                                    {skill}
                                    <VisibilityToggle field={fieldPath} visibility={visibility} onToggle={onToggleVis} />
                                </span>
                                {classified ? <Classified /> : (
                                    <input type="number" value={val}
                                        onChange={e => updateAttr(category, skill, parseInt(e.target.value) || 0)}
                                        disabled={!IS_ADMIN}
                                        style={{
                                            width: '60px', textAlign: 'center',
                                            background: 'transparent',
                                            border: '1px solid var(--border-color)',
                                            color: 'var(--accent-primary)',
                                            fontFamily: 'var(--font-mono)'
                                        }} />
                                )}
                            </div>
                        );
                    })}
                    {IS_ADMIN && (
                        <button onClick={() => addCustomSkill(category)} style={{
                            background: 'transparent', border: '1px dashed var(--border-color)',
                            color: 'var(--text-muted)', width: '100%', padding: '0.25rem',
                            cursor: 'pointer', fontSize: '0.8rem', marginTop: '0.5rem'
                        }}>+ Add Skill</button>
                    )}
                </div>
            );
        };

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                {/* Wave 3A: ATTRIBUTES block-head with stat-log button in trailing slot. */}
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>ATTRIBUTES</h3>
                    <span className="block-line"></span>
                    <StatLogButton filterPath="attributes" label="LOG" />
                </header>
                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))',
                    gap: '2rem'
                }}>
                    <CategorySection category="power" title="Power" />
                    <CategorySection category="finesse" title="Finesse" />
                    <CategorySection category="resistance" title="Resistance" />
                </div>
            </div>
        );
    };

    // --- GLOBAL FLAWS DISPLAY (read-only, shown on every agency) ---

            }}>

                    <span className="status-pill s-standby">READ ONLY</span>

                {/* Voting items — highlighted section */}
                {votingItems.length > 0 && (

                            color: '#f97316', fontSize: '0.8rem',

                        {votingItems.map(item => (

                                <div style={{
                                    display: 'flex', justifyContent: 'space-between',
                                    alignItems: 'center', marginBottom: '0.25rem'

                                        {typeLabels[item.itemType] || item.itemType.toUpperCase()}
                                    </span>
                                </div>
                                {item.proposedBy && (
                                    <p className="text-muted mono-text" style={{ fontSize: '0.75rem', marginBottom: '0.25rem' }}>
                                        Proposed by: {item.proposedBy}
                                    </p>
                                )}
                                {item.description && (
                                    <p className="text-secondary" style={{ fontSize: '0.85rem', marginTop: '0.25rem' }}>
                                        {item.description}
                                    </p>
                                )}
                            </div>
                        ))}
                    </div>
                )}

                {/* Active and proposed items */}
                {otherItems.map(item => (
                    <div key={item.id} className="tech-border" style={{
                        padding: '0.75rem', marginBottom: '0.5rem',
                        background: 'rgba(168, 85, 247, 0.05)',
                    }}>
                        <div style={{
                            display: 'flex', justifyContent: 'space-between',
                            alignItems: 'center', marginBottom: '0.25rem'
                        }}>
                            <span className="mono-text" style={{ color: 'var(--text-primary)', fontSize: '0.9rem', fontWeight: 'bold' }}>
                                {item.name}
                            </span>
                            <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                                <span className="mono-text" style={{
                                    fontSize: '0.65rem', padding: '2px 6px',
                                    border: `1px solid ${COUNCIL_ACCENT}`,
                                    color: COUNCIL_ACCENT,
                                }}>
                                    {typeLabels[item.itemType] || item.itemType.toUpperCase()}
                                </span>
                                {/* Wave 3A: council item status now uses status-pill recipe. */}
                                <span className={`status-pill ${statusPillClass[item.status] || 's-inactive'}`}>
                                    {item.status.toUpperCase()}
                                </span>
                            </div>
                        </div>
                        {item.proposedBy && (
                            <p className="text-muted mono-text" style={{ fontSize: '0.75rem', marginBottom: '0.25rem' }}>
                                Proposed by: {item.proposedBy}
                            </p>
                        )}
                        {item.description && (
                            <p className="text-secondary" style={{ fontSize: '0.85rem', marginTop: '0.25rem' }}>
                                {item.description}
                            </p>
                        )}
                    </div>
                ))}
            </div>
        );
    };

// Export to global scope
Object.assign(window, {
    AllianceModule, HeaderModule, NotesModule, IntegrityModule,
    DossiersModule, AttributesModule, GlobalFlawsDisplay, CouncilDisplay,
    getWorkspaceConfig, calcTotalBaseExp, StatLogButton,
});
</script>
