<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const { Icon, AutoSaveInput, Classified, VisibilityToggle, getCookie, getWorkspaceConfig } = window;

    // --- BASES MODULE ---
    const BASE_ACCENT = '#22c55e';

    const BaseNotesModule = ({ notes, onSave }) => {
        const [editing, setEditing] = useState(false);
        const notesRef = useRef(null);
        const renderMd = (text) => {
            if (!text) return '<p style="color: var(--text-muted); font-style: italic;">No notes.</p>';
            try { return window.marked.parse(text); } catch { return text; }
        };
        return (
            <div style={{ marginBottom: '0.5rem' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.25rem' }}>
                    <label className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>NOTES</label>
                    {IS_ADMIN && (
                        <button onClick={() => {
                            if (editing && notesRef.current) onSave(notesRef.current.value);
                            setEditing(!editing);
                        }} style={{
                            background: 'transparent', border: '1px solid var(--accent-primary)',
                            color: 'var(--accent-primary)', padding: '0.15rem 0.5rem',
                            cursor: 'pointer', fontFamily: 'var(--font-mono)', fontSize: '0.7rem',
                        }}>{editing ? 'SAVE' : 'EDIT'}</button>
                    )}
                </div>
                {editing ? (
                    <textarea ref={notesRef} defaultValue={notes}
                        placeholder="Write notes in markdown..."
                        style={{
                            background: 'rgba(0,0,0,0.2)', border: '1px solid var(--border-color)',
                            color: 'var(--text-primary)', width: '100%', minHeight: '150px',
                            fontSize: '0.85rem', fontFamily: 'var(--font-mono)', padding: '0.5rem',
                            resize: 'vertical', borderRadius: 'var(--radius-sm)',
                        }} />
                ) : (
                    <div className="dossier-content" style={{ fontSize: '0.85rem' }}
                        dangerouslySetInnerHTML={{ __html: renderMd(notes) }} />
                )}
            </div>
        );
    };

    const BasesModule = ({ bases: initialBases, baseConfig, baseConfigLookup, isNuclearPower, agencyId, onBasesChange, assignableCharacters, assignableNpcs, visibility, onToggleVis, classifiedBases }) => {
        const lookup = baseConfigLookup || {};

        // Mobile base detection: these merits/location types mean the base needs its own power
        const MOBILE_MERIT_KEYS = new Set(['new_merit_1774341649496', 'new_merit_1774341869469', 'new_merit_1774341977938', 'mobile_platform']);
        const MOBILE_LOC_KEYS = new Set(['new_location_1774342056263']);
        const SELF_POWER_MERIT_KEYS = new Set(['underwater', 'self_sufficient', 'orbital']);

        const isMobileBase = (base) => {
            if (MOBILE_LOC_KEYS.has(base.locationType)) return true;
            return (base.merits || []).some(m => MOBILE_MERIT_KEYS.has(m));
        };

        const requiresSelfPower = (base) => {
            if (isMobileBase(base)) return true;
            return (base.merits || []).some(m => SELF_POWER_MERIT_KEYS.has(m));
        };

        const calcPower = (base) => {
            let totalConsumed = 0;
            let internalConsumed = 0;
            let produced = 0;
            const allFt = lookup.facilityTypes || baseConfig.facilityTypes || [];
            const ftMap = {};
            allFt.forEach(ft => { ftMap[ft.key] = ft; });
            const selfPow = requiresSelfPower(base);
            (base.facilities || []).forEach(f => {
                const ft = ftMap[f.key];
                if (ft) {
                    const lvl = ft.levels.find(l => l.level === f.level);
                    if (lvl) {
                        const pw = lvl.power || 0;
                        totalConsumed += pw;
                        if (f.internalPower) internalConsumed += pw;
                        produced += lvl.powerOutput || 0;
                    }
                }
            });
            const wsFt = ftMap['workspace'];
            (base.workspaces || []).forEach(w => {
                if (wsFt) {
                    const lvl = wsFt.levels.find(l => l.level === w.level);
                    if (lvl) {
                        const pw = lvl.power || 0;
                        totalConsumed += pw;
                        if (w.internalPower) internalConsumed += pw;
                    }
                }
            });
            return { totalConsumed, internalConsumed, produced, gridConsumed: totalConsumed - internalConsumed };
        };
        const [bases, setBases] = useState(initialBases || []);
        const [showRules, setShowRules] = useState(false);
        const [expandedBase, setExpandedBase] = useState(() => {
            const params = new URLSearchParams(window.location.search);
            const baseId = params.get('base');
            return baseId ? parseInt(baseId) : null;
        });
        const [creating, setCreating] = useState(false);
        const saveTimers = useRef({});

        useEffect(() => { setBases(initialBases || []); }, [initialBases]);

        // Auto-scroll to expanded base from URL param (once on mount only)
        const baseScrollRef = useRef(null);
        const hasScrolled = useRef(false);
        useEffect(() => {
            if (expandedBase && baseScrollRef.current && !hasScrolled.current) {
                hasScrolled.current = true;
                setTimeout(() => baseScrollRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
            }
        }, [initialBases]);

        // Notify parent whenever bases change so EXP totals stay in sync
        const updateBases = (updater) => {
            setBases(prev => {
                const next = typeof updater === 'function' ? updater(prev) : updater;
                if (onBasesChange) onBasesChange(next);
                return next;
            });
        };

        const headers = () => ({
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
        });

        // Lookup helpers — use full defs (allXxx) for cost/name lookups so other-class items resolve
        const getLocationType = (key) => (lookup.locationTypes || baseConfig.locationTypes || []).find(lt => lt.key === key);
        const getMerit = (key) => (lookup.locationMerits || baseConfig.locationMerits || []).find(m => m.key === key);
        const getFacilityType = (key) => (lookup.facilityTypes || baseConfig.facilityTypes || []).find(f => f.key === key);
        const getEquipment = (key) => (lookup.equipmentTypes || baseConfig.equipmentTypes || []).find(e => e.key === key);

        const calcBaseCosts = (base) => {
            let totalExp = 0;
            let totalSpace = 0;
            let usedSpace = 0;
            const loc = getLocationType(base.locationType);
            if (loc) { totalExp += loc.exp; totalSpace += loc.space; }
            (base.merits || []).forEach(mk => {
                const m = getMerit(mk);
                if (m) { totalExp += m.exp; totalSpace += (m.extraSpace || 0); }
            });
            (base.facilities || []).forEach(f => {
                const ft = getFacilityType(f.key);
                if (ft) {
                    const lvl = ft.levels.find(l => l.level === f.level);
                    if (lvl) { totalExp += lvl.exp; usedSpace += lvl.size; }
                }
            });
            const wsConfig = getWorkspaceConfig(baseConfig, lookup);
            (base.workspaces || []).forEach(w => {
                if (wsConfig) {
                    const lvl = wsConfig.levels.find(l => l.level === w.level);
                    if (lvl) { totalExp += lvl.exp; usedSpace += lvl.size; }
                }
            });
            (base.equipment || []).forEach(ek => {
                const eq = getEquipment(ek);
                if (eq) { totalExp += eq.exp; }
            });
            return { totalExp, totalSpace, usedSpace, freeSpace: totalSpace - usedSpace };
        };

        const saveBase = (baseId, data) => {
            if (saveTimers.current[baseId]) clearTimeout(saveTimers.current[baseId]);
            saveTimers.current[baseId] = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/agencies/${agencyId}/bases/${baseId}/`, {
                        method: 'PUT', headers: headers(), body: JSON.stringify(data),
                    });
                    if (res.ok) {
                        const updated = await res.json();
                        updateBases(prev => prev.map(b => b.id === baseId ? updated : b));
                    }
                } catch (err) { console.error('Base save error:', err); }
            }, 500);
        };

        const saveBaseNow = async (baseId, data) => {
            if (saveTimers.current[baseId]) clearTimeout(saveTimers.current[baseId]);
            try {
                const res = await fetch(`/api/agencies/${agencyId}/bases/${baseId}/`, {
                    method: 'PUT', headers: headers(), body: JSON.stringify(data),
                });
                if (res.ok) {
                    const updated = await res.json();
                    updateBases(prev => prev.map(b => b.id === baseId ? updated : b));
                }
            } catch (err) { console.error('Base save error:', err); }
        };

        const createBase = async () => {
            setCreating(true);
            try {
                const res = await fetch(`/api/agencies/${agencyId}/bases/`, {
                    method: 'POST', headers: headers(), body: JSON.stringify({ name: 'NEW BASE' }),
                });
                if (res.ok) {
                    const newBase = await res.json();
                    updateBases(prev => [...prev, newBase]);
                    setExpandedBase(newBase.id);
                }
            } catch (err) { console.error('Create base error:', err); }
            setCreating(false);
        };

        const deleteBase = async (baseId) => {
            try {
                await fetch(`/api/agencies/${agencyId}/bases/${baseId}/`, {
                    method: 'DELETE', headers: headers(),
                });
                updateBases(prev => prev.filter(b => b.id !== baseId));
                if (expandedBase === baseId) setExpandedBase(null);
            } catch (err) { console.error('Delete base error:', err); }
        };

        const updateBaseField = (baseId, field, value) => {
            updateBases(prev => prev.map(b => {
                if (b.id !== baseId) return b;
                const updated = { ...b, [field]: value };
                saveBase(baseId, updated);
                return updated;
            }));
        };

        const toggleMerit = (baseId, meritKey) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const current = base.merits || [];
            const newMerits = current.includes(meritKey)
                ? current.filter(k => k !== meritKey)
                : [...current, meritKey];
            updateBaseField(baseId, 'merits', newMerits);
        };

        const toggleFacilityLevel = (baseId, facilityKey, level) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const current = base.facilities || [];
            const has = current.some(f => f.key === facilityKey && f.level === level);
            let newFacilities;
            if (has) {
                newFacilities = current.filter(f => !(f.key === facilityKey && f.level === level));
            } else {
                newFacilities = [...current, { key: facilityKey, level }];
            }
            updateBaseField(baseId, 'facilities', newFacilities);
        };

        const toggleFacilityPower = (baseId, facilityKey, level) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const newFacilities = (base.facilities || []).map(f => {
                if (f.key === facilityKey && f.level === level) {
                    return { ...f, internalPower: !f.internalPower };
                }
                return f;
            });
            updateBases(prev => prev.map(b => b.id !== baseId ? b : { ...b, facilities: newFacilities }));
            saveBaseNow(baseId, { ...base, facilities: newFacilities });
        };

        const toggleWorkspacePower = (baseId, idx) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const newWs = (base.workspaces || []).map((w, i) => {
                if (i === idx) return { ...w, internalPower: !w.internalPower };
                return w;
            });
            updateBases(prev => prev.map(b => b.id !== baseId ? b : { ...b, workspaces: newWs }));
            saveBaseNow(baseId, { ...base, workspaces: newWs });
        };

        const addWorkspace = (baseId, level) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const ws = [...(base.workspaces || []), { level, assignedTo: null, assignedType: null }];
            updateBaseField(baseId, 'workspaces', ws);
        };

        const removeWorkspace = (baseId, idx) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            updateBaseField(baseId, 'workspaces', (base.workspaces || []).filter((_, i) => i !== idx));
        };

        const updateWorkspace = (baseId, idx, updates) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const ws = (base.workspaces || []).map((w, i) => i === idx ? { ...w, ...updates } : w);
            updateBaseField(baseId, 'workspaces', ws);
        };

        const toggleEquipment = (baseId, eqKey) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const current = base.equipment || [];
            const newEquip = current.includes(eqKey)
                ? current.filter(k => k !== eqKey)
                : [...current, eqKey];
            updateBaseField(baseId, 'equipment', newEquip);
        };

        const toggleHiddenSection = (baseId, sectionKey) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const current = base.hiddenSections || [];
            const newSections = current.includes(sectionKey)
                ? current.filter(k => k !== sectionKey)
                : [...current, sectionKey];
            updateBaseField(baseId, 'hiddenSections', newSections);
        };

        const SectionHideToggle = ({ baseId, sectionKey, hiddenSections }) => {
            if (!IS_ADMIN) return null;
            const isHidden = (hiddenSections || []).includes(sectionKey);
            return (
                <button
                    onClick={e => { e.stopPropagation(); toggleHiddenSection(baseId, sectionKey); }}
                    title={isHidden ? 'Hidden from players — click to reveal' : 'Visible to players — click to hide'}
                    style={{
                        background: 'transparent', border: 'none', cursor: 'pointer',
                        padding: '0 0.3rem', fontSize: '0.7rem', marginLeft: '0.3rem',
                        color: isHidden ? 'var(--accent-danger)' : 'var(--text-muted)',
                        opacity: isHidden ? 1 : 0.4,
                    }}>
                    {isHidden ? '\u{1F512}' : '\u{1F441}'}
                </button>
            );
        };

        const BaseCard = ({ base }) => {
            // Classified base — non-admin sees just the name
            if (base.classified && !IS_ADMIN) {
                return (
                    <div className="glass-panel" style={{ padding: '1rem', marginBottom: '0.75rem', borderLeft: `3px solid ${BASE_ACCENT}` }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                            <span className="mono-text" style={{ color: BASE_ACCENT, fontSize: '1rem', fontWeight: 'bold' }}>
                                {base.name || 'UNNAMED BASE'}
                            </span>
                            <Classified />
                        </div>
                    </div>
                );
            }

            const isExpanded = expandedBase === base.id;
            const costs = calcBaseCosts(base);
            const loc = getLocationType(base.locationType);
            const spacePercent = costs.totalSpace > 0 ? Math.min(100, (costs.usedSpace / costs.totalSpace) * 100) : 0;
            const basePath = `bases.${base.id}`;
            const hidden = new Set(base.hiddenSections || []);
            const isSectionHidden = (key) => !IS_ADMIN && hidden.has(key);

            return (
                <div ref={expandedBase === base.id ? baseScrollRef : null}
                    className="glass-panel" style={{ padding: '1rem', marginBottom: '0.75rem', borderLeft: `3px solid ${BASE_ACCENT}` }}>
                    {/* Header — collapsed card */}
                    <div title={loc ? `${loc.description}${loc.included ? '\n' + loc.included : ''}` : ''}
                         style={{ cursor: 'pointer' }}
                         onClick={() => setExpandedBase(isExpanded ? null : base.id)}>

                        {/* Row 1: name + location (left) | stats (right) */}
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '0.75rem' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', minWidth: 0 }}>
                                <Icon name={isExpanded ? "chevron-down" : "chevron-right"} size={16} />
                                <span className="mono-text" style={{ color: BASE_ACCENT, fontSize: '1rem', fontWeight: 'bold', whiteSpace: 'nowrap' }}>
                                    {base.name || 'UNNAMED BASE'}
                                </span>
                                {loc && (
                                    <span className="text-muted mono-text" style={{ fontSize: '0.7rem', whiteSpace: 'nowrap' }}>
                                        [{loc.name}]
                                    </span>
                                )}
                                <VisibilityToggle field={basePath} visibility={visibility} onToggle={onToggleVis} />
                                {base.isHidden && (
                                    <span className="mono-text" style={{
                                        fontSize: '0.6rem', color: 'var(--accent-danger)',
                                        border: '1px solid var(--accent-danger)',
                                        padding: '0.1rem 0.35rem', borderRadius: 'var(--radius-sm)',
                                        whiteSpace: 'nowrap',
                                    }}>HIDDEN</span>
                                )}
                            </div>
                            <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center', flexShrink: 0 }}>
                                <span className="mono-text" style={{ fontSize: '0.7rem', color: '#f59e0b' }}>
                                    EXP: {costs.totalExp}
                                </span>
                                {!isSectionHidden('space') && (
                                    <span className="mono-text" style={{
                                        fontSize: '0.7rem',
                                        color: costs.freeSpace < 0 ? 'var(--accent-danger)' : BASE_ACCENT
                                    }}>
                                        SPACE: {costs.usedSpace}/{costs.totalSpace}
                                    </span>
                                )}
                                {(() => {
                                    const pw = calcPower(base);
                                    if (pw.totalConsumed === 0 && pw.produced === 0) return null;
                                    const selfPow = requiresSelfPower(base);
                                    const over = pw.internalConsumed > pw.produced;
                                    return React.createElement('span', { className: 'mono-text', style: {
                                        fontSize: '0.7rem', color: over && selfPow ? 'var(--accent-danger)' : '#eab308',
                                    }}, '\u26A1 ' + pw.internalConsumed + '/' + pw.produced);
                                })()}
                            </div>
                        </div>

                        {/* Row 2: department thrive pills */}
                        {(() => {
                            var depts = base.departments || [];
                            if (depts.length === 0) return null;
                            var allDepts = baseConfig.departments || [];
                            return React.createElement('div', {
                                style: {
                                    display: 'flex', flexWrap: 'wrap', gap: '0.35rem',
                                    marginTop: '0.4rem', paddingLeft: '1.75rem',
                                },
                            }, depts.map(function(d) {
                                var def = allDepts.find(function(dd) { return dd.key === d.key; });
                                var name = def ? def.name : d.key;
                                var t = d.thrive || 5;
                                var color = t <= 2 ? '#ef4444' : t <= 4 ? '#f59e0b' : t <= 6 ? '#6b7280' : t <= 8 ? '#22c55e' : '#06b6d4';
                                return React.createElement('span', {
                                    key: d.key,
                                    className: 'mono-text',
                                    title: d.tooltip || '',
                                    style: {
                                        fontSize: '0.6rem',
                                        color: color,
                                        background: 'rgba(0,0,0,0.25)',
                                        border: '1px solid ' + color + '40',
                                        padding: '0.1rem 0.4rem',
                                        borderRadius: '9999px',
                                        whiteSpace: 'nowrap',
                                        lineHeight: '1.4',
                                        cursor: 'help',
                                    },
                                }, name + ' ' + t);
                            }));
                        })()}
                    </div>

                    {isExpanded && (
                        <div style={{ marginTop: '1rem', borderTop: '1px solid var(--border-color)', paddingTop: '1rem' }}>
                            {/* Base name */}
                            <div style={{ marginBottom: '1rem' }}>
                                <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>BASE NAME</label>
                                <AutoSaveInput type="text" defaultValue={base.name}
                                    onSave={val => updateBaseField(base.id, 'name', val)}
                                    disabled={!IS_ADMIN}
                                    style={{
                                        background: 'transparent', border: 'none',
                                        borderBottom: `1px solid ${BASE_ACCENT}`,
                                        color: 'var(--text-primary)', width: '100%',
                                        fontSize: '1rem', fontFamily: 'var(--font-mono)',
                                    }} />
                            </div>

                            {/* Hidden toggle — admin only */}
                            {IS_ADMIN && (
                                <div style={{ marginBottom: '1rem' }}>
                                    <label style={{
                                        display: 'flex', alignItems: 'center', gap: '0.5rem',
                                        cursor: 'pointer', fontFamily: 'var(--font-mono)',
                                        fontSize: '0.8rem', color: base.isHidden ? 'var(--accent-danger)' : 'var(--text-secondary)',
                                    }}>
                                        <input
                                            type="checkbox"
                                            checked={base.isHidden || false}
                                            onChange={e => updateBaseField(base.id, 'isHidden', e.target.checked)}
                                            style={{ accentColor: 'var(--accent-danger)' }}
                                        />
                                        HIDDEN (only visible to admins)
                                    </label>
                                </div>
                            )}

                            {/* Location Type */}
                            <div style={{ marginBottom: '1rem' }}>
                                <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.5rem' }}>
                                    LOCATION TYPE
                                    <SectionHideToggle baseId={base.id} sectionKey="locationType" hiddenSections={base.hiddenSections} />
                                </label>
                                {isSectionHidden('locationType') ? <Classified /> : (
                                    <React.Fragment>
                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem' }}>
                                            {(() => {
                                                const configLtKeys = new Set((baseConfig.locationTypes || []).map(lt => lt.key));
                                                const allLtDefs = lookup.locationTypes || baseConfig.locationTypes || [];
                                                const items = [...(baseConfig.locationTypes || [])];
                                                if (base.locationType && !configLtKeys.has(base.locationType)) {
                                                    const def = allLtDefs.find(lt => lt.key === base.locationType);
                                                    items.push(def ? Object.assign({}, def, { otherClass: true }) : { key: base.locationType, name: base.locationType.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), exp: 0, space: 0, otherClass: true });
                                                }
                                                return items.filter(lt => {
                                                    // Once a type is chosen, non-admins only see the selected one
                                                    if (!IS_ADMIN && base.locationType && base.locationType !== lt.key) return false;
                                                    return true;
                                                }).map(lt => {
                                                    const selected = base.locationType === lt.key;
                                                    const isOtherClass = lt.otherClass || false;
                                                    // Players can select (if not already set) but not deselect
                                                    const canClick = IS_ADMIN || (!selected && !isOtherClass && !base.locationType);
                                                    return (
                                                        <button key={lt.key}
                                                            onClick={() => {
                                                                if (!canClick) return;
                                                                if (selected && !IS_ADMIN) return;
                                                                updateBaseField(base.id, 'locationType', selected ? '' : lt.key);
                                                            }}
                                                            disabled={!canClick && !selected}
                                                            title={isOtherClass ? lt.name : selected && !IS_ADMIN ? 'Only GM can change' : `${lt.description || ''}${lt.included ? '\n' + lt.included : ''}`}
                                                            style={{
                                                                background: selected ? `${BASE_ACCENT}22` : 'rgba(0,0,0,0.2)',
                                                                border: `1px solid ${selected ? BASE_ACCENT : 'var(--border-color)'}`,
                                                                color: selected ? BASE_ACCENT : 'var(--text-muted)',
                                                                padding: '0.4rem 0.75rem', cursor: canClick ? 'pointer' : 'default',
                                                                fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                                borderRadius: 'var(--radius-sm)',
                                                            }}>
                                                            {lt.name}
                                                            {lt.exp > 0 ? React.createElement('span', { style: { fontSize: '0.65rem', marginLeft: '0.5rem', opacity: 0.7 } }, 'E:' + lt.exp + ' S:' + lt.space) : null}
                                                        </button>
                                                    );
                                                });
                                            })()}
                                        </div>
                                        {loc && loc.included && (
                                            <p className="text-muted" style={{ fontSize: '0.75rem', marginTop: '0.5rem', fontStyle: 'italic' }}>
                                                {loc.included}
                                            </p>
                                        )}
                                    </React.Fragment>
                                )}
                            </div>

                            {/* Location Merits */}
                            <div style={{ marginBottom: '1rem' }}>
                                <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.5rem' }}>
                                    LOCATION MERITS
                                    <SectionHideToggle baseId={base.id} sectionKey="merits" hiddenSections={base.hiddenSections} />
                                </label>
                                {isSectionHidden('merits') ? <Classified /> : (
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem' }}>
                                        {(() => {
                                            const configMeritKeys = new Set((baseConfig.locationMerits || []).map(m => m.key));
                                            const allMeritDefs = lookup.locationMerits || baseConfig.locationMerits || [];
                                            const items = [...(baseConfig.locationMerits || [])];
                                            (base.merits || []).forEach(mk => {
                                                if (!configMeritKeys.has(mk)) {
                                                    const def = allMeritDefs.find(m => m.key === mk);
                                                    items.push(def ? Object.assign({}, def, { otherClass: true }) : { key: mk, name: mk.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), exp: 0, extraSpace: 0, otherClass: true });
                                                }
                                            });
                                            return items.map(m => {
                                                const selected = (base.merits || []).includes(m.key);
                                                const isOtherClass = m.otherClass || false;
                                                if (!selected && isOtherClass) return null;
                                                // Players can add but not remove
                                                const canClick = IS_ADMIN || (!selected && !isOtherClass);
                                                return (
                                                    <button key={m.key}

                                                            if (!canClick) return;
                                                            if (selected && !IS_ADMIN) return;
                                                            toggleMerit(base.id, m.key);
                                                        }}
                                                        disabled={!canClick && !selected}
                                                        title={isOtherClass ? m.name : selected && !IS_ADMIN ? 'Only GM can remove' : m.description || ''}
                                                        style={{
                                                            background: selected ? '#3b82f622' : 'rgba(0,0,0,0.2)',

                                                            padding: '0.4rem 0.75rem', cursor: canClick ? 'pointer' : 'default',
                                                            fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                            borderRadius: 'var(--radius-sm)',
                                                        }}>
                                                        {m.name}
                                                        {m.exp > 0 ? React.createElement('span', { style: { fontSize: '0.65rem', marginLeft: '0.5rem', opacity: 0.7 } }, 'E:+' + m.exp + (m.extraSpace > 0 ? ' S:+' + m.extraSpace : '')) : null}
                                                    </button>
                                                );
                                            });
                                        })()}
                                    </div>
                                )}
                            </div>

                            {/* Space Usage Bar */}
                            {costs.totalSpace > 0 && (
                                <div style={{ marginBottom: '1rem' }}>
                                    <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>
                                        SPACE USAGE{!isSectionHidden('space') && `: ${costs.usedSpace} / ${costs.totalSpace}`}
                                        {!isSectionHidden('space') && costs.freeSpace < 0 && <span style={{ color: 'var(--accent-danger)', marginLeft: '0.5rem' }}>OVER CAPACITY!</span>}
                                        <SectionHideToggle baseId={base.id} sectionKey="space" hiddenSections={base.hiddenSections} />
                                    </label>
                                    {isSectionHidden('space') ? <Classified /> : (
                                        <div style={{ background: 'rgba(0,0,0,0.3)', height: '8px', borderRadius: '4px', overflow: 'hidden' }}>
                                            <div style={{
                                                width: `${spacePercent}%`, height: '100%',
                                                background: costs.freeSpace < 0 ? 'var(--accent-danger)' : BASE_ACCENT,
                                                transition: 'width 0.3s',
                                            }} />
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Power Usage Bar */}
                            {(() => {
                                const pw = calcPower(base);
                                const selfPowered = requiresSelfPower(base);
                                const mobile = isMobileBase(base);
                                if (pw.totalConsumed === 0 && pw.produced === 0) return null;
                                const internalPct = pw.produced > 0 ? Math.min(100, Math.round(pw.internalConsumed / pw.produced * 100)) : (pw.internalConsumed > 0 ? 100 : 0);
                                const internalOver = pw.internalConsumed > pw.produced;
                                const gridInfraPct = !selfPowered && pw.totalConsumed > 0 ? Math.round(pw.gridConsumed / pw.totalConsumed * 100) : 0;
                                const barColor = !internalOver ? '#eab308' : (selfPowered ? 'var(--accent-danger)' : '#f59e0b');
                                return (
                                    <div style={{ marginBottom: '1rem' }}>
                                        <label className="mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem', color: '#eab308' }}>
                                            ⚡ INTERNAL POWER: {pw.internalConsumed} / {pw.produced}
                                            {!selfPowered && pw.gridConsumed > 0 && (
                                                <span style={{ color: 'var(--text-muted)', marginLeft: '0.5rem', fontSize: '0.65rem' }}>
                                                    | {pw.gridConsumed} on country grid ({gridInfraPct}% infrastructure dependent)
                                                </span>
                                            )}
                                            {!selfPowered && pw.gridConsumed === 0 && pw.produced > 0 && (
                                                <span style={{ color: '#22c55e', marginLeft: '0.5rem', fontSize: '0.65rem' }}>
                                                    (self-sufficient)
                                                </span>
                                            )}
                                            {!selfPowered && pw.produced === 0 && pw.totalConsumed > 0 && (
                                                <span style={{ color: 'var(--text-muted)', marginLeft: '0.5rem', fontSize: '0.65rem' }}>
                                                    | 100% country infrastructure
                                                </span>
                                            )}
                                            {internalOver && selfPowered && (
                                                <span style={{ color: 'var(--accent-danger)', marginLeft: '0.5rem', fontSize: '0.65rem' }}>
                                                    POWER DEFICIT! {mobile ? 'Mobile base requires self-power.' : 'No grid connection.'}
                                                </span>
                                            )}
                                        </label>
                                        <div style={{ background: 'rgba(0,0,0,0.3)', height: '8px', borderRadius: '4px', overflow: 'hidden' }}>
                                            <div style={{
                                                width: pw.produced > 0 ? `${internalPct}%` : (pw.internalConsumed > 0 ? '100%' : '0%'),
                                                height: '100%',
                                                background: barColor,
                                                transition: 'width 0.3s',

                                        </div>

                            {/* Facilities (multi-select, excludes workspace) */}

                                    <SectionHideToggle baseId={base.id} sectionKey="facilities" hiddenSections={base.hiddenSections} />
                                    <VisibilityToggle field={`${basePath}.facilities`} visibility={visibility} onToggle={onToggleVis} />
                                </label>
                                {(isSectionHidden('facilities') || (base.classifiedFacilities && !IS_ADMIN)) ? <Classified /> : (() => {
                                    // Check if any character has "Fringe Science Labs" pulling string
                                    const hasFringePS = (assignableCharacters || []).some(c =>
                                        (c.pullingStrings || []).some(ps => ps.name === 'Fringe Science Labs')
                                    );
                                    // Config facilities = what this player's class can build
                                    const myFt = (baseConfig.facilityTypes || []).filter(ft => ft.key !== 'workspace');
                                    const configKeys = new Set(myFt.map(ft => ft.key));
                                    // Full definitions for all classes (for display lookups)
                                    const allDefs = lookup.facilityTypes || baseConfig.facilityTypes || [];
                                    const defByKey = {};
                                    allDefs.forEach(ft => { defByKey[ft.key] = ft; });
                                    // Add read-only entries for built facilities from other classes
                                    const builtOtherClassKeys = new Set();
                                    (base.facilities || []).forEach(f => {
                                        if (f.key !== 'workspace' && !configKeys.has(f.key)) builtOtherClassKeys.add(f.key);
                                    });
                                    const otherClassFts = [];
                                    builtOtherClassKeys.forEach(key => {
                                        const def = defByKey[key];
                                        if (def) {
                                            otherClassFts.push(Object.assign({}, def, { otherClass: true }));
                                        } else {
                                            const levels = (base.facilities || []).filter(f => f.key === key).map(f => f.level);
                                            otherClassFts.push({ key, name: key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), levels: levels.map(l => ({ level: l, name: 'Level ' + l, exp: 0, size: 0 })), otherClass: true });
                                        }
                                    });
                                    const combinedFt = myFt.concat(otherClassFts);

                                        const selectedLevels = (base.facilities || []).filter(f => f.key === ft.key).map(f => f.level);

                                        const isOtherClass = ft.otherClass || false;
                                        // Hide unselected facilities from other classes
                                        if (!hasAny && isOtherClass) return null;
