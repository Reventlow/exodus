                                        if (!hasAny && !configKeys.has(ft.key) && !IS_ADMIN) return null;
                                        return (
                                            <div key={ft.key} className="tech-border" style={{
                                                padding: '0.5rem', marginBottom: '0.25rem',
                                                background: hasAny ? 'rgba(34,197,94,0.05)' : 'rgba(0,0,0,0.15)',
                                            }}>
                                                <span className="mono-text" style={{
                                                    fontSize: '0.85rem', display: 'block', marginBottom: '0.35rem',
                                                    color: hasAny ? BASE_ACCENT : 'var(--text-muted)',
                                                }}>{ft.name}{isOtherClass && !IS_ADMIN ? '' : ''}</span>
                                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.3rem' }}>
                                                    {ft.levels.map(lvl => {
                                                        const active = selectedLevels.includes(lvl.level);
                                                        const baseMerits = base.merits || [];
                                                        const isUnderground = baseMerits.includes('underground');
                                                        const isUnderwater = baseMerits.includes('underwater');
                                                        const isSubterranean = isUnderground || isUnderwater;
                                                        const lockedFringe = ft.key === 'fringe_lab' && !hasFringePS && !active;
                                                        const lockedNuclear = ft.key === 'power_plant' && lvl.level === 3 && !isNuclearPower && !active;
                                                        const lockedSolar = ft.key === 'power_plant' && lvl.level === 2 && isSubterranean && !active;
                                                        const lockedGeothermal = ft.key === 'power_plant' && lvl.level === 4 && !isSubterranean && !active;
                                                        const locked = lockedFringe || lockedNuclear || lockedSolar || lockedGeothermal;
                                                        // Players can add (not active → active) but only admin can remove (active → not active)
                                                        const canClick = IS_ADMIN || (!active && !isOtherClass && !locked);
                                                        // For other-class built items, show as read-only
                                                        if (isOtherClass && !active) return null;
                                                        const facilityEntry = active ? (base.facilities || []).find(f => f.key === ft.key && f.level === lvl.level) : null;
                                                        const isPowered = facilityEntry ? !!facilityEntry.internalPower : false;
                                                        const selfPow = requiresSelfPower(base);
                                                        const hasPower = (lvl.power || 0) > 0;
                                                        const isPowerPlant = ft.key === 'power_plant';
                                                        const canTogglePower = active && hasPower && !isPowerPlant && (IS_ADMIN || CHARACTER_CLASS === 'engineer');
                                                        return React.createElement('span', { key: lvl.level, style: { display: 'inline-flex', alignItems: 'center', gap: '2px' } },
                                                            React.createElement('button', {
                                                                onClick: function() {
                                                                    if (!canClick) return;
                                                                    if (active && !IS_ADMIN) return;
                                                                    if (locked) return;
                                                                    toggleFacilityLevel(base.id, ft.key, lvl.level);
                                                                },
                                                                disabled: !canClick,
                                                                title: lockedSolar ? 'Solar/Wind not available underground or underwater' : lockedGeothermal ? 'Geothermal only available underground or underwater' : lockedNuclear ? 'Agency must have Nuclear Power status (council approval)' : lockedFringe ? 'Requires Fringe Science Labs pulling string' : isOtherClass ? ft.name : active && !IS_ADMIN ? 'Only GM can remove' : lvl.description,
                                                                style: {
                                                                    background: active ? (BASE_ACCENT + '22') : locked ? 'rgba(0,0,0,0.05)' : 'rgba(0,0,0,0.2)',
                                                                    border: '1px solid ' + (active ? BASE_ACCENT : locked ? 'var(--bg-panel)' : 'var(--border-color)'),
                                                                    color: active ? BASE_ACCENT : locked ? 'var(--bg-panel)' : 'var(--text-muted)',
                                                                    padding: '0.25rem 0.5rem', cursor: canClick ? 'pointer' : 'default',
                                                                    fontFamily: 'var(--font-mono)', fontSize: '0.7rem',
                                                                    borderRadius: 'var(--radius-sm)',
                                                                    opacity: locked ? 0.4 : 1,
                                                                },
                                                            }, locked ? '🔒 ' : '', lvl.name,
                                                                lvl.exp > 0 ? React.createElement('span', { style: { fontSize: '0.6rem', marginLeft: '0.3rem', opacity: 0.7 } }, 'E:' + lvl.exp + ' S:' + lvl.size) : null,
                                                                hasPower && !isPowerPlant ? React.createElement('span', { style: { fontSize: '0.6rem', marginLeft: '0.3rem', opacity: 0.7 } }, 'P:' + (lvl.power || 0)) : null,
                                                                isPowerPlant && (lvl.powerOutput || 0) > 0 ? React.createElement('span', { style: { fontSize: '0.6rem', marginLeft: '0.3rem', opacity: 0.7, color: '#22c55e' } }, 'P:+' + lvl.powerOutput) : null
                                                            ),
                                                            canTogglePower ? React.createElement('button', {
                                                                onClick: function() { toggleFacilityPower(base.id, ft.key, lvl.level); },
                                                                title: isPowered ? (selfPow ? 'Powered — click to take offline' : 'Internal power — click for country grid') : (selfPow ? 'Offline — click to power on' : 'Country grid — click for internal power'),
                                                                style: {
                                                                    background: isPowered ? '#eab30833' : 'transparent',
                                                                    border: '1px solid ' + (isPowered ? '#eab308' : 'var(--border-color)'),
                                                                    color: isPowered ? '#eab308' : 'var(--text-muted)',
                                                                    padding: '0.15rem 0.25rem', cursor: 'pointer',
                                                                    fontSize: '0.65rem', borderRadius: '3px',
                                                                    opacity: isPowered ? 1 : 0.4,
                                                                },
                                                            }, '\u26A1') : null
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    });
                                })()}
                            </div>

                            {/* Workspaces (multi-instance with assignment) */}
                            {(() => {
                                const wsConfig = getWorkspaceConfig(baseConfig, lookup);
                                if (!wsConfig) return null;
                                if ((isSectionHidden('workspaces') || (base.classifiedWorkspaces && !IS_ADMIN))) return (
                                    <div style={{ marginBottom: '1rem' }}>
                                        <label className="text-muted mono-text" style={{ fontSize: '0.7rem', marginBottom: '0.5rem' }}>
                                            WORKSPACES
                                            <SectionHideToggle baseId={base.id} sectionKey="workspaces" hiddenSections={base.hiddenSections} />
                                        </label>
                                        <Classified />
                                    </div>
                                );
                                const workspaces = base.workspaces || [];
                                return (
                                    <div style={{ marginBottom: '1rem' }}>
                                        <label className="text-muted mono-text" style={{
                                            fontSize: '0.7rem', display: 'flex', justifyContent: 'space-between',
                                            alignItems: 'center', marginBottom: '0.5rem',
                                        }}>
                                            <span>
                                                WORKSPACES ({workspaces.length})
                                                <SectionHideToggle baseId={base.id} sectionKey="workspaces" hiddenSections={base.hiddenSections} />
                                                <VisibilityToggle field={`${basePath}.workspaces`} visibility={visibility} onToggle={onToggleVis} />
                                            </span>
                                            {(IS_ADMIN || CHARACTER_CLASS === 'engineer') && (
                                                <select
                                                    value=""
                                                    onChange={e => { if (e.target.value) addWorkspace(base.id, parseInt(e.target.value)); e.target.value = ''; }}
                                                    style={{
                                                        background: 'rgba(0,0,0,0.3)', color: BASE_ACCENT,
                                                        border: `1px solid ${BASE_ACCENT}`, padding: '0.2rem 0.4rem',
                                                        fontFamily: 'var(--font-mono)', fontSize: '0.7rem',
                                                        borderRadius: 'var(--radius-sm)', cursor: 'pointer',
                                                    }}>
                                                    <option value="">+ Add Workspace</option>
                                                    {wsConfig.levels.map(lvl => (
                                                        <option key={lvl.level} value={lvl.level}>
                                                            {lvl.name} (E:{lvl.exp} S:{lvl.size}{lvl.power ? ' P:' + lvl.power : ''})
                                                        </option>
                                                    ))}
                                                </select>
                                            )}
                                        </label>
                                        {workspaces.map((ws, idx) => {
                                            const lvl = wsConfig.levels.find(l => l.level === ws.level);
                                            return (
                                                <div key={idx} className="tech-border" title={lvl?.description || ''}
                                                    style={{
                                                    padding: '0.5rem', marginBottom: '0.25rem',
                                                    background: 'rgba(34,197,94,0.05)',
                                                    display: 'flex', alignItems: 'center', gap: '0.5rem', flexWrap: 'wrap',
                                                }}>
                                                    <span className="mono-text" style={{ fontSize: '0.8rem', color: BASE_ACCENT, minWidth: '120px' }}>
                                                        {lvl?.name || `Level ${ws.level}`}
                                                        <span style={{ fontSize: '0.65rem', marginLeft: '0.3rem', opacity: 0.7 }}>
                                                            E:{lvl?.exp || 0} S:{lvl?.size || 0}
                                                        </span>
                                                        {(lvl?.power || 0) > 0 ? React.createElement('span', { style: { fontSize: '0.6rem', marginLeft: '0.3rem', opacity: 0.7 } }, 'P:' + lvl.power) : null}
                                                    </span>
                                                    {(lvl?.power || 0) > 0 && (IS_ADMIN || CHARACTER_CLASS === 'engineer') ? (
                                                        <button onClick={() => toggleWorkspacePower(base.id, idx)}
                                                            title={ws.internalPower ? (requiresSelfPower(base) ? 'Powered — click to take offline' : 'Internal power — click for country grid') : (requiresSelfPower(base) ? 'Offline — click to power on' : 'Country grid — click for internal power')}
                                                            style={{
                                                                background: ws.internalPower ? '#eab30833' : 'transparent',
                                                                border: '1px solid ' + (ws.internalPower ? '#eab308' : 'var(--border-color)'),
                                                                color: ws.internalPower ? '#eab308' : 'var(--text-muted)',
                                                                padding: '0.1rem 0.25rem', cursor: 'pointer',
                                                                fontSize: '0.6rem', borderRadius: '3px',
                                                                opacity: ws.internalPower ? 1 : 0.4,
                                                            }}>⚡</button>
                                                    ) : null}
                                                    {(IS_ADMIN || CHARACTER_CLASS === 'engineer') ? (
                                                        <select
                                                            value={ws.assignedTo ? `${ws.assignedType}:${ws.assignedTo}` : ''}
                                                            onChange={e => {
                                                                if (!e.target.value) {
                                                                    if (!IS_ADMIN) return; // only admin can unassign
                                                                    updateWorkspace(base.id, idx, { assignedTo: null, assignedType: null });
                                                                } else {
                                                                    const [type, id] = e.target.value.split(':');
                                                                    updateWorkspace(base.id, idx, { assignedTo: parseInt(id), assignedType: type });
                                                                }
                                                            }}
                                                            style={{
                                                                background: 'rgba(0,0,0,0.3)', color: 'var(--text-primary)',
                                                                border: '1px solid var(--border-color)', padding: '0.2rem 0.4rem',
                                                                fontFamily: 'var(--font-mono)', fontSize: '0.75rem',
                                                                borderRadius: 'var(--radius-sm)', flex: 1, minWidth: '150px',
                                                            }}>
                                                            <option value="">Unassigned</option>
                                                            {assignableCharacters.length > 0 && (
                                                                <optgroup label="Characters">
                                                                    {assignableCharacters.map(c => (
                                                                        <option key={`character:${c.id}`} value={`character:${c.id}`}>{c.name}</option>
                                                                    ))}
                                                                </optgroup>
                                                            )}
                                                            {assignableNpcs.length > 0 && (
                                                                <optgroup label="NPCs">
                                                                    {assignableNpcs.map(n => (
                                                                        <option key={`npc:${n.id}`} value={`npc:${n.id}`}>{n.name}</option>
                                                                    ))}
                                                                </optgroup>
                                                            )}
                                                        </select>
                                                    ) : (
                                                        <span className="text-muted mono-text" style={{ fontSize: '0.75rem' }}>
                                                            {ws.assignedName || 'Unassigned'}
                                                        </span>
                                                    )}
                                                    {IS_ADMIN && (
                                                        <button onClick={() => removeWorkspace(base.id, idx)} style={{
                                                            background: 'transparent', border: 'none',
                                                            color: 'var(--accent-danger)', cursor: 'pointer', padding: '2px',
                                                        }}>
                                                            <Icon name="x" size={14} />
                                                        </button>
                                                    )}
                                                </div>
                                            );
                                        })}
                                        {workspaces.length === 0 && (
                                            <p className="text-muted" style={{ fontSize: '0.75rem', fontStyle: 'italic' }}>No workspaces assigned.</p>
                                        )}
                                    </div>
                                );
                            })()}

                            {/* Equipment */}
                            <div style={{ marginBottom: '1rem' }}>
                                <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.5rem' }}>
                                    FACILITY EQUIPMENT
                                    <VisibilityToggle field={`${basePath}.equipment`} visibility={visibility} onToggle={onToggleVis} />
                                </label>
                                {base.classifiedEquipment && !IS_ADMIN ? <Classified /> : (() => {
                                    // Check if base meets facility/equipment requirements
                                    // requiresFacilities: AND conditions [{key, minLevel}]
                                    // requiresAnyOf: OR conditions [{type:"facility"|"equipment", key, minLevel?}]
                                    const hasFacility = (key, minLevel) => {
                                        const match = (base.facilities || []).find(f => f.key === key);
                                        return match && match.level >= (minLevel || 1);
                                    };
                                    const hasEquipment = (key) => (base.equipment || []).includes(key);
                                    const hasMerit = (key) => (base.merits || []).includes(key);

                                    const meetsRequirements = (eq) => {
                                        const reqs = eq.requiresFacilities || [];
                                        const anyOf = eq.requiresAnyOf || [];
                                        const andMet = reqs.length === 0 || reqs.every(req => hasFacility(req.key, req.minLevel));
                                        const orMet = anyOf.length === 0 || anyOf.some(req =>
                                            req.type === 'equipment' ? hasEquipment(req.key)
                                            : req.type === 'merit' ? hasMerit(req.key)
                                            : hasFacility(req.key, req.minLevel)
                                        );
                                        return andMet && orMet;
                                    };

                                    // Build categories from config + add built items from other classes
                                    const configEqKeys = new Set((baseConfig.equipmentTypes || []).map(eq => eq.key));
                                    const allEqDefs = lookup.equipmentTypes || baseConfig.equipmentTypes || [];
                                    const categories = {};
                                    (baseConfig.equipmentTypes || []).forEach(eq => {
                                        const cat = eq.category || 'Other';
                                        if (!categories[cat]) categories[cat] = [];
                                        categories[cat].push(eq);
                                    });
                                    (base.equipment || []).forEach(ek => {
                                        if (!configEqKeys.has(ek)) {
                                            const def = allEqDefs.find(eq => eq.key === ek);
                                            const cat = def ? (def.category || 'Other') : 'Other';
                                            if (!categories[cat]) categories[cat] = [];
                                            categories[cat].push(def ? Object.assign({}, def, { otherClass: true }) : { key: ek, name: ek.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), exp: 0, category: cat, otherClass: true });
                                        }
                                    });
                                    const catKeyMap = {
                                        'Aviation Units': 'aviationUnits', 'Base Defenses': 'baseDefenses',
                                        'Naval Units': 'navalUnits', 'Motorized Units': 'motorizedUnits',
                                    };
                                    return Object.entries(categories).map(([cat, items]) => {
                                        const catKey = catKeyMap[cat];
                                        const catHidden = catKey && isSectionHidden(catKey);
                                        const anyAvailable = items.some(eq => meetsRequirements(eq) || (base.equipment || []).includes(eq.key));
                                        if (!anyAvailable && !IS_ADMIN) return null;
                                        return (
                                        <div key={cat} style={{ marginBottom: '0.5rem' }}>
                                            <span className="mono-text text-muted" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem', borderBottom: '1px solid var(--border-color)', paddingBottom: '0.15rem' }}>
                                                {cat}
                                                {catKey && <SectionHideToggle baseId={base.id} sectionKey={catKey} hiddenSections={base.hiddenSections} />}
                                            </span>
                                            {catHidden ? <Classified /> : (
                                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.4rem' }}>
                                                {items.map(eq => {
                                                    const selected = (base.equipment || []).includes(eq.key);
                                                    const isOtherClass = eq.otherClass || false;
                                                    const reqMet = isOtherClass ? true : meetsRequirements(eq);
                                                    if (!selected && isOtherClass) return null;
                                                    if (!reqMet && !selected && !IS_ADMIN) return null;
                                                    const locked = !reqMet && !selected;
                                                    // Players can add but not remove
                                                    const canClick = IS_ADMIN || (!selected && !isOtherClass && reqMet);
                                                    return (
                                                        <button key={eq.key}
                                                            onClick={() => {
                                                                if (!canClick) return;
                                                                if (selected && !IS_ADMIN) return;
                                                                if (locked) return;
                                                                toggleEquipment(base.id, eq.key);
                                                            }}
                                                            disabled={!canClick && !selected}
                                                            title={locked ? `Requires: ${eq.requires}` : selected && !IS_ADMIN ? 'Only GM can remove' : (eq.requires || eq.name)}
                                                            style={{
                                                                background: selected ? '#f59e0b22' : locked ? 'rgba(0,0,0,0.05)' : 'rgba(0,0,0,0.2)',
                                                                border: `1px solid ${selected ? '#f59e0b' : locked ? 'var(--bg-panel)' : 'var(--border-color)'}`,
                                                                color: selected ? '#f59e0b' : locked ? 'var(--bg-panel)' : 'var(--text-muted)',
                                                                padding: '0.3rem 0.6rem', cursor: canClick ? 'pointer' : 'default',
                                                                fontFamily: 'var(--font-mono)', fontSize: '0.75rem',
                                                                borderRadius: 'var(--radius-sm)',
                                                                opacity: locked ? 0.4 : 1,
                                                            }}>
                                                            {locked && '🔒 '}{eq.name}
                                                            {eq.exp > 0 ? React.createElement('span', { style: { fontSize: '0.6rem', marginLeft: '0.4rem', opacity: 0.7 } }, 'E:' + eq.exp) : null}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                            )}
                                        </div>
                                        );
                                    });
                                })()}
                            </div>

                            {/* Departments & Thrive Scores (auto-calculated from facilities) */}
                            <div style={{ marginBottom: '1rem' }}>
                                <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.5rem' }}>
                                    DEPARTMENTS
                                    <SectionHideToggle baseId={base.id} sectionKey="departments" hiddenSections={base.hiddenSections} />
                                </label>
                                {isSectionHidden('departments') ? <Classified /> : (() => {
                                    const depts = base.departments || [];
                                    const tg = base.thriveGlobal || {};
                                    const reasons = tg.reasons || [];
                                    const globalMod = tg.mod || 0;

                                    const thriveColor = (t) => {
                                        if (t <= 2) return '#ef4444';
                                        if (t <= 4) return '#f59e0b';
                                        if (t <= 6) return '#6b7280';
                                        if (t <= 8) return '#22c55e';
                                        return '#06b6d4';
                                    };

                                    const thriveModifier = (t) => {
                                        const mod = Math.floor((t - 5) / 2);
                                        if (mod > 0) return '+' + mod;
                                        if (mod < 0) return '' + mod;
                                        return '0';
                                    };

                                    return (
                                        <div>
                                            {/* Global modifiers */}
                                            {reasons.length > 0 && (
                                                <div style={{ marginBottom: '0.5rem', padding: '0.3rem 0.5rem', background: 'rgba(0,0,0,0.2)', borderRadius: 'var(--radius-sm)', borderLeft: '3px solid ' + (globalMod >= 0 ? '#22c55e' : '#ef4444') }}>
                                                    <span className="mono-text" style={{ fontSize: '0.6rem', color: globalMod >= 0 ? '#22c55e' : '#ef4444' }}>
                                                        GLOBAL {globalMod >= 0 ? '+' + globalMod : globalMod}: {reasons.join(' | ')}
                                                    </span>
                                                </div>
                                            )}

                                            {depts.length === 0 ? (
                                                <span className="text-muted" style={{ fontSize: '0.75rem', fontStyle: 'italic' }}>
                                                    No facilities built — no departments active.
                                                </span>
                                            ) : (
                                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.4rem' }}>
                                                    {depts.map(function(dept) {
                                                        var t = dept.thrive || 1;
                                                        var color = thriveColor(t);
                                                        var mod = thriveModifier(t);
                                                        return (
                                                            <div key={dept.key} title={dept.tooltip || ''} style={{
                                                                display: 'flex', alignItems: 'center', gap: '0.5rem',
                                                                background: 'rgba(0,0,0,0.15)', padding: '0.4rem 0.6rem',
                                                                borderRadius: 'var(--radius-sm)', borderLeft: '3px solid ' + color,
                                                                cursor: 'help',
                                                            }}>
                                                                <span className="mono-text" style={{ fontSize: '0.75rem', color: 'var(--text-primary)', minWidth: '120px' }}>
                                                                    {dept.name}
                                                                </span>
                                                                <div style={{
                                                                    flex: 1, maxWidth: '120px', height: '6px',
                                                                    background: 'rgba(0,0,0,0.3)', borderRadius: '3px',
                                                                    overflow: 'hidden',
                                                                }}>
                                                                    <div style={{
                                                                        width: (t * 10) + '%', height: '100%',
                                                                        background: color, borderRadius: '3px',
                                                                    }} />
                                                                </div>
                                                                <span className="mono-text" style={{
                                                                    fontSize: '0.8rem', fontWeight: 'bold',
                                                                    color: color, minWidth: '20px', textAlign: 'center',
                                                                }}>{t}</span>
                                                                <span className="mono-text" style={{
                                                                    fontSize: '0.7rem', color: color,
                                                                    minWidth: '80px',
                                                                }}>{dept.label}</span>
                                                                <span className="mono-text" style={{
                                                                    fontSize: '0.65rem', padding: '0.1rem 0.3rem',
                                                                    background: 'rgba(0,0,0,0.3)', borderRadius: '3px',
                                                                    color: mod.charAt(0) === '-' ? '#ef4444' : mod === '0' ? 'var(--text-muted)' : '#22c55e',
                                                                }}>
                                                                    {mod} dice
                                                                </span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })()}
                            </div>

                            {/* Notes (markdown) */}
                            <BaseNotesModule notes={base.notes || ''} onSave={val => updateBaseField(base.id, 'notes', val)} />

                            {/* Coordinates for world map */}
                            {IS_ADMIN && (
                                <div style={{ marginBottom: '0.5rem' }}>
                                    <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>
                                        MAP COORDINATES
                                        <SectionHideToggle baseId={base.id} sectionKey="coordinates" hiddenSections={base.hiddenSections} />
                                    </label>
                                    <div style={{ display: 'flex', gap: '0.75rem' }}>
                                        <div style={{ flex: 1 }}>
                                            <label className="text-muted mono-text" style={{ fontSize: '0.6rem' }}>LAT</label>
                                            <AutoSaveInput type="number" step="any"
                                                defaultValue={base.latitude != null ? base.latitude : ''}
                                                onSave={val => updateBaseField(base.id, 'latitude', val ? parseFloat(val) : null)}
                                                placeholder="e.g. 55.67"
                                                style={{
                                                    background: 'rgba(0,0,0,0.2)', border: '1px solid var(--border-color)',
                                                    color: 'var(--text-primary)', width: '100%',
                                                    fontSize: '0.85rem', fontFamily: 'var(--font-mono)', padding: '0.3rem 0.5rem',
                                                    borderRadius: 'var(--radius-sm)',
                                                }} />
                                        </div>
                                        <div style={{ flex: 1 }}>
                                            <label className="text-muted mono-text" style={{ fontSize: '0.6rem' }}>LNG</label>
                                            <AutoSaveInput type="number" step="any"
                                                defaultValue={base.longitude != null ? base.longitude : ''}
                                                onSave={val => updateBaseField(base.id, 'longitude', val ? parseFloat(val) : null)}
                                                placeholder="e.g. 12.56"
                                                style={{
                                                    background: 'rgba(0,0,0,0.2)', border: '1px solid var(--border-color)',
                                                    color: 'var(--text-primary)', width: '100%',
                                                    fontSize: '0.85rem', fontFamily: 'var(--font-mono)', padding: '0.3rem 0.5rem',
                                                    borderRadius: 'var(--radius-sm)',
                                                }} />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Clear & Delete buttons */}
                            {IS_ADMIN && (
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '0.5rem' }}>
                                    <button onClick={() => {
                                        const costs = calcBaseCosts(base);
                                        if (!confirm('CLEAR ALL CHOICES on "' + base.name + '"?\n\nThis will remove:\n- Location type\n- All merits\n- All facilities\n- All workspaces\n- All equipment\n\nEXP returned: ' + costs.totalExp + '\n\nDepartments and notes will be kept.\n\nAre you sure?')) return;
                                        saveBase(base.id, {
                                            locationType: '',
                                            merits: [],
                                            facilities: [],
                                            workspaces: [],
                                            equipment: [],
                                        });
                                    }}
                                        className="mono-text"
                                        style={{
                                            background: 'transparent', border: '1px solid #f59e0b',
                                            color: '#f59e0b', padding: '0.3rem 1rem',
                                            cursor: 'pointer', fontSize: '0.75rem', fontFamily: 'var(--font-mono)',
                                            borderRadius: 'var(--radius-sm)',
                                        }}>
                                        CLEAR BASE
                                    </button>
                                    <button onClick={() => {
                                        if (!confirm('PERMANENTLY DELETE "' + base.name + '"?\n\nThis cannot be undone.')) return;
                                        deleteBase(base.id);
                                    }}
                                        className="mono-text"
                                        style={{
                                            background: 'transparent', border: '1px solid var(--accent-danger)',
                                            color: 'var(--accent-danger)', padding: '0.3rem 1rem',
                                            cursor: 'pointer', fontSize: '0.75rem', fontFamily: 'var(--font-mono)',
                                            borderRadius: 'var(--radius-sm)',
                                        }}>
                                        DELETE BASE
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // Total exp across all bases
        const totalBaseExp = bases.reduce((sum, b) => b.classified ? sum : sum + calcBaseCosts(b).totalExp, 0);

        // If entire bases section is classified for non-admins
        if (classifiedBases && !IS_ADMIN) {
            return (
                <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                    <h3 className="mono-text" style={{ color: BASE_ACCENT, marginBottom: '1rem' }}>BASES</h3>
                    <Classified />
                </div>
            );
        }

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text" style={{
                    color: BASE_ACCENT,
                    borderBottom: `1px solid ${BASE_ACCENT}`,
                    paddingBottom: '0.5rem', marginBottom: '1rem',
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                }}>
                    <span>
                        BASES
                        <VisibilityToggle field="bases" visibility={visibility} onToggle={onToggleVis} />
                        <span className="text-muted" style={{ fontSize: '0.75rem', marginLeft: '0.75rem' }}>
                            ({bases.length}) // TOTAL EXP: {totalBaseExp}
                        </span>
                    </span>
                    <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                        <button onClick={() => setShowRules(prev => !prev)}
                            style={{
                                background: showRules ? `${BASE_ACCENT}22` : 'transparent',
                                border: `1px solid ${BASE_ACCENT}`,
                                color: BASE_ACCENT, padding: '0.15rem 0.5rem',
                                borderRadius: '4px', cursor: 'pointer',
                                fontFamily: 'var(--font-mono)', fontSize: '0.65rem',
                            }}>RULES</button>
                        {IS_ADMIN && (
                            <button onClick={createBase} disabled={creating}
                                style={{
                                    background: 'transparent', border: `1px solid ${BASE_ACCENT}`,
                                    color: BASE_ACCENT, width: '24px', height: '24px',
                                    borderRadius: '4px', cursor: creating ? 'wait' : 'pointer',
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                }}>
                                <Icon name="plus" size={14} />
                            </button>
                        )}
                    </div>
                </h3>

                {showRules && (
                    <div style={{ marginBottom: '1rem', padding: '1rem', background: 'rgba(0,0,0,0.3)', borderRadius: 'var(--radius-sm)', border: `1px solid ${BASE_ACCENT}`, fontSize: '0.75rem', fontFamily: 'var(--font-mono)', color: 'var(--text-secondary)' }}>
                        <div style={{ color: BASE_ACCENT, fontWeight: 'bold', marginBottom: '0.5rem' }}>BASE BUILDING RULES</div>

                        <div style={{ marginBottom: '0.75rem' }}>
                            <span style={{ color: '#f59e0b', fontWeight: 'bold' }}>CLASS RESTRICTIONS</span><br/>
                            Each player class can only see and build facilities matching their specialisation. General facilities are available to all.<br/>
                            <span style={{ color: '#6b7280' }}>Soldier: military, security, aviation · Engineer: tech, power, fabrication · Science: labs, medical, research · Fixer: diplomacy, HR, intelligence</span><br/>
                            Players can ADD items but only the GM can remove them. Built items from other classes are visible but read-only.
                        </div>

                        <div style={{ marginBottom: '0.75rem' }}>
                            <span style={{ color: '#eab308', fontWeight: 'bold' }}>⚡ POWER SYSTEM</span><br/>
                            Every facility consumes power (shown as P: value). Power plants produce power.<br/>
                            <span style={{ color: '#6b7280' }}>Generator: 15 output · Solar/Wind: 30 · Geothermal: 40 (underground/underwater only) · Nuclear Reactor: 80 (requires council approval)</span><br/>
                            Non-mobile bases draw excess from country infrastructure. Underwater, mobile, and orbital bases must be fully self-powered.<br/>
                            Engineers can toggle ⚡ on each facility to connect/disconnect from internal power.
                        </div>

                        <div style={{ marginBottom: '0.75rem' }}>
                            <span style={{ color: '#22c55e', fontWeight: 'bold' }}>DEPARTMENT THRIVE</span><br/>
                            Departments appear automatically based on built facilities. Each department has a thrive score (1-10) that affects project dice pools.<br/>
                            <span style={{ color: '#6b7280' }}>1-2 Collapsing/Critical (-2 dice) · 3-4 Struggling/Strained (-1 dice) · 5-6 Stable/Functional (0) · 7-8 Thriving/Flourishing (+1 dice) · 9-10 Exemplary/Pinnacle (+2 dice)</span><br/>
                            Most specialist facilities give +2 per level (labs, fabrication, intel archive, training, diplomatic). Barracks also gives +2. General areas, living, storage give +1 admin each. Recreation gives +2 admin.<br/>
                            Some facilities have cross-department effects — interrogation boosts intelligence but hurts diplomacy and admin. High-level monitoring boosts intelligence but hinders science and engineering.<br/>
                            Hover over a department row to see the full breakdown.
                        </div>

                        <div style={{ marginBottom: '0.75rem' }}>
                            <span style={{ color: '#ef4444', fontWeight: 'bold' }}>GLOBAL PENALTIES & BONUSES</span><br/>
                            These affect ALL departments on the base:<br/>
                            <span style={{ color: '#ef4444' }}>No housing (large base, &gt;12 space): -1 or -2 · Normal housing (L1): -1 · No medical (8+ facilities): -1 · Poor amenities (&lt;10%): -1 · No power (isolated base): -1</span><br/>
                            <span style={{ color: '#22c55e' }}>Nice housing (L2): neutral · Luxus housing (L3): +1 · Good amenities (20%+): +1</span><br/>
                            <span style={{ color: '#6b7280' }}>Small bases (12 space or less) assume staff rotation — no housing penalty.</span><br/>
                            <span style={{ color: '#ef4444' }}>Active fringe project on base: -1 per project to all departments</span><br/>
                            <span style={{ color: '#6b7280' }}>Tip: build housing, medical, and recreation early — they lift every department. Fringe research is powerful but destabilises the base.</span><br/>
                            <span style={{ color: '#c084fc' }}>Child Prodigy: +2 automatic successes on every roll for their assigned project (+ normal NPC dice bonus). Dedicated until project completion.</span>
                        </div>

                        <div style={{ marginBottom: '0.75rem' }}>
                            <span style={{ color: '#f97316', fontWeight: 'bold' }}>BASE IDENTITY</span><br/>
                            The location type affects which departments thrive. Specialised bases are powerful in their domain but hostile to outsiders.<br/>
                            <span style={{ color: '#ef4444' }}>Military Base / Black Site: each science facility gets -1 Science Ops, each engineering facility gets -1 Engineering Ops, each diplomatic facility gets -1 Diplomatic Corps. War bases aren't built for research, engineering, or negotiation.</span><br/>
                            <span style={{ color: '#22c55e' }}>R&D Installation / Observitorium: +1 Science Ops and +1 Engineering Ops baseline. But each military facility gets -1 Military. Soldiers feel unwelcome among lab coats and telescopes.</span><br/>
                            <span style={{ color: '#6b7280' }}>Other locations (Official Building, Vessel, etc.): no identity modifiers — neutral ground for all departments.</span><br/>
                            <span style={{ color: '#6b7280' }}>Tip: general-purpose bases avoid penalties but miss the specialisation bonuses. Choose your base type to match your strategy.</span>
                        </div>

                        <div>
                            <span style={{ color: '#c084fc', fontWeight: 'bold' }}>SPECIAL LOCKS</span><br/>
                            <span style={{ color: '#6b7280' }}>🔒 Nuclear Reactor — agency needs council-approved nuclear power status<br/>
                            🔒 Fringe Lab — requires Fringe Science Labs pulling string<br/>
                            🔒 Solar/Wind — not available underground or underwater<br/>
                            🔒 Geothermal — only available underground or underwater</span>
                        </div>
                    </div>
                )}

                {bases.map(base => <BaseCard key={base.id} base={base} />)}

                {bases.length === 0 && (
                    <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                        No bases established.
                    </p>
                )}
            </div>
        );
    };

Object.assign(window, { BaseNotesModule, BasesModule, BASE_ACCENT });
</script>
{% endverbatim %}
