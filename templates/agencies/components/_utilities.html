<script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // --- XP PROTESTER (shown when remaining XP < 0) ---
    const PROTEST_SIGNS = [
        "NEED MORE XP!", "UNFAIR ALLOCATION!", "WILL WORK FOR XP",
        "ON STRIKE!", "BUDGET DEFICIT!", "XP OR RIOT!",
        "MANAGEMENT FAILED US", "THIS IS EXPLOITATION",
        "WE DEMAND RAISES", "RUNNING ON FUMES",
    ];
    const XpProtester = () => {
        const sign = useMemo(() => PROTEST_SIGNS[Math.floor(Math.random() * PROTEST_SIGNS.length)], []);
        return (
            <div className="xp-protester">
                <div className="xp-protester-body">
                    <svg width="240" height="210" viewBox="-20 -2 90 54" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <g className="xp-protester-sign">
                            <line x1="25" y1="10" x2="25" y2="20" stroke="var(--accent-danger)" strokeWidth="1.5"/>
                            <rect x="-12" y="0" width="74" height="12" rx="2" fill="var(--accent-danger)" opacity="0.9"/>
                            <text x="25" y="9" textAnchor="middle" fill="var(--bg-dark)"
                                style={{ fontSize: '6px', fontFamily: 'var(--font-mono)', fontWeight: 'bold' }}>
                                {sign}
                            </text>
                        </g>
                        <circle cx="25" cy="24" r="4.5" fill="var(--text-muted)"/>
                        <line x1="25" y1="28.5" x2="25" y2="40" stroke="var(--text-muted)" strokeWidth="2.5" strokeLinecap="round"/>
                        <line x1="25" y1="31" x2="16" y2="37" stroke="var(--text-muted)" strokeWidth="2" strokeLinecap="round"/>
                        <line x1="25" y1="31" x2="34" y2="37" stroke="var(--text-muted)" strokeWidth="2" strokeLinecap="round"/>
                        <line x1="25" y1="40" x2="18" y2="52" stroke="var(--text-muted)" strokeWidth="2" strokeLinecap="round"/>
                        <line x1="25" y1="40" x2="32" y2="52" stroke="var(--text-muted)" strokeWidth="2" strokeLinecap="round"/>
                    </svg>
                </div>
            </div>
        );
    };

    // --- CSRF ---
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // --- DEFAULT AGENCY STRUCTURE ---
    const DEFAULT_AGENCY = {
        id: null,
        name: "NEW AGENCY",
        alliance: { countries: [], companies: [], organizations: [] },
        motto: "",
        headquarters: "",
        notes: "",
        integrity: 0,
        experience: 0,
        isPlayerAgency: false,
        isCouncilMember: false,
        isCouncilChairman: false,
        attributes: {
            power: { Industry: 0, Science: 0, Military: 0, Agriculture: 0 },
            finesse: { Espionage: 0, Diplomacy: 0, Logistics: 0, Trade: 0 },
            resistance: { Unity: 0, Surveillance: 0, Ethics: 0, "Counter Espionage": 0, Security: 0 }
        },
        specializations: [],
        merits: [],
        flaws: [],
        globalFlaws: [],
        ftlProjects: [],
        councilItems: [],
        assets: [],
        fleet: [],
        conditions: [],
        projects: [],
        history: [],
        bases: [],
        baseConfig: { locationTypes: [], locationMerits: [], facilityTypes: [], equipmentTypes: [] },
        assignableCharacters: [],
        assignableNpcs: [],
        fieldVisibility: {}
    };

    // --- ICON COMPONENT (debounced createIcons to avoid per-render overhead) ---
    let _iconTimer = null;
    const _refreshIcons = () => {
        if (_iconTimer) clearTimeout(_iconTimer);
        _iconTimer = setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 50);
    };
    const Icon = ({ name, size = 16, className = "" }) => {
        useEffect(() => { _refreshIcons(); }, [name]);
        return <i data-lucide={name} width={size} height={size} className={className}></i>;
    };

    // --- AUTO-SAVE INPUT (uncontrolled) ---
    // Uses defaultValue so React never touches the DOM input after mount.
    // The DOM manages typing; we just read values via onChange to update
    // the data ref and schedule a background save.
    const AutoSaveInput = ({ defaultValue, onSave, delay = 1500, component = 'input', ...props }) => {
        const timerRef = useRef(null);

        const handleChange = (e) => {
            const val = e.target.value;
            if (timerRef.current) clearTimeout(timerRef.current);
            timerRef.current = setTimeout(() => {
                onSave(val);
            }, delay);
        };

        const handleBlur = (e) => {
            if (timerRef.current) {
                clearTimeout(timerRef.current);
                timerRef.current = null;
            }
            onSave(e.target.value);
        };

        const Tag = component;
        return <Tag {...props} defaultValue={defaultValue} onChange={handleChange} onBlur={handleBlur} />;
    };

    // --- SAVE STATUS INDICATOR ---
    const SaveStatus = ({ status }) => {
        const labels = {
            saved: 'SAVED',
            saving: 'SAVING...',
            unsaved: 'UNSAVED CHANGES',
            error: 'SAVE ERROR'
        };
        return (
            <span className={'save-status ' + status}>
                {labels[status] || status}
            </span>
        );
    };

    // --- CLASSIFIED INDICATOR ---
    const Classified = () => (
        <span className="classified" title="CLASSIFIED // CLEARANCE REQUIRED"
            style={{ fontFamily: 'var(--font-mono)', fontSize: '0.9rem' }}>
            CLASSIFIED
        </span>
    );

    // ------------------------------------------------------------------
    // SECTION-SAVE CONTEXT (Phase 3 multi-player concurrency rewire)
    // ------------------------------------------------------------------
    //
    // Provider value shape:
    //   {
    //     agencyId:        number,
    //     versionsRef:     React.MutableRefObject<{[sectionKey]: number}>,
    //     baseVersionsRef: React.MutableRefObject<{[baseId]:    number}>,
    //     onConflict:      (sectionKey, currentValue, currentVersion, ctx?) => void,
    //   }
    //
    // The two refs are caches of the latest server-known section versions.
    // On every successful PATCH the hook bumps the cache entry; on a 409 the
    // cache is replaced with the server's current_version so the next save
    // attempt can succeed once the user re-blurs.
    // ------------------------------------------------------------------
    const SectionSaveContext = React.createContext(null);

    // Convenience wrapper for the CSRF token. Always reads the cookie first
    // (Django rotates it across login), falling back to the template-rendered
    // CSRF_TOKEN constant if cookies are unavailable (eg. iframe contexts).
    function getCsrfToken() {
        return getCookie('csrftoken') || (typeof CSRF_TOKEN !== 'undefined' ? CSRF_TOKEN : '');
    }

    // useSectionSave('notes') -> async (payload) => {ok, value?, version?, conflict?, currentValue?, currentVersion?, error?}
    //
    // Payload is the raw section dict the backend write_fn expects, eg.
    //   useSectionSave('notes')({ notes: 'hello' })
    //   useSectionSave('header')({ name: 'NEW NAME' })
    //   useSectionSave('admin-flags')({ isNuclearPower: true })
    //
    // The hook does NOT debounce — wrap the call in a debouncer at the call
    // site (or use AutoSaveInput which already debounces at 1.5s by default).
    function useSectionSave(sectionKey) {
        const ctx = React.useContext(SectionSaveContext);
        if (!ctx) {
            // Soft-fail: log but don't crash the tree. This makes it easier
            // to refactor incrementally — modules wired to the new hook will
            // simply no-op until the provider is mounted.
            console.error('useSectionSave called outside SectionSaveContext for', sectionKey);
            return async () => ({ ok: false, conflict: false, error: 'no provider' });
        }
        return async function saveSection(payload) {
            const expected = ctx.versionsRef.current[sectionKey];
            const headers = {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCsrfToken(),
            };
            // Only attach If-Match when we have a known version. First-time
            // writes (server has never seen this section) come through with
            // version 0; we still send 0 so the server can return 409 if a
            // concurrent first writer beat us to it.
            headers['If-Match'] = String(expected != null ? expected : 0);
            let res;
            try {
                res = await fetch(`/api/agencies/${ctx.agencyId}/section/${sectionKey}/`, {
                    method: 'PATCH',
                    credentials: 'same-origin',
                    headers: headers,
                    body: JSON.stringify(payload || {}),
                });
            } catch (err) {
                console.error('Section save network error', sectionKey, err);
                return { ok: false, conflict: false, error: String(err) };
            }
            if (res.status === 409) {
                let data = {};
                try { data = await res.json(); } catch (e) {}
                ctx.versionsRef.current[sectionKey] = data.current_version || 0;
                if (typeof ctx.onConflict === 'function') {
                    ctx.onConflict(sectionKey, data.current_value, data.current_version);
                }
                return {
                    ok: false, conflict: true,
                    currentValue: data.current_value,
                    currentVersion: data.current_version,
                };
            }
            if (!res.ok) {
                let body = '';
                try { body = await res.text(); } catch (e) {}
                console.error('Section save failed', sectionKey, res.status, body);
                return { ok: false, conflict: false, error: body || res.statusText };
            }
            let data = {};
            try { data = await res.json(); } catch (e) {}
            if (typeof data.version === 'number') {
                ctx.versionsRef.current[sectionKey] = data.version;
            }
            return { ok: true, value: data, version: data.version };
        };
    }

    // useBaseSectionSave(baseId, 'merits') -> async (payload) => {...}
    //
    // Same shape as useSectionSave but writes to
    //   /api/agencies/<id>/bases/<baseId>/section/<sectionKey>/
    // and tracks version via ctx.baseVersionsRef.current[baseId]. Note that
    // a base has one version counter shared across ALL its sections (unlike
    // the agency, which has one per section), so we key the cache by baseId
    // alone — the backend's per-base optimistic concurrency is base-wide.
    function useBaseSectionSave(baseId, sectionKey) {
        const ctx = React.useContext(SectionSaveContext);
        if (!ctx) {
            console.error('useBaseSectionSave called outside SectionSaveContext', baseId, sectionKey);
            return async () => ({ ok: false, conflict: false, error: 'no provider' });
        }
        return async function saveBaseSection(payload) {
            const expected = ctx.baseVersionsRef.current[baseId];
            const headers = {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCsrfToken(),
                'If-Match': String(expected != null ? expected : 0),
            };
            let res;
            try {
                res = await fetch(
                    `/api/agencies/${ctx.agencyId}/bases/${baseId}/section/${sectionKey}/`,
                    {
                        method: 'PATCH',
                        credentials: 'same-origin',
                        headers: headers,
                        body: JSON.stringify(payload || {}),
                    }
                );
            } catch (err) {
                console.error('Base section save network error', baseId, sectionKey, err);
                return { ok: false, conflict: false, error: String(err) };
            }
            if (res.status === 409) {
                let data = {};
                try { data = await res.json(); } catch (e) {}
                ctx.baseVersionsRef.current[baseId] = data.current_version || 0;
                if (typeof ctx.onConflict === 'function') {
                    ctx.onConflict(`base:${baseId}:${sectionKey}`, data.current_value, data.current_version);
                }
                return {
                    ok: false, conflict: true,
                    currentValue: data.current_value,
                    currentVersion: data.current_version,
                };
            }
            if (!res.ok) {
                let body = '';
                try { body = await res.text(); } catch (e) {}
                console.error('Base section save failed', baseId, sectionKey, res.status, body);
                return { ok: false, conflict: false, error: body || res.statusText };
            }
            let data = {};
            try { data = await res.json(); } catch (e) {}
            if (typeof data.version === 'number') {
                ctx.baseVersionsRef.current[baseId] = data.version;
            }
            return { ok: true, value: data, version: data.version };
        };
    }

    // --- VISIBILITY TOGGLE (admin on NPC) ---
    const VisibilityToggle = ({ field, visibility, onToggle }) => {
        if (!IS_ADMIN || IS_PLAYER_AGENCY) return null;
        const isVisible = visibility[field] !== false; // default visible
        return (
            <button
                onClick={() => onToggle(field, !isVisible)}
                title={isVisible ? 'Click to classify' : 'Click to declassify'}
                style={{
                    background: 'transparent',
                    border: 'none',
                    cursor: 'pointer',
                    color: isVisible ? 'var(--text-muted)' : 'var(--accent-danger)',
                    padding: '2px',
                    marginLeft: '4px',
                    opacity: isVisible ? 0.4 : 1,
                    transition: 'all 0.2s'
                }}
            >
                <Icon name={isVisible ? "eye" : "eye-off"} size={14} />
            </button>
        );
    };

    Object.assign(window, {
        PROTEST_SIGNS, XpProtester, getCookie, getCsrfToken, DEFAULT_AGENCY,
        Icon, _refreshIcons, AutoSaveInput, SaveStatus, Classified, VisibilityToggle,
        SectionSaveContext, useSectionSave, useBaseSectionSave,
    });
</script>
{% endverbatim %}
