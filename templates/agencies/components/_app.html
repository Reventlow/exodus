<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const {
    Icon, AutoSaveInput, SaveStatus, Classified, VisibilityToggle,
    getCookie, getCsrfToken, DEFAULT_AGENCY, XpProtester, _refreshIcons,
    SectionSaveContext, useSectionSave, useBaseSectionSave,
    useProjectActionFetch,
    AllianceModule, HeaderModule, NotesModule, IntegrityModule,
    DossiersModule, AttributesModule, GlobalFlawsDisplay, CouncilDisplay,
    DarkGrantsModule, ProjectsModule, getWorkspaceConfig, calcTotalBaseExp,
    TableModule, FTLProjectsModule, FTL_ACCENT,
    ChangeRequestPanel,
    BaseNotesModule, BasesModule, BASE_ACCENT,
    StarIntelModule,
} = window;

    // --- DICE ROLLER ---
    const DiceRoller = () => {
        const [pool, setPool] = useState(1);
        const [again, setAgain] = useState(10);
        const [results, setResults] = useState(null);

        const roll = () => {
            const newResults = [];
            let successes = 0;
            let diceToRoll = pool;

            if (diceToRoll > 50) diceToRoll = 50;
            if (diceToRoll < 1) diceToRoll = 1;

            while (diceToRoll > 0) {
                const die = Math.floor(Math.random() * 10) + 1;
                let isSuccess = die >= 8;
                let explode = die >= again;

                newResults.push({ value: die, success: isSuccess, exploded: explode });
                if (isSuccess) successes++;

                if (explode) {
                    diceToRoll++;
                    if (newResults.length > 100) break;
                }
                diceToRoll--;
            }
            setResults({ rolls: newResults, totalSuccesses: successes });
        };

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                borderTop: '2px solid var(--accent-primary)'
            }}>
                {/* Wave 3A: section header reframed as .block-head bullet/title/line. */}
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>TACTICAL DICE ROLLER</h3>
                    <span className="block-line"></span>
                </header>

                <div style={{
                    display: 'flex', gap: '1rem', alignItems: 'flex-end',
                    justifyContent: 'center', marginBottom: '1rem',
                    flexWrap: 'wrap'
                }}>
                    <div>
                        <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>POOL SIZE</label>
                        <input type="number" value={pool}
                            onChange={e => setPool(parseInt(e.target.value) || 1)}
                            style={{
                                display: 'block', width: '80px', height: '50px',
                                fontSize: '2rem', textAlign: 'center',
                                background: 'var(--bg-input)', color: 'var(--text-primary)',
                                border: '1px solid var(--accent-primary)'
                            }} />
                    </div>
                    <div>
                        <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>AGAIN</label>
                        <select value={again} onChange={e => setAgain(parseInt(e.target.value))}
                            style={{
                                display: 'block', height: '50px',
                                background: 'var(--bg-input)', color: 'var(--text-primary)',
                                border: '1px solid var(--border-color)'
                            }}>
                            <option value={10}>10-Again</option>
                            <option value={9}>9-Again</option>
                            <option value={8}>8-Again</option>
                        </select>
                    </div>
                    <button onClick={roll} style={{
                        height: '50px', padding: '0 2rem',
                        background: 'var(--accent-primary)', color: 'var(--bg-dark)',
                        border: 'none', fontWeight: 'bold', cursor: 'pointer', fontSize: '1.2rem'
                    }}>
                        EXECUTE
                    </button>
                </div>

                {results && (
                    <div className="tech-border" style={{ padding: '1rem', background: 'rgba(0,0,0,0.3)' }}>
                        <div style={{ textAlign: 'center', marginBottom: '0.5rem' }}>
                            <span className="mono-text text-muted">OUTCOME: </span>
                            <span style={{
                                fontSize: '1.5rem', fontWeight: 'bold',
                                color: results.totalSuccesses > 0 ? 'var(--accent-success)' : 'var(--text-secondary)'
                            }}>
                                {results.totalSuccesses} SUCCESSES
                            </span>
                        </div>
                        <div style={{
                            display: 'flex', flexWrap: 'wrap', gap: '4px', justifyContent: 'center'
                        }}>
                            {results.rolls.map((r, i) => (
                                <div key={i} style={{
                                    width: '24px', height: '24px',
                                    borderRadius: 0,
                                    background: r.success ? 'var(--accent-primary)' : 'var(--bg-panel)',
                                    color: r.success ? 'var(--bg-dark)' : 'var(--text-secondary)',
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    fontWeight: 'bold',
                                    border: r.exploded ? '1px solid var(--accent-warning)' : 'none'
                                }}>
                                    {r.value}
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );
    };

    // ---------------------------------------------------------------
    // Phase 3 helpers (multi-player concurrency)
    //
    // Section dispatcher: maps an `updates` blob (the legacy saveAgencyQuiet
    // shape, eg. {motto: "..."} or {merits: [...]}) onto the new per-section
    // PATCH endpoints. Returns a list of per-section payload pairs.
    //
    // Keys not covered here fall through to the legacy monolithic PUT —
    // see saveAgencyLegacy in AgencySheet. As Phase N migrates more
    // fields to dedicated endpoints, add them here.
    // ---------------------------------------------------------------
    const SECTION_FIELD_MAP = {
        // header
        name: 'header', motto: 'header', headquarters: 'header',
        // alliance
        alliance: 'alliance',
        // notes
        notes: 'notes',
        // integrity scalar (server endpoint named "integrity" but covers only the
        // integrity counter; experience is still flushed via legacy PUT)
        integrity: 'integrity',
        // attributes
        attributes: 'attributes',
        // tabular sections
        specializations: 'specializations',
        merits: 'merits',
        flaws: 'flaws',
        assets: 'assets',
        fleet: 'fleet',
        history: 'history',
        // projects — Phase 4: full-list edits go through the section
        // endpoint with If-Match. Per-project mutations (roll, fringe-
        // effect, ...) share this version slot via _with_projects_cas
        // server-side.
        projects: 'projects',
        // admin-flags (combined endpoint for misc toggles)
        mapColor: 'admin-flags',
        isNuclearPower: 'admin-flags',
        isHidden: 'admin-flags',
        sweepPool: 'admin-flags',
        zeroDayPool: 'admin-flags',
    };

    // --- MAIN APP ---
    const AgencySheet = () => {
        const [agency, setAgency] = useState(null);
        const [loading, setLoading] = useState(true);
        const [saveStatus, setSaveStatus] = useState('saved');
        // Conflict banner: { sectionKey, message } | null
        const [conflictBanner, setConflictBanner] = useState(null);
        const saveTimerRef = useRef(null);
        const agencyRef = useRef(null);

        // Phase 3 version caches. Keys here are the canonical section keys
        // shipped in the backend dispatcher (header/notes/merits/...).
        // baseVersionsRef is keyed by base.id and holds the per-base version
        // (one counter shared across all base sections — backend semantics).
        const versionsRef = useRef({});
        const baseVersionsRef = useRef({});

        // Hydrate the version caches from a freshly fetched agency payload.
        const hydrateVersions = useCallback((data) => {
            const sv = data.sectionVersions || {};
            // Replace, don't merge — the server is canonical.
            versionsRef.current = { ...sv };
            const bv = {};
            (data.bases || []).forEach(b => {
                if (b && typeof b.id === 'number' && typeof b.version === 'number') {
                    bv[b.id] = b.version;
                }
            });
            baseVersionsRef.current = bv;
        }, []);

        useEffect(() => {
            fetchAgency();
            const pollInterval = setInterval(fetchAgency, 30000);
            return () => clearInterval(pollInterval);
        }, []);

        const fetchAgency = async () => {
            try {
                const response = await fetch('/api/agencies/' + AGENCY_ID + '/');
                if (response.ok) {
                    const data = await response.json();
                    const merged = { ...DEFAULT_AGENCY, ...data };
                    // Merge attributes carefully
                    if (data.attributes && typeof data.attributes === 'object') {
                        merged.attributes = {
                            power: { ...DEFAULT_AGENCY.attributes.power, ...(data.attributes.power || {}) },
                            finesse: { ...DEFAULT_AGENCY.attributes.finesse, ...(data.attributes.finesse || {}) },
                            resistance: { ...DEFAULT_AGENCY.attributes.resistance, ...(data.attributes.resistance || {}) },
                            // Include any custom categories
                            ...Object.fromEntries(
                                Object.entries(data.attributes).filter(
                                    ([k]) => !['power', 'finesse', 'resistance'].includes(k)
                                )
                            )
                        };
                    }
                    // Hydrate the version caches BEFORE updating React state — the
                    // 30s poll could otherwise race with an in-flight save and
                    // leave the cache one bump ahead of reality.
                    hydrateVersions(data);
                    setAgency(merged);
                    agencyRef.current = merged;
                }
            } catch (err) {
                console.error('Failed to load agency:', err);
            } finally {
                setLoading(false);
            }
        };

        // Conflict handler shared by every per-section save. We refresh the
        // banner with a friendly message and update the in-memory agency
        // state so the UI re-renders with the server's canonical value.
        // AutoSaveInput is uncontrolled, so the user's typing is preserved
        // in the DOM — they can re-blur to save against the new version.
        const handleConflict = useCallback((sectionKey, currentValue) => {
            // Section-specific messages. "Adjust" verbs that match the UI
            // affordance: text-input sections ask for re-blur; button-driven
            // sections (projects, base toggles) ask for a re-click.
            let message;
            if (sectionKey === 'projects') {
                message = 'Another player just changed the projects list. The view has been refreshed — your last action was NOT applied. Click again if you still want it.';
            } else if (typeof sectionKey === 'string' && sectionKey.startsWith('base:')) {
                const tail = sectionKey.split(':').slice(2).join(':') || 'this base';
                message = `Another player just edited ${tail} on this base. The view has been refreshed — your last action was NOT applied.`;
            } else {
                const friendly = sectionKey === 'admin-flags' ? 'agency settings' : sectionKey;
                message = `Another user updated "${friendly}". The view has been refreshed — re-blur the field (or click the button again) to apply your change against the new version.`;
            }
            const myTs = Date.now();
            setConflictBanner({
                sectionKey: sectionKey,
                message: message,
                ts: myTs,
            });
            // Best-effort: try to slot the server's current_value back into
            // the agency state for top-level sections (notes, merits, ...).
            // Header / admin-flags / geo carry partial dicts so we merge.
            if (currentValue !== undefined && agencyRef.current) {
                const next = { ...agencyRef.current };
                if (sectionKey === 'header' && currentValue && typeof currentValue === 'object') {
                    Object.assign(next, currentValue);
                } else if (sectionKey === 'admin-flags' && currentValue && typeof currentValue === 'object') {
                    Object.assign(next, currentValue);
                } else if (typeof sectionKey === 'string' && !sectionKey.startsWith('base:')) {
                    next[sectionKey] = currentValue;
                }
                agencyRef.current = next;
                setAgency(next);
            }
            // Auto-clear the banner after 9s — long enough to read and
            // understand a section name like "admin-flags" or "base:7:facilities".
            // We track the timestamp so a later, distinct conflict doesn't get
            // dismissed prematurely by an earlier banner's pending timeout.
            setTimeout(() => {
                setConflictBanner(prev => (prev && prev.ts === myTs ? null : prev));
            }, 9000);
        }, []);

        const sectionContextValue = useMemo(() => ({
            agencyId: AGENCY_ID,
            versionsRef: versionsRef,
            baseVersionsRef: baseVersionsRef,
            onConflict: handleConflict,
        }), [handleConflict]);

        // Legacy monolithic PUT — kept for transitional callers (projects,
        // unmigrated legacy fields). Same code path that saveAgency had
        // before Phase 3, just renamed for clarity. New code should NOT
        // call this; use saveAgencyQuiet (auto-routes) or the section hooks.
        const saveAgencyLegacy = useCallback(async (data) => {
            setSaveStatus('saving');
            try {
                const response = await fetch('/api/agencies/' + AGENCY_ID + '/', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken(),
                    },
                    body: JSON.stringify(data),
                });
                if (response.ok) {
                    setSaveStatus('saved');
                } else {
                    setSaveStatus('error');
                }
            } catch (err) {
                setSaveStatus('error');
            }
        }, []);

        // Full update: sets state (re-renders) + ref + schedules save.
        // Use for structural changes (add/remove rows, button clicks).
        const updateAgency = (updates) => {
            if (!IS_ADMIN) return;
            const updated = { ...agencyRef.current, ...updates };
            setAgency(updated);
            agencyRef.current = updated;
            setSaveStatus('unsaved');

            if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
            saveTimerRef.current = setTimeout(() => {
                // Route through saveAgencyQuiet so the per-section endpoints
                // are used when possible; updateAgency is the structural-edit
                // path (add/remove rows, toggle checkboxes) and benefits from
                // the same routing. saveAgencyQuiet doesn't re-set state on
                // its own when called directly with a known section field.
                if (typeof saveAgencyQuietRef.current === 'function') {
                    saveAgencyQuietRef.current(updates);
                }
            }, 1000);
        };

        // ---------------------------------------------------------------
        // saveAgencyQuiet — Phase 3 transitional dispatcher.
        //
        // Splits an `updates` object into:
        //  1. recognised section fields (PATCHed per-section with If-Match)
        //  2. legacy fields like `projects` (still flushed via PUT until
        //     Phase 4 adds dedicated endpoints for them)
        //
        // Optimistic state update is preserved (sync state + ref so adds/
        // removes have current data) so callers see no behavioural change.
        // ---------------------------------------------------------------
        const quietSaveTimerRef = useRef(null);
        // Track per-section PATCH calls debounced together. We keep the
        // pending payload merged so multiple updates within the debounce
        // window collapse into one PATCH per section.
        const pendingSectionPayloads = useRef({});

        // Forward declaration to break the updateAgency -> saveAgencyQuiet
        // -> updateAgency cycle (saveAgencyQuiet is used inside updateAgency
        // and vice-versa via debounce).
        const saveAgencyQuietRef = useRef(null);

        const saveAgencyQuiet = useCallback((updates) => {
            if (!IS_ADMIN) return;
            const updated = { ...agencyRef.current, ...updates };
            agencyRef.current = updated;
            setAgency(updated);

            // Partition fields by section.
            const bySection = {};
            const legacyFields = {};
            Object.keys(updates || {}).forEach(field => {
                const sec = SECTION_FIELD_MAP[field];
                if (sec) {
                    if (!bySection[sec]) bySection[sec] = {};
                    bySection[sec][field] = updates[field];
                } else {
                    legacyFields[field] = updates[field];
                }
            });

            // Merge into pending buffer so debounced batches accumulate.
            Object.keys(bySection).forEach(sec => {
                pendingSectionPayloads.current[sec] = {
                    ...(pendingSectionPayloads.current[sec] || {}),
                    ...bySection[sec],
                };
            });

            if (quietSaveTimerRef.current) clearTimeout(quietSaveTimerRef.current);
            quietSaveTimerRef.current = setTimeout(async () => {
                // Snapshot and reset the pending buffer in one shot so any
                // saves arriving during await don't get dropped.
                const toFlush = pendingSectionPayloads.current;
                pendingSectionPayloads.current = {};
                const headers = {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken(),
                };
                let conflictHit = false;
                // Fire per-section PATCHes sequentially. They share a single
                // agency row lock on the backend, so parallel sends would
                // queue up anyway; sequential keeps the conflict banner sane.
                for (const sectionKey of Object.keys(toFlush)) {
                    const payload = toFlush[sectionKey];
                    const expected = versionsRef.current[sectionKey];
                    const reqHeaders = {
                        ...headers,
                        'If-Match': String(expected != null ? expected : 0),
                    };
                    try {
                        const res = await fetch(
                            `/api/agencies/${AGENCY_ID}/section/${sectionKey}/`,
                            { method: 'PATCH', credentials: 'same-origin', headers: reqHeaders, body: JSON.stringify(payload) }
                        );
                        if (res.status === 409) {
                            conflictHit = true;
                            const data = await res.json().catch(() => ({}));
                            versionsRef.current[sectionKey] = data.current_version || 0;
                            handleConflict(sectionKey, data.current_value, data.current_version);
                            continue;
                        }
                        if (!res.ok) {
                            console.error('Section save failed', sectionKey, res.status);
                            continue;
                        }
                        const data = await res.json().catch(() => ({}));
                        if (typeof data.version === 'number') {
                            versionsRef.current[sectionKey] = data.version;
                        }
                    } catch (err) {
                        console.error('Section save error', sectionKey, err);
                    }
                }

                // Flush remaining legacy fields via the monolithic PUT.
                // Now that `projects` has its own section endpoint
                // (Phase 4), only ad-hoc unmigrated fields like
                // `experience`, `projectRolls`, `conditions` reach this
                // branch. Once those migrate, this becomes dead code.
                //
                // We send ONLY the legacy fields (not the whole agency) so we
                // don't stomp on a concurrent edit to a different section.
                // The backend PUT shim accepts partial bodies.
                if (Object.keys(legacyFields).length > 0) {
                    try {
                        await fetch('/api/agencies/' + AGENCY_ID + '/', {
                            method: 'PUT', credentials: 'same-origin',
                            headers: headers,
                            body: JSON.stringify(legacyFields),
                        });
                    } catch (err) {
                        console.error('Legacy save error:', err);
                    }
                }

                // Re-fetch to refresh server-computed fields (dice pool,
                // sweep info, base XP totals) and to re-hydrate the version
                // cache. Skip the refetch on conflict so the user can see
                // the banner before the UI swaps under them.
                if (!conflictHit) {
                    try {
                        const fresh = await fetch('/api/agencies/' + AGENCY_ID + '/');
                        if (fresh.ok) {
                            const data = await fresh.json();
                            hydrateVersions(data);
                            agencyRef.current = data;
                            setAgency(data);
                        }
                    } catch (err) {
                        console.error('Refresh after save failed:', err);
                    }
                }
            }, 500);
        }, [handleConflict, hydrateVersions]);

        // Wire the forward-declared ref so updateAgency can call back here.
        useEffect(() => {
            saveAgencyQuietRef.current = saveAgencyQuiet;
        }, [saveAgencyQuiet]);

        // Back-compat alias: legacy code still references saveAgency. Now
        // routes through the same dispatcher; intentionally not exposed to
        // child modules going forward — they should use the section hooks.
        const saveAgency = saveAgencyLegacy;

        const toggleVisibility = async (field, visible) => {
            try {
                const res = await fetch(`/api/agencies/${AGENCY_ID}/visibility/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ field, visible }),
                });
                if (res.ok) {
                    const result = await res.json();
                    const updated = {
                        ...agencyRef.current,
                        fieldVisibility: {
                            ...(agencyRef.current.fieldVisibility || {}),
                            [field]: result.visible
                        }
                    };
                    setAgency(updated);
                    agencyRef.current = updated;
                }
            } catch (err) {
                console.error('Failed to toggle visibility:', err);
            }
        };

        if (loading) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-accent" style={{ animation: 'pulse 1.5s infinite' }}>
                        DECRYPTING AGENCY RECORD...
                    </h2>
                </div>
            );
        }

        if (!agency) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-danger">ERROR: RECORD NOT FOUND</h2>
                </div>
            );
        }

        const vis = agency.fieldVisibility || {};

        return (
            <SectionSaveContext.Provider value={sectionContextValue}>
            <div className="fade-in">
                {/* Conflict banner — fixed-position toast at top-right.
                    Stays visible regardless of where the user is scrolled
                    in the long agency sheet. Auto-clears after ~9s. */}
                {conflictBanner && (
                    <div
                        key={conflictBanner.ts}
                        role="status"
                        aria-live="polite"
                        style={{
                        position: 'fixed',
                        top: '1rem',
                        right: '1rem',
                        maxWidth: 'min(420px, calc(100vw - 2rem))',
                        zIndex: 9999,
                        padding: '0.75rem 1rem',
                        borderRadius: 0,
                        background: 'rgba(234, 179, 8, 0.95)',
                        border: '1px solid #b45309',
                        color: '#1c1917',
                        fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                        display: 'flex', gap: '0.75rem', alignItems: 'flex-start',
                        boxShadow: '0 8px 24px rgba(0, 0, 0, 0.4)',
                        animation: 'conflictBannerIn 0.2s ease-out',
                    }}>
                        <span style={{ flex: 1, lineHeight: 1.4 }}>
                            <strong style={{ display: 'block', marginBottom: '0.2rem', letterSpacing: '0.05em' }}>
                                ⚠ EDIT CONFLICT
                            </strong>
                            {conflictBanner.message}
                        </span>
                        <button
                            onClick={() => setConflictBanner(null)}
                            aria-label="Dismiss"
                            style={{
                                background: 'transparent', border: 'none', color: 'inherit',
                                cursor: 'pointer', fontFamily: 'inherit', fontSize: '1.1rem',
                                padding: '0 0.25rem', flexShrink: 0,
                            }}
                        >×</button>
                    </div>
                )}
                <style>{`
                    @keyframes conflictBannerIn {
                        from { opacity: 0; transform: translateX(20px); }
                        to   { opacity: 1; transform: translateX(0); }
                    }
                `}</style>
                {/* Sub-header with save status */}
                <div style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    marginBottom: '1rem', paddingBottom: '0.5rem',
                    borderBottom: '1px solid var(--border-color)'
                }}>
                    <h2 className="mono-text text-accent" style={{ fontSize: '1.2rem' }}>
                        AGENCY RECORD
                        {!IS_ADMIN && !IS_PLAYER_AGENCY && (
                            <span className="text-muted" style={{ fontSize: '0.8rem', marginLeft: '1rem' }}>
                                READ ONLY
                            </span>
                        )}
                    </h2>
                    <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                        {IS_ADMIN && <SaveStatus status={saveStatus} />}
                        <a href="/agencies/"
                            className="mono-text"
                            style={{
                                background: 'transparent', border: '1px solid var(--accent-primary)',
                                color: 'var(--accent-primary)', padding: '0.5rem 1rem',
                                cursor: 'pointer', textDecoration: 'none', fontSize: '0.9rem'
                            }}>
                            &lt; CLOSE RECORD
                        </a>
                    </div>
                </div>

                <HeaderModule agency={agency}
                    onSave={saveAgencyQuiet}
                    visibility={vis} onToggleVis={toggleVisibility} />

                <AllianceModule
                    alliance={agency.alliance}
                    agencyRef={agencyRef}
                    update={val => updateAgency({ alliance: val })}
                    onSave={val => saveAgencyQuiet({ alliance: val })}
                    visibility={vis} onToggleVis={toggleVisibility} />

                <NotesModule notes={agency.notes}
                    onSave={saveAgencyQuiet}
                    visibility={vis} onToggleVis={toggleVisibility} />

                <IntegrityModule agency={agency} update={updateAgency}
                    fetchAgency={fetchAgency}
                    visibility={vis} onToggleVis={toggleVisibility} />

                <DossiersModule dossiers={agency.linkedDossiers} />

                <AttributesModule
                    attributes={agency.attributes}
                    update={attrs => updateAgency({ attributes: attrs })}
                    visibility={vis} onToggleVis={toggleVisibility} />

                <DiceRoller />

                <TableModule
                    title="SPECIALIZATIONS" field="specializations"
                    items={agency.specializations}
                    columns={[
                        { key: 'name', label: 'NAME', width: '1fr' },
                        { key: 'relatedSkill', label: 'RELATED SKILL', width: '1fr' },
                        { key: 'effect', label: 'EFFECT', width: '2fr' },
                    ]}
                    emptyItem={{ name: '', relatedSkill: '', effect: '' }}
                    update={val => updateAgency({ specializations: val })}
                    onSave={val => saveAgencyQuiet({ specializations: val })}
                    getFreshItems={() => agencyRef.current.specializations || []}
                    visibility={vis} onToggleVis={toggleVisibility}
                />

                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))',
                    gap: '1rem'
                }}>
                    <TableModule
                        title="MERITS" field="merits"
                        items={agency.merits}
                        columns={[
                            { key: 'name', label: 'NAME', width: 'minmax(120px, 1.5fr)' },
                            { key: 'value', label: 'VALUE', width: '60px', type: 'number' },
                            { key: 'description', label: 'DESCRIPTION', width: 'minmax(120px, 2fr)' },
                        ]}
                        emptyItem={{ name: '', value: 0, description: '' }}
                        update={val => updateAgency({ merits: val })}
                        onSave={val => saveAgencyQuiet({ merits: val })}
                        getFreshItems={() => agencyRef.current.merits || []}
                        visibility={vis} onToggleVis={toggleVisibility}
                    />
                    <div>
                        <TableModule
                            title="FLAWS" field="flaws"
                            items={agency.flaws}
                            columns={[
                                { key: 'name', label: 'NAME', width: 'minmax(120px, 1.5fr)' },
                                { key: 'value', label: 'VALUE', width: '60px', type: 'number' },
                                { key: 'description', label: 'DESCRIPTION', width: 'minmax(120px, 2fr)' },
                            ]}
                            emptyItem={{ name: '', value: 0, description: '' }}
                            update={val => updateAgency({ flaws: val })}
                            onSave={val => saveAgencyQuiet({ flaws: val })}
                            getFreshItems={() => agencyRef.current.flaws || []}
                            visibility={vis} onToggleVis={toggleVisibility}
                        />
                        <GlobalFlawsDisplay globalFlaws={agency.globalFlaws} />
                    </div>
                </div>

                <TableModule
                    title="ASSETS" field="assets"
                    items={agency.assets}
                    columns={[
                        { key: 'name', label: 'NAME', width: '1fr' },
                        { key: 'type', label: 'TYPE', width: '1fr' },
                        { key: 'status', label: 'STATUS', width: '1fr' },
                        { key: 'notes', label: 'NOTES', width: '2fr' },
                    ]}
                    emptyItem={{ name: '', type: '', status: '', notes: '' }}
                    update={val => updateAgency({ assets: val })}
                    onSave={val => saveAgencyQuiet({ assets: val })}
                    getFreshItems={() => agencyRef.current.assets || []}
                    visibility={vis} onToggleVis={toggleVisibility}
                />

                {/*
                  Legacy fleet table removed in v0.13.6. Fleet data now
                  lives in the dedicated /starships/ page (StarshipClass
                  + Starship + Fleet tables). The Agency.fleet JSON
                  field is still populated for backwards compatibility
                  but no longer rendered or editable from the sheet.
                */}
                <div style={{
                    border: '1px solid var(--border-color)',
                    borderRadius: 0,
                    padding: '0.75rem 1rem',
                    marginBottom: '1rem'
                }}>
                    <div className="mono-text" style={{
                        color: 'var(--accent-primary)',
                        fontSize: '0.75rem',
                        letterSpacing: '1px',
                        marginBottom: '0.4rem'
                    }}>FLEET</div>
                    <div className="mono-text" style={{
                        color: 'var(--text-muted)',
                        fontSize: '0.75rem',
                        marginBottom: '0.5rem'
                    }}>
                        Fleet management has moved to the dedicated Starships page.
                        Use it to design classes, commission hulls, and organise fleets.
                    </div>
                    <a href="/starships/" className="mono-text" style={{
                        display: 'inline-block',
                        background: 'var(--accent-primary)',
                        color: 'var(--bg-dark)',
                        padding: '0.35rem 0.8rem',
                        fontSize: '0.7rem',
                        fontWeight: 'bold',
                        letterSpacing: '1px',
                        textDecoration: 'none'
                    }}>OPEN STARSHIPS</a>
                </div>

                <BasesModule
                    bases={agency.bases}
                    baseConfig={agency.baseConfig}
                    baseConfigLookup={agency.baseConfigLookup}
                    isNuclearPower={agency.isNuclearPower}
                    agencyId={AGENCY_ID}
                    assignableCharacters={agency.assignableCharacters || []}
                    assignableNpcs={agency.assignableNpcs || []}
                    visibility={vis}
                    onToggleVis={toggleVisibility}
                    classifiedBases={agency.classifiedBases}
                    onBasesChange={(newBases) => {
                        const updated = { ...agencyRef.current, bases: newBases };
                        setAgency(updated);
                        agencyRef.current = updated;
                    }}
                />


                {/* Cyber Conditions - structured conditions from deploy actions */}
                {agency.conditions_cyber && agency.conditions_cyber.length > 0 && (
                    <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                        {/* Wave 3A: block-head with sweep pool badge in trailing slot. */}
                        <header className="block-head" style={{ marginBottom: '0.5rem' }}>
                            <span className="block-bullet">■</span>
                            <h3>CYBER CONDITIONS</h3>
                            <span className="block-line"></span>
                            <span className={`status-pill ${agency.sweepPool > 0 ? 's-active' : 's-burned'}`}>
                                SWEEP {agency.sweepPool || 0}
                            </span>
                            {IS_ADMIN && (
                                <button onClick={() => {
                                    const input = prompt('Set agency Sweep & Clear pool:');
                                    if (input === null) return;
                                    const pool = parseInt(input);
                                    if (isNaN(pool)) return;
                                    saveAgencyQuiet({ sweepPool: pool });
                                }} className="btn-cyber" style={{ fontSize: '0.65rem', padding: '0.15rem 0.5rem', marginLeft: '0.25rem' }}>
                                    SET
                                </button>
                            )}
                        </header>
                        {agency.sweepInfo && (
                            <div className="tech-border" style={{ padding: '0.75rem', marginBottom: '0.75rem', background: 'rgba(0,0,0,0.2)' }}>
                                <div className="mono-text text-muted" style={{ fontSize: '0.7rem', marginBottom: '0.25rem' }}>
                                    SWEEP ROLL: <span style={{ color: 'var(--accent-primary)' }}>{agency.sweepInfo.parts.join(' + ')} = {agency.sweepInfo.pool} dice</span>
                                </div>
                                {agency.sweepInfo.merits && agency.sweepInfo.merits.length > 0 && (
                                    <div className="mono-text text-muted" style={{ fontSize: '0.65rem' }}>
                                        Active merits: {agency.sweepInfo.merits.join(', ')}
                                    </div>
                                )}
                                {(agency.sweepInfo.npcName || agency.sweepInfo.characterName) && (
                                    <div className="mono-text text-muted" style={{ fontSize: '0.65rem' }}>
                                        Best roller: {agency.sweepInfo.npcName || agency.sweepInfo.characterName}
                                    </div>
                                )}
                            </div>
                        )}
                        {agency.conditions_cyber.map(c => (
                            <div key={c.id} className="tech-border" style={{
                                padding: '1rem', marginBottom: '0.5rem',
                                background: 'rgba(170,51,51,0.05)',
                                borderColor: 'var(--accent-danger, #c0392b)',
                            }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                    <span className="mono-text" style={{ color: 'var(--accent-danger, #c0392b)', fontSize: '0.85rem', fontWeight: 'bold' }}>
                                        {c.typeDisplay}
                                    </span>
                                    <span className="mono-text text-muted" style={{ fontSize: '0.7rem' }}>
                                        Difficulty {c.difficulty}
                                    </span>
                                </div>
                                <div className="text-secondary" style={{ fontSize: '0.8rem', marginBottom: '0.75rem' }}>
                                    {c.description}
                                </div>
                                <div style={{ marginBottom: '0.5rem' }}>
                                    <div className="mono-text text-muted" style={{ fontSize: '0.7rem', marginBottom: '0.25rem' }}>
                                        SWEEP &amp; CLEAR: {c.sweepProgress} / {c.difficulty}
                                    </div>
                                    <div style={{ display: 'flex', gap: '2px' }}>
                                        {Array.from({ length: c.difficulty }, (_, i) => (
                                            <div key={i} style={{
                                                flex: 1, height: 8, borderRadius: 0,
                                                background: i < c.sweepProgress ? 'var(--accent-success, #2ecc71)' : 'rgba(255,255,255,0.1)',
                                                border: '1px solid var(--border-color)',
                                            }} />
                                        ))}
                                    </div>
                                </div>
                                <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                                    {agency.sweepPool > 0 && (
                                        <button onClick={() => {
                                            fetch(`/api/agencies/${AGENCY_ID}/conditions/${c.id}/sweep/`, {
                                                method: 'POST',
                                                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
                                            }).then(r => r.json()).then(data => {
                                                if (data.error) { alert(data.error); return; }
                                                if (data.cleared) {
                                                    alert(`Condition cleared! ${data.successes} successes.`);
                                                } else {
                                                    alert(`Sweep: ${data.successes} successes. Progress: ${data.sweepProgress}/${data.difficulty}. Pool: ${data.sweepPoolRemaining}`);
                                                }
                                                fetchAgency();
                                            });
                                        }} className="btn-cyber" style={{ fontSize: '0.75rem', padding: '0.3rem 0.75rem' }}>
                                            SWEEP &amp; CLEAR
                                        </button>
                                    )}
                                    {agency.sweepPool <= 0 && !IS_ADMIN && (
                                        <span className="mono-text text-muted" style={{ fontSize: '0.7rem' }}>No sweep pool — awaiting GM allocation</span>
                                    )}
                                    {IS_ADMIN && (
                                        <button onClick={() => {
                                            if (!confirm('Clear this condition?')) return;
                                            fetch(`/api/agencies/${AGENCY_ID}/conditions/${c.id}/`, {
                                                method: 'PUT',
                                                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
                                                body: JSON.stringify({ isActive: false }),
                                            }).then(() => fetchAgency());
                                        }} style={{
                                            background: 'transparent', border: '1px solid var(--accent-danger, #c0392b)',
                                            color: 'var(--accent-danger, #c0392b)', fontSize: '0.75rem',
                                            padding: '0.3rem 0.75rem', cursor: 'pointer', fontFamily: 'var(--font-mono)',
                                        }}>
                                            REMOVE
                                        </button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                )}

                <ProjectsModule
                    items={agency.projects}
                    characters={agency.assignableCharacters || []}
                    bases={agency.bases || []}
                    npcs={agency.assignableNpcs || []}
                    agencyAttributes={agency.attributes}
                    projectRolls={agency.projectRolls || {}}
                    currentCharName={agency.projectRolls && agency.projectRolls.charName ? agency.projectRolls.charName : ''}
                    fetchAgency={fetchAgency}
                    onSave={val => saveAgencyQuiet({ projects: val })}
                    visibility={vis} onToggleVis={toggleVisibility}
                />

                <DarkGrantsModule agency={agency} fetchAgency={fetchAgency} />

                <FTLProjectsModule
                    ftlProjects={agency.ftlProjects}
                    agencyId={AGENCY_ID}
                    characters={agency.assignableCharacters || []}
                    bases={agency.bases || []}
                    npcs={agency.assignableNpcs || []}
                    projectRolls={agency.projectRolls || {}}
                    fetchAgency={fetchAgency}
                />

                <StarIntelModule
                    observatories={agency.observatories || []}
                    scanGrant={agency.scanGrant || 0}
                    starScans={agency.starScans || []}
                    publicRecord={agency.publicRecord || []}
                    publishedSystemIds={agency.publishedSystemIds || []}
                    agencyId={AGENCY_ID}
                    fetchAgency={fetchAgency}
                />

                <TableModule
                    title="HISTORY" field="history"
                    items={agency.history}
                    columns={[
                        { key: 'year', label: 'YEAR', width: '80px' },
                        { key: 'decision', label: 'DECISION', width: '2fr', type: 'textarea' },
                        { key: 'consequence', label: 'CONSEQUENCE', width: '2fr', type: 'textarea' },
                    ]}
                    emptyItem={{ year: '', decision: '', consequence: '' }}
                    update={val => updateAgency({ history: val })}
                    onSave={val => saveAgencyQuiet({ history: val })}
                    getFreshItems={() => agencyRef.current.history || []}
                    visibility={vis} onToggleVis={toggleVisibility}
                />

                <CouncilDisplay
                    councilItems={agency.councilItems}
                    isCouncilMember={agency.isCouncilMember}
                    isCouncilChairman={agency.isCouncilChairman}
                    onToggleMembership={(checked) => {
                        updateAgency({ isCouncilMember: checked });
                        if (!checked) updateAgency({ isCouncilChairman: false });
                    }}
                />

                {/* Change Request Panel — only for player agency */}
                {IS_PLAYER_AGENCY && (
                    <ChangeRequestPanel agencyId={AGENCY_ID} />
                )}
            </div>
            </SectionSaveContext.Provider>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<AgencySheet />);
</script>
{% endverbatim %}
