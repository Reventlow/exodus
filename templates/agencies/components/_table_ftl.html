<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const { Icon, AutoSaveInput, Classified, VisibilityToggle, getCookie } = window;

    const TableModule = ({ title, field, items, columns, update, onSave, visibility, onToggleVis, emptyItem, getFreshItems }) => {
        const isClassified = items === 'CLASSIFIED';

        if (isClassified && !IS_ADMIN) return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                {/* Wave 3A: classified table placeholder uses block-head pattern. */}
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>{title}</h3>
                    <span className="block-line"></span>
                </header>
                <Classified />
            </div>
        );

        const actualItems = Array.isArray(items) ? items : [];

        const addItem = () => {
            document.activeElement?.blur();
            const fresh = getFreshItems ? getFreshItems() : actualItems;
            update([...fresh, { ...emptyItem }]);
        };

        const removeItem = (idx) => {
            document.activeElement?.blur();
            const fresh = getFreshItems ? getFreshItems() : actualItems;
            update(fresh.filter((_, i) => i !== idx));
        };

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                {/* Wave 3A: TableModule heading uses block-head; row-count badge if any. */}
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>{title}</h3>
                    <span className="block-line"></span>
                    {actualItems.length > 0 && (
                        <span className="block-badge">{actualItems.length}</span>
                    )}
                    <VisibilityToggle field={field} visibility={visibility} onToggle={onToggleVis} />
                    {IS_ADMIN && (
                        <button onClick={addItem} title="Add Row" style={{
                            background: 'transparent', border: '1px solid var(--accent-primary)',
                            color: 'var(--accent-primary)', width: '24px', height: '24px',
                            borderRadius: 0, cursor: 'pointer',
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                            marginLeft: '0.25rem',
                        }}>
                            <Icon name="plus" size={14} />
                        </button>
                    )}
                </header>

                {/* Column headers */}
                {actualItems.length > 0 && (
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: columns.map(c => c.width || '1fr').join(' ') + (IS_ADMIN ? ' 30px' : ''),
                        gap: '0.5rem', marginBottom: '0.5rem', padding: '0 0.5rem'
                    }}>
                        {columns.map(col => (
                            <span key={col.key} className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>
                                {col.label}
                            </span>
                        ))}
                    </div>
                )}

                {actualItems.map((item, idx) => (
                    <div key={idx} className="tech-border" style={{
                        display: 'grid',
                        gridTemplateColumns: columns.map(c => c.width || '1fr').join(' ') + (IS_ADMIN ? ' 30px' : ''),
                        gap: '0.5rem', padding: '0.5rem', marginBottom: '0.25rem',
                        background: 'rgba(0,0,0,0.2)', alignItems: 'start'
                    }}>
                        {columns.map(col => {
                            if (col.type === 'boolean') {
                                const isFringe = col.key === 'fringe';
                                const canToggle = isFringe ? IS_SCIENCE : IS_ADMIN;
                                return (
                                    <div key={col.key} style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        {isFringe ? (
                                            <button onClick={() => {
                                                if (!canToggle || item.fringe) return;
                                                var activeFringe = actualItems.filter(function(it) { return it.fringe && !it.discarded; }).length;
                                                var maxSlots = 99;
                                                try { if (typeof agency !== 'undefined' && agency && agency.fringeInfo) maxSlots = agency.fringeInfo.maxSlots; } catch(e) {}
                                                if (activeFringe >= maxSlots) { alert('No fringe slots available (' + activeFringe + '/' + maxSlots + ')'); return; }
                                                if (!confirm('Mark as Fringe Science? This cannot be undone.')) return;
                                                var updated = actualItems.map(function(it, i) { return i === idx ? Object.assign({}, it, {fringe: true}) : it; });
                                                onSave(updated);
                                            }} disabled={!canToggle || item.fringe}
                                            title={item.fringe ? 'Fringe Science (permanent)' : 'Mark as Fringe Science'}
                                            style={{
                                                background: 'transparent', border: 'none', cursor: (canToggle && !item.fringe) ? 'pointer' : 'default',
                                                fontSize: '1.2rem', opacity: item.fringe ? 1 : 0.2, filter: item.fringe ? 'none' : 'grayscale(1)',
                                            }}>🖐</button>
                                        ) : (
                                            <input type="checkbox" checked={!!item[col.key]}
                                                onChange={e => {
                                                    const updated = actualItems.map((it, i) =>
                                                        i === idx ? { ...it, [col.key]: e.target.checked } : it
                                                    );
                                                    onSave(updated);
                                                }}
                                                disabled={!IS_ADMIN}
                                                style={{ accentColor: 'var(--accent-primary)' }}
                                            />
                                        )}
                                    </div>
                                );
                            }
                            const isNotes = col.key === 'notes' || col.type === 'textarea';
                            return (
                                <AutoSaveInput
                                    key={col.key}
                                    type={col.type || 'text'}
                                    component={isNotes ? 'textarea' : 'input'}
                                    placeholder={col.label}
                                    defaultValue={item[col.key] || (col.type === 'number' ? 0 : '')}
                                    onSave={val => {
                                        const parsed = col.type === 'number' ? (parseInt(val) || 0) : val;
                                        const updated = actualItems.map((it, i) =>
                                            i === idx ? { ...it, [col.key]: parsed } : it
                                        );
                                        onSave(updated);
                                    }}
                                    disabled={!IS_ADMIN}
                                    style={{
                                        background: 'transparent', border: 'none',
                                        borderBottom: '1px solid var(--border-color)',
                                        color: 'var(--text-primary)', width: '100%',
                                        fontSize: '0.85rem',
                                        ...(isNotes ? { minHeight: '2.5rem', resize: 'vertical', fontFamily: 'inherit' } : {}),
                                    }}
                                />
                            );
                        })}
                        {IS_ADMIN && (
                            <button onClick={() => removeItem(idx)} style={{
                                background: 'transparent', border: 'none',
                                color: 'var(--accent-danger)', cursor: 'pointer'
                            }}>
                                <Icon name="x" size={14} />
                            </button>
                        )}
                    </div>
                ))}

                {actualItems.length === 0 && (
                    <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                        No data recorded.
                    </p>
                )}
            </div>
        );
    };

    // --- FTL PROJECTS MODULE (per-agency assignments with progress tracking) ---
    const FTL_ACCENT = '#3b82f6';

    const FTLProjectsModule = ({ ftlProjects, agencyId, characters, bases, npcs, projectRolls, fetchAgency }) => {
        const [projects, setProjects] = useState(ftlProjects || []);
        const [showAssign, setShowAssign] = useState(false);
        const [allFTL, setAllFTL] = useState([]);
        const [loadingFTL, setLoadingFTL] = useState(false);
        const [openPanels, setOpenPanels] = useState({});
        const [armedMerits, setArmedMerits] = useState({});
        const [lastRolls, setLastRolls] = useState({});
        const [rollLogData, setRollLogData] = useState(null);
        const [rollLogLoading, setRollLogLoading] = useState(false);

        var fetchRollLog = function(assignmentId) {
            setRollLogLoading(true);
            fetch('/api/agencies/' + agencyId + '/ftl/' + assignmentId + '/roll-log/')
                .then(function(r) { return r.json(); })
                .then(function(data) { setRollLogData({ assignmentId: assignmentId, logs: data }); })
                .catch(function(e) { console.error('Failed to fetch roll log:', e); })
                .finally(function() { setRollLogLoading(false); });
        };

        var togglePanel = function(key) {
            var next = {};
            for (var k in openPanels) next[k] = openPanels[k];
            next[key] = !next[key];
            setOpenPanels(next);
        };

        var CHAR_ATTRS = [
            {path: ['power','mental'], label: 'Intelligence'},
            {path: ['power','physical'], label: 'Strength'},
            {path: ['power','social'], label: 'Presence'},
            {path: ['finesse','mental'], label: 'Wits'},
            {path: ['finesse','physical'], label: 'Dexterity'},
            {path: ['finesse','social'], label: 'Manipulation'},
            {path: ['resistance','mental'], label: 'Resolve'},
            {path: ['resistance','physical'], label: 'Stamina'},
            {path: ['resistance','social'], label: 'Composure'},
        ];
        var SKILLS = [
            {cat: 'mental', names: ['Academics','Computer','Crafts','Investigation','Medicine','Occult','Politics','Science']},
            {cat: 'physical', names: ['Athletics','Brawl','Drive','Firearms','Larceny','Stealth','Survival','Weaponry']},
            {cat: 'social', names: ['AnimalKen','Empathy','Expression','Intimidation','Persuasion','Socialize','Streetwise','Subterfuge']},
        ];
        var pathKey = function(p) { return p[0] + '.' + p[1]; };

        // Keep in sync when parent re-renders with new data
        useEffect(() => {
            setProjects(ftlProjects || []);
        }, [ftlProjects]);

        const fetchAllFTL = async () => {
            setLoadingFTL(true);
            try {
                const res = await fetch('/api/ftl-projects/');
                if (res.ok) setAllFTL(await res.json());
            } catch (err) {
                console.error('Failed to fetch FTL projects:', err);
            }
            setLoadingFTL(false);
        };

        const openAssign = () => {
            fetchAllFTL();
            setShowAssign(true);
        };

        const assignProject = async (ftlProjectId) => {
            try {
                const res = await fetch(`/api/agencies/${agencyId}/ftl/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ ftlProjectId }),
                });
                if (res.ok) {
                    const newAssignment = await res.json();
                    setProjects(prev => [...prev, newAssignment]);
                    setShowAssign(false);
                }
            } catch (err) {
                console.error('Failed to assign FTL project:', err);
            }
        };

        const unassignProject = async (assignmentId) => {
            try {
                const res = await fetch(`/api/agencies/${agencyId}/ftl/${assignmentId}/`, {
                    method: 'DELETE',
                    headers: { 'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN },
                });
                if (res.ok) {
                    setProjects(prev => prev.filter(p => p.assignmentId !== assignmentId));
                }
            } catch (err) {
                console.error('Failed to unassign FTL project:', err);
            }
        };

        const updateSuccesses = async (assignmentId, delta) => {
            const proj = projects.find(p => p.assignmentId === assignmentId);
            if (!proj) return;
            const newVal = Math.max(0, proj.currentSuccesses + delta);
            try {
                const res = await fetch(`/api/agencies/${agencyId}/ftl/${assignmentId}/`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ currentSuccesses: newVal }),
                });
                if (res.ok) {
                    const updated = await res.json();
                    setProjects(prev => prev.map(p =>
                        p.assignmentId === assignmentId
                            ? { ...p, currentSuccesses: updated.currentSuccesses }
                            : p
                    ));
                }
            } catch (err) {
                console.error('Failed to update successes:', err);
            }
        };

        // Unassigned projects for the dropdown
        const assignedIds = projects.map(p => p.id);
        const unassigned = allFTL.filter(fp => !assignedIds.includes(fp.id));

        const activeFtlCount = projects.length;
        return (<React.Fragment>
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                borderLeft: `3px solid ${FTL_ACCENT}`,
            }}>
                {/* Wave 3A: FTL PROJECTS block-head with assigned-count badge + assign button. */}
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>FTL PROJECTS</h3>
                    <span className="block-line"></span>
                    {activeFtlCount > 0 && (
                        <span className="block-badge">{activeFtlCount} ASSIGNED</span>
                    )}
                    {IS_ADMIN && (
                        <button onClick={openAssign} style={{
                            background: 'transparent', border: `1px solid ${FTL_ACCENT}`,
                            color: FTL_ACCENT, padding: '4px 12px',
                            cursor: 'pointer', fontFamily: 'var(--font-mono)', fontSize: '0.75rem',
                            borderRadius: 0, marginLeft: '0.25rem',
                        }}>
                            ASSIGN FTL PROJECT
                        </button>
                    )}
                </header>

                {/* Assign dropdown */}
                {showAssign && IS_ADMIN && (
                    <div className="tech-border" style={{
                        padding: '0.75rem', marginBottom: '1rem',
                        background: 'rgba(59, 130, 246, 0.05)',
                    }}>
                        {loadingFTL ? (
                            <span className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>
                                Loading available projects...
                            </span>
                        ) : unassigned.length === 0 ? (
                            <div>
                                <span className="text-muted mono-text" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                                    All FTL projects are already assigned.
                                </span>
                                <button onClick={() => setShowAssign(false)} style={{
                                    background: 'transparent', border: '1px solid var(--border-color)',
                                    color: 'var(--text-muted)', padding: '3px 10px', cursor: 'pointer',
                                    marginLeft: '0.5rem', fontSize: '0.75rem',
                                }}>CLOSE</button>
                            </div>
                        ) : (
                            <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center', flexWrap: 'wrap' }}>
                                <select
                                    id="ftl-assign-select"
                                    style={{
                                        background: 'var(--bg-input, #1a1a2e)',
                                        border: '1px solid var(--border-color)',
                                        color: 'var(--text-primary)',
                                        padding: '0.3rem 0.5rem',
                                        fontFamily: 'var(--font-mono)',
                                        fontSize: '0.8rem',
                                        flex: 1,
                                        minWidth: '200px',
                                    }}
                                >
                                    {unassigned.map(fp => (
                                        <option key={fp.id} value={fp.id}>{fp.name}</option>
                                    ))}
                                </select>
                                <button
                                    onClick={() => {
                                        const sel = document.getElementById('ftl-assign-select');
                                        if (sel && sel.value) assignProject(parseInt(sel.value));
                                    }}
                                    style={{
                                        background: FTL_ACCENT, border: 'none',
                                        color: 'var(--bg-dark)', padding: '4px 12px',
                                        cursor: 'pointer', fontFamily: 'var(--font-mono)',
                                        fontSize: '0.8rem', fontWeight: 'bold',
                                        borderRadius: 0,
                                    }}
                                >ASSIGN</button>
                                <button onClick={() => setShowAssign(false)} style={{
                                    background: 'transparent', border: '1px solid var(--border-color)',
                                    color: 'var(--text-muted)', padding: '4px 12px', cursor: 'pointer',
                                    fontSize: '0.8rem',
                                }}>CANCEL</button>
                            </div>
                        )}
                    </div>
                )}

                {/* Project cards */}
                {projects.length === 0 && (
                    <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                        No FTL projects assigned.
                    </p>
                )}

                {projects.map(proj => {
                    const pct = proj.requiredSuccesses > 0
                        ? Math.min(100, Math.round((proj.currentSuccesses / proj.requiredSuccesses) * 100))
                        : 0;
                    const isComplete = proj.currentSuccesses >= proj.requiredSuccesses;

                    return (
                        <div key={proj.assignmentId} className="tech-border" style={{
                            padding: '1rem', marginBottom: '0.5rem',
                            background: isComplete
                                ? 'rgba(59, 130, 246, 0.08)'
                                : 'rgba(0,0,0,0.2)',
                        }}>
                            {/* Header row */}
                            <div style={{
                                display: 'flex', justifyContent: 'space-between',
                                alignItems: 'flex-start', marginBottom: '0.5rem',
                            }}>
                                <div>
                                    <span className="mono-text" style={{
                                        color: FTL_ACCENT, fontSize: '0.95rem', fontWeight: 'bold',
                                    }}>
                                        {proj.name}
                                    </span>
                                    {isComplete && (
                                        /* Wave 3A: COMPLETE -> status-pill active. */
                                        <span className="status-pill s-active" style={{ marginLeft: '0.5rem' }}>COMPLETE</span>
                                    )}
                                </div>
                                {IS_ADMIN && (
                                    <button
                                        onClick={() => unassignProject(proj.assignmentId)}
                                        title="Unassign FTL project"
                                        style={{
                                            background: 'transparent', border: 'none',
                                            color: 'var(--accent-danger)', cursor: 'pointer',
                                            padding: '2px',
                                        }}
                                    >
                                        <Icon name="x" size={16} />
                                    </button>
                                )}
                            </div>

                            {/* Description */}
                            {proj.description && (
                                <p style={{
                                    color: 'var(--text-secondary)', fontSize: '0.85rem',
                                    marginBottom: '0.5rem',
                                }}>
                                    {proj.description}
                                </p>
                            )}

                            {/* Pros and Cons */}
                            <div style={{
                                display: 'grid', gridTemplateColumns: '1fr 1fr',
                                gap: '0.75rem', marginBottom: '0.75rem',
                            }}>
                                {proj.pros && proj.pros.length > 0 && (
                                    <div>
                                        <span className="mono-text" style={{
                                            fontSize: '0.7rem', color: 'var(--accent-primary)',
                                        }}>PROS</span>
                                        <ul style={{
                                            margin: '0.25rem 0 0 0', paddingLeft: '1rem',
                                            fontSize: '0.8rem', color: 'var(--text-secondary)',
                                        }}>
                                            {proj.pros.map((p, i) => (
                                                <li key={i} style={{ marginBottom: '0.15rem' }}>{p.text}</li>
                                            ))}
                                        </ul>
                                    </div>
                                )}
                                {proj.cons && proj.cons.length > 0 && (
                                    <div>
                                        <span className="mono-text" style={{
                                            fontSize: '0.7rem', color: 'var(--accent-danger)',
                                        }}>CONS</span>
                                        <ul style={{
                                            margin: '0.25rem 0 0 0', paddingLeft: '1rem',
                                            fontSize: '0.8rem', color: 'var(--text-secondary)',
                                        }}>
                                            {proj.cons.map((c, i) => (
                                                <li key={i} style={{ marginBottom: '0.15rem' }}>{c.text}</li>
                                            ))}
                                        </ul>
                                    </div>
                                )}
                            </div>

                            {/* Progress bar + counter */}
                            <div style={{ marginTop: '0.5rem' }}>
                                <div style={{
                                    display: 'flex', justifyContent: 'space-between',
                                    alignItems: 'center', marginBottom: '0.25rem',
                                }}>
                                    <span className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>
                                        PROGRESS
                                    </span>
                                    <span className="mono-text" style={{
                                        fontSize: '0.8rem', color: FTL_ACCENT,
                                    }}>
                                        {proj.currentSuccesses} / {proj.requiredSuccesses}
                                    </span>
                                </div>
                                {/* Progress bar */}
                                <div style={{
                                    width: '100%', height: '8px',
                                    background: 'rgba(255,255,255,0.05)',
                                    borderRadius: 0, overflow: 'hidden',
                                    border: '1px solid var(--border-color)',
                                }}>
                                    <div style={{
                                        width: `${pct}%`, height: '100%',
                                        background: isComplete
                                            ? 'var(--accent-primary)'
                                            : FTL_ACCENT,
                                        transition: 'width 0.3s ease',
                                    }} />
                                </div>
                                {/* Add/remove successes (admin only) */}
                                {IS_ADMIN && (
                                    <div style={{
                                        display: 'flex', gap: '0.5rem',
                                        alignItems: 'center', justifyContent: 'center',
                                        marginTop: '0.5rem',
                                    }}>
                                        <button
                                            onClick={() => {
                                                const input = document.getElementById(`ftl-delta-${proj.assignmentId}`);
                                                const val = parseInt(input?.value) || 1;
                                                updateSuccesses(proj.assignmentId, -val);
                                            }}
                                            disabled={proj.currentSuccesses <= 0}
                                            title="Remove successes"
                                            style={{
                                                background: 'transparent',
                                                border: '1px solid var(--border-color)',
                                                color: 'var(--text-primary)',
                                                padding: '4px 10px',
                                                cursor: proj.currentSuccesses <= 0 ? 'not-allowed' : 'pointer',
                                                fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                borderRadius: 0,
                                                opacity: proj.currentSuccesses <= 0 ? 0.3 : 1,
                                            }}
                                        >−</button>
                                        <input
                                            id={`ftl-delta-${proj.assignmentId}`}
                                            type="number"
                                            defaultValue={1}
                                            min={1}
                                            style={{
                                                width: '50px', textAlign: 'center',
                                                background: 'var(--bg-input)',
                                                border: '1px solid var(--border-color)',
                                                color: 'var(--text-primary)',
                                                padding: '4px',
                                                fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                borderRadius: 0,
                                            }}
                                        />
                                        <button
                                            onClick={() => {
                                                const input = document.getElementById(`ftl-delta-${proj.assignmentId}`);
                                                const val = parseInt(input?.value) || 1;
                                                updateSuccesses(proj.assignmentId, val);
                                            }}
                                            title="Add successes"
                                            style={{
                                                background: 'rgba(59, 130, 246, 0.15)',
                                                border: `1px solid ${FTL_ACCENT}`,
                                                color: FTL_ACCENT,
                                                padding: '4px 10px',
                                                cursor: 'pointer',
                                                fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                borderRadius: 0,
                                            }}
                                        >+</button>
                                    </div>
                                )}
                            </div>

                            {/* Player & Base assignment (admin) */}
                            {IS_ADMIN && (
                                <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', marginTop: '0.75rem', paddingTop: '0.5rem', borderTop: '1px solid var(--border-color)' }}>
                                    <div style={{ minWidth: '130px' }}>
                                        <div className="text-muted mono-text" style={{ fontSize: '0.65rem', marginBottom: '0.15rem' }}>PLAYER</div>
                                        <select value={proj.player || ''} onChange={function(e) {
                                            fetch('/api/agencies/' + agencyId + '/ftl/' + proj.assignmentId + '/meta/', {
                                                method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN },
                                                body: JSON.stringify({ player: e.target.value }),
                                            }).then(function() { if (fetchAgency) fetchAgency(); });
                                        }} style={{ background: 'var(--bg-input, #1a1a2e)', border: 'none', borderBottom: '1px solid var(--border-color)', color: 'var(--text-primary)', width: '100%', fontSize: '0.8rem', fontFamily: 'var(--font-mono)', padding: '0.2rem 0' }}>
                                            <option value="">Unassigned</option>
                                            {(characters || []).map(function(c) { return <option key={c.id} value={c.name}>{c.name}</option>; })}
                                        </select>
                                    </div>
                                    <div style={{ minWidth: '130px' }}>
                                        <div className="text-muted mono-text" style={{ fontSize: '0.65rem', marginBottom: '0.15rem' }}>BASE</div>
                                        <select value={proj.baseId || ''} onChange={function(e) {
                                            var sel = e.target.value;
                                            var bName = '';
                                            if (sel) { var found = (bases || []).filter(function(b) { return String(b.id) === sel; }); if (found.length) bName = found[0].name; }
                                            fetch('/api/agencies/' + agencyId + '/ftl/' + proj.assignmentId + '/meta/', {
                                                method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN },

                                                </div>
                                            </div>
                                        );
                                    })() : null}
                                    </div>
                                );
                            })() : null}
                            {/* Roll log button */}
                            <button onClick={function() { fetchRollLog(p.assignmentId); }}
                                className="mono-text"
                                style={{
                                    marginTop: '0.5rem', background: 'transparent',
                                    border: '1px solid var(--border-color)', color: 'var(--text-muted)',
                                    padding: '0.3rem 0.75rem', cursor: 'pointer',
                                    fontSize: '0.7rem', fontFamily: 'var(--font-mono)',
                                    letterSpacing: '1px',
                                }}>
                                ROLL LOG
                            </button>
                        </div>
                    );
                })}
            </div>

            {/* Roll log modal */}
            {rollLogData && (
                <div style={{
                    position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                    background: 'rgba(0,0,0,0.85)', display: 'flex',
                    alignItems: 'center', justifyContent: 'center', zIndex: 1000,
                }} onClick={function() { setRollLogData(null); }}>
                    <div className="glass-panel" style={{
                        padding: '1.5rem', maxWidth: '600px', width: '95%',
                        maxHeight: '80vh', overflowY: 'auto',
                    }} onClick={function(e) { e.stopPropagation(); }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem' }}>
                            <h3 className="mono-text text-accent" style={{ fontSize: '1rem', margin: 0 }}>ROLL LOG</h3>
                            <button onClick={function() { setRollLogData(null); }} className="mono-text"
                                style={{ background: 'transparent', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '1.2rem' }}>&times;</button>
                        </div>
                        {rollLogData.logs.length === 0 ? (
                            <p className="mono-text text-muted" style={{ textAlign: 'center', padding: '2rem 0', fontStyle: 'italic' }}>No rolls recorded yet.</p>
                        ) : rollLogData.logs.map(function(log) {
                            var diceSuccesses = log.successes - (log.autoSuccesses || 0);
                            return (
                                <div key={log.id} style={{
                                    padding: '0.75rem', marginBottom: '0.5rem',
                                    background: 'rgba(0,0,0,0.3)', borderRadius: 0,
                                    border: '1px solid var(--border-color)',
                                }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.4rem' }}>
                                        <span className="mono-text text-accent" style={{ fontSize: '0.8rem' }}>
                                            {log.characterName}
                                        </span>
                                        <span className="mono-text text-muted" style={{ fontSize: '0.65rem' }}>
                                            {new Date(log.rolledAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}
                                        </span>
                                    </div>
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '3px', marginBottom: '0.35rem' }}>
                                        {(log.rolls || []).map(function(die, i) {
                                            var isSuccess = die >= 8;
                                            return React.createElement('span', { key: i, className: 'mono-text', style: {
                                                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                                                width: '22px', height: '22px', borderRadius: 0,
                                                background: isSuccess ? 'rgba(34,197,94,0.2)' : 'rgba(0,0,0,0.3)',
                                                border: '1px solid ' + (isSuccess ? '#22c55e' : 'var(--border-color)'),
                                                color: isSuccess ? '#22c55e' : 'var(--text-muted)',
                                                fontSize: '0.7rem', fontWeight: isSuccess ? 'bold' : 'normal',
                                            }}, die);
                                        })}
                                    </div>
                                    <div className="mono-text" style={{ fontSize: '0.7rem', fontWeight: 'bold', color: log.successes > 0 ? '#22c55e' : '#ef4444' }}>
                                        {diceSuccesses} {diceSuccesses === 1 ? 'SUCCESS' : 'SUCCESSES'}
                                        {log.autoSuccesses > 0 ? ' + ' + log.autoSuccesses + ' AUTO' + (log.autoMerit ? ' (' + log.autoMerit + ')' : '') : ''}
                                        {log.autoSuccesses > 0 ? ' = ' + log.successes + ' TOTAL' : ''}
                                        {log.successes >= 5 ? ' — EXCEPTIONAL!' : ''}
                                    </div>
                                    <div className="mono-text" style={{ fontSize: '0.6rem', color: 'var(--text-muted)', marginTop: '0.2rem' }}>
                                        {log.rollType === 'spare' ? 'Spare time' : 'Free'} · {log.pool} dice · Progress: {log.oldScore} → {log.newScore}
                                        {log.mentalDamage ? ' · +1 ML' : ''}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            )}
        </React.Fragment>);
    };

// Export to global scope
Object.assign(window, { TableModule, FTLProjectsModule, FTL_ACCENT });
</script>
