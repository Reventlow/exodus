<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const { Icon, AutoSaveInput, Classified, VisibilityToggle, getCookie } = window;

    const TableModule = ({ title, field, items, columns, update, onSave, visibility, onToggleVis, emptyItem, getFreshItems }) => {
        const isClassified = items === 'CLASSIFIED';

        if (isClassified && !IS_ADMIN) return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{ marginBottom: '1rem' }}>
                    {title}
                </h3>
                <Classified />
            </div>
        );

        const actualItems = Array.isArray(items) ? items : [];

        const addItem = () => {
            document.activeElement?.blur();
            const fresh = getFreshItems ? getFreshItems() : actualItems;
            update([...fresh, { ...emptyItem }]);
        };

        const removeItem = (idx) => {
            document.activeElement?.blur();
            const fresh = getFreshItems ? getFreshItems() : actualItems;
            update(fresh.filter((_, i) => i !== idx));
        };

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem',
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                }}>
                    <span>
                        {title}
                        <VisibilityToggle field={field} visibility={visibility} onToggle={onToggleVis} />
                    </span>
                    {IS_ADMIN && (
                        <button onClick={addItem} title="Add Row" style={{
                            background: 'transparent', border: '1px solid var(--accent-primary)',
                            color: 'var(--accent-primary)', width: '24px', height: '24px',
                            borderRadius: '4px', cursor: 'pointer',
                            display: 'flex', alignItems: 'center', justifyContent: 'center'
                        }}>
                            <Icon name="plus" size={14} />
                        </button>
                    )}
                </h3>

                {/* Column headers */}
                {actualItems.length > 0 && (
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: columns.map(c => c.width || '1fr').join(' ') + (IS_ADMIN ? ' 30px' : ''),
                        gap: '0.5rem', marginBottom: '0.5rem', padding: '0 0.5rem'
                    }}>
                        {columns.map(col => (
                            <span key={col.key} className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>
                                {col.label}
                            </span>
                        ))}
                    </div>
                )}

                {actualItems.map((item, idx) => (
                    <div key={idx} className="tech-border" style={{
                        display: 'grid',
                        gridTemplateColumns: columns.map(c => c.width || '1fr').join(' ') + (IS_ADMIN ? ' 30px' : ''),
                        gap: '0.5rem', padding: '0.5rem', marginBottom: '0.25rem',
                        background: 'rgba(0,0,0,0.2)', alignItems: 'start'
                    }}>
                        {columns.map(col => {
                            if (col.type === 'boolean') {
                                const isFringe = col.key === 'fringe';
                                const canToggle = isFringe ? IS_SCIENCE : IS_ADMIN;
                                return (
                                    <div key={col.key} style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        {isFringe ? (
                                            <button onClick={() => {
                                                if (!canToggle || item.fringe) return;
                                                var activeFringe = actualItems.filter(function(it) { return it.fringe && !it.discarded; }).length;
                                                var maxSlots = 99;
                                                try { if (typeof agency !== 'undefined' && agency && agency.fringeInfo) maxSlots = agency.fringeInfo.maxSlots; } catch(e) {}
                                                if (activeFringe >= maxSlots) { alert('No fringe slots available (' + activeFringe + '/' + maxSlots + ')'); return; }
                                                if (!confirm('Mark as Fringe Science? This cannot be undone.')) return;
                                                var updated = actualItems.map(function(it, i) { return i === idx ? Object.assign({}, it, {fringe: true}) : it; });
                                                onSave(updated);
                                            }} disabled={!canToggle || item.fringe}
                                            title={item.fringe ? 'Fringe Science (permanent)' : 'Mark as Fringe Science'}
                                            style={{
                                                background: 'transparent', border: 'none', cursor: (canToggle && !item.fringe) ? 'pointer' : 'default',
                                                fontSize: '1.2rem', opacity: item.fringe ? 1 : 0.2, filter: item.fringe ? 'none' : 'grayscale(1)',
                                            }}>🖐</button>
                                        ) : (
                                            <input type="checkbox" checked={!!item[col.key]}
                                                onChange={e => {
                                                    const updated = actualItems.map((it, i) =>
                                                        i === idx ? { ...it, [col.key]: e.target.checked } : it
                                                    );
                                                    onSave(updated);
                                                }}
                                                disabled={!IS_ADMIN}
                                                style={{ accentColor: 'var(--accent-primary)' }}
                                            />
                                        )}
                                    </div>
                                );
                            }
                            const isNotes = col.key === 'notes' || col.type === 'textarea';
                            return (
                                <AutoSaveInput
                                    key={col.key}
                                    type={col.type || 'text'}
                                    component={isNotes ? 'textarea' : 'input'}
                                    placeholder={col.label}
                                    defaultValue={item[col.key] || (col.type === 'number' ? 0 : '')}
                                    onSave={val => {
                                        const parsed = col.type === 'number' ? (parseInt(val) || 0) : val;
                                        const updated = actualItems.map((it, i) =>
                                            i === idx ? { ...it, [col.key]: parsed } : it
                                        );
                                        onSave(updated);
                                    }}
                                    disabled={!IS_ADMIN}
                                    style={{
                                        background: 'transparent', border: 'none',
                                        borderBottom: '1px solid var(--border-color)',
                                        color: 'var(--text-primary)', width: '100%',
                                        fontSize: '0.85rem',
                                        ...(isNotes ? { minHeight: '2.5rem', resize: 'vertical', fontFamily: 'inherit' } : {}),
                                    }}
                                />
                            );
                        })}
                        {IS_ADMIN && (
                            <button onClick={() => removeItem(idx)} style={{
                                background: 'transparent', border: 'none',
                                color: 'var(--accent-danger)', cursor: 'pointer'
                            }}>
                                <Icon name="x" size={14} />
                            </button>
                        )}
                    </div>
                ))}

                {actualItems.length === 0 && (
                    <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                        No data recorded.
                    </p>
                )}
            </div>
        );
    };

    // --- FTL PROJECTS MODULE (per-agency assignments with progress tracking) ---
    const FTL_ACCENT = '#3b82f6';

    const FTLProjectsModule = ({ ftlProjects, agencyId }) => {
        const [projects, setProjects] = useState(ftlProjects || []);
        const [showAssign, setShowAssign] = useState(false);
        const [allFTL, setAllFTL] = useState([]);
        const [loadingFTL, setLoadingFTL] = useState(false);

        // Keep in sync when parent re-renders with new data
        useEffect(() => {
            setProjects(ftlProjects || []);
        }, [ftlProjects]);

        const fetchAllFTL = async () => {
            setLoadingFTL(true);
            try {
                const res = await fetch('/api/ftl-projects/');
                if (res.ok) setAllFTL(await res.json());
            } catch (err) {
                console.error('Failed to fetch FTL projects:', err);
            }
            setLoadingFTL(false);
        };

        const openAssign = () => {
            fetchAllFTL();
            setShowAssign(true);
        };

        const assignProject = async (ftlProjectId) => {
            try {
                const res = await fetch(`/api/agencies/${agencyId}/ftl/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ ftlProjectId }),
                });
                if (res.ok) {
                    const newAssignment = await res.json();
                    setProjects(prev => [...prev, newAssignment]);
                    setShowAssign(false);
                }
            } catch (err) {
                console.error('Failed to assign FTL project:', err);
            }
        };

        const unassignProject = async (assignmentId) => {
            try {
                const res = await fetch(`/api/agencies/${agencyId}/ftl/${assignmentId}/`, {
                    method: 'DELETE',
                    headers: { 'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN },
                });
                if (res.ok) {
                    setProjects(prev => prev.filter(p => p.assignmentId !== assignmentId));
                }
            } catch (err) {
                console.error('Failed to unassign FTL project:', err);
            }
        };

        const updateSuccesses = async (assignmentId, delta) => {
            const proj = projects.find(p => p.assignmentId === assignmentId);
            if (!proj) return;
            const newVal = Math.max(0, proj.currentSuccesses + delta);
            try {
                const res = await fetch(`/api/agencies/${agencyId}/ftl/${assignmentId}/`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ currentSuccesses: newVal }),
                });
                if (res.ok) {
                    const updated = await res.json();
                    setProjects(prev => prev.map(p =>
                        p.assignmentId === assignmentId
                            ? { ...p, currentSuccesses: updated.currentSuccesses }
                            : p
                    ));
                }
            } catch (err) {
                console.error('Failed to update successes:', err);
            }
        };

        // Unassigned projects for the dropdown
        const assignedIds = projects.map(p => p.id);
        const unassigned = allFTL.filter(fp => !assignedIds.includes(fp.id));

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                borderLeft: `3px solid ${FTL_ACCENT}`,
            }}>
                <h3 className="mono-text" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem',
                    color: FTL_ACCENT, fontSize: '0.95rem',
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                }}>
                    <span>
                        FTL PROJECTS
                        <span className="text-muted" style={{ fontSize: '0.7rem', marginLeft: '0.5rem' }}>
                            (FASTER THAN LIGHT RESEARCH)
                        </span>
                    </span>
                    {IS_ADMIN && (
                        <button onClick={openAssign} style={{
                            background: 'transparent', border: `1px solid ${FTL_ACCENT}`,
                            color: FTL_ACCENT, padding: '4px 12px',
                            cursor: 'pointer', fontFamily: 'var(--font-mono)', fontSize: '0.75rem',
                            borderRadius: 'var(--radius-sm)',
                        }}>
                            ASSIGN FTL PROJECT
                        </button>
                    )}
                </h3>

                {/* Assign dropdown */}
                {showAssign && IS_ADMIN && (
                    <div className="tech-border" style={{
                        padding: '0.75rem', marginBottom: '1rem',
                        background: 'rgba(59, 130, 246, 0.05)',
                    }}>
                        {loadingFTL ? (
                            <span className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>
                                Loading available projects...
                            </span>
                        ) : unassigned.length === 0 ? (
                            <div>
                                <span className="text-muted mono-text" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                                    All FTL projects are already assigned.
                                </span>
                                <button onClick={() => setShowAssign(false)} style={{
                                    background: 'transparent', border: '1px solid var(--border-color)',
                                    color: 'var(--text-muted)', padding: '3px 10px', cursor: 'pointer',
                                    marginLeft: '0.5rem', fontSize: '0.75rem',
                                }}>CLOSE</button>
                            </div>
                        ) : (
                            <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center', flexWrap: 'wrap' }}>
                                <select
                                    id="ftl-assign-select"
                                    style={{
                                        background: 'var(--bg-input, #1a1a2e)',
                                        border: '1px solid var(--border-color)',
                                        color: 'var(--text-primary)',
                                        padding: '0.3rem 0.5rem',
                                        fontFamily: 'var(--font-mono)',
                                        fontSize: '0.8rem',
                                        flex: 1,
                                        minWidth: '200px',
                                    }}
                                >
                                    {unassigned.map(fp => (
                                        <option key={fp.id} value={fp.id}>{fp.name}</option>
                                    ))}
                                </select>
                                <button
                                    onClick={() => {
                                        const sel = document.getElementById('ftl-assign-select');
                                        if (sel && sel.value) assignProject(parseInt(sel.value));
                                    }}
                                    style={{
                                        background: FTL_ACCENT, border: 'none',
                                        color: 'var(--bg-dark)', padding: '4px 12px',
                                        cursor: 'pointer', fontFamily: 'var(--font-mono)',
                                        fontSize: '0.8rem', fontWeight: 'bold',
                                        borderRadius: 'var(--radius-sm)',
                                    }}
                                >ASSIGN</button>
                                <button onClick={() => setShowAssign(false)} style={{
                                    background: 'transparent', border: '1px solid var(--border-color)',
                                    color: 'var(--text-muted)', padding: '4px 12px', cursor: 'pointer',
                                    fontSize: '0.8rem',
                                }}>CANCEL</button>
                            </div>
                        )}
                    </div>
                )}

                {/* Project cards */}
                {projects.length === 0 && (
                    <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                        No FTL projects assigned.
                    </p>
                )}

                {projects.map(proj => {
                    const pct = proj.requiredSuccesses > 0
                        ? Math.min(100, Math.round((proj.currentSuccesses / proj.requiredSuccesses) * 100))
                        : 0;
                    const isComplete = proj.currentSuccesses >= proj.requiredSuccesses;

                    return (
                        <div key={proj.assignmentId} className="tech-border" style={{
                            padding: '1rem', marginBottom: '0.5rem',
                            background: isComplete
                                ? 'rgba(59, 130, 246, 0.08)'
                                : 'rgba(0,0,0,0.2)',
                        }}>
                            {/* Header row */}
                            <div style={{
                                display: 'flex', justifyContent: 'space-between',
                                alignItems: 'flex-start', marginBottom: '0.5rem',
                            }}>
                                <div>
                                    <span className="mono-text" style={{
                                        color: FTL_ACCENT, fontSize: '0.95rem', fontWeight: 'bold',
                                    }}>
                                        {proj.name}
                                    </span>
                                    {isComplete && (
                                        <span className="mono-text" style={{
                                            fontSize: '0.7rem', padding: '2px 6px',
                                            border: `1px solid ${FTL_ACCENT}`,
                                            color: FTL_ACCENT, marginLeft: '0.5rem',
                                        }}>COMPLETE</span>
                                    )}
                                </div>
                                {IS_ADMIN && (
                                    <button
                                        onClick={() => unassignProject(proj.assignmentId)}
                                        title="Unassign FTL project"
                                        style={{
                                            background: 'transparent', border: 'none',
                                            color: 'var(--accent-danger)', cursor: 'pointer',
                                            padding: '2px',
                                        }}
                                    >
                                        <Icon name="x" size={16} />
                                    </button>
                                )}
                            </div>

                            {/* Description */}
                            {proj.description && (
                                <p style={{
                                    color: 'var(--text-secondary)', fontSize: '0.85rem',
                                    marginBottom: '0.5rem',
                                }}>
                                    {proj.description}
                                </p>
                            )}

                            {/* Pros and Cons */}
                            <div style={{
                                display: 'grid', gridTemplateColumns: '1fr 1fr',
                                gap: '0.75rem', marginBottom: '0.75rem',
                            }}>
                                {proj.pros && proj.pros.length > 0 && (
                                    <div>
                                        <span className="mono-text" style={{
                                            fontSize: '0.7rem', color: 'var(--accent-primary)',
                                        }}>PROS</span>
                                        <ul style={{
                                            margin: '0.25rem 0 0 0', paddingLeft: '1rem',
                                            fontSize: '0.8rem', color: 'var(--text-secondary)',
                                        }}>
                                            {proj.pros.map((p, i) => (
                                                <li key={i} style={{ marginBottom: '0.15rem' }}>{p.text}</li>
                                            ))}
                                        </ul>
                                    </div>
                                )}
                                {proj.cons && proj.cons.length > 0 && (
                                    <div>
                                        <span className="mono-text" style={{
                                            fontSize: '0.7rem', color: 'var(--accent-danger)',
                                        }}>CONS</span>
                                        <ul style={{
                                            margin: '0.25rem 0 0 0', paddingLeft: '1rem',
                                            fontSize: '0.8rem', color: 'var(--text-secondary)',
                                        }}>
                                            {proj.cons.map((c, i) => (
                                                <li key={i} style={{ marginBottom: '0.15rem' }}>{c.text}</li>
                                            ))}
                                        </ul>
                                    </div>
                                )}
                            </div>

                            {/* Progress bar + counter */}
                            <div style={{ marginTop: '0.5rem' }}>
                                <div style={{
                                    display: 'flex', justifyContent: 'space-between',
                                    alignItems: 'center', marginBottom: '0.25rem',
                                }}>
                                    <span className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>
                                        PROGRESS
                                    </span>
                                    <span className="mono-text" style={{
                                        fontSize: '0.8rem', color: FTL_ACCENT,
                                    }}>
                                        {proj.currentSuccesses} / {proj.requiredSuccesses}
                                    </span>
                                </div>
                                {/* Progress bar */}
                                <div style={{
                                    width: '100%', height: '8px',
                                    background: 'rgba(255,255,255,0.05)',
                                    borderRadius: '4px', overflow: 'hidden',
                                    border: '1px solid var(--border-color)',
                                }}>
                                    <div style={{
                                        width: `${pct}%`, height: '100%',
                                        background: isComplete
                                            ? 'var(--accent-primary)'
                                            : FTL_ACCENT,
                                        transition: 'width 0.3s ease',
                                    }} />
                                </div>
                                {/* Add/remove successes (admin only) */}
                                {IS_ADMIN && (
                                    <div style={{
                                        display: 'flex', gap: '0.5rem',
                                        alignItems: 'center', justifyContent: 'center',
                                        marginTop: '0.5rem',
                                    }}>
                                        <button
                                            onClick={() => {
                                                const input = document.getElementById(`ftl-delta-${proj.assignmentId}`);
                                                const val = parseInt(input?.value) || 1;
                                                updateSuccesses(proj.assignmentId, -val);
                                            }}
                                            disabled={proj.currentSuccesses <= 0}
                                            title="Remove successes"
                                            style={{
                                                background: 'transparent',
                                                border: '1px solid var(--border-color)',
                                                color: 'var(--text-primary)',
                                                padding: '4px 10px',
                                                cursor: proj.currentSuccesses <= 0 ? 'not-allowed' : 'pointer',
                                                fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                borderRadius: 'var(--radius-sm)',
                                                opacity: proj.currentSuccesses <= 0 ? 0.3 : 1,
                                            }}
                                        >−</button>
                                        <input
                                            id={`ftl-delta-${proj.assignmentId}`}
                                            type="number"
                                            defaultValue={1}
                                            min={1}
                                            style={{
                                                width: '50px', textAlign: 'center',
                                                background: 'var(--bg-input)',
                                                border: '1px solid var(--border-color)',
                                                color: 'var(--text-primary)',
                                                padding: '4px',
                                                fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                borderRadius: 'var(--radius-sm)',
                                            }}
                                        />
                                        <button
                                            onClick={() => {
                                                const input = document.getElementById(`ftl-delta-${proj.assignmentId}`);
                                                const val = parseInt(input?.value) || 1;
                                                updateSuccesses(proj.assignmentId, val);
                                            }}
                                            title="Add successes"
                                            style={{
                                                background: 'rgba(59, 130, 246, 0.15)',
                                                border: `1px solid ${FTL_ACCENT}`,
                                                color: FTL_ACCENT,
                                                padding: '4px 10px',
                                                cursor: 'pointer',
                                                fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                borderRadius: 'var(--radius-sm)',
                                            }}
                                        >+</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                })}
            </div>
        );
    };

// Export to global scope
Object.assign(window, { TableModule, FTLProjectsModule, FTL_ACCENT });
</script>
{% endverbatim %}
