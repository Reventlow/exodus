<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const { Icon, AutoSaveInput, Classified, VisibilityToggle, getCookie, useProjectActionFetch } = window;

    const DarkGrantsModule = ({ agency, fetchAgency }) => {
        // Per-project endpoints share the ``projects`` section version
        // slot — useProjectActionFetch attaches If-Match and routes 409
        // through the standard conflict handler. Called unconditionally
        // at the top so the hook order matches across renders even when
        // the early-return guards below trigger.
        var projectFetch = useProjectActionFetch();
        if (!IS_SCIENCE) return null;
        var projects = agency.projects;
        if (!Array.isArray(projects)) return null;
        var fringeProjects = projects.filter(function(p) { return p && p.fringe && !p.discarded; });
        if (fringeProjects.length === 0) return null;

        var fringeInfo = agency.fringeInfo;
        var rulesState = React.useState(false);
        var showRules = rulesState[0];
        var setShowRules = rulesState[1];
        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                {/* Wave 3A: FRINGE SCIENCE block-head with slot badge + rules toggle. */}
                <header className="block-head" style={{ marginBottom: '1rem' }}>
                    <span className="block-bullet">■</span>
                    <h3>🖐 FRINGE SCIENCE</h3>
                    <span className="block-line"></span>
                    {fringeInfo ? (
                        <span className="block-badge">{fringeInfo.usedSlots}/{fringeInfo.maxSlots} SLOTS</span>
                    ) : null}
                    <button onClick={function() { setShowRules(!showRules); }} style={{
                        background: 'transparent', border: '1px solid #8a2be2', borderRadius: 0,
                        color: showRules ? '#c084fc' : '#6b21a8', cursor: 'pointer',
                        fontFamily: 'var(--font-mono)', fontSize: '0.65rem', padding: '0.15rem 0.5rem',
                        marginLeft: '0.25rem',
                    }}>RULES</button>
                </header>
                {showRules ? (
                    <div style={{ marginBottom: '1rem', padding: '0.75rem', border: '1px solid rgba(138,43,226,0.3)', background: 'rgba(138,43,226,0.04)', borderRadius: 0 }}>
                        <div className="mono-text" style={{ fontSize: '0.75rem', color: '#c084fc', marginBottom: '0.5rem', fontWeight: 'bold' }}>FRINGE SCIENCE MANUAL</div>
                        <div style={{ fontSize: '0.65rem', marginBottom: '0.5rem', display: 'flex', gap: '1rem' }}>
                            <span className="mono-text" style={{ color: '#c084fc', border: '1px solid #c084fc', padding: '0.15rem 0.4rem', borderRadius: 0 }}>PERMANENT</span>
                            <span style={{ color: 'var(--text-muted)' }}>= added to all rolls forever</span>
                            <span className="mono-text" style={{ color: '#e879f9', border: '1px solid #e879f9', padding: '0.15rem 0.4rem', borderRadius: 0 }}>PER ROLL</span>
                            <span style={{ color: 'var(--text-muted)' }}>= next roll only, then consumed (re-activatable)</span>
                        </div>
                        <div style={{ fontSize: '0.7rem', lineHeight: '1.6', color: 'var(--text-secondary)' }}>
                            <div style={{ marginBottom: '0.6rem', borderBottom: '1px solid rgba(138,43,226,0.15)', paddingBottom: '0.4rem' }}>
                                <span style={{ color: '#c084fc', fontWeight: 'bold' }}>FRINGE PROJECTS</span><br/>
                                Science class can mark any project as fringe (permanent). Max fringe slots = your Science skill score.
                                Discarded or completed projects free up slots. Only science class and GM can see fringe status.
                            </div>
                            <div style={{ marginBottom: '0.6rem', borderBottom: '1px solid rgba(138,43,226,0.15)', paddingBottom: '0.4rem' }}>
                                <span style={{ color: '#c084fc', fontWeight: 'bold' }}>DARK GRANTS</span> <span className="mono-text" style={{ fontSize: '0.55rem', color: '#c084fc', border: '1px solid #c084fc', padding: '0.1rem 0.3rem', borderRadius: 0 }}>PERMANENT</span> — Requires "Dark Grants" pulling string (cost 4)<br/>
                                Choose level 1-3. Permanently adds +level dice to all completion rolls.
                                Risk: d100 per level — chance of linking an NPC agency to the project.
                            </div>
                            <div style={{ marginBottom: '0.6rem', borderBottom: '1px solid rgba(138,43,226,0.15)', paddingBottom: '0.4rem' }}>
                                <span style={{ color: '#d97706', fontWeight: 'bold' }}>LIVE TESTING</span> <span className="mono-text" style={{ fontSize: '0.55rem', color: '#c084fc', border: '1px solid #c084fc', padding: '0.1rem 0.3rem', borderRadius: 0 }}>PERMANENT</span> — Choose subject type<br/>
                                Small Animals (+1, 5% ML) | Large Animals (+2, 9% ML) | Human (+5, 23% ML, 17% integrity) | Off the Books (+5, 23% ML, requires merit).
                            </div>
                            <div style={{ marginBottom: '0.6rem', borderBottom: '1px solid rgba(138,43,226,0.15)', paddingBottom: '0.4rem' }}>
                                <span style={{ color: '#3b82f6', fontWeight: 'bold' }}>STIMULANT COCKTAILS</span> <span className="mono-text" style={{ fontSize: '0.55rem', color: '#e879f9', border: '1px solid #e879f9', padding: '0.1rem 0.3rem', borderRadius: 0 }}>PER ROLL</span> — Select one or more substances<br/>
                                Cocaine (+2, 15%) | LSD (+3, 20%) | Shrooms (+2, 10%) | Exotic Venom (+4, 25%).
                                Stacking: +10% risk per additional substance. Side effects hidden from project owner.
                                Consumed after rolling. Re-activatable for next roll.
                            </div>
                            <div style={{ marginBottom: '0.6rem', borderBottom: '1px solid rgba(138,43,226,0.15)', paddingBottom: '0.4rem' }}>
                                <span style={{ color: '#2dd4bf', fontWeight: 'bold' }}>BLACK MARKET TECH</span> <span className="mono-text" style={{ fontSize: '0.55rem', color: '#c084fc', border: '1px solid #c084fc', padding: '0.1rem 0.3rem', borderRadius: 0 }}>PERMANENT</span> — +2 dice, 15% tracker risk<br/>
                                Acquired tech may come with a tracker. If detected, an NPC agency is linked to the project.
                            </div>
                            <div style={{ marginBottom: '0.6rem', borderBottom: '1px solid rgba(138,43,226,0.15)', paddingBottom: '0.4rem' }}>
                                <span style={{ color: '#4ade80', fontWeight: 'bold' }}>GENE MANIPULATION</span> <span className="mono-text" style={{ fontSize: '0.55rem', color: '#c084fc', border: '1px solid #c084fc', padding: '0.1rem 0.3rem', borderRadius: 0 }}>PERMANENT</span> — +3 dice, 18% containment breach<br/>
                                Experimental genetic modification. If breach occurs, GM determines narrative consequences.
                            </div>
                            <div style={{ marginBottom: '0.6rem', borderBottom: '1px solid rgba(138,43,226,0.15)', paddingBottom: '0.4rem' }}>
                                <span style={{ color: '#c084fc', fontWeight: 'bold' }}>NEURAL INTERFACE</span> <span className="mono-text" style={{ fontSize: '0.55rem', color: '#e879f9', border: '1px solid #e879f9', padding: '0.1rem 0.3rem', borderRadius: 0 }}>PER ROLL</span> — +4 dice, 30% ML+2, 5% permanent -1 mental attr<br/>
                                Direct neural link. 30% chance of +2 mental load, 5% chance of permanently reducing a random mental attribute.
                                Consumed after rolling. Re-activatable for next roll (risks re-apply each time).
                            </div>
                            <div style={{ marginBottom: '0.6rem', borderBottom: '1px solid rgba(138,43,226,0.15)', paddingBottom: '0.4rem' }}>
                                <span style={{ color: '#fbbf24', fontWeight: 'bold' }}>SLEEP DEPRIVATION MARATHON</span> <span className="mono-text" style={{ fontSize: '0.55rem', color: '#e879f9', border: '1px solid #e879f9', padding: '0.1rem 0.3rem', borderRadius: 0 }}>PER ROLL</span> — +2 dice, 30% ML+1 all team<br/>
                                Extended work session. If risk triggers, ALL team members gain +1 mental load.
                                Consumed after rolling. Re-activatable for next roll.
                            </div>
                            <div style={{ marginBottom: '0.6rem', borderBottom: '1px solid rgba(138,43,226,0.15)', paddingBottom: '0.4rem' }}>
                                <span style={{ color: '#f87171', fontWeight: 'bold' }}>OVERCLOCKED EQUIPMENT</span> <span className="mono-text" style={{ fontSize: '0.55rem', color: '#c084fc', border: '1px solid #c084fc', padding: '0.1rem 0.3rem', borderRadius: 0 }}>PERMANENT</span> — +3 dice, 25% facility loss + 3-7 XP<br/>
                                Push base equipment beyond safe limits. Select a base with the owner's workspace.
                                If risk triggers, a facility loses a level and agency loses 3-7 XP.
                            </div>
                            <div style={{ marginBottom: '0.2rem' }}>
                                <span style={{ color: '#60a5fa', fontWeight: 'bold' }}>CHILD PRODIGY RECRUITMENT</span> <span className="mono-text" style={{ fontSize: '0.55rem', color: '#c084fc', border: '1px solid #c084fc', padding: '0.1rem 0.3rem', borderRadius: 0 }}>PERMANENT</span> — +1 dice, 2 XP, 15% integrity<br/>
                                Recruit a child genius. Costs 2 agency XP. Creates a permanent NPC in the agency dossier.
                                Prodigies can be assigned to other fringe projects for +2 dice (one project at a time).
                            </div>
                        </div>
                        <div className="mono-text" style={{ fontSize: '0.6rem', color: 'var(--text-muted)', marginTop: '0.5rem', fontStyle: 'italic' }}>
                            Permanent effects stack and cannot be undone. Per-roll effects are consumed after each completion roll and can be re-activated.
                        </div>
                    </div>
                ) : null}
                {fringeProjects.map(function(p) {
                    var LiveTestingBlock = function() {
                        if (p.liveTestingLevel) {
                            return (
                                <div style={{ marginTop: '0.75rem', padding: '0.5rem', background: 'rgba(220,120,20,0.08)', borderLeft: '2px solid #d97706', borderRadius: 0 }}>
                                    <div className="mono-text" style={{ fontSize: '0.7rem', color: '#d97706', marginBottom: '0.15rem' }}>
                                        LIVE TESTING: {p.liveTestingLabel}
                                    </div>
                                    <span className="mono-text" style={{ fontSize: '0.75rem', padding: '0.15rem 0.4rem', background: 'rgba(220,120,20,0.15)', borderRadius: 0, color: '#fbbf24' }}>
                                        +{p.liveTestingDice} dice to completion
                                    </span>
                                </div>
                            );
                        }
                        return (
                            <div style={{ marginTop: '0.75rem' }}>
                                <div className="mono-text text-muted" style={{ fontSize: '0.7rem', marginBottom: '0.5rem' }}>
                                    LIVE TESTING — choose subject type:
                                </div>
                                <div style={{ display: 'flex', gap: '0.4rem', flexWrap: 'wrap' }}>
                                    {[
                                        {key: 'small_animals', label: 'Small Animals', dice: 1, mental: '5%', integrity: null},
                                        {key: 'large_animals', label: 'Large Animals', dice: 2, mental: '9%', integrity: null},
                                        {key: 'human', label: 'Human', dice: 5, mental: '23%', integrity: '17%'},
                                        {key: 'off_books', label: 'Off the Books Human Testing', dice: 5, mental: '23%', integrity: null},
                                    ].map(function(opt) {
                                        return (
                                            <button key={opt.key} onClick={function() {
                                                var warn = 'Activate ' + opt.label + ' testing on "' + p.name + '"?\n\n+' + opt.dice + ' permanent dice.\nMental load risk: ' + opt.mental;
                                                if (opt.integrity) warn += '\nIntegrity risk: ' + opt.integrity;
                                                if (opt.key === 'off_books') warn += '\nRequires Off the Books merit.';
                                                warn += '\n\nThis cannot be undone.';
                                                if (!confirm(warn)) return;
                                                projectFetch('/api/agencies/' + AGENCY_ID + '/projects/' + realIdx + '/live-testing/', {
                                                    method: 'POST',
                                                    body: JSON.stringify({ level: opt.key }),
                                                }).then(function(r) {
                                                    if (r.conflict) return null;
                                                    if (!r.response) return null;
                                                    return r.response.json();
                                                }).then(function(data) {
                                                    if (!data) return;
                                                    if (data.error) { alert(data.error); return; }
                                                    alert(data.message);
                                                    fetchAgency();
                                                });
                                            }} style={{
                                                flex: 1, minWidth: '120px', padding: '0.5rem', cursor: 'pointer',
                                                background: 'rgba(220,120,20,0.06)', border: '1px solid #d97706',
                                                borderRadius: 0, fontFamily: 'var(--font-mono)', color: '#fbbf24', textAlign: 'center',
                                            }}>
                                                <div style={{ fontSize: '0.9rem', fontWeight: 'bold' }}>+{opt.dice}</div>
                                                <div style={{ fontSize: '0.6rem', color: 'var(--text-muted)', marginTop: '0.15rem' }}>{opt.label}</div>
                                                <div style={{ fontSize: '0.55rem', color: '#d97706', marginTop: '0.1rem' }}>
                                                    ML {opt.mental}{opt.integrity ? ' / Int ' + opt.integrity : ''}
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    };
                    var StimulantBlock = function() {
                        var realI = projects.indexOf(p);
                        if (p.stimulantLocked) {
                            return (
                                <div style={{ marginTop: '0.75rem', padding: '0.5rem', background: 'rgba(59,130,246,0.08)', borderLeft: '2px solid #3b82f6', borderRadius: 0 }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <div>
                                            <div className="mono-text" style={{ fontSize: '0.7rem', color: '#3b82f6', marginBottom: '0.15rem' }}>
                                                STIMULANT COCKTAIL ACTIVE
                                            </div>
                                            <span className="mono-text" style={{ fontSize: '0.75rem', padding: '0.15rem 0.4rem', background: 'rgba(59,130,246,0.15)', borderRadius: 0, color: '#60a5fa' }}>
                                                +{p.stimulantDice} dice (next roll)
                                            </span>
                                            {IS_SCIENCE ? (
                                                <div className="mono-text" style={{ fontSize: '0.65rem', color: 'var(--text-muted)', marginTop: '0.35rem' }}>
                                                    {(p.stimulantResults || []).map(function(r) {
                                                        return r.label + (r.failed ? ' [SIDE EFFECT: ' + (r.effects || []).join(', ') + ']' : ' [clean]');
                                                    }).join(' | ')}
                                                </div>
                                            ) : null}
                                        </div>
                                        {IS_ADMIN ? (
                                            <button onClick={function() {
                                                if (!confirm('Unlock this project? Stimulant cocktail will be cleared.')) return;
                                                projectFetch('/api/agencies/' + AGENCY_ID + '/projects/' + realI + '/stimulants/unlock/', {
                                                    method: 'POST',
                                                }).then(function(r) {
                                                    if (r.conflict) return null;
                                                    if (!r.response) return null;
                                                    return r.response.json();
                                                }).then(function(data) {
                                                    if (!data) return;
                                                    if (data.error) { alert(data.error); return; }
                                                    fetchAgency();
                                                });
                                            }} className="btn-cyber" style={{ fontSize: '0.65rem', padding: '0.2rem 0.5rem' }}>
                                                UNLOCK
                                            </button>
                                        ) : null}
                                    </div>
                                </div>
                            );
                        }
                        if (!IS_SCIENCE) return null;
                        return (
                            <div style={{ marginTop: '0.75rem' }}>
                                <div className="mono-text text-muted" style={{ fontSize: '0.7rem', marginBottom: '0.5rem' }}>
                                    STIMULANTS — select substances for the cocktail:
                                </div>
                                {(function() {
                                    var stims = [
                                        {key: 'cocaine', label: 'Modified Cocaine', dice: 2, risk: '15%'},
                                        {key: 'lsd', label: 'Modified LSD', dice: 3, risk: '20%'},
                                        {key: 'shrooms', label: 'Modified Shrooms', dice: 2, risk: '10%'},
                                        {key: 'venom', label: 'Modified Exotic Animal Venom', dice: 4, risk: '25%'},
                                    ];
                                    var selectedRef = React.useRef([]);
                                    var forceRef = React.useRef(0);
                                    var dummy = React.useState(0);
                                    var toggle = function(key) {
                                        var arr = selectedRef.current;
                                        var idx = arr.indexOf(key);
                                        if (idx >= 0) arr.splice(idx, 1); else arr.push(key);
                                        selectedRef.current = arr.slice();
                                        dummy[1](function(x) { return x + 1; });
                                    };
                                    var sel = selectedRef.current;
                                    var stackPen = Math.max(0, sel.length - 1) * 10;
                                    return (
                                        <div>
                                            <div style={{ display: 'flex', gap: '0.4rem', flexWrap: 'wrap', marginBottom: '0.5rem' }}>
                                                {stims.map(function(s) {
                                                    var isOn = sel.indexOf(s.key) >= 0;
                                                    var adjRisk = parseInt(s.risk) + stackPen;
                                                    return (
                                                        <button key={s.key} onClick={function() { toggle(s.key); }}
                                                            style={{
                                                                flex: 1, minWidth: '110px', padding: '0.5rem', cursor: 'pointer',
                                                                background: isOn ? 'rgba(59,130,246,0.15)' : 'rgba(59,130,246,0.03)',
                                                                border: isOn ? '2px solid #3b82f6' : '1px solid var(--border-color)',
                                                                borderRadius: 0, fontFamily: 'var(--font-mono)', color: isOn ? '#60a5fa' : 'var(--text-muted)', textAlign: 'center',
                                                            }}>
                                                            <div style={{ fontSize: '0.85rem', fontWeight: 'bold' }}>+{s.dice}</div>
                                                            <div style={{ fontSize: '0.55rem', marginTop: '0.1rem' }}>{s.label}</div>
                                                            <div style={{ fontSize: '0.5rem', color: '#ef4444', marginTop: '0.1rem' }}>
                                                                Risk: {adjRisk}%{stackPen > 0 && isOn ? ' (+' + stackPen + ')' : ''}
                                                            </div>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                            {sel.length > 0 ? (
                                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                    <span className="mono-text" style={{ fontSize: '0.7rem', color: '#60a5fa' }}>
                                                        Total: +{stims.filter(function(s) { return sel.indexOf(s.key) >= 0; }).reduce(function(a, s) { return a + s.dice; }, 0)} dice
                                                        {sel.length > 1 ? ' (stacking penalty +' + stackPen + '% to all risks)' : ''}
                                                    </span>
                                                    <button onClick={function() {
                                                        var totalDice = stims.filter(function(s) { return sel.indexOf(s.key) >= 0; }).reduce(function(a, s) { return a + s.dice; }, 0);
                                                        if (!confirm('Synthesize stimulant: ' + sel.length + ' substances, +' + totalDice + ' dice.\nThe project owner will only see "Stimulant Cocktail Active".\nSide effects are hidden from them.\n\nProceed?')) return;
                                                        projectFetch('/api/agencies/' + AGENCY_ID + '/projects/' + realI + '/stimulants/', {
                                                            method: 'POST',
                                                            body: JSON.stringify({ stimulants: sel }),
                                                        }).then(function(r) {
                                                            if (r.conflict) return null;
                                                            if (!r.response) return null;
                                                            return r.response.json();
                                                        }).then(function(data) {
                                                            if (!data) return;
                                                            if (data.error) { alert(data.error); return; }
                                                            alert(data.message);
                                                            selectedRef.current = [];
                                                            fetchAgency();
                                                        });
                                                    }} style={{
                                                        padding: '0.4rem 1rem', background: '#3b82f6', border: 'none',
                                                        color: 'white', fontFamily: 'var(--font-mono)', fontWeight: 'bold',
                                                        fontSize: '0.75rem', cursor: 'pointer', borderRadius: 0,
                                                    }}>
                                                        SYNTHESIZE STIMULANT
                                                    </button>
                                                </div>
                                            ) : null}
                                        </div>
                                    );
                                })()}
                            </div>
                        );
                    };
                    var BlackMarketTechBlock = function() {
                        var ri = projects.indexOf(p);
                        if (p.blackMarketTech) {
                            return (
                                <div style={{ marginTop: '0.75rem', padding: '0.5rem', background: 'rgba(13,148,136,0.08)', borderLeft: '2px solid #0d9488', borderRadius: 0 }}>
                                    <div className="mono-text" style={{ fontSize: '0.7rem', color: '#0d9488', marginBottom: '0.15rem' }}>BLACK MARKET TECH</div>
                                    <span className="mono-text" style={{ fontSize: '0.75rem', padding: '0.15rem 0.4rem', background: 'rgba(13,148,136,0.15)', borderRadius: 0, color: '#2dd4bf' }}>
                                        +{p.blackMarketTechDice} dice to completion
                                    </span>
                                    {(p.blackMarketTechAgencies && p.blackMarketTechAgencies.length > 0) ? (
                                        <div className="mono-text" style={{ fontSize: '0.65rem', color: 'var(--accent-danger, #c0392b)', marginTop: '0.35rem' }}>
                                            TRACKER DETECTED — linked to {p.blackMarketTechAgencies[0].name}
                                        </div>
                                    ) : (
                                        <div className="mono-text" style={{ fontSize: '0.65rem', color: 'var(--accent-success, #2ecc71)', marginTop: '0.35rem' }}>Equipment clean — no trackers</div>
                                    )}
                                </div>
                            );
                        }
                        if (!IS_SCIENCE) return null;
                        return (
                            <div style={{ marginTop: '0.75rem' }}>
                                <button onClick={function() {
                                    if (!confirm('Activate Black Market Tech on "' + p.name + '"?\n\n+2 permanent dice.\nRisk: 15% chance tech comes with a tracker (agency linkage).\n\nThis cannot be undone.')) return;
                                    projectFetch('/api/agencies/' + AGENCY_ID + '/projects/' + ri + '/fringe-effect/', {
                                        method: 'POST',
                                        body: JSON.stringify({ effect: 'black_market_tech' }),
                                    }).then(function(r) {
                                        if (r.conflict || !r.response) return null;
                                        return r.response.json();
                                    }).then(function(d) { if (!d) return; if (d.error) { alert(d.error); return; } alert(d.message); fetchAgency(); });
                                }} style={{ width: '100%', padding: '0.5rem', cursor: 'pointer', background: 'rgba(13,148,136,0.06)', border: '1px solid #0d9488', borderRadius: 0, fontFamily: 'var(--font-mono)', color: '#2dd4bf', textAlign: 'center' }}>
                                    <div style={{ fontSize: '0.85rem', fontWeight: 'bold' }}>+2 BLACK MARKET TECH</div>
                                    <div style={{ fontSize: '0.55rem', color: 'var(--text-muted)', marginTop: '0.1rem' }}>15% tracker risk (agency linkage)</div>
                                </button>
                            </div>
                        );
                    };
                    var GeneManipulationBlock = function() {
                        var ri = projects.indexOf(p);
                        if (p.geneManipulation) {
                            return (
                                <div style={{ marginTop: '0.75rem', padding: '0.5rem', background: 'rgba(22,163,74,0.08)', borderLeft: '2px solid #16a34a', borderRadius: 0 }}>
                                    <div className="mono-text" style={{ fontSize: '0.7rem', color: '#16a34a', marginBottom: '0.15rem' }}>GENE MANIPULATION</div>
                                    <span className="mono-text" style={{ fontSize: '0.75rem', padding: '0.15rem 0.4rem', background: 'rgba(22,163,74,0.15)', borderRadius: 0, color: '#4ade80' }}>
                                        +{p.geneManipulationDice} dice to completion
                                    </span>
                                    {p.geneManipulationBreach ? (
                                        <div className="mono-text" style={{ fontSize: '0.65rem', color: 'var(--accent-danger, #c0392b)', marginTop: '0.35rem' }}>CONTAINMENT BREACH — GM narrative</div>
                                    ) : (
                                        <div className="mono-text" style={{ fontSize: '0.65rem', color: 'var(--accent-success, #2ecc71)', marginTop: '0.35rem' }}>Containment held</div>

                                </div>
                            );
                        }
                        if (!IS_SCIENCE) return null;
                        return (
                            <div style={{ marginTop: '0.75rem' }}>
                                <button onClick={function() {
                                    if (!confirm('Activate Gene Manipulation on "' + p.name + '"?\n\n+3 permanent dice.\nRisk: 18% containment breach (GM determines consequences).\n\nThis cannot be undone.')) return;
                                    projectFetch('/api/agencies/' + AGENCY_ID + '/projects/' + ri + '/fringe-effect/', {
                                        method: 'POST',
                                        body: JSON.stringify({ effect: 'gene_manipulation' }),
                                    }).then(function(r) {

                                    }).then(function(d) {
                                        if (!d) return;
                                        if (d.error) { alert(d.error); return; }

                                var totalFree = charRolls.free || 0;
                                var totalSpare = charRolls.spare || 0;
                                var hasRolls = totalFree + totalSpare > 0;
                                var rollLabel = totalFree > 0 ? 'FREE ROLL' : totalSpare > 0 ? 'SPARE TIME ROLL' : 'NO ROLLS';

                                var charData = (props.characters || []).find(function(c) { return c.name === p.player; });

                                            if (r.conflict) return null;
                                            if (!r.response) return null;
                                            return r.response.json();

                                                    {lr.mentalDamage ? ' · +1 mental load' : ''}
                                                </div>
                                            </div>
                                        );
                                    })() : null}
                                    </div>

                            {p.completed ? (

                            <AutoSaveInput
                                component="textarea"

                                onSave={function(val) { updateField(idx, 'notes', val); }}
                                disabled={!IS_ADMIN}
                                placeholder="Notes..."
                                style={{ background: 'transparent', border: 'none', borderBottom: '1px solid var(--border-color)', color: 'var(--text-secondary)', width: '100%', fontSize: '0.75rem', minHeight: '1.5rem', resize: 'vertical', fontFamily: 'inherit' }}
                            />
                        </div>
                    );
                })}
            </div>

            {/* Roll log modal */}
            {rollLogData && (
                <div style={{
                    position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                    background: 'rgba(0,0,0,0.85)', display: 'flex',
                    alignItems: 'center', justifyContent: 'center', zIndex: 1000,
                }} onClick={function() { setRollLogData(null); }}>
                    <div className="glass-panel" style={{
                        padding: '1.5rem', maxWidth: '600px', width: '95%',
                        maxHeight: '80vh', overflowY: 'auto',
                    }} onClick={function(e) { e.stopPropagation(); }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem' }}>
                            <h3 className="mono-text text-accent" style={{ fontSize: '1rem', margin: 0 }}>ROLL LOG</h3>
                            <button onClick={function() { setRollLogData(null); }} className="mono-text"
                                style={{ background: 'transparent', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', fontSize: '1.2rem' }}>&times;</button>
                        </div>
                        {rollLogData.logs.length === 0 ? (
                            <p className="mono-text text-muted" style={{ textAlign: 'center', padding: '2rem 0', fontStyle: 'italic' }}>No rolls recorded yet.</p>
                        ) : rollLogData.logs.map(function(log) {
                            var diceSuccesses = log.successes - (log.autoSuccesses || 0);
                            return (
                                <div key={log.id} style={{
                                    padding: '0.75rem', marginBottom: '0.5rem',
                                    background: 'rgba(0,0,0,0.3)', borderRadius: 0,
                                    border: '1px solid var(--border-color)',
                                }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.4rem' }}>
                                        <span className="mono-text text-accent" style={{ fontSize: '0.8rem' }}>
                                            {log.characterName}
                                        </span>
                                        <span className="mono-text text-muted" style={{ fontSize: '0.65rem' }}>
                                            {new Date(log.rolledAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}
                                        </span>
                                    </div>
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '3px', marginBottom: '0.35rem' }}>
                                        {(log.rolls || []).map(function(die, i) {
                                            var isSuccess = die >= 8;
                                            return React.createElement('span', { key: i, className: 'mono-text', style: {
                                                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                                                width: '22px', height: '22px', borderRadius: 0,
                                                background: isSuccess ? 'rgba(34,197,94,0.2)' : 'rgba(0,0,0,0.3)',
                                                border: '1px solid ' + (isSuccess ? '#22c55e' : 'var(--border-color)'),
                                                color: isSuccess ? '#22c55e' : 'var(--text-muted)',
                                                fontSize: '0.7rem', fontWeight: isSuccess ? 'bold' : 'normal',
                                            }}, die);
                                        })}
                                    </div>
                                    <div className="mono-text" style={{ fontSize: '0.7rem', fontWeight: 'bold', color: log.successes > 0 ? '#22c55e' : '#ef4444' }}>
                                        {diceSuccesses} {diceSuccesses === 1 ? 'SUCCESS' : 'SUCCESSES'}
                                        {log.autoSuccesses > 0 ? ' + ' + log.autoSuccesses + ' AUTO' + (log.autoMerit ? ' (' + log.autoMerit + ')' : '') : ''}
                                        {log.autoSuccesses > 0 ? ' = ' + log.successes + ' TOTAL' : ''}
                                        {log.successes >= 5 ? ' — EXCEPTIONAL!' : ''}
                                    </div>
                                    <div className="mono-text" style={{ fontSize: '0.6rem', color: 'var(--text-muted)', marginTop: '0.2rem' }}>
                                        {log.rollType === 'spare' ? 'Spare time' : 'Free'} · {log.pool} dice · Progress: {log.oldScore} → {log.newScore}
                                        {log.mentalDamage ? ' · +1 ML' : ''}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            )}
        </React.Fragment>);
    };


// Export to global scope
Object.assign(window, { DarkGrantsModule, ProjectsModule });
</script>
