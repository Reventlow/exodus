{% extends "base.html" %}

{% block title %}AGENCY RECORD // BLACKLOG.NET{% endblock %}

{% block content %}
<div id="app-root">
    <div class="loading-screen">
        <h1 class="mono-text">DECRYPTING AGENCY RECORD...</h1>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Django context variables — outside verbatim block
    const AGENCY_ID = {{ agency_id }};
    const IS_ADMIN = {{ is_admin|yesno:"true,false" }};
    const IS_PLAYER_AGENCY = {{ is_player_agency|yesno:"true,false" }};
    const CSRF_TOKEN = '{{ csrf_token }}';
</script>
{% verbatim %}
<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- CSRF ---
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // --- DEFAULT AGENCY STRUCTURE ---
    const DEFAULT_AGENCY = {
        id: null,
        name: "NEW AGENCY",
        alliance: { countries: [], companies: [], organizations: [] },
        motto: "",
        headquarters: "",
        notes: "",
        integrity: 0,
        experience: 0,
        isPlayerAgency: false,
        isCouncilMember: false,
        isCouncilChairman: false,
        attributes: {
            power: { Industry: 0, Science: 0, Military: 0, Agriculture: 0 },
            finesse: { Espionage: 0, Diplomacy: 0, Logistics: 0, Trade: 0 },
            resistance: { Unity: 0, Surveillance: 0, Ethics: 0, "Counter Espionage": 0, Security: 0 }
        },
        specializations: [],
        merits: [],
        flaws: [],
        globalFlaws: [],
        ftlProjects: [],
        councilItems: [],
        assets: [],
        fleet: [],
        conditions: [],
        projects: [],
        history: [],
        bases: [],
        baseConfig: { locationTypes: [], locationMerits: [], facilityTypes: [], equipmentTypes: [] },
        assignableCharacters: [],
        assignableNpcs: [],
        fieldVisibility: {}
    };

    // --- ICON COMPONENT (debounced createIcons to avoid per-render overhead) ---
    let _iconTimer = null;
    const _refreshIcons = () => {
        if (_iconTimer) clearTimeout(_iconTimer);
        _iconTimer = setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 50);
    };
    const Icon = ({ name, size = 16, className = "" }) => {
        useEffect(() => { _refreshIcons(); }, [name]);
        return <i data-lucide={name} width={size} height={size} className={className}></i>;
    };

    // --- AUTO-SAVE INPUT (uncontrolled) ---
    // Uses defaultValue so React never touches the DOM input after mount.
    // The DOM manages typing; we just read values via onChange to update
    // the data ref and schedule a background save.
    const AutoSaveInput = ({ defaultValue, onSave, delay = 1500, component = 'input', ...props }) => {
        const timerRef = useRef(null);

        const handleChange = (e) => {
            const val = e.target.value;
            if (timerRef.current) clearTimeout(timerRef.current);
            timerRef.current = setTimeout(() => {
                onSave(val);
            }, delay);
        };

        const handleBlur = (e) => {
            if (timerRef.current) {
                clearTimeout(timerRef.current);
                timerRef.current = null;
            }
            onSave(e.target.value);
        };

        const Tag = component;
        return <Tag {...props} defaultValue={defaultValue} onChange={handleChange} onBlur={handleBlur} />;
    };

    // --- SAVE STATUS INDICATOR ---
    const SaveStatus = ({ status }) => {
        const labels = {
            saved: 'SAVED',
            saving: 'SAVING...',
            unsaved: 'UNSAVED CHANGES',
            error: 'SAVE ERROR'
        };
        return (
            <span className={'save-status ' + status}>
                {labels[status] || status}
            </span>
        );
    };

    // --- CLASSIFIED INDICATOR ---
    const Classified = () => (
        <span className="classified" title="CLASSIFIED // CLEARANCE REQUIRED"
            style={{ fontFamily: 'var(--font-mono)', fontSize: '0.9rem' }}>
            CLASSIFIED
        </span>
    );

    // --- VISIBILITY TOGGLE (admin on NPC) ---
    const VisibilityToggle = ({ field, visibility, onToggle }) => {
        if (!IS_ADMIN || IS_PLAYER_AGENCY) return null;
        const isVisible = visibility[field] !== false; // default visible
        return (
            <button
                onClick={() => onToggle(field, !isVisible)}
                title={isVisible ? 'Click to classify' : 'Click to declassify'}
                style={{
                    background: 'transparent',
                    border: 'none',
                    cursor: 'pointer',
                    color: isVisible ? 'var(--text-muted)' : 'var(--accent-danger)',
                    padding: '2px',
                    marginLeft: '4px',
                    opacity: isVisible ? 0.4 : 1,
                    transition: 'all 0.2s'
                }}
            >
                <Icon name={isVisible ? "eye" : "eye-off"} size={14} />
            </button>
        );
    };

    // --- ALLIANCE MODULE (3-column: countries, companies, organizations) ---
    const AllianceModule = ({ alliance, agencyRef, update, onSave, visibility, onToggleVis }) => {
        const isClassified = alliance === 'CLASSIFIED';

        if (isClassified && !IS_ADMIN) return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{ marginBottom: '1rem' }}>ALLIANCE / BLOC</h3>
                <Classified />
            </div>
        );

        const data = (typeof alliance === 'object' && alliance !== null)
            ? { countries: [], companies: [], organizations: [], ...alliance }
            : { countries: [], companies: [], organizations: [] };

        const addItem = (category) => {
            document.activeElement?.blur();
            const fresh = agencyRef.current.alliance || { countries: [], companies: [], organizations: [] };
            update({ ...fresh, [category]: [...(fresh[category] || []), ''] });
        };

        const removeItem = (category, idx) => {
            document.activeElement?.blur();
            const fresh = agencyRef.current.alliance || { countries: [], companies: [], organizations: [] };
            update({ ...fresh, [category]: fresh[category].filter((_, i) => i !== idx) });
        };

        const Column = ({ category, title, icon }) => (
            <div>
                <h4 className="text-muted mono-text" style={{
                    fontSize: '0.8rem', marginBottom: '0.75rem',
                    borderBottom: '1px solid var(--border-color)', paddingBottom: '0.25rem'
                }}>
                    {title}
                    <span className="text-muted" style={{ marginLeft: '0.5rem', fontSize: '0.7rem' }}>
                        ({data[category].length})
                    </span>
                </h4>
                {data[category].map((item, idx) => (
                    <div key={idx} style={{
                        display: 'flex', alignItems: 'center', gap: '0.25rem', marginBottom: '0.25rem'
                    }}>
                        <AutoSaveInput
                            type="text"
                            defaultValue={item}
                            placeholder={`Add ${title.toLowerCase().slice(0, -1)}...`}
                            onSave={val => onSave({
                                ...data,
                                [category]: data[category].map((it, i) => i === idx ? val : it)
                            })}
                            disabled={!IS_ADMIN}
                            style={{
                                background: 'transparent', border: 'none',
                                borderBottom: '1px solid var(--border-color)',
                                color: 'var(--text-primary)', flex: 1,
                                fontSize: '0.85rem', padding: '0.25rem 0'
                            }}
                        />
                        {IS_ADMIN && (
                            <button onClick={() => removeItem(category, idx)} style={{
                                background: 'transparent', border: 'none',
                                color: 'var(--accent-danger)', cursor: 'pointer', padding: '2px'
                            }}>
                                <Icon name="x" size={12} />
                            </button>
                        )}
                    </div>
                ))}
                {IS_ADMIN && (
                    <button onClick={() => addItem(category)} style={{
                        background: 'transparent', border: '1px dashed var(--border-color)',
                        color: 'var(--text-muted)', width: '100%', padding: '0.25rem',
                        cursor: 'pointer', fontSize: '0.8rem', marginTop: '0.25rem'
                    }}>+ Add</button>
                )}
                {data[category].length === 0 && !IS_ADMIN && (
                    <p className="text-muted" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>None</p>
                )}
            </div>
        );

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>
                    ALLIANCE / BLOC
                    <VisibilityToggle field="alliance" visibility={visibility} onToggle={onToggleVis} />
                </h3>
                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))',
                    gap: '1.5rem'
                }}>
                    <Column category="countries" title="COUNTRIES" />
                    <Column category="companies" title="COMPANIES" />
                    <Column category="organizations" title="ORGANIZATIONS" />
                </div>
            </div>
        );
    };

    // --- HEADER MODULE ---
    const HeaderModule = ({ agency, onSave, visibility, onToggleVis }) => (
        <div className="glass-panel" style={{
            padding: '1.5rem', marginBottom: '1rem',
            display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem'
        }}>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                    AGENCY NAME
                </label>
                <AutoSaveInput type="text" defaultValue={agency.name}
                    onSave={val => onSave({ name: val })}
                    disabled={!IS_ADMIN}
                    style={{
                        background: 'transparent', border: 'none',
                        borderBottom: '1px solid var(--accent-primary)',
                        color: 'var(--text-primary)', width: '100%',
                        fontSize: '1.2rem', fontFamily: 'var(--font-mono)'
                    }} />
            </div>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                    MOTTO
                    <VisibilityToggle field="motto" visibility={visibility} onToggle={onToggleVis} />
                </label>
                {agency.motto === 'CLASSIFIED' ? <Classified /> : (
                    <AutoSaveInput type="text" defaultValue={agency.motto}
                        onSave={val => onSave({ motto: val })}
                        disabled={!IS_ADMIN}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--border-color)',
                            color: 'var(--text-primary)', width: '100%'
                        }} />
                )}
            </div>
            <div>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                    HEADQUARTERS
                    <VisibilityToggle field="headquarters" visibility={visibility} onToggle={onToggleVis} />
                </label>
                {agency.headquarters === 'CLASSIFIED' ? <Classified /> : (
                    <AutoSaveInput type="text" defaultValue={agency.headquarters}
                        onSave={val => onSave({ headquarters: val })}
                        disabled={!IS_ADMIN}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--border-color)',
                            color: 'var(--text-primary)', width: '100%'
                        }} />
                )}
            </div>
        </div>
    );

    // --- NOTES MODULE ---
    const NotesModule = ({ notes, onSave, visibility, onToggleVis }) => (
        <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
            <h3 className="mono-text text-accent" style={{
                borderBottom: '1px solid var(--border-color)',
                paddingBottom: '0.5rem', marginBottom: '1rem'
            }}>
                NOTES
                <VisibilityToggle field="notes" visibility={visibility} onToggle={onToggleVis} />
            </h3>
            {notes === 'CLASSIFIED' ? <Classified /> : (
                <AutoSaveInput
                    component="textarea"
                    defaultValue={notes}
                    onSave={val => onSave({ notes: val })}
                    disabled={!IS_ADMIN}
                    placeholder="Agency notes..."
                    style={{
                        width: '100%', minHeight: '80px', background: 'transparent',
                        border: '1px solid var(--border-color)', color: 'var(--text-primary)',
                        padding: '0.5rem', fontFamily: 'inherit', resize: 'vertical'
                    }}
                />
            )}
        </div>
    );

    // --- INTEGRITY & EXPERIENCE MODULE ---
    const getWorkspaceConfig = (baseConfig) => (baseConfig.facilityTypes || []).find(f => f.key === 'workspace');

    const calcTotalBaseExp = (bases, baseConfig) => {
        if (!bases || !baseConfig) return 0;
        const getLocationType = (key) => (baseConfig.locationTypes || []).find(lt => lt.key === key);
        const getMerit = (key) => (baseConfig.locationMerits || []).find(m => m.key === key);
        const getFacilityType = (key) => (baseConfig.facilityTypes || []).find(f => f.key === key);
        const getEquipment = (key) => (baseConfig.equipmentTypes || []).find(e => e.key === key);
        const wsConfig = getWorkspaceConfig(baseConfig);
        let total = 0;
        (bases || []).forEach(base => {
            const loc = getLocationType(base.locationType);
            if (loc) total += loc.exp;
            (base.merits || []).forEach(mk => { const m = getMerit(mk); if (m) total += m.exp; });
            (base.facilities || []).forEach(f => {
                const ft = getFacilityType(f.key);
                if (ft) { const lvl = ft.levels.find(l => l.level === f.level); if (lvl) total += lvl.exp; }
            });
            (base.workspaces || []).forEach(w => {
                if (wsConfig) { const lvl = wsConfig.levels.find(l => l.level === w.level); if (lvl) total += lvl.exp; }
            });
            (base.equipment || []).forEach(ek => { const eq = getEquipment(ek); if (eq) total += eq.exp; });
        });
        return total;
    };

    const IntegrityModule = ({ agency, update, visibility, onToggleVis }) => {
        const expPool = typeof agency.experience === 'number' ? agency.experience : 0;
        const basesExp = calcTotalBaseExp(agency.bases, agency.baseConfig);
        const available = expPool - basesExp;

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>CORE STATS</h3>
                <div style={{ display: 'flex', gap: '2rem', justifyContent: 'center', flexWrap: 'wrap' }}>
                    <div className="tech-border text-center" style={{ padding: '1rem', minWidth: '120px' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                            INTEGRITY
                            <VisibilityToggle field="integrity" visibility={visibility} onToggle={onToggleVis} />
                        </div>
                        {agency.integrity === 'CLASSIFIED' ? <Classified /> : (
                            <input type="number" value={agency.integrity}
                                onChange={e => update({ integrity: parseInt(e.target.value) || 0 })}
                                disabled={!IS_ADMIN}
                                style={{
                                    background: 'transparent', border: 'none',
                                    color: 'var(--accent-primary)', width: '100%',
                                    textAlign: 'center', fontSize: '2rem',
                                    fontFamily: 'var(--font-mono)'
                                }} />
                        )}
                    </div>
                    <div className="tech-border text-center" style={{ padding: '1rem', minWidth: '160px' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                            AVAILABLE EXP
                            <VisibilityToggle field="experience" visibility={visibility} onToggle={onToggleVis} />
                        </div>
                        {agency.experience === 'CLASSIFIED' ? <Classified /> : (
                            <>
                                <div style={{
                                    color: available < 0 ? 'var(--accent-danger)' : 'var(--accent-primary)',
                                    fontSize: '2rem', fontFamily: 'var(--font-mono)',
                                }}>
                                    {available}
                                </div>
                                <div style={{
                                    marginTop: '0.25rem', fontFamily: 'var(--font-mono)',
                                    color: 'var(--text-muted)', fontSize: '0.8rem',
                                }}>
                                    {basesExp} used / {expPool} total
                                </div>
                                {IS_ADMIN && (
                                    <button
                                        onClick={() => {
                                            const input = prompt('Add EXP amount (use negative to subtract):');
                                            if (input === null) return;
                                            const amount = parseInt(input);
                                            if (isNaN(amount)) return;
                                            update({ experience: expPool + amount });
                                        }}
                                        className="btn-cyber"
                                        style={{ marginTop: '0.5rem', fontSize: '0.75rem', padding: '0.25rem 0.75rem' }}
                                    >
                                        + ADD EXP
                                    </button>
                                )}
                            </>
                        )}
                    </div>
                </div>
            </div>
        );
    };

    // --- DOSSIERS MODULE ---
    const DossiersModule = ({ dossiers }) => {
        if (!dossiers || dossiers.length === 0) return null;
        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>LINKED DOSSIERS</h3>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem' }}>
                    {dossiers.map(d => (
                        <a key={`${d.type}-${d.id}`}
                            href={d.type === 'character' ? `/character/${d.id}/` : `/npcs/${d.id}/`}
                            className="btn-cyber mono-text"
                            style={{
                                textDecoration: 'none', fontSize: '0.85rem',
                                padding: '0.4rem 0.75rem',
                                display: 'inline-flex', alignItems: 'center', gap: '0.5rem',
                            }}>
                            <span style={{
                                fontSize: '0.6rem', opacity: 0.7,
                                border: '1px solid currentColor',
                                padding: '0.1rem 0.3rem', borderRadius: '2px',
                            }}>{d.type === 'character' ? 'PC' : 'NPC'}</span>
                            {d.name}
                        </a>
                    ))}
                </div>
            </div>
        );
    };

    // --- ATTRIBUTES MODULE ---
    const AttributesModule = ({ attributes, update, visibility, onToggleVis }) => {
        const isClassified = attributes === 'CLASSIFIED';
        if (isClassified && !IS_ADMIN) return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{ marginBottom: '1rem' }}>ATTRIBUTES</h3>
                <Classified />
            </div>
        );

        const updateAttr = (cat, skill, val) => {
            const updated = { ...attributes, [cat]: { ...attributes[cat], [skill]: val } };
            update(updated);
        };

        const addCustomSkill = (category) => {
            const name = prompt('Enter new skill name:');
            if (name && name.trim()) {
                const updated = { ...attributes, [category]: { ...attributes[category], [name.trim()]: 0 } };
                update(updated);
            }
        };

        const CategorySection = ({ category, title }) => {
            const skills = attributes[category] || {};
            return (
                <div>
                    <h4 className="text-center text-muted mono-text" style={{
                        marginBottom: '1rem', textTransform: 'uppercase',
                        borderBottom: '1px solid var(--border-color)', paddingBottom: '0.25rem'
                    }}>{title}</h4>
                    {Object.entries(skills).map(([skill, val]) => {
                        const fieldPath = `attributes.${category}.${skill}`;
                        const classified = val === 'CLASSIFIED';
                        return (
                            <div key={skill} style={{
                                display: 'flex', justifyContent: 'space-between',
                                alignItems: 'center', marginBottom: '0.5rem'
                            }}>
                                <span style={{ fontSize: '0.9rem', color: 'var(--text-primary)' }}>
                                    {skill}
                                    <VisibilityToggle field={fieldPath} visibility={visibility} onToggle={onToggleVis} />
                                </span>
                                {classified ? <Classified /> : (
                                    <input type="number" value={val}
                                        onChange={e => updateAttr(category, skill, parseInt(e.target.value) || 0)}
                                        disabled={!IS_ADMIN}
                                        style={{
                                            width: '60px', textAlign: 'center',
                                            background: 'transparent',
                                            border: '1px solid var(--border-color)',
                                            color: 'var(--accent-primary)',
                                            fontFamily: 'var(--font-mono)'
                                        }} />
                                )}
                            </div>
                        );
                    })}
                    {IS_ADMIN && (
                        <button onClick={() => addCustomSkill(category)} style={{
                            background: 'transparent', border: '1px dashed var(--border-color)',
                            color: 'var(--text-muted)', width: '100%', padding: '0.25rem',
                            cursor: 'pointer', fontSize: '0.8rem', marginTop: '0.5rem'
                        }}>+ Add Skill</button>
                    )}
                </div>
            );
        };

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>ATTRIBUTES</h3>
                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))',
                    gap: '2rem'
                }}>
                    <CategorySection category="power" title="Power" />
                    <CategorySection category="finesse" title="Finesse" />
                    <CategorySection category="resistance" title="Resistance" />
                </div>
            </div>
        );
    };

    // --- GLOBAL FLAWS DISPLAY (read-only, shown on every agency) ---
    const GlobalFlawsDisplay = ({ globalFlaws }) => {
        if (!globalFlaws || globalFlaws.length === 0) return null;

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginTop: '0.5rem',
                borderLeft: '3px solid var(--accent-warning)'
            }}>
                <h3 className="mono-text" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem',
                    color: 'var(--accent-warning)', fontSize: '0.95rem'
                }}>
                    GLOBAL FLAWS
                    <span className="text-muted" style={{ fontSize: '0.7rem', marginLeft: '0.5rem' }}>
                        (SYSTEM-WIDE // READ ONLY)
                    </span>
                </h3>
                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'minmax(120px, 1.5fr) 60px minmax(120px, 2fr)',
                    gap: '0.5rem', marginBottom: '0.5rem', padding: '0 0.5rem'
                }}>
                    <span className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>NAME</span>
                    <span className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>VALUE</span>
                    <span className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>DESCRIPTION</span>
                </div>
                {globalFlaws.map(flaw => (
                    <div key={flaw.id} className="tech-border" style={{
                        display: 'grid',
                        gridTemplateColumns: 'minmax(120px, 1.5fr) 60px minmax(120px, 2fr)',
                        gap: '0.5rem', padding: '0.5rem', marginBottom: '0.25rem',
                        background: 'rgba(234, 179, 8, 0.05)', alignItems: 'center'
                    }}>
                        <span style={{ color: 'var(--text-primary)', fontSize: '0.85rem' }}>
                            {flaw.name}
                        </span>
                        <span className="mono-text" style={{ color: 'var(--accent-warning)', fontSize: '0.85rem' }}>
                            {flaw.value}
                        </span>
                        <span style={{ color: 'var(--text-secondary)', fontSize: '0.85rem' }}>
                            {flaw.description}
                        </span>
                    </div>
                ))}
            </div>
        );
    };

    // --- COUNCIL ITEMS DISPLAY (read-only, shown on every agency) ---
    const CouncilDisplay = ({ councilItems, isCouncilMember, isCouncilChairman, onToggleMembership }) => {
        const COUNCIL_ACCENT = '#a855f7';

        const statusColors = {
            proposed: '#facc15',
            voting: '#f97316',
            active: 'var(--accent-primary)',
            suspended: 'var(--accent-warning)',
            repealed: 'var(--accent-danger)',
        };

        const typeLabels = {
            agreement: 'AGREEMENT',
            initiative: 'INITIATIVE',
            law: 'LAW',
        };

        // Show active, proposed, and voting items on agency sheets
        const visibleItems = (councilItems || []).filter(i => ['active', 'proposed', 'voting'].includes(i.status));
        const votingItems = visibleItems.filter(i => i.status === 'voting');
        const otherItems = visibleItems.filter(i => i.status !== 'voting');

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginTop: '1rem',
                borderLeft: `3px solid ${COUNCIL_ACCENT}`
            }}>
                <h3 className="mono-text" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem',
                    color: COUNCIL_ACCENT, fontSize: '0.95rem',
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                }}>
                    <span>
                        UNITED INTERSTELLAR COUNCIL
                        <span className="text-muted" style={{ fontSize: '0.7rem', marginLeft: '0.5rem' }}>
                            (COUNCIL RECORD // READ ONLY)
                        </span>
                    </span>
                    {isCouncilChairman && (
                        <span className="mono-text" style={{
                            fontSize: '0.7rem', padding: '2px 8px',
                            background: COUNCIL_ACCENT, color: 'var(--bg-dark)',
                            borderRadius: 'var(--radius-sm)', fontWeight: 'bold',
                        }}>
                            CHAIRMAN
                        </span>
                    )}
                </h3>

                {/* Council Membership Toggle */}
                {IS_ADMIN && (
                    <div style={{
                        display: 'flex', alignItems: 'center', gap: '0.5rem',
                        marginBottom: '1rem', padding: '0.5rem 0.75rem',
                        background: 'rgba(168, 85, 247, 0.08)',
                        borderRadius: 'var(--radius-sm)',
                        border: '1px solid rgba(168, 85, 247, 0.2)',
                    }}>
                        <input
                            type="checkbox"
                            id="council-member-toggle"
                            checked={isCouncilMember}
                            onChange={(e) => onToggleMembership(e.target.checked)}
                            style={{ cursor: 'pointer', accentColor: COUNCIL_ACCENT }}
                        />
                        <label htmlFor="council-member-toggle" className="mono-text" style={{
                            fontSize: '0.8rem', color: 'var(--text-primary)', cursor: 'pointer',
                        }}>
                            COUNCIL MEMBER
                        </label>
                        {isCouncilMember && isCouncilChairman && (
                            <span className="mono-text text-muted" style={{ fontSize: '0.7rem', marginLeft: '0.5rem' }}>
                                (Designated Chairman)
                            </span>
                        )}
                    </div>
                )}
                {/* Voting items — highlighted section */}
                {votingItems.length > 0 && (
                    <div style={{
                        border: '1px solid #f97316',
                        borderRadius: 'var(--radius-sm)',
                        padding: '0.75rem',
                        marginBottom: '0.75rem',
                        background: 'rgba(249, 115, 22, 0.08)',
                    }}>
                        <h4 className="mono-text" style={{
                            color: '#f97316', fontSize: '0.8rem',
                            marginBottom: '0.5rem', letterSpacing: '1px',
                        }}>
                            CURRENTLY IN VOTE
                        </h4>
                        {votingItems.map(item => (
                            <div key={item.id} className="tech-border" style={{
                                padding: '0.75rem', marginBottom: '0.5rem',
                                background: 'rgba(249, 115, 22, 0.05)',
                                borderLeft: '3px solid #f97316',
                            }}>
                                <div style={{
                                    display: 'flex', justifyContent: 'space-between',
                                    alignItems: 'center', marginBottom: '0.25rem'
                                }}>
                                    <span className="mono-text" style={{ color: 'var(--text-primary)', fontSize: '0.9rem', fontWeight: 'bold' }}>
                                        {item.name}
                                    </span>
                                    <span className="mono-text" style={{
                                        fontSize: '0.65rem', padding: '2px 6px',
                                        border: `1px solid ${COUNCIL_ACCENT}`,
                                        color: COUNCIL_ACCENT,
                                    }}>
                                        {typeLabels[item.itemType] || item.itemType.toUpperCase()}
                                    </span>
                                </div>
                                {item.proposedBy && (
                                    <p className="text-muted mono-text" style={{ fontSize: '0.75rem', marginBottom: '0.25rem' }}>
                                        Proposed by: {item.proposedBy}
                                    </p>
                                )}
                                {item.description && (
                                    <p className="text-secondary" style={{ fontSize: '0.85rem', marginTop: '0.25rem' }}>
                                        {item.description}
                                    </p>
                                )}
                            </div>
                        ))}
                    </div>
                )}

                {/* Active and proposed items */}
                {otherItems.map(item => (
                    <div key={item.id} className="tech-border" style={{
                        padding: '0.75rem', marginBottom: '0.5rem',
                        background: 'rgba(168, 85, 247, 0.05)',
                    }}>
                        <div style={{
                            display: 'flex', justifyContent: 'space-between',
                            alignItems: 'center', marginBottom: '0.25rem'
                        }}>
                            <span className="mono-text" style={{ color: 'var(--text-primary)', fontSize: '0.9rem', fontWeight: 'bold' }}>
                                {item.name}
                            </span>
                            <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
                                <span className="mono-text" style={{
                                    fontSize: '0.65rem', padding: '2px 6px',
                                    border: `1px solid ${COUNCIL_ACCENT}`,
                                    color: COUNCIL_ACCENT,
                                }}>
                                    {typeLabels[item.itemType] || item.itemType.toUpperCase()}
                                </span>
                                <span className="mono-text" style={{
                                    fontSize: '0.65rem', padding: '2px 6px',
                                    border: `1px solid ${statusColors[item.status] || 'var(--text-muted)'}`,
                                    color: statusColors[item.status] || 'var(--text-muted)',
                                }}>
                                    {item.status.toUpperCase()}
                                </span>
                            </div>
                        </div>
                        {item.proposedBy && (
                            <p className="text-muted mono-text" style={{ fontSize: '0.75rem', marginBottom: '0.25rem' }}>
                                Proposed by: {item.proposedBy}
                            </p>
                        )}
                        {item.description && (
                            <p className="text-secondary" style={{ fontSize: '0.85rem', marginTop: '0.25rem' }}>
                                {item.description}
                            </p>
                        )}
                    </div>
                ))}
            </div>
        );
    };

    // --- GENERIC TABLE MODULE ---
    const TableModule = ({ title, field, items, columns, update, onSave, visibility, onToggleVis, emptyItem, getFreshItems }) => {
        const isClassified = items === 'CLASSIFIED';

        if (isClassified && !IS_ADMIN) return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{ marginBottom: '1rem' }}>
                    {title}
                </h3>
                <Classified />
            </div>
        );

        const actualItems = Array.isArray(items) ? items : [];

        const addItem = () => {
            document.activeElement?.blur();
            const fresh = getFreshItems ? getFreshItems() : actualItems;
            update([...fresh, { ...emptyItem }]);
        };

        const removeItem = (idx) => {
            document.activeElement?.blur();
            const fresh = getFreshItems ? getFreshItems() : actualItems;
            update(fresh.filter((_, i) => i !== idx));
        };

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem',
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                }}>
                    <span>
                        {title}
                        <VisibilityToggle field={field} visibility={visibility} onToggle={onToggleVis} />
                    </span>
                    {IS_ADMIN && (
                        <button onClick={addItem} title="Add Row" style={{
                            background: 'transparent', border: '1px solid var(--accent-primary)',
                            color: 'var(--accent-primary)', width: '24px', height: '24px',
                            borderRadius: '4px', cursor: 'pointer',
                            display: 'flex', alignItems: 'center', justifyContent: 'center'
                        }}>
                            <Icon name="plus" size={14} />
                        </button>
                    )}
                </h3>

                {/* Column headers */}
                {actualItems.length > 0 && (
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: columns.map(c => c.width || '1fr').join(' ') + (IS_ADMIN ? ' 30px' : ''),
                        gap: '0.5rem', marginBottom: '0.5rem', padding: '0 0.5rem'
                    }}>
                        {columns.map(col => (
                            <span key={col.key} className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>
                                {col.label}
                            </span>
                        ))}
                    </div>
                )}

                {actualItems.map((item, idx) => (
                    <div key={idx} className="tech-border" style={{
                        display: 'grid',
                        gridTemplateColumns: columns.map(c => c.width || '1fr').join(' ') + (IS_ADMIN ? ' 30px' : ''),
                        gap: '0.5rem', padding: '0.5rem', marginBottom: '0.25rem',
                        background: 'rgba(0,0,0,0.2)', alignItems: 'start'
                    }}>
                        {columns.map(col => {
                            const isNotes = col.key === 'notes' || col.type === 'textarea';
                            return (
                                <AutoSaveInput
                                    key={col.key}
                                    type={col.type || 'text'}
                                    component={isNotes ? 'textarea' : 'input'}
                                    placeholder={col.label}
                                    defaultValue={item[col.key] || (col.type === 'number' ? 0 : '')}
                                    onSave={val => {
                                        const parsed = col.type === 'number' ? (parseInt(val) || 0) : val;
                                        const updated = actualItems.map((it, i) =>
                                            i === idx ? { ...it, [col.key]: parsed } : it
                                        );
                                        onSave(updated);
                                    }}
                                    disabled={!IS_ADMIN}
                                    style={{
                                        background: 'transparent', border: 'none',
                                        borderBottom: '1px solid var(--border-color)',
                                        color: 'var(--text-primary)', width: '100%',
                                        fontSize: '0.85rem',
                                        ...(isNotes ? { minHeight: '2.5rem', resize: 'vertical', fontFamily: 'inherit' } : {}),
                                    }}
                                />
                            );
                        })}
                        {IS_ADMIN && (
                            <button onClick={() => removeItem(idx)} style={{
                                background: 'transparent', border: 'none',
                                color: 'var(--accent-danger)', cursor: 'pointer'
                            }}>
                                <Icon name="x" size={14} />
                            </button>
                        )}
                    </div>
                ))}

                {actualItems.length === 0 && (
                    <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                        No data recorded.
                    </p>
                )}
            </div>
        );
    };

    // --- FTL PROJECTS MODULE (per-agency assignments with progress tracking) ---
    const FTL_ACCENT = '#3b82f6';

    const FTLProjectsModule = ({ ftlProjects, agencyId }) => {
        const [projects, setProjects] = useState(ftlProjects || []);
        const [showAssign, setShowAssign] = useState(false);
        const [allFTL, setAllFTL] = useState([]);
        const [loadingFTL, setLoadingFTL] = useState(false);

        // Keep in sync when parent re-renders with new data
        useEffect(() => {
            setProjects(ftlProjects || []);
        }, [ftlProjects]);

        const fetchAllFTL = async () => {
            setLoadingFTL(true);
            try {
                const res = await fetch('/api/ftl-projects/');
                if (res.ok) setAllFTL(await res.json());
            } catch (err) {
                console.error('Failed to fetch FTL projects:', err);
            }
            setLoadingFTL(false);
        };

        const openAssign = () => {
            fetchAllFTL();
            setShowAssign(true);
        };

        const assignProject = async (ftlProjectId) => {
            try {
                const res = await fetch(`/api/agencies/${agencyId}/ftl/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ ftlProjectId }),
                });
                if (res.ok) {
                    const newAssignment = await res.json();
                    setProjects(prev => [...prev, newAssignment]);
                    setShowAssign(false);
                }
            } catch (err) {
                console.error('Failed to assign FTL project:', err);
            }
        };

        const unassignProject = async (assignmentId) => {
            try {
                const res = await fetch(`/api/agencies/${agencyId}/ftl/${assignmentId}/`, {
                    method: 'DELETE',
                    headers: { 'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN },
                });
                if (res.ok) {
                    setProjects(prev => prev.filter(p => p.assignmentId !== assignmentId));
                }
            } catch (err) {
                console.error('Failed to unassign FTL project:', err);
            }
        };

        const updateSuccesses = async (assignmentId, delta) => {
            const proj = projects.find(p => p.assignmentId === assignmentId);
            if (!proj) return;
            const newVal = Math.max(0, proj.currentSuccesses + delta);
            try {
                const res = await fetch(`/api/agencies/${agencyId}/ftl/${assignmentId}/`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ currentSuccesses: newVal }),
                });
                if (res.ok) {
                    const updated = await res.json();
                    setProjects(prev => prev.map(p =>
                        p.assignmentId === assignmentId
                            ? { ...p, currentSuccesses: updated.currentSuccesses }
                            : p
                    ));
                }
            } catch (err) {
                console.error('Failed to update successes:', err);
            }
        };

        // Unassigned projects for the dropdown
        const assignedIds = projects.map(p => p.id);
        const unassigned = allFTL.filter(fp => !assignedIds.includes(fp.id));

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                borderLeft: `3px solid ${FTL_ACCENT}`,
            }}>
                <h3 className="mono-text" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem',
                    color: FTL_ACCENT, fontSize: '0.95rem',
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                }}>
                    <span>
                        FTL PROJECTS
                        <span className="text-muted" style={{ fontSize: '0.7rem', marginLeft: '0.5rem' }}>
                            (FASTER THAN LIGHT RESEARCH)
                        </span>
                    </span>
                    {IS_ADMIN && (
                        <button onClick={openAssign} style={{
                            background: 'transparent', border: `1px solid ${FTL_ACCENT}`,
                            color: FTL_ACCENT, padding: '4px 12px',
                            cursor: 'pointer', fontFamily: 'var(--font-mono)', fontSize: '0.75rem',
                            borderRadius: 'var(--radius-sm)',
                        }}>
                            ASSIGN FTL PROJECT
                        </button>
                    )}
                </h3>

                {/* Assign dropdown */}
                {showAssign && IS_ADMIN && (
                    <div className="tech-border" style={{
                        padding: '0.75rem', marginBottom: '1rem',
                        background: 'rgba(59, 130, 246, 0.05)',
                    }}>
                        {loadingFTL ? (
                            <span className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>
                                Loading available projects...
                            </span>
                        ) : unassigned.length === 0 ? (
                            <div>
                                <span className="text-muted mono-text" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                                    All FTL projects are already assigned.
                                </span>
                                <button onClick={() => setShowAssign(false)} style={{
                                    background: 'transparent', border: '1px solid var(--border-color)',
                                    color: 'var(--text-muted)', padding: '3px 10px', cursor: 'pointer',
                                    marginLeft: '0.5rem', fontSize: '0.75rem',
                                }}>CLOSE</button>
                            </div>
                        ) : (
                            <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center', flexWrap: 'wrap' }}>
                                <select
                                    id="ftl-assign-select"
                                    style={{
                                        background: 'var(--bg-input, #1a1a2e)',
                                        border: '1px solid var(--border-color)',
                                        color: 'var(--text-primary)',
                                        padding: '0.3rem 0.5rem',
                                        fontFamily: 'var(--font-mono)',
                                        fontSize: '0.8rem',
                                        flex: 1,
                                        minWidth: '200px',
                                    }}
                                >
                                    {unassigned.map(fp => (
                                        <option key={fp.id} value={fp.id}>{fp.name}</option>
                                    ))}
                                </select>
                                <button
                                    onClick={() => {
                                        const sel = document.getElementById('ftl-assign-select');
                                        if (sel && sel.value) assignProject(parseInt(sel.value));
                                    }}
                                    style={{
                                        background: FTL_ACCENT, border: 'none',
                                        color: 'var(--bg-dark)', padding: '4px 12px',
                                        cursor: 'pointer', fontFamily: 'var(--font-mono)',
                                        fontSize: '0.8rem', fontWeight: 'bold',
                                        borderRadius: 'var(--radius-sm)',
                                    }}
                                >ASSIGN</button>
                                <button onClick={() => setShowAssign(false)} style={{
                                    background: 'transparent', border: '1px solid var(--border-color)',
                                    color: 'var(--text-muted)', padding: '4px 12px', cursor: 'pointer',
                                    fontSize: '0.8rem',
                                }}>CANCEL</button>
                            </div>
                        )}
                    </div>
                )}

                {/* Project cards */}
                {projects.length === 0 && (
                    <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                        No FTL projects assigned.
                    </p>
                )}

                {projects.map(proj => {
                    const pct = proj.requiredSuccesses > 0
                        ? Math.min(100, Math.round((proj.currentSuccesses / proj.requiredSuccesses) * 100))
                        : 0;
                    const isComplete = proj.currentSuccesses >= proj.requiredSuccesses;

                    return (
                        <div key={proj.assignmentId} className="tech-border" style={{
                            padding: '1rem', marginBottom: '0.5rem',
                            background: isComplete
                                ? 'rgba(59, 130, 246, 0.08)'
                                : 'rgba(0,0,0,0.2)',
                        }}>
                            {/* Header row */}
                            <div style={{
                                display: 'flex', justifyContent: 'space-between',
                                alignItems: 'flex-start', marginBottom: '0.5rem',
                            }}>
                                <div>
                                    <span className="mono-text" style={{
                                        color: FTL_ACCENT, fontSize: '0.95rem', fontWeight: 'bold',
                                    }}>
                                        {proj.name}
                                    </span>
                                    {isComplete && (
                                        <span className="mono-text" style={{
                                            fontSize: '0.7rem', padding: '2px 6px',
                                            border: `1px solid ${FTL_ACCENT}`,
                                            color: FTL_ACCENT, marginLeft: '0.5rem',
                                        }}>COMPLETE</span>
                                    )}
                                </div>
                                {IS_ADMIN && (
                                    <button
                                        onClick={() => unassignProject(proj.assignmentId)}
                                        title="Unassign FTL project"
                                        style={{
                                            background: 'transparent', border: 'none',
                                            color: 'var(--accent-danger)', cursor: 'pointer',
                                            padding: '2px',
                                        }}
                                    >
                                        <Icon name="x" size={16} />
                                    </button>
                                )}
                            </div>

                            {/* Description */}
                            {proj.description && (
                                <p style={{
                                    color: 'var(--text-secondary)', fontSize: '0.85rem',
                                    marginBottom: '0.5rem',
                                }}>
                                    {proj.description}
                                </p>
                            )}

                            {/* Pros and Cons */}
                            <div style={{
                                display: 'grid', gridTemplateColumns: '1fr 1fr',
                                gap: '0.75rem', marginBottom: '0.75rem',
                            }}>
                                {proj.pros && proj.pros.length > 0 && (
                                    <div>
                                        <span className="mono-text" style={{
                                            fontSize: '0.7rem', color: 'var(--accent-primary)',
                                        }}>PROS</span>
                                        <ul style={{
                                            margin: '0.25rem 0 0 0', paddingLeft: '1rem',
                                            fontSize: '0.8rem', color: 'var(--text-secondary)',
                                        }}>
                                            {proj.pros.map((p, i) => (
                                                <li key={i} style={{ marginBottom: '0.15rem' }}>{p.text}</li>
                                            ))}
                                        </ul>
                                    </div>
                                )}
                                {proj.cons && proj.cons.length > 0 && (
                                    <div>
                                        <span className="mono-text" style={{
                                            fontSize: '0.7rem', color: 'var(--accent-danger)',
                                        }}>CONS</span>
                                        <ul style={{
                                            margin: '0.25rem 0 0 0', paddingLeft: '1rem',
                                            fontSize: '0.8rem', color: 'var(--text-secondary)',
                                        }}>
                                            {proj.cons.map((c, i) => (
                                                <li key={i} style={{ marginBottom: '0.15rem' }}>{c.text}</li>
                                            ))}
                                        </ul>
                                    </div>
                                )}
                            </div>

                            {/* Progress bar + counter */}
                            <div style={{ marginTop: '0.5rem' }}>
                                <div style={{
                                    display: 'flex', justifyContent: 'space-between',
                                    alignItems: 'center', marginBottom: '0.25rem',
                                }}>
                                    <span className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>
                                        PROGRESS
                                    </span>
                                    <span className="mono-text" style={{
                                        fontSize: '0.8rem', color: FTL_ACCENT,
                                    }}>
                                        {proj.currentSuccesses} / {proj.requiredSuccesses}
                                    </span>
                                </div>
                                {/* Progress bar */}
                                <div style={{
                                    width: '100%', height: '8px',
                                    background: 'rgba(255,255,255,0.05)',
                                    borderRadius: '4px', overflow: 'hidden',
                                    border: '1px solid var(--border-color)',
                                }}>
                                    <div style={{
                                        width: `${pct}%`, height: '100%',
                                        background: isComplete
                                            ? 'var(--accent-primary)'
                                            : FTL_ACCENT,
                                        transition: 'width 0.3s ease',
                                    }} />
                                </div>
                                {/* Add/remove successes (admin only) */}
                                {IS_ADMIN && (
                                    <div style={{
                                        display: 'flex', gap: '0.5rem',
                                        alignItems: 'center', justifyContent: 'center',
                                        marginTop: '0.5rem',
                                    }}>
                                        <button
                                            onClick={() => {
                                                const input = document.getElementById(`ftl-delta-${proj.assignmentId}`);
                                                const val = parseInt(input?.value) || 1;
                                                updateSuccesses(proj.assignmentId, -val);
                                            }}
                                            disabled={proj.currentSuccesses <= 0}
                                            title="Remove successes"
                                            style={{
                                                background: 'transparent',
                                                border: '1px solid var(--border-color)',
                                                color: 'var(--text-primary)',
                                                padding: '4px 10px',
                                                cursor: proj.currentSuccesses <= 0 ? 'not-allowed' : 'pointer',
                                                fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                borderRadius: 'var(--radius-sm)',
                                                opacity: proj.currentSuccesses <= 0 ? 0.3 : 1,
                                            }}
                                        >−</button>
                                        <input
                                            id={`ftl-delta-${proj.assignmentId}`}
                                            type="number"
                                            defaultValue={1}
                                            min={1}
                                            style={{
                                                width: '50px', textAlign: 'center',
                                                background: 'var(--bg-input)',
                                                border: '1px solid var(--border-color)',
                                                color: 'var(--text-primary)',
                                                padding: '4px',
                                                fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                borderRadius: 'var(--radius-sm)',
                                            }}
                                        />
                                        <button
                                            onClick={() => {
                                                const input = document.getElementById(`ftl-delta-${proj.assignmentId}`);
                                                const val = parseInt(input?.value) || 1;
                                                updateSuccesses(proj.assignmentId, val);
                                            }}
                                            title="Add successes"
                                            style={{
                                                background: 'rgba(59, 130, 246, 0.15)',
                                                border: `1px solid ${FTL_ACCENT}`,
                                                color: FTL_ACCENT,
                                                padding: '4px 10px',
                                                cursor: 'pointer',
                                                fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                borderRadius: 'var(--radius-sm)',
                                            }}
                                        >+</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                })}
            </div>
        );
    };

    // --- CHANGE REQUEST PANEL (player agency) ---
    const ChangeRequestPanel = ({ agencyId }) => {
        const [requests, setRequests] = useState([]);
        const [showForm, setShowForm] = useState(false);
        const [fieldName, setFieldName] = useState('');
        const [description, setDescription] = useState('');
        const [submitting, setSubmitting] = useState(false);

        useEffect(() => {
            fetchRequests();
        }, []);

        const fetchRequests = async () => {
            try {
                const res = await fetch(`/api/agencies/${agencyId}/changes/`);
                if (res.ok) setRequests(await res.json());
            } catch (err) {
                console.error('Failed to fetch change requests:', err);
            }
        };

        const submitRequest = async () => {
            if (!fieldName.trim() || !description.trim()) return;
            setSubmitting(true);
            try {
                const res = await fetch(`/api/agencies/${agencyId}/changes/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({
                        fieldName: fieldName,
                        description: description,
                        proposedChanges: {}
                    }),
                });
                if (res.ok) {
                    setFieldName('');
                    setDescription('');
                    setShowForm(false);
                    fetchRequests();
                }
            } catch (err) {
                console.error('Failed to submit change request:', err);
            } finally {
                setSubmitting(false);
            }
        };

        const reviewRequest = async (id, action, adminNote = '') => {
            try {
                const res = await fetch(`/api/changes/${id}/review/`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ action, adminNote }),
                });
                if (res.ok) fetchRequests();
            } catch (err) {
                console.error('Failed to review request:', err);
            }
        };

        const pending = requests.filter(r => r.status === 'pending');
        const reviewed = requests.filter(r => r.status !== 'pending');

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                borderLeft: '3px solid var(--accent-warning)'
            }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem',
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                }}>
                    <span>
                        CHANGE REQUESTS
                        {pending.length > 0 && (
                            <span style={{
                                background: 'var(--accent-warning)',
                                color: 'var(--bg-dark)',
                                borderRadius: '50%', width: '20px', height: '20px',
                                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                                fontSize: '0.7rem', fontWeight: 'bold', marginLeft: '0.5rem'
                            }}>{pending.length}</span>
                        )}
                    </span>
                    {!IS_ADMIN && (
                        <button onClick={() => setShowForm(!showForm)} style={{
                            background: 'transparent', border: '1px solid var(--accent-primary)',
                            color: 'var(--accent-primary)', padding: '4px 12px',
                            cursor: 'pointer', fontFamily: 'var(--font-mono)', fontSize: '0.8rem'
                        }}>
                            REQUEST CHANGE
                        </button>
                    )}
                </h3>

                {/* Submit form (non-admin) */}
                {showForm && !IS_ADMIN && (
                    <div className="tech-border" style={{ padding: '1rem', marginBottom: '1rem', background: 'rgba(0,0,0,0.2)' }}>
                        <div style={{ marginBottom: '0.5rem' }}>
                            <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>SECTION</label>
                            <select value={fieldName} onChange={e => setFieldName(e.target.value)}
                                style={{
                                    width: '100%', background: 'var(--bg-input, #1a1a2e)',
                                    border: '1px solid var(--border-color)', color: 'var(--text-primary)',
                                    padding: '0.25rem'
                                }}>
                                <option value="">Select section...</option>
                                <option value="attributes">Attributes</option>
                                <option value="specializations">Specializations</option>
                                <option value="merits">Merits</option>
                                <option value="flaws">Flaws</option>
                                <option value="assets">Assets</option>
                                <option value="fleet">Fleet</option>
                                <option value="conditions">Conditions</option>
                                <option value="projects">Projects</option>
                                <option value="history">History</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div style={{ marginBottom: '0.5rem' }}>
                            <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>DESCRIPTION</label>
                            <textarea value={description} onChange={e => setDescription(e.target.value)}
                                placeholder="Describe the change you'd like to make..."
                                style={{
                                    width: '100%', minHeight: '60px', background: 'transparent',
                                    border: '1px solid var(--border-color)', color: 'var(--text-primary)',
                                    padding: '0.5rem', fontFamily: 'inherit', resize: 'vertical'
                                }} />
                        </div>
                        <div style={{ display: 'flex', gap: '0.5rem', justifyContent: 'flex-end' }}>
                            <button onClick={() => setShowForm(false)} style={{
                                background: 'transparent', border: '1px solid var(--border-color)',
                                color: 'var(--text-muted)', padding: '4px 12px', cursor: 'pointer'
                            }}>CANCEL</button>
                            <button onClick={submitRequest} disabled={submitting} style={{
                                background: 'var(--accent-primary)', border: 'none',
                                color: 'var(--bg-dark)', padding: '4px 12px',
                                cursor: 'pointer', fontWeight: 'bold'
                            }}>{submitting ? 'SUBMITTING...' : 'SUBMIT'}</button>
                        </div>
                    </div>
                )}

                {/* Pending requests */}
                {pending.map(cr => (
                    <div key={cr.id} className="tech-border" style={{
                        padding: '0.75rem', marginBottom: '0.5rem',
                        background: 'rgba(0,0,0,0.2)',
                        borderLeft: '2px solid var(--accent-warning)'
                    }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                            <div>
                                <span className="mono-text text-accent" style={{ fontSize: '0.85rem' }}>
                                    {cr.fieldName}
                                </span>
                                <span className="text-muted" style={{ fontSize: '0.8rem', marginLeft: '0.5rem' }}>
                                    by {cr.requester}
                                </span>
                            </div>
                            <span className="mono-text" style={{
                                fontSize: '0.7rem', padding: '2px 6px',
                                border: '1px solid var(--accent-warning)',
                                color: 'var(--accent-warning)'
                            }}>PENDING</span>
                        </div>
                        <p className="text-secondary" style={{ fontSize: '0.85rem', marginTop: '0.25rem' }}>
                            {cr.description}
                        </p>
                        {IS_ADMIN && (
                            <div style={{ display: 'flex', gap: '0.5rem', marginTop: '0.5rem', justifyContent: 'flex-end' }}>
                                <button
                                    onClick={() => {
                                        const note = prompt('Admin note (optional):') || '';
                                        reviewRequest(cr.id, 'approve', note);
                                    }}
                                    style={{
                                        background: 'var(--accent-success, #00cc66)', border: 'none',
                                        color: 'var(--bg-dark)', padding: '4px 12px',
                                        cursor: 'pointer', fontFamily: 'var(--font-mono)',
                                        fontSize: '0.8rem', fontWeight: 'bold'
                                    }}>APPROVE</button>
                                <button
                                    onClick={() => {
                                        const note = prompt('Reason for rejection:') || '';
                                        reviewRequest(cr.id, 'reject', note);
                                    }}
                                    style={{
                                        background: 'var(--accent-danger)', border: 'none',
                                        color: 'var(--bg-dark)', padding: '4px 12px',
                                        cursor: 'pointer', fontFamily: 'var(--font-mono)',
                                        fontSize: '0.8rem', fontWeight: 'bold'
                                    }}>REJECT</button>
                            </div>
                        )}
                    </div>
                ))}

                {/* Reviewed requests */}
                {reviewed.length > 0 && (
                    <details style={{ marginTop: '0.5rem' }}>
                        <summary className="text-muted mono-text" style={{ cursor: 'pointer', fontSize: '0.8rem' }}>
                            HISTORY ({reviewed.length})
                        </summary>
                        {reviewed.map(cr => (
                            <div key={cr.id} style={{
                                padding: '0.5rem', marginTop: '0.25rem',
                                borderLeft: `2px solid ${cr.status === 'approved' ? 'var(--accent-success, #00cc66)' : 'var(--accent-danger)'}`,
                                opacity: 0.7
                            }}>
                                <span className="mono-text" style={{ fontSize: '0.8rem' }}>
                                    {cr.fieldName}
                                </span>
                                <span style={{
                                    fontSize: '0.7rem', marginLeft: '0.5rem',
                                    color: cr.status === 'approved' ? 'var(--accent-success, #00cc66)' : 'var(--accent-danger)'
                                }}>
                                    {cr.status.toUpperCase()}
                                </span>
                                {cr.adminNote && (
                                    <p className="text-muted" style={{ fontSize: '0.8rem', marginTop: '0.25rem' }}>
                                        Note: {cr.adminNote}
                                    </p>
                                )}
                            </div>
                        ))}
                    </details>
                )}

                {requests.length === 0 && (
                    <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                        No change requests.
                    </p>
                )}
            </div>
        );
    };

    // --- BASES MODULE ---
    const BASE_ACCENT = '#22c55e';

    const BasesModule = ({ bases: initialBases, baseConfig, agencyId, onBasesChange, assignableCharacters, assignableNpcs, visibility, onToggleVis, classifiedBases }) => {
        const [bases, setBases] = useState(initialBases || []);
        const [expandedBase, setExpandedBase] = useState(null);
        const [creating, setCreating] = useState(false);
        const saveTimers = useRef({});

        useEffect(() => { setBases(initialBases || []); }, [initialBases]);

        // Notify parent whenever bases change so EXP totals stay in sync
        const updateBases = (updater) => {
            setBases(prev => {
                const next = typeof updater === 'function' ? updater(prev) : updater;
                if (onBasesChange) onBasesChange(next);
                return next;
            });
        };

        const headers = () => ({
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
        });

        // Lookup helpers
        const getLocationType = (key) => (baseConfig.locationTypes || []).find(lt => lt.key === key);
        const getMerit = (key) => (baseConfig.locationMerits || []).find(m => m.key === key);
        const getFacilityType = (key) => (baseConfig.facilityTypes || []).find(f => f.key === key);
        const getEquipment = (key) => (baseConfig.equipmentTypes || []).find(e => e.key === key);

        const calcBaseCosts = (base) => {
            let totalExp = 0;
            let totalSpace = 0;
            let usedSpace = 0;
            const loc = getLocationType(base.locationType);
            if (loc) { totalExp += loc.exp; totalSpace += loc.space; }
            (base.merits || []).forEach(mk => {
                const m = getMerit(mk);
