                if (m) { totalExp += m.exp; totalSpace += (m.extraSpace || 0); }
            });
            (base.facilities || []).forEach(f => {
                const ft = getFacilityType(f.key);
                if (ft) {
                    const lvl = ft.levels.find(l => l.level === f.level);
                    if (lvl) { totalExp += lvl.exp; usedSpace += lvl.size; }
                }
            });
            const wsConfig = getWorkspaceConfig(baseConfig);
            (base.workspaces || []).forEach(w => {
                if (wsConfig) {
                    const lvl = wsConfig.levels.find(l => l.level === w.level);
                    if (lvl) { totalExp += lvl.exp; usedSpace += lvl.size; }
                }
            });
            (base.equipment || []).forEach(ek => {
                const eq = getEquipment(ek);
                if (eq) { totalExp += eq.exp; }
            });
            return { totalExp, totalSpace, usedSpace, freeSpace: totalSpace - usedSpace };
        };

        const saveBase = (baseId, data) => {
            if (saveTimers.current[baseId]) clearTimeout(saveTimers.current[baseId]);
            saveTimers.current[baseId] = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/agencies/${agencyId}/bases/${baseId}/`, {
                        method: 'PUT', headers: headers(), body: JSON.stringify(data),
                    });
                    if (res.ok) {
                        const updated = await res.json();
                        updateBases(prev => prev.map(b => b.id === baseId ? updated : b));
                    }
                } catch (err) { console.error('Base save error:', err); }
            }, 500);
        };

        const createBase = async () => {
            setCreating(true);
            try {
                const res = await fetch(`/api/agencies/${agencyId}/bases/`, {
                    method: 'POST', headers: headers(), body: JSON.stringify({ name: 'NEW BASE' }),
                });
                if (res.ok) {
                    const newBase = await res.json();
                    updateBases(prev => [...prev, newBase]);
                    setExpandedBase(newBase.id);
                }
            } catch (err) { console.error('Create base error:', err); }
            setCreating(false);
        };

        const deleteBase = async (baseId) => {
            try {
                await fetch(`/api/agencies/${agencyId}/bases/${baseId}/`, {
                    method: 'DELETE', headers: headers(),
                });
                updateBases(prev => prev.filter(b => b.id !== baseId));
                if (expandedBase === baseId) setExpandedBase(null);
            } catch (err) { console.error('Delete base error:', err); }
        };

        const updateBaseField = (baseId, field, value) => {
            updateBases(prev => prev.map(b => {
                if (b.id !== baseId) return b;
                const updated = { ...b, [field]: value };
                saveBase(baseId, updated);
                return updated;
            }));
        };

        const toggleMerit = (baseId, meritKey) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const current = base.merits || [];
            const newMerits = current.includes(meritKey)
                ? current.filter(k => k !== meritKey)
                : [...current, meritKey];
            updateBaseField(baseId, 'merits', newMerits);
        };

        const toggleFacilityLevel = (baseId, facilityKey, level) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const current = base.facilities || [];
            const has = current.some(f => f.key === facilityKey && f.level === level);
            let newFacilities;
            if (has) {
                newFacilities = current.filter(f => !(f.key === facilityKey && f.level === level));
            } else {
                newFacilities = [...current, { key: facilityKey, level }];
            }
            updateBaseField(baseId, 'facilities', newFacilities);
        };

        const addWorkspace = (baseId, level) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const ws = [...(base.workspaces || []), { level, assignedTo: null, assignedType: null }];
            updateBaseField(baseId, 'workspaces', ws);
        };

        const removeWorkspace = (baseId, idx) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            updateBaseField(baseId, 'workspaces', (base.workspaces || []).filter((_, i) => i !== idx));
        };

        const updateWorkspace = (baseId, idx, updates) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const ws = (base.workspaces || []).map((w, i) => i === idx ? { ...w, ...updates } : w);
            updateBaseField(baseId, 'workspaces', ws);
        };

        const toggleEquipment = (baseId, eqKey) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const current = base.equipment || [];
            const newEquip = current.includes(eqKey)
                ? current.filter(k => k !== eqKey)
                : [...current, eqKey];
            updateBaseField(baseId, 'equipment', newEquip);
        };

        const toggleHiddenSection = (baseId, sectionKey) => {
            const base = bases.find(b => b.id === baseId);
            if (!base) return;
            const current = base.hiddenSections || [];
            const newSections = current.includes(sectionKey)
                ? current.filter(k => k !== sectionKey)
                : [...current, sectionKey];
            updateBaseField(baseId, 'hiddenSections', newSections);
        };

        const SectionHideToggle = ({ baseId, sectionKey, hiddenSections }) => {
            if (!IS_ADMIN) return null;
            const isHidden = (hiddenSections || []).includes(sectionKey);
            return (
                <button
                    onClick={e => { e.stopPropagation(); toggleHiddenSection(baseId, sectionKey); }}
                    title={isHidden ? 'Hidden from players — click to reveal' : 'Visible to players — click to hide'}
                    style={{
                        background: 'transparent', border: 'none', cursor: 'pointer',
                        padding: '0 0.3rem', fontSize: '0.7rem', marginLeft: '0.3rem',
                        color: isHidden ? 'var(--accent-danger)' : 'var(--text-muted)',
                        opacity: isHidden ? 1 : 0.4,
                    }}>
                    {isHidden ? '🔒' : '👁'}
                </button>
            );
        };

        const BaseCard = ({ base }) => {
            // Classified base — non-admin sees just the name
            if (base.classified && !IS_ADMIN) {
                return (
                    <div className="glass-panel" style={{ padding: '1rem', marginBottom: '0.75rem', borderLeft: `3px solid ${BASE_ACCENT}` }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                            <span className="mono-text" style={{ color: BASE_ACCENT, fontSize: '1rem', fontWeight: 'bold' }}>
                                {base.name || 'UNNAMED BASE'}
                            </span>
                            <Classified />
                        </div>
                    </div>
                );
            }

            const isExpanded = expandedBase === base.id;
            const costs = calcBaseCosts(base);
            const loc = getLocationType(base.locationType);
            const spacePercent = costs.totalSpace > 0 ? Math.min(100, (costs.usedSpace / costs.totalSpace) * 100) : 0;
            const basePath = `bases.${base.id}`;
            const hidden = new Set(base.hiddenSections || []);
            const isSectionHidden = (key) => !IS_ADMIN && hidden.has(key);

            return (
                <div className="glass-panel" style={{ padding: '1rem', marginBottom: '0.75rem', borderLeft: `3px solid ${BASE_ACCENT}` }}>
                    {/* Header row */}
                    <div title={loc ? `${loc.description}${loc.included ? '\n' + loc.included : ''}` : ''}
                         style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer' }}
                         onClick={() => setExpandedBase(isExpanded ? null : base.id)}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', flex: 1 }}>
                            <Icon name={isExpanded ? "chevron-down" : "chevron-right"} size={16} />
                            <span className="mono-text" style={{ color: BASE_ACCENT, fontSize: '1rem', fontWeight: 'bold' }}>
                                {base.name || 'UNNAMED BASE'}
                            </span>
                            {loc && (
                                <span className="text-muted mono-text" style={{ fontSize: '0.75rem' }}>
                                    [{loc.name}]
                                </span>
                            )}
                            <VisibilityToggle field={basePath} visibility={visibility} onToggle={onToggleVis} />
                            {base.isHidden && (
                                <span className="mono-text" style={{
                                    fontSize: '0.65rem', color: 'var(--accent-danger)',
                                    border: '1px solid var(--accent-danger)',
                                    padding: '0.1rem 0.4rem', borderRadius: 'var(--radius-sm)',
                                }}>HIDDEN</span>
                            )}
                        </div>
                        <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                            <span className="mono-text" style={{ fontSize: '0.75rem', color: '#f59e0b' }}>
                                EXP: {costs.totalExp}
                            </span>
                            {!isSectionHidden('space') && (
                                <span className="mono-text" style={{
                                    fontSize: '0.75rem',
                                    color: costs.freeSpace < 0 ? 'var(--accent-danger)' : BASE_ACCENT
                                }}>
                                    SPACE: {costs.usedSpace}/{costs.totalSpace}
                                </span>
                            )}
                        </div>
                    </div>

                    {isExpanded && (
                        <div style={{ marginTop: '1rem', borderTop: '1px solid var(--border-color)', paddingTop: '1rem' }}>
                            {/* Base name */}
                            <div style={{ marginBottom: '1rem' }}>
                                <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>BASE NAME</label>
                                <AutoSaveInput type="text" defaultValue={base.name}
                                    onSave={val => updateBaseField(base.id, 'name', val)}
                                    disabled={!IS_ADMIN}
                                    style={{
                                        background: 'transparent', border: 'none',
                                        borderBottom: `1px solid ${BASE_ACCENT}`,
                                        color: 'var(--text-primary)', width: '100%',
                                        fontSize: '1rem', fontFamily: 'var(--font-mono)',
                                    }} />
                            </div>

                            {/* Hidden toggle — admin only */}
                            {IS_ADMIN && (
                                <div style={{ marginBottom: '1rem' }}>
                                    <label style={{
                                        display: 'flex', alignItems: 'center', gap: '0.5rem',
                                        cursor: 'pointer', fontFamily: 'var(--font-mono)',
                                        fontSize: '0.8rem', color: base.isHidden ? 'var(--accent-danger)' : 'var(--text-secondary)',
                                    }}>
                                        <input
                                            type="checkbox"
                                            checked={base.isHidden || false}
                                            onChange={e => updateBaseField(base.id, 'isHidden', e.target.checked)}
                                            style={{ accentColor: 'var(--accent-danger)' }}
                                        />
                                        HIDDEN (only visible to admins)
                                    </label>
                                </div>
                            )}

                            {/* Location Type */}
                            <div style={{ marginBottom: '1rem' }}>
                                <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.5rem' }}>
                                    LOCATION TYPE
                                    <SectionHideToggle baseId={base.id} sectionKey="locationType" hiddenSections={base.hiddenSections} />
                                </label>
                                {isSectionHidden('locationType') ? <Classified /> : (
                                    <React.Fragment>
                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem' }}>
                                            {(baseConfig.locationTypes || []).map(lt => {
                                                const selected = base.locationType === lt.key;
                                                return (
                                                    <button key={lt.key}
                                                        onClick={() => IS_ADMIN && updateBaseField(base.id, 'locationType', selected ? '' : lt.key)}
                                                        disabled={!IS_ADMIN}
                                                        title={`${lt.description}${lt.included ? '\n' + lt.included : ''}`}
                                                        style={{
                                                            background: selected ? `${BASE_ACCENT}22` : 'rgba(0,0,0,0.2)',
                                                            border: `1px solid ${selected ? BASE_ACCENT : 'var(--border-color)'}`,
                                                            color: selected ? BASE_ACCENT : 'var(--text-muted)',
                                                            padding: '0.4rem 0.75rem', cursor: IS_ADMIN ? 'pointer' : 'default',
                                                            fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                            borderRadius: 'var(--radius-sm)',
                                                        }}>
                                                        {lt.name}
                                                        <span style={{ fontSize: '0.65rem', marginLeft: '0.5rem', opacity: 0.7 }}>
                                                            E:{lt.exp} S:{lt.space}
                                                        </span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                        {loc && loc.included && (
                                            <p className="text-muted" style={{ fontSize: '0.75rem', marginTop: '0.5rem', fontStyle: 'italic' }}>
                                                {loc.included}
                                            </p>
                                        )}
                                    </React.Fragment>
                                )}
                            </div>

                            {/* Location Merits */}
                            <div style={{ marginBottom: '1rem' }}>
                                <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.5rem' }}>
                                    LOCATION MERITS
                                    <SectionHideToggle baseId={base.id} sectionKey="merits" hiddenSections={base.hiddenSections} />
                                </label>
                                {isSectionHidden('merits') ? <Classified /> : (
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem' }}>
                                        {(baseConfig.locationMerits || []).map(m => {
                                            const selected = (base.merits || []).includes(m.key);
                                            return (
                                                <button key={m.key}
                                                    onClick={() => IS_ADMIN && toggleMerit(base.id, m.key)}
                                                    disabled={!IS_ADMIN}
                                                    title={m.description}
                                                    style={{
                                                        background: selected ? '#3b82f622' : 'rgba(0,0,0,0.2)',
                                                        border: `1px solid ${selected ? '#3b82f6' : 'var(--border-color)'}`,
                                                        color: selected ? '#3b82f6' : 'var(--text-muted)',
                                                        padding: '0.4rem 0.75rem', cursor: IS_ADMIN ? 'pointer' : 'default',
                                                        fontFamily: 'var(--font-mono)', fontSize: '0.8rem',
                                                        borderRadius: 'var(--radius-sm)',
                                                    }}>
                                                    {m.name}
                                                    <span style={{ fontSize: '0.65rem', marginLeft: '0.5rem', opacity: 0.7 }}>
                                                        E:+{m.exp}{m.extraSpace > 0 ? ` S:+${m.extraSpace}` : ''}
                                                    </span>
                                                </button>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>

                            {/* Space Usage Bar */}
                            {costs.totalSpace > 0 && (
                                <div style={{ marginBottom: '1rem' }}>
                                    <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>
                                        SPACE USAGE{!isSectionHidden('space') && `: ${costs.usedSpace} / ${costs.totalSpace}`}
                                        {!isSectionHidden('space') && costs.freeSpace < 0 && <span style={{ color: 'var(--accent-danger)', marginLeft: '0.5rem' }}>OVER CAPACITY!</span>}
                                        <SectionHideToggle baseId={base.id} sectionKey="space" hiddenSections={base.hiddenSections} />
                                    </label>
                                    {isSectionHidden('space') ? <Classified /> : (
                                        <div style={{ background: 'rgba(0,0,0,0.3)', height: '8px', borderRadius: '4px', overflow: 'hidden' }}>
                                            <div style={{
                                                width: `${spacePercent}%`, height: '100%',
                                                background: costs.freeSpace < 0 ? 'var(--accent-danger)' : BASE_ACCENT,
                                                transition: 'width 0.3s',
                                            }} />
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Facilities (multi-select, excludes workspace) */}
                            <div style={{ marginBottom: '1rem' }}>
                                <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.5rem' }}>
                                    FACILITIES
                                    <SectionHideToggle baseId={base.id} sectionKey="facilities" hiddenSections={base.hiddenSections} />
                                    <VisibilityToggle field={`${basePath}.facilities`} visibility={visibility} onToggle={onToggleVis} />
                                </label>
                                {(isSectionHidden('facilities') || (base.classifiedFacilities && !IS_ADMIN)) ? <Classified /> : (baseConfig.facilityTypes || []).filter(ft => ft.key !== 'workspace').map(ft => {
                                    const selectedLevels = (base.facilities || []).filter(f => f.key === ft.key).map(f => f.level);
                                    const hasAny = selectedLevels.length > 0;
                                    return (
                                        <div key={ft.key} className="tech-border"
                                            style={{
                                            padding: '0.5rem', marginBottom: '0.25rem',
                                            background: hasAny ? 'rgba(34,197,94,0.05)' : 'rgba(0,0,0,0.15)',
                                        }}>
                                            <span className="mono-text" style={{
                                                fontSize: '0.85rem', display: 'block', marginBottom: '0.35rem',
                                                color: hasAny ? BASE_ACCENT : 'var(--text-muted)',
                                            }}>
                                                {ft.name}
                                            </span>
                                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.3rem' }}>
                                                {ft.levels.map(lvl => {
                                                    const active = selectedLevels.includes(lvl.level);
                                                    return (
                                                        <button key={lvl.level}
                                                            onClick={() => IS_ADMIN && toggleFacilityLevel(base.id, ft.key, lvl.level)}
                                                            disabled={!IS_ADMIN}
                                                            title={lvl.description}
                                                            style={{
                                                                background: active ? `${BASE_ACCENT}22` : 'rgba(0,0,0,0.2)',
                                                                border: `1px solid ${active ? BASE_ACCENT : 'var(--border-color)'}`,
                                                                color: active ? BASE_ACCENT : 'var(--text-muted)',
                                                                padding: '0.25rem 0.5rem', cursor: IS_ADMIN ? 'pointer' : 'default',
                                                                fontFamily: 'var(--font-mono)', fontSize: '0.7rem',
                                                                borderRadius: 'var(--radius-sm)',
                                                            }}>
                                                            {lvl.name}
                                                            <span style={{ fontSize: '0.6rem', marginLeft: '0.3rem', opacity: 0.7 }}>
                                                                E:{lvl.exp} S:{lvl.size}
                                                            </span>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Workspaces (multi-instance with assignment) */}
                            {(() => {
                                const wsConfig = getWorkspaceConfig(baseConfig);
                                if (!wsConfig) return null;
                                if ((isSectionHidden('workspaces') || (base.classifiedWorkspaces && !IS_ADMIN))) return (
                                    <div style={{ marginBottom: '1rem' }}>
                                        <label className="text-muted mono-text" style={{ fontSize: '0.7rem', marginBottom: '0.5rem' }}>
                                            WORKSPACES
                                            <SectionHideToggle baseId={base.id} sectionKey="workspaces" hiddenSections={base.hiddenSections} />
                                        </label>
                                        <Classified />
                                    </div>
                                );
                                const workspaces = base.workspaces || [];
                                return (
                                    <div style={{ marginBottom: '1rem' }}>
                                        <label className="text-muted mono-text" style={{
                                            fontSize: '0.7rem', display: 'flex', justifyContent: 'space-between',
                                            alignItems: 'center', marginBottom: '0.5rem',
                                        }}>
                                            <span>
                                                WORKSPACES ({workspaces.length})
                                                <SectionHideToggle baseId={base.id} sectionKey="workspaces" hiddenSections={base.hiddenSections} />
                                                <VisibilityToggle field={`${basePath}.workspaces`} visibility={visibility} onToggle={onToggleVis} />
                                            </span>
                                            {IS_ADMIN && (
                                                <select
                                                    value=""
                                                    onChange={e => { if (e.target.value) addWorkspace(base.id, parseInt(e.target.value)); e.target.value = ''; }}
                                                    style={{
                                                        background: 'rgba(0,0,0,0.3)', color: BASE_ACCENT,
                                                        border: `1px solid ${BASE_ACCENT}`, padding: '0.2rem 0.4rem',
                                                        fontFamily: 'var(--font-mono)', fontSize: '0.7rem',
                                                        borderRadius: 'var(--radius-sm)', cursor: 'pointer',
                                                    }}>
                                                    <option value="">+ Add Workspace</option>
                                                    {wsConfig.levels.map(lvl => (
                                                        <option key={lvl.level} value={lvl.level}>
                                                            {lvl.name} (E:{lvl.exp} S:{lvl.size})
                                                        </option>
                                                    ))}
                                                </select>
                                            )}
                                        </label>
                                        {workspaces.map((ws, idx) => {
                                            const lvl = wsConfig.levels.find(l => l.level === ws.level);
                                            return (
                                                <div key={idx} className="tech-border" title={lvl?.description || ''}
                                                    style={{
                                                    padding: '0.5rem', marginBottom: '0.25rem',
                                                    background: 'rgba(34,197,94,0.05)',
                                                    display: 'flex', alignItems: 'center', gap: '0.5rem', flexWrap: 'wrap',
                                                }}>
                                                    <span className="mono-text" style={{ fontSize: '0.8rem', color: BASE_ACCENT, minWidth: '120px' }}>
                                                        {lvl?.name || `Level ${ws.level}`}
                                                        <span style={{ fontSize: '0.65rem', marginLeft: '0.3rem', opacity: 0.7 }}>
                                                            E:{lvl?.exp || 0} S:{lvl?.size || 0}
                                                        </span>
                                                    </span>
                                                    {IS_ADMIN ? (
                                                        <select
                                                            value={ws.assignedTo ? `${ws.assignedType}:${ws.assignedTo}` : ''}
                                                            onChange={e => {
                                                                if (!e.target.value) {
                                                                    updateWorkspace(base.id, idx, { assignedTo: null, assignedType: null });
                                                                } else {
                                                                    const [type, id] = e.target.value.split(':');
                                                                    updateWorkspace(base.id, idx, { assignedTo: parseInt(id), assignedType: type });
                                                                }
                                                            }}
                                                            style={{
                                                                background: 'rgba(0,0,0,0.3)', color: 'var(--text-primary)',
                                                                border: '1px solid var(--border-color)', padding: '0.2rem 0.4rem',
                                                                fontFamily: 'var(--font-mono)', fontSize: '0.75rem',
                                                                borderRadius: 'var(--radius-sm)', flex: 1, minWidth: '150px',
                                                            }}>
                                                            <option value="">Unassigned</option>
                                                            {assignableCharacters.length > 0 && (
                                                                <optgroup label="Characters">
                                                                    {assignableCharacters.map(c => (
                                                                        <option key={`character:${c.id}`} value={`character:${c.id}`}>{c.name}</option>
                                                                    ))}
                                                                </optgroup>
                                                            )}
                                                            {assignableNpcs.length > 0 && (
                                                                <optgroup label="NPCs">
                                                                    {assignableNpcs.map(n => (
                                                                        <option key={`npc:${n.id}`} value={`npc:${n.id}`}>{n.name}</option>
                                                                    ))}
                                                                </optgroup>
                                                            )}
                                                        </select>
                                                    ) : (
                                                        <span className="text-muted mono-text" style={{ fontSize: '0.75rem' }}>
                                                            {ws.assignedName || 'Unassigned'}
                                                        </span>
                                                    )}
                                                    {IS_ADMIN && (
                                                        <button onClick={() => removeWorkspace(base.id, idx)} style={{
                                                            background: 'transparent', border: 'none',
                                                            color: 'var(--accent-danger)', cursor: 'pointer', padding: '2px',
                                                        }}>
                                                            <Icon name="x" size={14} />
                                                        </button>
                                                    )}
                                                </div>
                                            );
                                        })}
                                        {workspaces.length === 0 && (
                                            <p className="text-muted" style={{ fontSize: '0.75rem', fontStyle: 'italic' }}>No workspaces assigned.</p>
                                        )}
                                    </div>
                                );
                            })()}

                            {/* Equipment */}
                            <div style={{ marginBottom: '1rem' }}>
                                <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.5rem' }}>
                                    FACILITY EQUIPMENT
                                    <VisibilityToggle field={`${basePath}.equipment`} visibility={visibility} onToggle={onToggleVis} />
                                </label>
                                {base.classifiedEquipment && !IS_ADMIN ? <Classified /> : (() => {
                                    const categories = {};
                                    (baseConfig.equipmentTypes || []).forEach(eq => {
                                        const cat = eq.category || 'Other';
                                        if (!categories[cat]) categories[cat] = [];
                                        categories[cat].push(eq);
                                    });
                                    // Map category names to hiddenSections keys
                                    const catKeyMap = { 'Aviation Units': 'aviationUnits', 'Base Defenses': 'baseDefenses' };
                                    return Object.entries(categories).map(([cat, items]) => {
                                        const catKey = catKeyMap[cat];
                                        const catHidden = catKey && isSectionHidden(catKey);
                                        return (
                                        <div key={cat} style={{ marginBottom: '0.5rem' }}>
                                            <span className="mono-text text-muted" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem', borderBottom: '1px solid var(--border-color)', paddingBottom: '0.15rem' }}>
                                                {cat}
                                                {catKey && <SectionHideToggle baseId={base.id} sectionKey={catKey} hiddenSections={base.hiddenSections} />}
                                            </span>
                                            {catHidden ? <Classified /> : (
                                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.4rem' }}>
                                                {items.map(eq => {
                                                    const selected = (base.equipment || []).includes(eq.key);
                                                    return (
                                                        <button key={eq.key}
                                                            onClick={() => IS_ADMIN && toggleEquipment(base.id, eq.key)}
                                                            disabled={!IS_ADMIN}
                                                            title={eq.requires || eq.name}
                                                            style={{
                                                                background: selected ? '#f59e0b22' : 'rgba(0,0,0,0.2)',
                                                                border: `1px solid ${selected ? '#f59e0b' : 'var(--border-color)'}`,
                                                                color: selected ? '#f59e0b' : 'var(--text-muted)',
                                                                padding: '0.3rem 0.6rem', cursor: IS_ADMIN ? 'pointer' : 'default',
                                                                fontFamily: 'var(--font-mono)', fontSize: '0.75rem',
                                                                borderRadius: 'var(--radius-sm)',
                                                            }}>
                                                            {eq.name}
                                                            <span style={{ fontSize: '0.6rem', marginLeft: '0.4rem', opacity: 0.7 }}>E:{eq.exp}</span>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                            )}
                                        </div>
                                        );
                                    });
                                })()}
                            </div>

                            {/* Notes */}
                            <div style={{ marginBottom: '0.5rem' }}>
                                <label className="text-muted mono-text" style={{ fontSize: '0.7rem', display: 'block', marginBottom: '0.25rem' }}>NOTES</label>
                                <AutoSaveInput component="textarea" defaultValue={base.notes || ''}
                                    onSave={val => updateBaseField(base.id, 'notes', val)}
                                    disabled={!IS_ADMIN}
                                    style={{
                                        background: 'rgba(0,0,0,0.2)', border: '1px solid var(--border-color)',
                                        color: 'var(--text-primary)', width: '100%', minHeight: '3rem',
                                        fontSize: '0.85rem', fontFamily: 'inherit', padding: '0.5rem',
                                        resize: 'vertical', borderRadius: 'var(--radius-sm)',
                                    }} />
                            </div>

                            {/* Delete button */}
                            {IS_ADMIN && (
                                <div style={{ textAlign: 'right', marginTop: '0.5rem' }}>
                                    <button onClick={() => deleteBase(base.id)}
                                        className="mono-text"
                                        style={{
                                            background: 'transparent', border: '1px solid var(--accent-danger)',
                                            color: 'var(--accent-danger)', padding: '0.3rem 1rem',
                                            cursor: 'pointer', fontSize: '0.75rem', fontFamily: 'var(--font-mono)',
                                            borderRadius: 'var(--radius-sm)',
                                        }}>
                                        DELETE BASE
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // Total exp across all bases
        const totalBaseExp = bases.reduce((sum, b) => b.classified ? sum : sum + calcBaseCosts(b).totalExp, 0);

        // If entire bases section is classified for non-admins
        if (classifiedBases && !IS_ADMIN) {
            return (
                <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                    <h3 className="mono-text" style={{ color: BASE_ACCENT, marginBottom: '1rem' }}>BASES</h3>
                    <Classified />
                </div>
            );
        }

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text" style={{
                    color: BASE_ACCENT,
                    borderBottom: `1px solid ${BASE_ACCENT}`,
                    paddingBottom: '0.5rem', marginBottom: '1rem',
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                }}>
                    <span>
                        BASES
                        <VisibilityToggle field="bases" visibility={visibility} onToggle={onToggleVis} />
                        <span className="text-muted" style={{ fontSize: '0.75rem', marginLeft: '0.75rem' }}>
                            ({bases.length}) // TOTAL EXP: {totalBaseExp}
                        </span>
                    </span>
                    {IS_ADMIN && (
                        <button onClick={createBase} disabled={creating}
                            style={{
                                background: 'transparent', border: `1px solid ${BASE_ACCENT}`,
                                color: BASE_ACCENT, width: '24px', height: '24px',
                                borderRadius: '4px', cursor: creating ? 'wait' : 'pointer',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                            }}>
                            <Icon name="plus" size={14} />
                        </button>
                    )}
                </h3>

                {bases.map(base => <BaseCard key={base.id} base={base} />)}

                {bases.length === 0 && (
                    <p className="text-muted text-center" style={{ fontSize: '0.8rem', fontStyle: 'italic' }}>
                        No bases established.
                    </p>
                )}
            </div>
        );
    };

    // --- MAIN APP ---
    const AgencySheet = () => {
        const [agency, setAgency] = useState(null);
        const [loading, setLoading] = useState(true);
        const [saveStatus, setSaveStatus] = useState('saved');
        const saveTimerRef = useRef(null);
        const agencyRef = useRef(null);

        useEffect(() => {
            fetchAgency();
        }, []);

        const fetchAgency = async () => {
            try {
                const response = await fetch('/api/agencies/' + AGENCY_ID + '/');
                if (response.ok) {
                    const data = await response.json();
                    const merged = { ...DEFAULT_AGENCY, ...data };
                    // Merge attributes carefully
                    if (data.attributes && typeof data.attributes === 'object') {
                        merged.attributes = {
                            power: { ...DEFAULT_AGENCY.attributes.power, ...(data.attributes.power || {}) },
                            finesse: { ...DEFAULT_AGENCY.attributes.finesse, ...(data.attributes.finesse || {}) },
                            resistance: { ...DEFAULT_AGENCY.attributes.resistance, ...(data.attributes.resistance || {}) },
                            // Include any custom categories
                            ...Object.fromEntries(
                                Object.entries(data.attributes).filter(
                                    ([k]) => !['power', 'finesse', 'resistance'].includes(k)
                                )
                            )
                        };
                    }
                    setAgency(merged);
                    agencyRef.current = merged;
                }
            } catch (err) {
                console.error('Failed to load agency:', err);
            } finally {
                setLoading(false);
            }
        };

        const saveAgency = useCallback(async (data) => {
            setSaveStatus('saving');
            try {
                const response = await fetch('/api/agencies/' + AGENCY_ID + '/', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify(data),
                });
                if (response.ok) {
                    setSaveStatus('saved');
                } else {
                    setSaveStatus('error');
                }
            } catch (err) {
                setSaveStatus('error');
            }
        }, []);

        // Full update: sets state (re-renders) + ref + schedules save.
        // Use for structural changes (add/remove rows, button clicks).
        const updateAgency = (updates) => {
            if (!IS_ADMIN) return;
            const updated = { ...agencyRef.current, ...updates };
            setAgency(updated);
            agencyRef.current = updated;
            setSaveStatus('unsaved');

            if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
            saveTimerRef.current = setTimeout(() => {
                saveAgency(agencyRef.current);
            }, 1000);
        };

        // Silent save: updates ref + state and sends to server.
        // Safe with uncontrolled inputs (defaultValue) — re-renders
        // don't overwrite DOM input values, so typing is not interrupted.
        // Keeping state in sync ensures add/remove operations have current data.
        const quietSaveTimerRef = useRef(null);
        const saveAgencyQuiet = useCallback((updates) => {
            if (!IS_ADMIN) return;
            const updated = { ...agencyRef.current, ...updates };
            agencyRef.current = updated;
            setAgency(updated);

            if (quietSaveTimerRef.current) clearTimeout(quietSaveTimerRef.current);
            quietSaveTimerRef.current = setTimeout(async () => {
                try {
                    const response = await fetch('/api/agencies/' + AGENCY_ID + '/', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                        },
                        body: JSON.stringify(agencyRef.current),
                    });
                    if (!response.ok) console.error('Quiet save failed:', response.status);
                } catch (err) {
                    console.error('Quiet save error:', err);
                }
            }, 500);
        }, []);

        const toggleVisibility = async (field, visible) => {
            try {
                const res = await fetch(`/api/agencies/${AGENCY_ID}/visibility/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ field, visible }),
                });
                if (res.ok) {
                    const result = await res.json();
                    const updated = {
                        ...agencyRef.current,
                        fieldVisibility: {
                            ...(agencyRef.current.fieldVisibility || {}),
                            [field]: result.visible
                        }
                    };
                    setAgency(updated);
                    agencyRef.current = updated;
                }
            } catch (err) {
                console.error('Failed to toggle visibility:', err);
            }
        };

        if (loading) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-accent" style={{ animation: 'pulse 1.5s infinite' }}>
                        DECRYPTING AGENCY RECORD...
                    </h2>
                </div>
            );
        }

        if (!agency) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-danger">ERROR: RECORD NOT FOUND</h2>
                </div>
            );
        }

        const vis = agency.fieldVisibility || {};

        return (
            <div className="fade-in">
                {/* Sub-header with save status */}
                <div style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    marginBottom: '1rem', paddingBottom: '0.5rem',
                    borderBottom: '1px solid var(--border-color)'
                }}>
                    <h2 className="mono-text text-accent" style={{ fontSize: '1.2rem' }}>
                        AGENCY RECORD
                        {!IS_ADMIN && !IS_PLAYER_AGENCY && (
                            <span className="text-muted" style={{ fontSize: '0.8rem', marginLeft: '1rem' }}>
                                READ ONLY
                            </span>
                        )}
                    </h2>
                    <div style={{ display: 'flex', gap: '1rem', alignItems: 'center' }}>
                        {IS_ADMIN && <SaveStatus status={saveStatus} />}
                        <a href="/agencies/"
                            className="mono-text"
                            style={{
                                background: 'transparent', border: '1px solid var(--accent-primary)',
                                color: 'var(--accent-primary)', padding: '0.5rem 1rem',
                                cursor: 'pointer', textDecoration: 'none', fontSize: '0.9rem'
                            }}>
                            &lt; CLOSE RECORD
                        </a>
                    </div>
                </div>

                <HeaderModule agency={agency}
                    onSave={saveAgencyQuiet}
                    visibility={vis} onToggleVis={toggleVisibility} />

                <AllianceModule
                    alliance={agency.alliance}
                    agencyRef={agencyRef}
                    update={val => updateAgency({ alliance: val })}
                    onSave={val => saveAgencyQuiet({ alliance: val })}
                    visibility={vis} onToggleVis={toggleVisibility} />

                <NotesModule notes={agency.notes}
                    onSave={saveAgencyQuiet}
                    visibility={vis} onToggleVis={toggleVisibility} />

                <IntegrityModule agency={agency} update={updateAgency}
                    visibility={vis} onToggleVis={toggleVisibility} />

                <DossiersModule dossiers={agency.linkedDossiers} />

                <AttributesModule
                    attributes={agency.attributes}
                    update={attrs => updateAgency({ attributes: attrs })}
                    visibility={vis} onToggleVis={toggleVisibility} />

                <TableModule
                    title="SPECIALIZATIONS" field="specializations"
                    items={agency.specializations}
                    columns={[
                        { key: 'name', label: 'NAME', width: '1fr' },
                        { key: 'relatedSkill', label: 'RELATED SKILL', width: '1fr' },
                        { key: 'effect', label: 'EFFECT', width: '2fr' },
                    ]}
                    emptyItem={{ name: '', relatedSkill: '', effect: '' }}
                    update={val => updateAgency({ specializations: val })}
                    onSave={val => saveAgencyQuiet({ specializations: val })}
                    getFreshItems={() => agencyRef.current.specializations || []}
                    visibility={vis} onToggleVis={toggleVisibility}
                />

                <div style={{
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))',
                    gap: '1rem'
                }}>
                    <TableModule
                        title="MERITS" field="merits"
                        items={agency.merits}
                        columns={[
                            { key: 'name', label: 'NAME', width: 'minmax(120px, 1.5fr)' },
                            { key: 'value', label: 'VALUE', width: '60px', type: 'number' },
                            { key: 'description', label: 'DESCRIPTION', width: 'minmax(120px, 2fr)' },
                        ]}
                        emptyItem={{ name: '', value: 0, description: '' }}
                        update={val => updateAgency({ merits: val })}
                        onSave={val => saveAgencyQuiet({ merits: val })}
                        getFreshItems={() => agencyRef.current.merits || []}
                        visibility={vis} onToggleVis={toggleVisibility}
                    />
                    <div>
                        <TableModule
                            title="FLAWS" field="flaws"
                            items={agency.flaws}
                            columns={[
                                { key: 'name', label: 'NAME', width: 'minmax(120px, 1.5fr)' },
                                { key: 'value', label: 'VALUE', width: '60px', type: 'number' },
                                { key: 'description', label: 'DESCRIPTION', width: 'minmax(120px, 2fr)' },
                            ]}
                            emptyItem={{ name: '', value: 0, description: '' }}
                            update={val => updateAgency({ flaws: val })}
                            onSave={val => saveAgencyQuiet({ flaws: val })}
                            getFreshItems={() => agencyRef.current.flaws || []}
                            visibility={vis} onToggleVis={toggleVisibility}
                        />
                        <GlobalFlawsDisplay globalFlaws={agency.globalFlaws} />
                    </div>
                </div>

                <TableModule
                    title="ASSETS" field="assets"
                    items={agency.assets}
                    columns={[
                        { key: 'name', label: 'NAME', width: '1fr' },
                        { key: 'type', label: 'TYPE', width: '1fr' },
                        { key: 'status', label: 'STATUS', width: '1fr' },
                        { key: 'notes', label: 'NOTES', width: '2fr' },
                    ]}
                    emptyItem={{ name: '', type: '', status: '', notes: '' }}
                    update={val => updateAgency({ assets: val })}
                    onSave={val => saveAgencyQuiet({ assets: val })}
                    getFreshItems={() => agencyRef.current.assets || []}
                    visibility={vis} onToggleVis={toggleVisibility}
                />

                <TableModule
                    title="FLEET" field="fleet"
                    items={agency.fleet}
                    columns={[
                        { key: 'shipClass', label: 'SHIP CLASS', width: '1fr' },
                        { key: 'role', label: 'ROLE', width: '1fr' },
                        { key: 'quantity', label: 'QTY', width: '60px', type: 'number' },
                        { key: 'notes', label: 'NOTES', width: '2fr' },
                    ]}
                    emptyItem={{ shipClass: '', role: '', quantity: 0, notes: '' }}
                    update={val => updateAgency({ fleet: val })}
                    onSave={val => saveAgencyQuiet({ fleet: val })}
                    getFreshItems={() => agencyRef.current.fleet || []}
                    visibility={vis} onToggleVis={toggleVisibility}
                />

                <BasesModule
                    bases={agency.bases}
                    baseConfig={agency.baseConfig}
                    agencyId={AGENCY_ID}
                    assignableCharacters={agency.assignableCharacters || []}
                    assignableNpcs={agency.assignableNpcs || []}
                    visibility={vis}
                    onToggleVis={toggleVisibility}
                    classifiedBases={agency.classifiedBases}
                    onBasesChange={(newBases) => {
                        const updated = { ...agencyRef.current, bases: newBases };
                        setAgency(updated);
                        agencyRef.current = updated;
                    }}
                />

                <TableModule
                    title="CONDITIONS" field="conditions"
                    items={agency.conditions}
                    columns={[
                        { key: 'condition', label: 'CONDITION', width: '1fr' },
                        { key: 'source', label: 'SOURCE', width: '1fr' },
                        { key: 'effect', label: 'EFFECT', width: '2fr' },
                        { key: 'duration', label: 'DURATION', width: '1fr' },
                    ]}
                    emptyItem={{ condition: '', source: '', effect: '', duration: '' }}
                    update={val => updateAgency({ conditions: val })}
                    onSave={val => saveAgencyQuiet({ conditions: val })}
                    getFreshItems={() => agencyRef.current.conditions || []}
                    visibility={vis} onToggleVis={toggleVisibility}
                />

                <TableModule
                    title="PROJECTS" field="projects"
                    items={agency.projects}
                    columns={[
                        { key: 'name', label: 'NAME', width: '1fr' },
                        { key: 'player', label: 'PLAYER', width: '1fr' },
                        { key: 'duration', label: 'DURATION', width: '1fr' },
                        { key: 'completionScore', label: 'COMPLETION', width: '80px', type: 'number' },
                        { key: 'notes', label: 'NOTES', width: '2fr' },
                    ]}
                    emptyItem={{ name: '', player: '', duration: '', completionScore: 0, notes: '' }}
                    update={val => updateAgency({ projects: val })}
                    onSave={val => saveAgencyQuiet({ projects: val })}
                    getFreshItems={() => agencyRef.current.projects || []}
                    visibility={vis} onToggleVis={toggleVisibility}
                />

                <FTLProjectsModule
                    ftlProjects={agency.ftlProjects}
                    agencyId={AGENCY_ID}
                />

                <TableModule
                    title="HISTORY" field="history"
                    items={agency.history}
                    columns={[
                        { key: 'year', label: 'YEAR', width: '80px' },
                        { key: 'decision', label: 'DECISION', width: '2fr' },
                        { key: 'consequence', label: 'CONSEQUENCE', width: '2fr' },
                    ]}
                    emptyItem={{ year: '', decision: '', consequence: '' }}
                    update={val => updateAgency({ history: val })}
                    onSave={val => saveAgencyQuiet({ history: val })}
                    getFreshItems={() => agencyRef.current.history || []}
                    visibility={vis} onToggleVis={toggleVisibility}
                />

                <CouncilDisplay
                    councilItems={agency.councilItems}
                    isCouncilMember={agency.isCouncilMember}
                    isCouncilChairman={agency.isCouncilChairman}
                    onToggleMembership={(checked) => {
                        updateAgency({ isCouncilMember: checked });
                        if (!checked) updateAgency({ isCouncilChairman: false });
                    }}
                />

                {/* Change Request Panel — only for player agency */}
                {IS_PLAYER_AGENCY && (
                    <ChangeRequestPanel agencyId={AGENCY_ID} />
                )}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<AgencySheet />);
</script>
{% endverbatim %}
{% endblock %}
