{% extends "base.html" %}

{% block title %}CONTACT DOSSIERS // BLACKLOG.NET{% endblock %}

{% block content %}
<div id="app-root">
    <div class="loading-screen">
        <h1 class="mono-text">LOADING CONTACT DATABASE...</h1>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Django context variables — outside verbatim block
    const CURRENT_USER = '{{ user.username }}';
    const CURRENT_USER_ID = {{ user.id }};
    const IS_ADMIN = {{ user.is_superuser|yesno:"true,false" }};
    const CSRF_TOKEN = '{{ csrf_token }}';
</script>
{% verbatim %}
<script type="text/babel">
    const { useState, useEffect } = React;

    // CSRF cookie reader for fetch requests
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // Icon component using Lucide
    const Icon = ({ name, size = 16, className = "" }) => {
        useEffect(() => {
            if (window.lucide) window.lucide.createIcons();
        }, [name]);
        return <i data-lucide={name} width={size} height={size} className={className}></i>;
    };

        'canadian': '🇨🇦', 'cape verdean': '🇨🇻', 'central african': '🇨🇫',
        'chadian': '🇹🇩', 'chilean': '🇨🇱', 'chinese': '🇨🇳', 'colombian': '🇨🇴',

        'cuban': '🇨🇺', 'cypriot': '🇨🇾', 'czech': '🇨🇿', 'danish': '🇩🇰',
        'djiboutian': '🇩🇯', 'dominican': '🇩🇴', 'dutch': '🇳🇱', 'ecuadorian': '🇪🇨',
        'egyptian': '🇪🇬', 'emirati': '🇦🇪', 'english': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',

        'ethiopian': '🇪🇹', 'fijian': '🇫🇯', 'filipino': '🇵🇭', 'finnish': '🇫🇮',
        'french': '🇫🇷', 'gabonese': '🇬🇦', 'gambian': '🇬🇲', 'georgian': '🇬🇪',
        'german': '🇩🇪', 'ghanaian': '🇬🇭', 'greek': '🇬🇷', 'grenadian': '🇬🇩',
        'guatemalan': '🇬🇹', 'guinean': '🇬🇳', 'guyanese': '🇬🇾', 'haitian': '🇭🇹',
        'honduran': '🇭🇳', 'hungarian': '🇭🇺', 'icelandic': '🇮🇸', 'indian': '🇮🇳',
        'indonesian': '🇮🇩', 'iranian': '🇮🇷', 'iraqi': '🇮🇶', 'irish': '🇮🇪',
        'israeli': '🇮🇱', 'italian': '🇮🇹', 'ivorian': '🇨🇮', 'jamaican': '🇯🇲',
        'japanese': '🇯🇵', 'jordanian': '🇯🇴', 'kazakh': '🇰🇿', 'kenyan': '🇰🇪',

        'new zealander': '🇳🇿', 'nicaraguan': '🇳🇮', 'nigerien': '🇳🇪',
        'nigerian': '🇳🇬', 'norwegian': '🇳🇴', 'omani': '🇴🇲', 'pakistani': '🇵🇰',
        'palestinian': '🇵🇸', 'panamanian': '🇵🇦', 'paraguayan': '🇵🇾',
        'peruvian': '🇵🇪', 'polish': '🇵🇱', 'portuguese': '🇵🇹', 'qatari': '🇶🇦',
        'romanian': '🇷🇴', 'russian': '🇷🇺', 'rwandan': '🇷🇼', 'saudi': '🇸🇦',
        'saudi arabian': '🇸🇦', 'scottish': '🏴󠁧󠁢󠁳󠁣󠁴󠁿', 'senegalese': '🇸🇳',
        'serbian': '🇷🇸', 'sierra leonean': '🇸🇱', 'singaporean': '🇸🇬',
        'slovak': '🇸🇰', 'slovenian': '🇸🇮', 'somali': '🇸🇴', 'south african': '🇿🇦',
        'spanish': '🇪🇸', 'sri lankan': '🇱🇰', 'sudanese': '🇸🇩', 'surinamese': '🇸🇷',
        'swazi': '🇸🇿', 'swedish': '🇸🇪', 'swiss': '🇨🇭', 'syrian': '🇸🇾',
        'taiwanese': '🇹🇼', 'tajik': '🇹🇯', 'tanzanian': '🇹🇿', 'thai': '🇹🇭',
        'togolese': '🇹🇬', 'trinidadian': '🇹🇹', 'tunisian': '🇹🇳', 'turkish': '🇹🇷',
        'turkmen': '🇹🇲', 'ugandan': '🇺🇬', 'ukrainian': '🇺🇦', 'uruguayan': '🇺🇾',
        'uzbek': '🇺🇿', 'venezuelan': '🇻🇪', 'vietnamese': '🇻🇳', 'welsh': '🏴󠁧󠁢󠁷󠁬󠁳󠁿',
        'yemeni': '🇾🇪', 'zambian': '🇿🇲', 'zimbabwean': '🇿🇼',
    };

    const getNationalityFlag = (nationality) => {
        if (!nationality) return null;
        return NATIONALITY_FLAGS[nationality.toLowerCase().trim()] || null;
    };

    // State color mapping for NPC status
    const STATE_COLORS = {
        active: 'var(--accent-primary)',
        leave: 'var(--accent-warning)',
        medical_leave: 'var(--accent-warning)',
        missing: 'var(--accent-danger)',
        deceased: 'var(--text-muted)',
    };

    const getStateColor = (state) => STATE_COLORS[state] || 'var(--text-muted)';

    const getStateLabel = (state) => {
        const labels = {
            active: 'ACTIVE',
            leave: 'ON LEAVE',
            medical_leave: 'MEDICAL LEAVE',
            missing: 'MISSING',
            deceased: 'DECEASED',
        };
        return labels[state] || (state ? state.toUpperCase() : 'UNKNOWN');
    };

    // NPC portrait with state-colored border
    const Portrait = ({ npc }) => {
        const color = getStateColor(npc.state);
        const firstLetter = npc.name ? npc.name.charAt(0).toUpperCase() : '?';
        const hasImage = !!npc.image;

        return (
            <div style={{
                width: '60px',
                height: '60px',
                borderRadius: '50%',
                border: `2px solid ${color}`,
                flexShrink: 0,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                overflow: 'hidden',
                background: hasImage ? 'transparent' : 'var(--bg-dark)',
                backgroundImage: hasImage ? `url(${npc.image})` : 'none',
                backgroundSize: 'cover',
                backgroundPosition: 'center',
            }}>
                {!hasImage && (
                    <span className="mono-text" style={{
                        fontSize: '1.4rem',
                        color: color,
                        fontWeight: 'bold',
                    }}>
                        {firstLetter}
                    </span>
                )}
            </div>
        );
    };

    // NPC card component
    const NPCCard = ({ npc, onClick }) => {
        const stateColor = getStateColor(npc.state);

        return (
            <div
                className="tech-border glitch-hover glass-panel"
                style={{
                    padding: '1rem',
                    cursor: 'pointer',
                    transition: 'all 0.2s',
                }}
                onClick={onClick}
            >
                <div style={{ display: 'flex', gap: '1rem', alignItems: 'flex-start' }}>
                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', flexShrink: 0 }}>
                        <Portrait npc={npc} />
                        {getNationalityFlag(npc.nationality) && (
                            <span style={{ fontSize: '1.2rem', marginTop: '0.25rem' }}>
                                {getNationalityFlag(npc.nationality)}
                            </span>
                        )}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                        <h3 className="text-accent mono-text" style={{
                            fontSize: '1.1rem',
                            margin: 0,
                            lineHeight: '1.3',
                        }}>
                            {npc.name}
                        </h3>

                        <span className="mono-text" style={{
                            fontSize: '0.65rem',
                            color: stateColor,
                            textTransform: 'uppercase',
                            letterSpacing: '1px',
                            display: 'inline-block',
                            marginTop: '0.25rem',
                        }}>
                            {getStateLabel(npc.state)}
                        </span>

                        {npc.occupation && (
                            <p className="text-secondary" style={{
                                fontSize: '0.85rem',
                                margin: '0.4rem 0 0 0',
                                lineHeight: '1.3',
                            }}>
                                {npc.occupation}
                            </p>
                        )}
                    </div>
                </div>

                <div style={{
                    marginTop: '0.75rem',
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                }}>
                    {npc.isNpcDossier ? (
                        <span className="mono-text" style={{
                            fontSize: '0.7rem',
                            color: 'var(--accent-warning)',
                            border: '1px solid var(--accent-warning)',
                            padding: '0.1rem 0.4rem',
                            letterSpacing: '1px',
                        }}>
                            {npc.agencyName || 'NPC'}
                        </span>
                    ) : (
                        <span className="mono-text" style={{
                            fontSize: '0.7rem',
                            color: 'var(--accent-primary)',
                            border: '1px solid var(--accent-primary)',
                            padding: '0.1rem 0.4rem',
                            letterSpacing: '1px',
                        }}>
                            BIFROST UNION
                        </span>
                    )}
                    <span className="text-muted" style={{ fontSize: '0.75rem' }}>
                        ID: {String(npc.id).substring(0, 6)}
                    </span>
                </div>
            </div>
        );
    };

    // Filter bar with filter buttons
    const FilterBar = ({ activeFilter, onFilterChange }) => {
        const filters = [
            { key: 'all', label: 'ALL' },
            { key: 'my_contacts', label: 'MY CONTACTS' },
            { key: 'npc_dossiers', label: 'NPC DOSSIERS' },
            { key: 'active', label: 'ACTIVE' },
            { key: 'deceased', label: 'DECEASED' },
        ];

        return (
            <div style={{
                display: 'flex',
                gap: '0.5rem',
                flexWrap: 'wrap',
                marginBottom: '1.5rem',
            }}>
                {filters.map(f => (
                    <button
                        key={f.key}
                        className="tech-border mono-text"
                        onClick={() => onFilterChange(f.key)}
                        style={{
                            background: activeFilter === f.key ? 'var(--accent-primary)' : 'transparent',
                            color: activeFilter === f.key ? 'var(--bg-dark)' : 'var(--text-secondary)',
                            border: activeFilter === f.key ? '1px solid var(--accent-primary)' : '1px solid var(--border-color)',
                            padding: '0.4rem 1rem',
                            cursor: 'pointer',
                            fontSize: '0.75rem',
                            letterSpacing: '1px',
                            fontWeight: activeFilter === f.key ? 'bold' : 'normal',
                            transition: 'all 0.2s',
                            fontFamily: 'var(--font-mono)',
                        }}
                    >
                        {f.label}
                    </button>
                ))}
            </div>
        );
    };

    // NPC agency selector for creating NPC dossiers
    const CreateNPCDossierDialog = ({ agencies, onClose, onCreate }) => {
        const [name, setName] = useState('NEW OPERATIVE');
        const [agencyId, setAgencyId] = useState('');
        const [creating, setCreating] = useState(false);

        const handleCreate = async () => {
            setCreating(true);
            await onCreate(name, agencyId ? parseInt(agencyId) : null);
        };

        return (
            <div style={{
                position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                background: 'rgba(0,0,0,0.8)', display: 'flex',
                alignItems: 'center', justifyContent: 'center', zIndex: 1000,
            }} onClick={onClose}>
                <div className="glass-panel" style={{
                    padding: '2rem', maxWidth: '400px', width: '90%',
                }} onClick={e => e.stopPropagation()}>
                    <h3 className="mono-text text-accent" style={{
                        marginBottom: '1.5rem',
                        borderBottom: '1px solid var(--border-color)',
                        paddingBottom: '0.5rem',
                    }}>
                        CREATE NPC DOSSIER
                    </h3>

                    <div style={{ marginBottom: '1rem' }}>
                        <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>NAME</label>
                        <input
                            type="text"
                            value={name}
                            onChange={e => setName(e.target.value)}
                            style={{
                                display: 'block', width: '100%', marginTop: '0.25rem',
                                background: 'transparent', border: '1px solid var(--border-color)',
                                color: 'var(--text-primary)', padding: '0.5rem',
                                fontFamily: 'var(--font-mono)',
                            }}
                        />
                    </div>

                    <div style={{ marginBottom: '1.5rem' }}>
                        <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>AGENCY</label>
                        <select
                            value={agencyId}
                            onChange={e => setAgencyId(e.target.value)}
                            style={{
                                display: 'block', width: '100%', marginTop: '0.25rem',
                                background: 'transparent', border: '1px solid var(--border-color)',
                                color: 'var(--text-primary)', padding: '0.5rem',
                                fontFamily: 'var(--font-mono)', cursor: 'pointer',
                            }}
                        >
                            <option value="" style={{ background: 'var(--bg-dark)' }}>-- No Agency --</option>
                            {agencies.map(a => (
                                <option key={a.id} value={a.id} style={{ background: 'var(--bg-dark)' }}>
                                    {a.name}
                                </option>
                            ))}
                        </select>
                    </div>

                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                        <button
                            onClick={handleCreate}
                            disabled={creating}
                            className="mono-text"
                            style={{
                                flex: 1, background: 'var(--accent-primary)', border: 'none',
                                color: 'var(--bg-dark)', padding: '0.6rem',
                                cursor: creating ? 'wait' : 'pointer', fontWeight: 'bold',
                                fontFamily: 'var(--font-mono)', fontSize: '0.85rem',
                                opacity: creating ? 0.6 : 1,
                            }}
                        >
                            {creating ? 'CREATING...' : 'CREATE'}
                        </button>
                        <button
                            onClick={onClose}
                            className="mono-text"
                            style={{
                                background: 'transparent', border: '1px solid var(--border-color)',
                                color: 'var(--text-muted)', padding: '0.6rem 1rem',
                                cursor: 'pointer', fontFamily: 'var(--font-mono)', fontSize: '0.85rem',
                            }}
                        >
                            CANCEL
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    // Main application component
    const DossierList = () => {
        const [npcs, setNpcs] = useState([]);
        const [loading, setLoading] = useState(true);
        const [creating, setCreating] = useState(false);
        const [activeFilter, setActiveFilter] = useState('all');
        const [showNpcDialog, setShowNpcDialog] = useState(false);
        const [npcAgencies, setNpcAgencies] = useState([]);

        useEffect(() => {
            fetchNpcs();
        }, []);

        const fetchNpcs = async () => {
            try {
                const response = await fetch('/api/npcs/');
                if (response.ok) {
                    const data = await response.json();
                    setNpcs(data);
                }
            } catch (err) {
                console.error('Failed to fetch contacts:', err);
            } finally {
                setLoading(false);
            }
        };

        const fetchNpcAgencies = async () => {
            try {
                const response = await fetch('/api/agencies/');
                if (response.ok) {
                    const data = await response.json();
                    // Filter to NPC agencies only
                    setNpcAgencies(data.filter(a => !a.isPlayerAgency));
                }
            } catch (err) {
                console.error('Failed to fetch agencies:', err);
            }
        };

        const createContact = async () => {
            setCreating(true);
            try {
                const response = await fetch('/api/npcs/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ name: 'NEW CONTACT' }),
                });
                if (response.ok) {
                    const newNpc = await response.json();
                    window.location.href = '/npcs/' + newNpc.id + '/';
                } else {
                    console.error('Failed to create contact');
                }
            } catch (err) {
                console.error('Failed to create contact:', err);
            } finally {
                setCreating(false);
            }
        };

        const handleCreateNpcDossier = async () => {
            await fetchNpcAgencies();
            setShowNpcDialog(true);
        };

        const createNpcDossier = async (name, agencyId) => {
            try {
                const response = await fetch('/api/npcs/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({
                        name: name,
                        isNpcDossier: true,
                        agencyId: agencyId,
                    }),
                });
                if (response.ok) {
                    const newNpc = await response.json();
                    window.location.href = '/npcs/' + newNpc.id + '/';
                } else {
                    console.error('Failed to create NPC dossier');
                }
            } catch (err) {
                console.error('Failed to create NPC dossier:', err);
            }
        };

        const getFilteredNpcs = () => {
            switch (activeFilter) {
                case 'my_contacts':
                    return npcs.filter(n => !n.isNpcDossier && n.assignedTo === CURRENT_USER);
                case 'npc_dossiers':
                    return npcs.filter(n => n.isNpcDossier);
                case 'active':
                    return npcs.filter(n => n.state === 'active');
                case 'deceased':
                    return npcs.filter(n => n.state === 'deceased');
                default:
                    return npcs;
            }
        };

        if (loading) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-accent" style={{ animation: 'pulse 1.5s infinite' }}>
                        ACCESSING CONTACT DATABASE...
                    </h2>
                </div>
            );
        }

        const filtered = getFilteredNpcs();

        return (
            <div>
                <div className="glass-panel" style={{ padding: '2rem', maxWidth: '1100px', margin: '2rem auto' }}>
                    <h2 className="mono-text" style={{
                        marginBottom: '1.5rem',
                        borderBottom: '1px solid var(--border-color)',
                        paddingBottom: '0.5rem',
                        display: 'flex',
                        flexWrap: 'wrap',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        gap: '0.5rem',
                    }}>
                        <span className="text-accent">
                            <Icon name="book-user" size={20} /> CONTACT DOSSIERS
                        </span>
                        <span className="text-muted" style={{ fontSize: '0.8rem' }}>
                            {filtered.length} RECORD{filtered.length !== 1 ? 'S' : ''}
                        </span>
                    </h2>

                    <FilterBar activeFilter={activeFilter} onFilterChange={setActiveFilter} />

                    <div style={{
                        textAlign: 'right', marginBottom: '1.5rem',
                        display: 'flex', gap: '0.5rem', justifyContent: 'flex-end', flexWrap: 'wrap',
                    }}>
                        <button
                            onClick={createContact}
                            disabled={creating}
                            style={{
                                background: 'var(--accent-primary)',
                                border: 'none',
                                color: 'var(--bg-dark)',
                                padding: '0.6rem 1.5rem',
                                cursor: creating ? 'wait' : 'pointer',
                                fontWeight: 'bold',
                                fontFamily: 'var(--font-mono)',
                                fontSize: '0.85rem',
                                letterSpacing: '1px',
                                borderRadius: 'var(--radius-sm)',
                                opacity: creating ? 0.6 : 1,
                                transition: 'opacity 0.2s',
                            }}
                        >
                            {creating ? 'INITIALIZING...' : 'CREATE NEW CONTACT'}
                        </button>

                        {IS_ADMIN && (
                            <button
                                onClick={handleCreateNpcDossier}
                                style={{
                                    background: 'transparent',
                                    border: '1px solid var(--accent-warning)',
                                    color: 'var(--accent-warning)',
                                    padding: '0.6rem 1.5rem',
                                    cursor: 'pointer',
                                    fontWeight: 'bold',
                                    fontFamily: 'var(--font-mono)',
                                    fontSize: '0.85rem',
                                    letterSpacing: '1px',
                                    borderRadius: 'var(--radius-sm)',
                                    transition: 'opacity 0.2s',
                                }}
                            >
                                CREATE NPC DOSSIER
                            </button>
                        )}
                    </div>

                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))',
                        gap: '1rem',
                        marginBottom: '2rem',
                    }}>
                        {filtered.map(npc => (
                            <NPCCard
                                key={npc.id}
                                npc={npc}
                                onClick={() => { window.location.href = '/npcs/' + npc.id + '/'; }}
                            />
                        ))}
                    </div>

                    {filtered.length === 0 && (
                        <p className="text-muted mono-text fade-in" style={{
                            textAlign: 'center',
                            fontStyle: 'italic',
                            padding: '2rem 0',
                        }}>
                            No contact records match current filter.
                        </p>
                    )}
                </div>

                {showNpcDialog && (
                    <CreateNPCDossierDialog
                        agencies={npcAgencies}
                        onClose={() => setShowNpcDialog(false)}
                        onCreate={createNpcDossier}
                    />
                )}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<DossierList />);
</script>
