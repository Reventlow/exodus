                                        ))}
                                        {available.length === 0 && <p className="text-muted" style={{ fontSize: '0.75rem', fontStyle: 'italic' }}>No more available.</p>}
                                    </div>
                                )}
                                {(npc.merits || []).map(m => (
                                    <div key={m.id} className="tech-border" style={{ padding: '0.5rem', marginBottom: '0.3rem', background: 'rgba(0,0,0,0.2)' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                            <div>
                                                <span className="mono-text" style={{ fontSize: '0.8rem' }}>{m.name}</span>
                                                {m.minRating !== m.maxRating && (
                                                    <span className="text-muted" style={{ fontSize: '0.7rem', marginLeft: '0.5rem' }}>
                                                        ({m.rating}/{m.maxRating})
                                                    </span>
                                                )}
                                            </div>
                                            {!readOnly && <button onClick={() => { onSave({ removeMerit: m.id }); setTimeout(onRefresh, 500); }} style={{
                                                background: 'transparent', border: 'none', color: 'var(--accent-danger)', cursor: 'pointer', fontSize: '0.8rem'
                                            }}>×</button>}
                                        </div>
                                        {m.description && <p className="text-secondary" style={{ fontSize: '0.75rem', margin: '0.25rem 0 0 0' }}>{m.description}</p>}
                                    </div>
                                ))}
                                {(npc.merits || []).length === 0 && !showMeritPicker && <p className="text-muted" style={{ fontSize: '0.75rem', fontStyle: 'italic' }}>None.</p>}
                            </div>
                        );
                    })()}
                </div>

                {/* Flaws (free-text) */}
                <NpcExpandableListModule
                    title="FLAWS" itemLabel="Flaw"
                    items={npc.flaws || []}
                    onAdd={() => onSave({ flaws: [...(npc.flaws || []), { name: '', rating: 1, description: '' }] })}
                    onRemove={idx => onSave({ flaws: (npc.flaws || []).filter((_, i) => i !== idx) })}
                    onUpdate={(idx, val) => onSave({ flaws: (npc.flaws || []).map((item, i) => i === idx ? val : item) })}
                />
            </div>
        );
    };

    // --- ADMIN PANEL ---
    const AdminPanel = ({ npc, onSave }) => {
        const [users, setUsers] = useState([]);
        const [agencies, setAgencies] = useState([]);
        const [confirmDelete, setConfirmDelete] = useState(false);
        const [transferMode, setTransferMode] = useState(null); // null, 'player', 'agency'
        const [transferTarget, setTransferTarget] = useState('');
        const [confirmTransfer, setConfirmTransfer] = useState(false);
        const [transferring, setTransferring] = useState(false);

        useEffect(() => {
            fetchUsers();
            fetchAgencies();
        }, []);

        const fetchUsers = async () => {
            try {
                const response = await fetch('/api/comms/users/');
                if (response.ok) {
                    const data = await response.json();
                    setUsers(data);
                }
            } catch (err) {
                console.error('Failed to fetch users:', err);
            }
        };

        const fetchAgencies = async () => {
            try {
                const response = await fetch('/api/agencies/');
                if (response.ok) {
                    const data = await response.json();
                    setAgencies(data.filter(a => !a.isPlayerAgency));
                }
            } catch (err) {
                console.error('Failed to fetch agencies:', err);
            }
        };

        const handleTransfer = async () => {
            if (!transferTarget) return;
            setTransferring(true);
            try {
                const transfer = transferMode === 'player'
                    ? { type: 'player', userId: parseInt(transferTarget) }
                    : { type: 'agency', agencyId: parseInt(transferTarget) };

                const response = await fetch('/api/npcs/' + NPC_ID + '/', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ transfer }),
                });
                if (response.ok) {
                    // Reload page to reflect new dossier type
                    window.location.reload();
                } else {
                    console.error('Transfer failed:', response.status);
                }
            } catch (err) {
                console.error('Transfer error:', err);
            } finally {
                setTransferring(false);
            }
        };

        const resetTransfer = () => {
            setTransferMode(null);
            setTransferTarget('');
            setConfirmTransfer(false);
        };

        const handleDelete = async () => {
            try {
                const response = await fetch('/api/npcs/' + NPC_ID + '/', {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                });
                if (response.ok) {
                    window.location.href = '/npcs/';
                } else {
                    console.error('Delete failed:', response.status);
                }
            } catch (err) {
                console.error('Delete error:', err);
            }
        };

        if (!IS_ADMIN) return null;

        // Build transfer label for confirmation
        const getTransferLabel = () => {
            if (transferMode === 'player') {
                const u = users.find(u => u.id === parseInt(transferTarget));
                return u ? u.displayName : '?';
            }
            const a = agencies.find(a => a.id === parseInt(transferTarget));
            return a ? a.name : '?';
        };

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                border: '1px solid var(--accent-danger)'
            }}>
                <h3 className="mono-text text-danger" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>ADMIN PANEL</h3>

                {/* Hidden toggle */}
                <div style={{ marginBottom: '1.5rem' }}>
                    <label style={{
                        display: 'flex', alignItems: 'center', gap: '0.5rem',
                        cursor: 'pointer', fontFamily: 'var(--font-mono)',
                        fontSize: '0.8rem', color: npc.isHidden ? 'var(--accent-danger)' : 'var(--text-secondary)',
                    }}>
                        <input
                            type="checkbox"
                            checked={npc.isHidden || false}
                            onChange={e => onSave({ isHidden: e.target.checked })}
                            style={{ accentColor: 'var(--accent-danger)' }}
                        />
                        HIDDEN (only visible to admins)
                    </label>
                </div>

                {/* Reassign dropdown (player contacts only) */}
                {!npc.isNpcDossier && (
                    <div style={{ marginBottom: '1.5rem' }}>
                        <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                            REASSIGN CONTACT
                        </label>
                        <select
                            value={npc.assignedToId || ''}
                            onChange={e => onSave({ assignedToId: parseInt(e.target.value) || null })}
                            style={{
                                display: 'block', marginTop: '0.25rem',
                                background: 'transparent',
                                border: '1px solid var(--accent-primary)',
                                color: 'var(--text-primary)',
                                padding: '0.5rem', width: '100%',
                                fontFamily: 'var(--font-mono)',
                                fontSize: '0.9rem', cursor: 'pointer'
                            }}
                        >
                            <option value="" style={{ background: 'var(--bg-dark)' }}>-- Unassigned --</option>
                            {users.map(user => (
                                <option key={user.id} value={user.id}
                                    style={{ background: 'var(--bg-dark)', color: 'var(--text-primary)' }}>
                                    {user.displayName}
                                </option>
                            ))}
                        </select>
                    </div>
                )}

                {/* Transfer dossier */}
                <div style={{ marginBottom: '1.5rem' }}>
                    <label className="text-secondary mono-text" style={{
                        fontSize: '0.8rem', display: 'block', marginBottom: '0.5rem'
                    }}>
                        TRANSFER DOSSIER
                    </label>

                    {!transferMode ? (
                        <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
                            <button
                                onClick={() => setTransferMode('player')}
                                className="mono-text"
                                style={{
                                    background: 'transparent',
                                    border: '1px solid var(--accent-primary)',
                                    color: 'var(--accent-primary)',
                                    padding: '0.4rem 1rem',
                                    cursor: 'pointer', fontSize: '0.8rem',
                                    fontFamily: 'var(--font-mono)',
                                }}
                            >
                                TO PLAYER
                            </button>
                            <button
                                onClick={() => setTransferMode('agency')}
                                className="mono-text"
                                style={{
                                    background: 'transparent',
                                    border: '1px solid var(--accent-warning)',
                                    color: 'var(--accent-warning)',
                                    padding: '0.4rem 1rem',
                                    cursor: 'pointer', fontSize: '0.8rem',
                                    fontFamily: 'var(--font-mono)',
                                }}
                            >
                                TO AGENCY
                            </button>
                        </div>
                    ) : !confirmTransfer ? (
                        <div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.5rem' }}>
                                <span className="mono-text" style={{
                                    fontSize: '0.75rem',
                                    color: transferMode === 'player' ? 'var(--accent-primary)' : 'var(--accent-warning)',
                                }}>
                                    {transferMode === 'player' ? 'SELECT PLAYER' : 'SELECT AGENCY'}
                                </span>
                            </div>
                            <select
                                value={transferTarget}
                                onChange={e => setTransferTarget(e.target.value)}
                                style={{
                                    display: 'block',
                                    background: 'transparent',
                                    border: `1px solid ${transferMode === 'player' ? 'var(--accent-primary)' : 'var(--accent-warning)'}`,
                                    color: 'var(--text-primary)',
                                    padding: '0.5rem', width: '100%',
                                    fontFamily: 'var(--font-mono)',
                                    fontSize: '0.9rem', cursor: 'pointer',
                                    marginBottom: '0.5rem',
                                }}
                            >
                                <option value="" style={{ background: 'var(--bg-dark)' }}>
                                    -- {transferMode === 'player' ? 'Select Player' : 'Select Agency'} --
                                </option>
                                {transferMode === 'player'
                                    ? users.map(u => (
                                        <option key={u.id} value={u.id}
                                            style={{ background: 'var(--bg-dark)', color: 'var(--text-primary)' }}>
                                            {u.displayName}
                                        </option>
                                    ))
                                    : agencies.map(a => (
                                        <option key={a.id} value={a.id}
                                            style={{ background: 'var(--bg-dark)', color: 'var(--text-primary)' }}>
                                            {a.name}
                                        </option>
                                    ))
                                }
                            </select>
                            <div style={{ display: 'flex', gap: '0.5rem' }}>
                                <button
                                    onClick={() => transferTarget && setConfirmTransfer(true)}
                                    disabled={!transferTarget}
                                    className="mono-text"
                                    style={{
                                        background: transferTarget ? 'var(--accent-warning)' : 'transparent',
                                        border: transferTarget ? 'none' : '1px solid var(--border-color)',
                                        color: transferTarget ? 'var(--bg-dark)' : 'var(--text-muted)',
                                        padding: '0.4rem 1rem',
                                        cursor: transferTarget ? 'pointer' : 'default',
                                        fontSize: '0.8rem', fontWeight: 'bold',
                                        fontFamily: 'var(--font-mono)',
                                    }}
                                >
                                    TRANSFER
                                </button>
                                <button
                                    onClick={resetTransfer}
                                    className="mono-text"
                                    style={{
                                        background: 'transparent',
                                        border: '1px solid var(--border-color)',
                                        color: 'var(--text-muted)',
                                        padding: '0.4rem 1rem',
                                        cursor: 'pointer', fontSize: '0.8rem',
                                        fontFamily: 'var(--font-mono)',
                                    }}
                                >
                                    CANCEL
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div>
                            <p className="mono-text" style={{
                                fontSize: '0.85rem', color: 'var(--accent-warning)',
                                marginBottom: '0.75rem',
                            }}>
                                Transfer "{npc.name}" to {transferMode === 'player' ? 'player' : 'agency'}: <strong>{getTransferLabel()}</strong>?
                                {npc.isNpcDossier && transferMode === 'player' && (
                                    <span style={{ display: 'block', marginTop: '0.25rem', fontSize: '0.75rem', color: 'var(--text-muted)' }}>
                                        This will convert the NPC dossier into a player contact.
                                    </span>
                                )}
                                {!npc.isNpcDossier && transferMode === 'agency' && (
                                    <span style={{ display: 'block', marginTop: '0.25rem', fontSize: '0.75rem', color: 'var(--text-muted)' }}>
                                        This will convert the player contact into an NPC dossier.
                                    </span>
                                )}
                            </p>
                            <div style={{ display: 'flex', gap: '0.5rem' }}>
                                <button
                                    onClick={handleTransfer}
                                    disabled={transferring}
                                    className="mono-text"
                                    style={{
                                        background: 'var(--accent-warning)',
                                        border: 'none',
                                        color: 'var(--bg-dark)',
                                        padding: '0.4rem 1rem',
                                        cursor: transferring ? 'wait' : 'pointer',
                                        fontSize: '0.8rem', fontWeight: 'bold',
                                        fontFamily: 'var(--font-mono)',
                                        opacity: transferring ? 0.6 : 1,
                                    }}
                                >
                                    {transferring ? 'TRANSFERRING...' : 'CONFIRM TRANSFER'}
                                </button>
                                <button
                                    onClick={resetTransfer}
                                    className="mono-text"
                                    style={{
                                        background: 'transparent',
                                        border: '1px solid var(--border-color)',
                                        color: 'var(--text-muted)',
                                        padding: '0.4rem 1rem',
                                        cursor: 'pointer', fontSize: '0.8rem',
                                        fontFamily: 'var(--font-mono)',
                                    }}
                                >
                                    CANCEL
                                </button>
                            </div>
                        </div>
                    )}
                </div>

                {/* Delete button */}
                <div>
                    {!confirmDelete ? (
                        <button
                            onClick={() => setConfirmDelete(true)}
                            className="mono-text"
                            style={{
                                background: 'transparent',
                                border: '1px solid var(--accent-danger)',
                                color: 'var(--accent-danger)',
                                padding: '0.5rem 1rem',
                                cursor: 'pointer', fontSize: '0.9rem',
                                width: '100%'
                            }}
                        >
                            DELETE RECORD
                        </button>
                    ) : (
                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                            <button
                                onClick={handleDelete}
                                className="mono-text"
                                style={{
                                    background: 'var(--accent-danger)',
                                    border: 'none',
                                    color: 'var(--bg-dark)',
                                    padding: '0.5rem 1rem',
                                    cursor: 'pointer', fontSize: '0.9rem',
                                    flex: 1, fontWeight: 'bold'
                                }}
                            >
                                CONFIRM DELETE
                            </button>
                            <button
                                onClick={() => setConfirmDelete(false)}
                                className="mono-text"
                                style={{
                                    background: 'transparent',
                                    border: '1px solid var(--border-color)',
                                    color: 'var(--text-muted)',
                                    padding: '0.5rem 1rem',
                                    cursor: 'pointer', fontSize: '0.9rem'
                                }}
                            >
                                CANCEL
                            </button>
                        </div>
                    )}
                </div>
            </div>
        );
    };

    // --- MAIN APP ---
    const NPCDetail = () => {
        const [npc, setNpc] = useState(null);
        const [loading, setLoading] = useState(true);
        const [saveStatus, setSaveStatus] = useState('saved');
        const saveTimerRef = useRef(null);
        const charRef = useRef(null);

        const [meritCatalog, setMeritCatalog] = useState([]);
        const [psCatalog, setPsCatalog] = useState([]);

        useEffect(() => {
            fetchNPC();
            fetch('/api/merits/').then(r => r.json()).then(setMeritCatalog).catch(() => {});
            fetch('/api/pulling-strings/').then(r => r.json()).then(setPsCatalog).catch(() => {});
        }, []);

        const fetchNPC = async () => {
            try {
                const response = await fetch('/api/npcs/' + NPC_ID + '/');
                if (response.ok) {
                    const data = await response.json();
                    setNpc(data);
                    charRef.current = data;
                } else {
                    console.error('Failed to load NPC');
                }
            } catch (err) {
                console.error('Failed to load NPC:', err);
            } finally {
                setLoading(false);
            }
        };

        const saveNPC = useCallback(async (data) => {
            setSaveStatus('saving');
            try {
                const response = await fetch('/api/npcs/' + NPC_ID + '/', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify(data),
                });
                if (response.ok) {
                    setSaveStatus('saved');
                } else {
                    setSaveStatus('error');
                    console.error('Save failed:', response.status);
                }
            } catch (err) {
                setSaveStatus('error');
                console.error('Save error:', err);
            }
        }, []);

        const updateNPC = (updates) => {
            if (!IS_EDITOR) return;
            const updated = { ...charRef.current, ...updates };
            setNpc(updated);
            charRef.current = updated;
            setSaveStatus('unsaved');

            if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
            saveTimerRef.current = setTimeout(() => {
                saveNPC(charRef.current);
            }, 1000);
        };

        const quietSaveTimerRef = useRef(null);
        const saveNPCQuiet = useCallback((updates) => {
            if (!IS_EDITOR) return;
            const updated = { ...charRef.current, ...updates };
            charRef.current = updated;
            setNpc(updated);

            if (quietSaveTimerRef.current) clearTimeout(quietSaveTimerRef.current);
            quietSaveTimerRef.current = setTimeout(async () => {
                try {
                    const response = await fetch('/api/npcs/' + NPC_ID + '/', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                        },
                        body: JSON.stringify(charRef.current),
                    });
                    if (!response.ok) console.error('Quiet save failed:', response.status);
                } catch (err) {
                    console.error('Quiet save error:', err);
                }
            }, 500);
        }, []);

        if (loading) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-accent" style={{ animation: 'pulse 1.5s infinite' }}>
                        DECRYPTING CONTACT DOSSIER...
                    </h2>
                </div>
            );
        }

        if (!npc) {
            return (
                <div style={{ textAlign: 'center', padding: '4rem' }}>
                    <h2 className="mono-text text-danger">ERROR: RECORD NOT FOUND</h2>
                    <p className="text-muted" style={{ marginTop: '1rem' }}>
                        The requested contact dossier could not be retrieved.
                    </p>
                </div>
            );
        }

        return (
            <div className="fade-in">
                {/* Sub-header with save status */}
                <div style={{
                    display: 'flex', flexWrap: 'wrap', justifyContent: 'space-between', alignItems: 'center',
                    marginBottom: '1rem', paddingBottom: '0.5rem',
                    gap: '0.5rem',
                    borderBottom: '1px solid var(--border-color)'
                }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                        <h2 className="mono-text text-accent" style={{ fontSize: '1.2rem' }}>
                            {IS_NPC_DOSSIER ? 'NPC DOSSIER' : 'CONTACT DOSSIER'}
                        </h2>
                        {IS_NPC_DOSSIER && npc.agencyName && (
                            <span className="mono-text" style={{
                                fontSize: '0.75rem', color: 'var(--accent-warning)',
                                border: '1px solid var(--accent-warning)',
                                padding: '0.15rem 0.5rem',
                            }}>
                                {npc.agencyName}
                            </span>
                        )}
                        {npc.isHidden && (
                            <span className="mono-text" style={{
                                fontSize: '0.75rem', color: 'var(--accent-danger)',
                                border: '1px solid var(--accent-danger)',
                                padding: '0.15rem 0.5rem',
                            }}>
                                HIDDEN
                            </span>
                        )}
                    </div>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem', alignItems: 'center' }}>
                        {!IS_EDITOR && (
                            <span className="mono-text" style={{
                                fontSize: '0.8rem', padding: '0.25rem 0.75rem',
                                border: '1px solid var(--text-muted)',
                                color: 'var(--text-muted)'
                            }}>READ ONLY</span>
                        )}
                        {IS_EDITOR && <SaveStatus status={saveStatus} />}
                        <a href="/npcs/"
                            className="mono-text"
                            style={{
                                background: 'transparent', border: '1px solid var(--accent-primary)',
                                color: 'var(--accent-primary)', padding: '0.5rem 1rem',
                                cursor: 'pointer', textDecoration: 'none', fontSize: '0.9rem'
                            }}>
                            &lt; CLOSE RECORD
                        </a>
                    </div>
                </div>

                <ProfilePictureModule
                    npc={npc}
                    onImageUploaded={(imageUrl) => {
                        const updated = { ...charRef.current, image: imageUrl };
                        setNpc(updated);
                        charRef.current = updated;
                    }}
                />

                <DemographicsModule npc={npc} onSave={saveNPCQuiet} />

                <StateModule npc={npc} onSave={updateNPC} />

                <AgencyModule npc={npc} onSave={updateNPC} />

                <BioModule npc={npc} onSave={saveNPCQuiet} />

                {/* Stats — superuser only */}
                {IS_ADMIN && npc.attributes && <DiceRoller npc={npc} />}
                {(IS_ADMIN || IS_ASSIGNED) && npc.attributes && <NpcStatsPanel npc={npc} onSave={IS_ADMIN ? saveNPCQuiet : () => {}} onRefresh={fetchNPC} psCatalog={psCatalog} meritCatalog={meritCatalog} readOnly={!IS_ADMIN} />}

                {/* Merits and Pulling Strings for non-admin view */}
                {!IS_ADMIN && (npc.merits?.length > 0 || npc.pullingStrings?.length > 0) && (
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '1rem' }}>
                        {(npc.pullingStrings || []).length > 0 && (
                            <div className="glass-panel" style={{ padding: '1rem' }}>
                                <h4 className="mono-text text-accent" style={{ borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '0.5rem', fontSize: '0.85rem' }}>PULLING STRINGS</h4>
                                {npc.pullingStrings.map(ps => (
                                    <div key={ps.id} className="tech-border" style={{ padding: '0.5rem', marginBottom: '0.3rem', background: 'rgba(0,0,0,0.2)' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                            <span className="mono-text" style={{ fontSize: '0.8rem' }}>{ps.name}</span>
                                            <span className="text-accent mono-text" style={{ fontSize: '0.7rem' }}>{ps.cost} XP</span>
                                        </div>
                                        {ps.description && <p className="text-secondary" style={{ fontSize: '0.75rem', margin: '0.25rem 0 0 0' }}>{ps.description}</p>}
                                    </div>
                                ))}
                            </div>
                        )}
                        {(npc.merits || []).length > 0 && (
                            <div className="glass-panel" style={{ padding: '1rem' }}>
                                <h4 className="mono-text text-accent" style={{ borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', marginBottom: '0.5rem', fontSize: '0.85rem' }}>MERITS</h4>
                                {npc.merits.map(m => (
                                    <div key={m.id} className="tech-border" style={{ padding: '0.5rem', marginBottom: '0.3rem', background: 'rgba(0,0,0,0.2)' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                            <span className="mono-text" style={{ fontSize: '0.8rem' }}>{m.name}</span>
                                            <span className="text-muted" style={{ fontSize: '0.7rem' }}>{m.rating}/{m.maxRating}</span>
                                        </div>
                                        {m.description && <p className="text-secondary" style={{ fontSize: '0.75rem', margin: '0.25rem 0 0 0' }}>{m.description}</p>}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                )}

                {/* Notes section - available on all dossiers */}
                {IS_NPC_DOSSIER && <NotesModule npc={npc} />}

                <AdminPanel npc={npc} onSave={updateNPC} />
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('app-root'));
    root.render(<NPCDetail />);
</script>
{% endverbatim %}
