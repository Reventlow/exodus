{% extends "base.html" %}

{% block title %}CONTACT DOSSIER // BLACKLOG.NET{% endblock %}

{% block content %}
<div id="app-root">
    <div class="loading-screen">
        <h1 class="mono-text">DECRYPTING CONTACT DOSSIER...</h1>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Django context variables — outside verbatim block
    const NPC_ID = {{ npc_id }};
    const IS_EDITOR = {{ is_editor|yesno:"true,false" }};
    const IS_ADMIN = {{ is_admin|yesno:"true,false" }};
    const IS_NPC_DOSSIER = {{ is_npc_dossier|yesno:"true,false" }};
    const CSRF_TOKEN = '{{ csrf_token }}';
    const CURRENT_USER = '{{ user.username }}';
    const CURRENT_USER_ID = {{ user.id }};
</script>
{% verbatim %}
<script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // --- CSRF ---
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // --- ICON COMPONENT (debounced createIcons to avoid per-render overhead) ---
    let _iconTimer = null;
    const _refreshIcons = () => {
        if (_iconTimer) clearTimeout(_iconTimer);
        _iconTimer = setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 50);
    };
    const Icon = ({ name, size = 16, className = "" }) => {
        useEffect(() => { _refreshIcons(); }, [name]);
        return <i data-lucide={name} width={size} height={size} className={className}></i>;
    };

    // --- AUTO-SAVE INPUT (uncontrolled) ---
    const AutoSaveInput = ({ defaultValue, onSave, delay = 1500, component = 'input', ...props }) => {
        const timerRef = useRef(null);

        const handleChange = (e) => {
            const val = e.target.value;
            if (timerRef.current) clearTimeout(timerRef.current);
            timerRef.current = setTimeout(() => {
                onSave(val);
            }, delay);
        };

        const handleBlur = (e) => {
            if (timerRef.current) {
                clearTimeout(timerRef.current);
                timerRef.current = null;
            }
            onSave(e.target.value);
        };

        const Tag = component;
        return <Tag {...props} defaultValue={defaultValue} onChange={handleChange} onBlur={handleBlur} />;
    };

    // --- SAVE STATUS INDICATOR ---
    const SaveStatus = ({ status }) => {
        const labels = {
            saved: 'SAVED',
            saving: 'SAVING...',
            unsaved: 'UNSAVED CHANGES',
            error: 'SAVE ERROR'
        };
        return (
            <span className={'save-status ' + status}>
                {labels[status] || status}
            </span>
        );
    };

    // --- STATE COLOR HELPER ---
    const getStateColor = (state) => {
        switch (state) {
            case 'active': return 'var(--accent-primary)';
            case 'leave':
            case 'medical_leave': return 'var(--accent-warning)';
            case 'missing': return 'var(--accent-danger)';
            case 'deceased': return 'var(--text-muted)';
            default: return 'var(--accent-primary)';
        }
    };

    // --- STATE DISPLAY LABELS ---
    const STATE_CHOICES = [
        { value: 'active', label: 'Active' },
        { value: 'leave', label: 'Leave' },
        { value: 'medical_leave', label: 'Medical Leave' },
        { value: 'missing', label: 'Missing' },
        { value: 'deceased', label: 'Deceased' }
    ];

    // --- PROFILE PICTURE MODULE ---
    // Image lightbox modal (rendered via portal to avoid overflow clipping)
    const ImageLightbox = ({ src, alt, onClose }) => {
        if (!src) return null;
        return ReactDOM.createPortal(
            <div
                onClick={onClose}
                style={{
                    position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                    background: 'rgba(0,0,0,0.85)', display: 'flex',
                    alignItems: 'center', justifyContent: 'center', zIndex: 2000,
                    cursor: 'pointer',
                }}
            >
                <img src={src} alt={alt || 'Image'}
                    onClick={e => e.stopPropagation()}
                    style={{
                        maxWidth: '90vw', maxHeight: '90vh', objectFit: 'contain',
                        border: '2px solid var(--border-color)', borderRadius: '4px',
                        cursor: 'default',
                    }}
                />
            </div>,
            document.body
        );
    };

    const ProfilePictureModule = ({ npc, onImageUploaded }) => {
        const [uploading, setUploading] = useState(false);
        const [hoverEdit, setHoverEdit] = useState(false);
        const [showLightbox, setShowLightbox] = useState(false);
        const fileInputRef = useRef(null);

        const handleEditClick = (e) => {
            e.stopPropagation();
            if (IS_EDITOR && fileInputRef.current) {
                fileInputRef.current.click();
            }
        };

        const handleImageClick = () => {
            if (npc.image) {
                setShowLightbox(true);
            }
        };

        const handleFileChange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            setUploading(true);
            try {
                const formData = new FormData();
                formData.append('image', file);

                const response = await fetch('/api/npcs/' + NPC_ID + '/image/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: formData,
                });

                if (response.ok) {
                    const data = await response.json();
                    onImageUploaded(data.image || data.url || data);
                } else {
                    console.error('Image upload failed:', response.status);
                }
            } catch (err) {
                console.error('Image upload error:', err);
            } finally {
                setUploading(false);
                if (fileInputRef.current) fileInputRef.current.value = '';
            }
        };

        const stateColor = getStateColor(npc.state);

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                display: 'flex', justifyContent: 'center'
            }}>
                <div
                    onClick={handleImageClick}
                    onMouseEnter={() => setHoverEdit(true)}
                    onMouseLeave={() => setHoverEdit(false)}
                    style={{
                        width: '150px', height: '150px', borderRadius: '50%',
                        border: '3px solid ' + stateColor,
                        overflow: 'hidden', position: 'relative',
                        cursor: npc.image ? 'zoom-in' : 'default',
                        background: 'rgba(0,0,0,0.3)',
                        display: 'flex', alignItems: 'center', justifyContent: 'center'
                    }}
                >
                    {npc.image ? (
                        <img src={npc.image} alt={npc.name || 'NPC'}
                            style={{
                                width: '100%', height: '100%', objectFit: 'cover'
                            }} />
                    ) : (
                        <Icon name="user" size={48} className="text-muted" />
                    )}

                    {IS_EDITOR && hoverEdit && !uploading && (
                        <div
                            onClick={handleEditClick}
                            style={{
                                position: 'absolute', bottom: 0, left: 0,
                                width: '100%', height: '40%',
                                background: 'rgba(0,0,0,0.7)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                cursor: 'pointer',
                            }}
                        >
                            <span className="mono-text" style={{
                                fontSize: '0.7rem', color: 'var(--accent-primary)',
                                fontWeight: 'bold', letterSpacing: '1px',
                            }}>EDIT</span>
                        </div>
                    )}

                    {uploading && (
                        <div style={{
                            position: 'absolute', top: 0, left: 0,
                            width: '100%', height: '100%',
                            background: 'rgba(0,0,0,0.7)',
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                            borderRadius: '50%'
                        }}>
                            <span className="mono-text text-accent" style={{
                                fontSize: '0.7rem', animation: 'pulse 1s infinite'
                            }}>UPLOADING</span>
                        </div>
                    )}
                </div>

                <input
                    ref={fileInputRef}
                    type="file"
                    accept="image/*"
                    onChange={handleFileChange}
                    style={{ display: 'none' }}
                />

                {showLightbox && (
                    <ImageLightbox
                        src={npc.image}
                        alt={npc.name}
                        onClose={() => setShowLightbox(false)}
                    />
                )}
            </div>
        );
    };

    // --- DEMOGRAPHICS MODULE ---
    const DemographicsModule = ({ npc, onSave }) => {
        if (!IS_EDITOR) {
            return (
                <div className="glass-panel" style={{
                    padding: '1.5rem', marginBottom: '1rem',
                    display: 'grid',
                    gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))',
                    gap: '1rem'
                }}>
                    <div>
                        <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>NAME</label>
                        <div className="mono-text" style={{
                            fontSize: '1.2rem', color: 'var(--text-primary)',
                            borderBottom: '1px solid var(--accent-primary)',
                            paddingBottom: '0.25rem'
                        }}>{npc.name || 'UNKNOWN'}</div>
                    </div>
                    <div>
                        <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>CLASS</label>
                        <div style={{
                            color: npc.characterClass === 'classified'
                                ? 'var(--accent-danger)' : 'var(--text-primary)',
                            fontStyle: npc.characterClass === 'classified' ? 'italic' : 'normal'
                        }}>
                            {npc.characterClass === 'classified' ? 'CLASSIFIED'
                                : npc.characterClass ? npc.characterClass.charAt(0).toUpperCase() + npc.characterClass.slice(1)
                                : '-'}
                        </div>
                    </div>
                    <div>
                        <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>AGE</label>
                        <div style={{ color: 'var(--text-primary)' }}>{npc.age || '-'}</div>
                    </div>
                    <div>
                        <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>SEX</label>
                        <div style={{ color: 'var(--text-primary)' }}>{npc.sex || '-'}</div>
                    </div>
                    <div>
                        <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>PRONOUNS</label>
                        <div style={{ color: 'var(--text-primary)' }}>{npc.pronouns || '-'}</div>
                    </div>
                    <div>
                        <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>NATIONALITY</label>
                        <div style={{ color: 'var(--text-primary)' }}>{npc.nationality || '-'}</div>
                    </div>
                    <div style={{ gridColumn: '1 / -1' }}>
                        <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>OCCUPATION</label>
                        <div style={{ color: 'var(--text-primary)' }}>{npc.occupation || '-'}</div>
                    </div>
                </div>
            );
        }

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))',
                gap: '1rem'
            }}>
                <div>
                    <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>NAME</label>
                    <AutoSaveInput type="text" defaultValue={npc.name}
                        onSave={val => onSave({ name: val })}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--accent-primary)',
                            color: 'var(--text-primary)', width: '100%',
                            fontSize: '1.2rem', fontFamily: 'var(--font-mono)'
                        }} />
                </div>
                <div>
                    <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>CLASS</label>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                        <select value={npc.characterClass || ""}
                            onChange={e => onSave({ characterClass: e.target.value })}
                            style={{
                                background: 'transparent', border: 'none',
                                borderBottom: '1px solid var(--border-color)',
                                color: 'var(--text-primary)', flex: 1,
                                fontFamily: 'var(--font-mono)', cursor: 'pointer'
                            }}>
                            <option value="" style={{ background: 'var(--bg-dark)' }}>— SELECT —</option>
                            <option value="fixer" style={{ background: 'var(--bg-dark)' }}>Fixer</option>
                            <option value="soldier" style={{ background: 'var(--bg-dark)' }}>Soldier</option>
                            <option value="science" style={{ background: 'var(--bg-dark)' }}>Science</option>
                            <option value="engineer" style={{ background: 'var(--bg-dark)' }}>Engineer</option>
                            {IS_ADMIN && <option value="ai" style={{ background: 'var(--bg-dark)' }}>AI</option>}
                        </select>
                        {IS_ADMIN && IS_NPC_DOSSIER && (
                            <label style={{
                                display: 'flex', alignItems: 'center', gap: '0.25rem',
                                fontSize: '0.7rem', color: npc.classClassified ? 'var(--accent-danger)' : 'var(--text-muted)',
                                cursor: 'pointer', whiteSpace: 'nowrap'
                            }} title="Mark class as classified for non-admins">
                                <input type="checkbox" checked={npc.classClassified || false}
                                    onChange={e => onSave({ classClassified: e.target.checked })}
                                    style={{ accentColor: 'var(--accent-danger)' }} />
                                CLASSIFIED
                            </label>
                        )}
                    </div>
                </div>
                <div>
                    <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>AGE</label>
                    <AutoSaveInput type="number" defaultValue={npc.age}
                        onSave={val => onSave({ age: val })}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--border-color)',
                            color: 'var(--text-primary)', width: '100%'
                        }} />
                </div>
                <div>
                    <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>SEX</label>
                    <AutoSaveInput type="text" defaultValue={npc.sex}
                        onSave={val => onSave({ sex: val })}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--border-color)',
                            color: 'var(--text-primary)', width: '100%'
                        }} />
                </div>
                <div>
                    <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>PRONOUNS</label>
                    <AutoSaveInput type="text" defaultValue={npc.pronouns}
                        onSave={val => onSave({ pronouns: val })}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--border-color)',
                            color: 'var(--text-primary)', width: '100%'
                        }} />
                </div>
                <div>
                    <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>NATIONALITY</label>
                    <AutoSaveInput type="text" defaultValue={npc.nationality}
                        onSave={val => onSave({ nationality: val })}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--border-color)',
                            color: 'var(--text-primary)', width: '100%'
                        }} />
                </div>
                <div style={{ gridColumn: '1 / -1' }}>
                    <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>OCCUPATION</label>
                    <AutoSaveInput type="text" defaultValue={npc.occupation}
                        onSave={val => onSave({ occupation: val })}
                        style={{
                            background: 'transparent', border: 'none',
                            borderBottom: '1px solid var(--border-color)',
                            color: 'var(--text-primary)', width: '100%'
                        }} />
                </div>
            </div>
        );
    };

    // --- STATE MODULE ---
    const StateModule = ({ npc, onSave }) => {
        const stateColor = getStateColor(npc.state);
        const stateLabel = STATE_CHOICES.find(s => s.value === npc.state)?.label || npc.state;

        if (!IS_EDITOR) {
            return (
                <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                    <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>STATUS</label>
                    <span className="mono-text" style={{
                        display: 'block', marginTop: '0.25rem',
                        color: stateColor, fontSize: '1rem',
                        textTransform: 'uppercase'
                    }}>
                        {stateLabel}
                    </span>
                </div>
            );
        }

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>STATUS</label>
                <select
                    value={npc.state || 'active'}
                    onChange={e => onSave({ state: e.target.value })}
                    style={{
                        display: 'block', marginTop: '0.25rem',
                        background: 'transparent',
                        border: '1px solid ' + stateColor,
                        color: stateColor,
                        padding: '0.5rem', width: '100%',
                        fontFamily: 'var(--font-mono)',
                        fontSize: '0.9rem', cursor: 'pointer',
                        textTransform: 'uppercase'
                    }}
                >
                    {STATE_CHOICES.map(s => (
                        <option key={s.value} value={s.value}
                            style={{ background: 'var(--bg-dark)', color: 'var(--text-primary)' }}>
                            {s.label}
                        </option>
                    ))}
                </select>
            </div>
        );
    };

    // --- AGENCY MODULE (NPC dossiers only) ---
    const AgencyModule = ({ npc, onSave }) => {
        const [agencies, setAgencies] = useState([]);

        useEffect(() => {
            if (IS_ADMIN) {
                fetch('/api/agencies/')
                    .then(r => r.json())
                    .then(data => setAgencies(data.filter(a => !a.isPlayerAgency)))
                    .catch(() => {});
            }
        }, []);

        if (!IS_NPC_DOSSIER) return null;

        if (!IS_ADMIN) {
            return (
                <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                    <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>AGENCY</label>
                    <div className="mono-text" style={{
                        marginTop: '0.25rem', color: 'var(--accent-warning)',
                        fontSize: '1rem',
                    }}>
                        {npc.agencyName || 'UNASSIGNED'}
                    </div>
                </div>
            );
        }

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>AGENCY</label>
                <select
                    value={npc.agencyId || ''}
                    onChange={e => onSave({ agencyId: parseInt(e.target.value) || null })}
                    style={{
                        display: 'block', marginTop: '0.25rem',
                        background: 'transparent',
                        border: '1px solid var(--accent-warning)',
                        color: 'var(--accent-warning)',
                        padding: '0.5rem', width: '100%',
                        fontFamily: 'var(--font-mono)',
                        fontSize: '0.9rem', cursor: 'pointer',
                    }}
                >
                    <option value="" style={{ background: 'var(--bg-dark)' }}>-- Unassigned --</option>
                    {agencies.map(a => (
                        <option key={a.id} value={a.id}
                            style={{ background: 'var(--bg-dark)', color: 'var(--text-primary)' }}>
                            {a.name}
                        </option>
                    ))}
                </select>
            </div>
        );
    };

    // --- BIO MODULE (Markdown editor with preview toggle) ---
    const BioModule = ({ npc, onSave }) => {
        const [editMode, setEditMode] = useState(false);

        const renderMarkdown = (text) => {
            if (!text) return '<p class="text-muted" style="font-style:italic;">No bio recorded.</p>';
            try {
                return window.marked.parse(text);
            } catch (err) {
                return '<p>' + text + '</p>';
            }
        };

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <div style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>
                    <h3 className="mono-text text-accent">DOSSIER</h3>
                    {IS_EDITOR && (
                        <button
                            onClick={() => setEditMode(!editMode)}
                            className="mono-text"
                            style={{
                                background: 'transparent',
                                border: '1px solid var(--accent-primary)',
                                color: 'var(--accent-primary)',
                                padding: '0.25rem 0.75rem',
                                cursor: 'pointer', fontSize: '0.8rem'
                            }}
                        >
                            {editMode ? 'PREVIEW' : 'EDIT'}
                        </button>
                    )}
                </div>

                {editMode && IS_EDITOR ? (
                    <AutoSaveInput
                        component="textarea"
                        defaultValue={npc.bio || ''}
                        onSave={val => onSave({ bio: val })}
                        placeholder="Write the contact's dossier in Markdown..."
                        style={{
                            width: '100%', minHeight: '300px',
                            background: 'rgba(0,0,0,0.2)',
                            border: '1px solid var(--border-color)',
                            color: 'var(--text-primary)',
                            padding: '1rem', fontFamily: 'var(--font-mono)',
                            fontSize: '0.9rem', resize: 'vertical',
                            lineHeight: '1.6'
                        }}
                    />
                ) : (
                    <div
                        className="dossier-content"
                        dangerouslySetInnerHTML={{ __html: renderMarkdown(npc.bio) }}
                    />
                )}
            </div>
        );
    };

    // --- NOTES MODULE (available on all dossiers, any player can add) ---
    const NotesModule = ({ npc }) => {
        const [notes, setNotes] = useState(npc.notes || []);
        const [newNote, setNewNote] = useState('');
        const [submitting, setSubmitting] = useState(false);
        const [editingId, setEditingId] = useState(null);
        const [editText, setEditText] = useState('');

        const renderMarkdown = (text) => {
            try {
                return window.marked.parse(text);
            } catch (err) {
                return '<p>' + text + '</p>';
            }
        };

        const submitNote = async () => {
            if (!newNote.trim()) return;
            setSubmitting(true);
            try {
                const response = await fetch('/api/npcs/' + NPC_ID + '/notes/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ text: newNote }),
                });
                if (response.ok) {
                    const note = await response.json();
                    setNotes([note, ...notes]);
                    setNewNote('');
                }
            } catch (err) {
                console.error('Failed to submit note:', err);
            } finally {
                setSubmitting(false);
            }
        };

        const deleteNote = async (noteId) => {
            try {
                const response = await fetch('/api/npcs/' + NPC_ID + '/notes/' + noteId + '/', {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                });
                if (response.ok) {
                    setNotes(notes.filter(n => n.id !== noteId));
                }
            } catch (err) {
                console.error('Failed to delete note:', err);
            }
        };

        const startEdit = (note) => {
            setEditingId(note.id);
            setEditText(note.text);
        };

        const saveEdit = async (noteId) => {
            if (!editText.trim()) return;
            try {
                const response = await fetch('/api/npcs/' + NPC_ID + '/notes/' + noteId + '/', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ text: editText }),
                });
                if (response.ok) {
                    const updated = await response.json();
                    setNotes(notes.map(n => n.id === noteId ? updated : n));
                    setEditingId(null);
                    setEditText('');
                }
            } catch (err) {
                console.error('Failed to update note:', err);
            }
        };

        const formatDate = (iso) => {
            try {
                const d = new Date(iso);
                return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } catch {
                return iso;
            }
        };

        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem',
                }}>
                    <Icon name="sticky-note" size={16} /> FIELD NOTES
                </h3>

                {/* Add note form */}
                <div style={{ marginBottom: '1.5rem' }}>
                    <textarea
                        value={newNote}
                        onChange={e => setNewNote(e.target.value)}
                        placeholder="Add a note... (Markdown supported)"
                        style={{
                            width: '100%', minHeight: '80px',
                            background: 'rgba(0,0,0,0.2)',
                            border: '1px solid var(--border-color)',
                            color: 'var(--text-primary)',
                            padding: '0.75rem', fontFamily: 'var(--font-mono)',
                            fontSize: '0.85rem', resize: 'vertical',
                            marginBottom: '0.5rem',
                        }}
                    />
                    <button
                        onClick={submitNote}
                        disabled={submitting || !newNote.trim()}
                        className="mono-text"
                        style={{
                            background: newNote.trim() ? 'var(--accent-primary)' : 'transparent',
                            border: newNote.trim() ? 'none' : '1px solid var(--border-color)',
                            color: newNote.trim() ? 'var(--bg-dark)' : 'var(--text-muted)',
                            padding: '0.4rem 1rem',
                            cursor: submitting || !newNote.trim() ? 'default' : 'pointer',
                            fontSize: '0.8rem', fontWeight: 'bold',
                            fontFamily: 'var(--font-mono)',
                            opacity: submitting ? 0.6 : 1,
                        }}
                    >
                        {submitting ? 'SUBMITTING...' : 'ADD NOTE'}
                    </button>
                </div>

                {/* Notes list */}
                {notes.length === 0 && (
                    <p className="text-muted mono-text" style={{
                        textAlign: 'center', fontStyle: 'italic', padding: '1rem 0',
                    }}>
                        No field notes recorded.
                    </p>
                )}

                {notes.map(note => (
                    <div key={note.id} style={{
                        borderLeft: '2px solid var(--accent-primary)',
                        paddingLeft: '1rem',
                        marginBottom: '1rem',
                        paddingBottom: '0.5rem',
                        borderBottom: '1px solid var(--border-color)',
                    }}>
                        <div style={{
                            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                            marginBottom: '0.5rem',
                        }}>
                            <span className="mono-text" style={{ fontSize: '0.75rem', color: 'var(--accent-primary)' }}>
                                {note.author} — {formatDate(note.createdAt)}
                            </span>
                            {(note.author === CURRENT_USER || IS_ADMIN) && editingId !== note.id && (
                                <div style={{ display: 'flex', gap: '0.5rem' }}>
                                    <button
                                        onClick={() => startEdit(note)}
                                        className="mono-text"
                                        style={{
                                            background: 'transparent', border: 'none',
                                            color: 'var(--text-muted)', cursor: 'pointer',
                                            fontSize: '0.7rem', padding: '0.2rem 0.4rem',
                                        }}
                                    >
                                        EDIT
                                    </button>
                                    <button
                                        onClick={() => deleteNote(note.id)}
                                        className="mono-text"
                                        style={{
                                            background: 'transparent', border: 'none',
                                            color: 'var(--accent-danger)', cursor: 'pointer',
                                            fontSize: '0.7rem', padding: '0.2rem 0.4rem',
                                        }}
                                    >
                                        DELETE
                                    </button>
                                </div>
                            )}
                        </div>

                        {editingId === note.id ? (
                            <div>
                                <textarea
                                    value={editText}
                                    onChange={e => setEditText(e.target.value)}
                                    style={{
                                        width: '100%', minHeight: '60px',
                                        background: 'rgba(0,0,0,0.2)',
                                        border: '1px solid var(--border-color)',
                                        color: 'var(--text-primary)',
                                        padding: '0.5rem', fontFamily: 'var(--font-mono)',
                                        fontSize: '0.85rem', resize: 'vertical',
                                        marginBottom: '0.5rem',
                                    }}
                                />
                                <div style={{ display: 'flex', gap: '0.5rem' }}>
                                    <button
                                        onClick={() => saveEdit(note.id)}
                                        className="mono-text"
                                        style={{
                                            background: 'var(--accent-primary)', border: 'none',
                                            color: 'var(--bg-dark)', padding: '0.3rem 0.75rem',
                                            cursor: 'pointer', fontSize: '0.75rem', fontWeight: 'bold',
                                            fontFamily: 'var(--font-mono)',
                                        }}
                                    >
                                        SAVE
                                    </button>
                                    <button
                                        onClick={() => { setEditingId(null); setEditText(''); }}
                                        className="mono-text"
                                        style={{
                                            background: 'transparent',
                                            border: '1px solid var(--border-color)',
                                            color: 'var(--text-muted)', padding: '0.3rem 0.75rem',
                                            cursor: 'pointer', fontSize: '0.75rem',
                                            fontFamily: 'var(--font-mono)',
                                        }}
                                    >
                                        CANCEL
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div
                                className="dossier-content"
                                style={{ fontSize: '0.9rem' }}
                                dangerouslySetInnerHTML={{ __html: renderMarkdown(note.text) }}
                            />
                        )}
                    </div>
                ))}
            </div>
        );
    };

    // --- STAT COMPONENTS (superuser-only) ---

    const StatDots = ({ value, max = 5, onChange, editable }) => {
        return (
            <div style={{ display: 'flex', gap: '4px' }}>
                {[...Array(max)].map((_, i) => (
                    <div
                        key={i}
                        onClick={() => editable && onChange(i + 1 === value && value === 1 ? 0 : i + 1)}
                        style={{
                            width: '12px', height: '12px', borderRadius: '50%',
                            border: '1px solid var(--text-muted)',
                            background: i < value ? 'var(--accent-primary)' : 'transparent',
                            cursor: editable ? 'pointer' : 'default',
                            boxShadow: i < value ? '0 0 5px var(--accent-glow)' : 'none'
                        }}
                    />
                ))}
            </div>
        );
    };

    const NpcAttributesModule = ({ attributes, update }) => {
        const updateAttr = (cat, type, val) => {
            update({ ...attributes, [cat]: { ...attributes[cat], [type]: val } });
        };
        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>ATTRIBUTES</h3>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '2rem' }}>
                    <div>
                        <div className="text-center text-muted mono-text" style={{ marginBottom: '0.5rem' }}>MENTAL</div>
                        {[['Intelligence', 'power'], ['Wits', 'finesse'], ['Resolve', 'resistance']].map(([label, cat]) => (
                            <div key={label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                <span>{label}</span>
                                <StatDots value={attributes[cat].mental} onChange={v => updateAttr(cat, 'mental', v)} editable={true} />
                            </div>
                        ))}
                    </div>
                    <div>
                        <div className="text-center text-muted mono-text" style={{ marginBottom: '0.5rem' }}>PHYSICAL</div>
                        {[['Strength', 'power'], ['Dexterity', 'finesse'], ['Stamina', 'resistance']].map(([label, cat]) => (
                            <div key={label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                <span>{label}</span>
                                <StatDots value={attributes[cat].physical} onChange={v => updateAttr(cat, 'physical', v)} editable={true} />
                            </div>
                        ))}
                    </div>
                    <div>
                        <div className="text-center text-muted mono-text" style={{ marginBottom: '0.5rem' }}>SOCIAL</div>
                        {[['Presence', 'power'], ['Manipulation', 'finesse'], ['Composure', 'resistance']].map(([label, cat]) => (
                            <div key={label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                                <span>{label}</span>
                                <StatDots value={attributes[cat].social} onChange={v => updateAttr(cat, 'social', v)} editable={true} />
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    const NpcSkillsModule = ({ skills, update }) => {
        const updateSkill = (cat, name, val) => {
            update({ ...skills, [cat]: { ...skills[cat], [name]: val } });
        };
        const SkillCol = ({ category, title }) => (
            <div>
                <h4 className="text-center text-muted mono-text" style={{ marginBottom: '1rem', textTransform: 'uppercase' }}>{title}</h4>
                {Object.entries(skills[category]).map(([name, val]) => (
                    <div key={name} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                        <span style={{ fontSize: '0.9rem', color: val === 0 ? 'var(--text-muted)' : 'var(--text-primary)' }}>
                            {name.replace(/([A-Z])/g, ' $1').trim()}
                            {val === 0 && <span style={{ fontSize: '0.7em', marginLeft: '4px', opacity: 0.5 }}>(-{category === 'mental' ? 3 : 1})</span>}
                        </span>
                        <StatDots value={val} onChange={v => updateSkill(category, name, v)} editable={true} />
                    </div>
                ))}
            </div>
        );
        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>SKILLS</h3>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(250px, 1fr))', gap: '2rem' }}>
                    <SkillCol category="mental" title="Mental (-3 Unskilled)" />
                    <SkillCol category="physical" title="Physical (-1 Unskilled)" />
                    <SkillCol category="social" title="Social (-1 Unskilled)" />
                </div>
            </div>
        );
    };

    const NpcDerivedTraitsModule = ({ npc, update }) => {
        const attrs = npc.attributes;
        const speed = 5 + attrs.power.physical + attrs.finesse.physical + (npc.size || 5);
        const initMod = attrs.finesse.physical + attrs.resistance.social;
        const defense = Math.min(attrs.finesse.physical, attrs.finesse.mental);
        const willpowerMax = attrs.resistance.mental + attrs.resistance.social;
        const healthMax = attrs.resistance.physical + (npc.size || 5);
        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>DERIVED TRAITS</h3>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '1rem' }}>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>HEALTH</div>
                        <div className="text-accent" style={{ fontSize: '1.5rem' }}>{healthMax}</div>
                        <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>Stamina + Size</div>
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>WILLPOWER</div>
                        <div className="text-accent" style={{ fontSize: '1.5rem' }}>{willpowerMax}</div>
                        <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>Resolve + Composure</div>
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>INITIATIVE</div>
                        <div style={{ fontSize: '1.5rem', color: 'var(--text-primary)' }}>{initMod}</div>
                        <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>Dex + Comp</div>
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>DEFENSE</div>
                        <div style={{ fontSize: '1.5rem', color: 'var(--text-primary)' }}>{defense}</div>
                        <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>Lowest(Wits, Dex)</div>
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>SPEED</div>
                        <div style={{ fontSize: '1.5rem', color: 'var(--text-primary)' }}>{speed}</div>
                        <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>Str + Dex + 5</div>
                    </div>
                    <div className="tech-border text-center" style={{ padding: '0.5rem' }}>
                        <div className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>SIZE</div>
                        <input type="number" value={npc.size || 5}
                            onChange={e => update({ size: parseInt(e.target.value) || 5 })}
                            style={{
                                background: 'transparent', border: 'none',
                                color: 'var(--text-primary)', width: '100%',
                                textAlign: 'center', fontSize: '1.5rem'
                            }} />
                    </div>
                </div>
            </div>
        );
    };

    const getMentalLoadPenalties = (level) => {
        let social = 0, cognitive = 0;
        if (level >= 3) social -= 2;
        if (level >= 4) cognitive -= 2;
        if (level >= 5) { social -= 1; cognitive -= 1; }
        if (level >= 6) { social -= 2; cognitive -= 2; }
        return { social, cognitive };
    };

    const NpcHealthModule = ({ health, max, mentalLoad, update, onMentalLoadChange }) => {
        const deadlyFill = (health.lethal || 0) + (health.aggravated || 0);
        const isFlatline = max > 0 && deadlyFill >= max;
        const ekgSpeed = isFlatline ? 0 : Math.max(0.3, 2 - mentalLoad * 0.25);
        const ekgPath = isFlatline ? "M0,30 L300,30" : "M0,30 L20,30 L25,10 L35,50 L40,30 L300,30";
        const ekgColor = isFlatline ? 'var(--text-muted)' : 'var(--accent-danger)';
        const penalties = getMentalLoadPenalties(mentalLoad);
        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem', border: '1px solid var(--accent-danger)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem', flexWrap: 'wrap', gap: '0.5rem' }}>
                    <h3 className="mono-text text-danger">BIOSIGN MONITOR</h3>
                    <div className="text-danger mono-text" style={{ animation: isFlatline ? 'none' : 'pulse 2s infinite' }}>
                        {isFlatline ? 'NO VITAL SIGNS DETECTED' : 'Tracking vital signs...'}
                    </div>
                </div>
                <div style={{ height: '60px', background: 'rgba(0,0,0,0.3)', marginBottom: '1rem', position: 'relative', overflow: 'hidden', borderLeft: '2px solid ' + ekgColor }}>
                    <svg width="100%" height="100%" viewBox="0 0 300 60" preserveAspectRatio="none">
                        <path d={ekgPath} fill="none" stroke={ekgColor} strokeWidth="2" vectorEffect="non-scaling-stroke"
                            style={isFlatline ? {} : { animation: 'dash ' + ekgSpeed + 's linear infinite' }} />
                    </svg>
                </div>
                <div style={{ display: 'flex', justifyContent: 'center', gap: '0.5rem', flexWrap: 'wrap' }}>
                    {[...Array(max)].map((_, i) => {
                        let symbol = '', color = 'var(--border-color)';
                        if (i < (health.aggravated || 0)) { symbol = '*'; color = 'var(--accent-danger)'; }
                        else if (i < (health.aggravated || 0) + (health.lethal || 0)) { symbol = 'X'; color = 'var(--accent-warning)'; }
                        else if (i < (health.aggravated || 0) + (health.lethal || 0) + (health.bashing || 0)) { symbol = '/'; color = 'var(--text-secondary)'; }
                        return (
                            <div key={i} style={{ width: '24px', height: '24px', border: '1px solid var(--accent-danger)', display: 'flex', alignItems: 'center', justifyContent: 'center', color, fontWeight: 'bold', fontSize: '0.9rem' }}>
                                {symbol}
                            </div>
                        );
                    })}
                </div>
                <div style={{ display: 'flex', gap: '2rem', justifyContent: 'center', marginTop: '1rem', flexWrap: 'wrap' }}>
                    {[['BASHING', 'bashing'], ['LETHAL', 'lethal'], ['AGGRAVATED', 'aggravated']].map(([label, key]) => (
                        <div key={key} className="text-center">
                            <label className="text-muted mono-text" style={{ fontSize: '0.8rem' }}>{label}</label>
                            <input type="number" value={health[key] || 0}
                                onChange={e => update({ ...health, [key]: parseInt(e.target.value) || 0 })}
                                style={{ display: 'block', background: 'transparent', border: '1px solid var(--accent-danger)', color: 'var(--accent-danger)', width: '60px', textAlign: 'center', fontSize: '1.2rem' }} />
                        </div>
                    ))}
                </div>
                <div style={{ marginTop: '1.5rem', paddingTop: '1rem', borderTop: '1px solid var(--border-color)' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.75rem', flexWrap: 'wrap', gap: '0.5rem' }}>
                        <span className="mono-text text-danger" style={{ fontSize: '0.9rem' }}>MENTAL LOAD</span>
                        {(penalties.social !== 0 || penalties.cognitive !== 0) && (
                            <div style={{ display: 'flex', gap: '0.75rem' }}>
                                {penalties.social !== 0 && <span className="mono-text" style={{ fontSize: '0.75rem', color: 'var(--accent-warning)' }}>SOCIAL {penalties.social}</span>}
                                {penalties.cognitive !== 0 && <span className="mono-text" style={{ fontSize: '0.75rem', color: 'var(--accent-warning)' }}>COGNITIVE {penalties.cognitive}</span>}
                            </div>
                        )}
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'center', gap: '0.5rem' }}>
                        {[...Array(6)].map((_, i) => {
                            const filled = i < mentalLoad;
                            const level = i + 1;
                            let boxColor = 'var(--border-color)';
                            if (filled && level <= 2) boxColor = 'var(--accent-primary)';
                            else if (filled && level <= 4) boxColor = 'var(--accent-warning)';
                            else if (filled) boxColor = 'var(--accent-danger)';
                            return (
                                <div key={i}
                                    onClick={() => onMentalLoadChange(mentalLoad === level ? level - 1 : level)}
                                    style={{ width: '28px', height: '28px', border: '1px solid var(--accent-danger)', background: filled ? boxColor : 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.2s', boxShadow: filled ? '0 0 6px ' + boxColor : 'none' }}
                                    title={'Level ' + level}>
                                    {filled && <span style={{ color: 'var(--bg-dark)', fontWeight: 'bold', fontSize: '0.7rem' }}>{level}</span>}
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
        );
    };

    const NpcExpandableListModule = ({ title, itemLabel, items, onAdd, onRemove, onUpdate }) => {
        const [expanded, setExpanded] = useState({});
        return (
            <div className="glass-panel" style={{ padding: '1.5rem', marginBottom: '1rem' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                    <h3 className="mono-text text-accent" style={{ borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem', flex: 1 }}>
                        {title} ({items.length})
                    </h3>
                    <button onClick={onAdd} style={{
                        background: 'transparent', border: '1px solid var(--accent-primary)',
                        color: 'var(--accent-primary)', padding: '0.3rem 0.75rem', cursor: 'pointer',
                        fontFamily: 'var(--font-mono)', fontSize: '0.8rem', marginLeft: '1rem',
                    }}>+ ADD</button>
                </div>
                {items.map((item, idx) => (
                    <div key={idx} className="tech-border" style={{ padding: '0.75rem', marginBottom: '0.5rem' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer' }}
                            onClick={() => setExpanded(prev => ({ ...prev, [idx]: !prev[idx] }))}>
                            <span className="mono-text" style={{ color: 'var(--accent-primary)' }}>
                                {item.name || `${itemLabel} ${idx + 1}`}
                                {item.rating ? ` (${item.rating})` : ''}
                            </span>
                            <button onClick={e => { e.stopPropagation(); onRemove(idx); }}
                                style={{ background: 'transparent', border: 'none', color: 'var(--accent-danger)', cursor: 'pointer', fontSize: '1rem' }}>
                                X
                            </button>
                        </div>
                        {expanded[idx] && (
                            <div style={{ marginTop: '0.5rem' }}>
                                <AutoSaveInput type="text" defaultValue={item.name || ''}
                                    onSave={val => onUpdate(idx, { ...item, name: val })}
                                    placeholder="Name"
                                    style={{ background: 'transparent', border: 'none', borderBottom: '1px solid var(--border-color)', color: 'var(--text-primary)', width: '100%', marginBottom: '0.5rem', fontSize: '0.9rem', fontFamily: 'var(--font-mono)' }} />
                                <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center', marginBottom: '0.5rem' }}>
                                    <label className="text-muted mono-text" style={{ fontSize: '0.7rem' }}>RATING</label>
                                    <StatDots value={item.rating || 0} onChange={v => onUpdate(idx, { ...item, rating: v })} editable={true} />
                                </div>
                                <AutoSaveInput component="textarea" defaultValue={item.description || ''}
                                    onSave={val => onUpdate(idx, { ...item, description: val })}
                                    placeholder="Description"
                                    style={{ background: 'rgba(0,0,0,0.2)', border: '1px solid var(--border-color)', color: 'var(--text-primary)', width: '100%', minHeight: '2rem', fontSize: '0.85rem', padding: '0.5rem', resize: 'vertical' }} />
                            </div>
                        )}
                    </div>
                ))}
                {items.length === 0 && <p className="text-muted" style={{ fontSize: '0.85rem', fontStyle: 'italic' }}>None recorded.</p>}
            </div>
        );
    };

    const NpcStatsPanel = ({ npc, onSave }) => {
        const DEFAULT_ATTRS = {
            power: { mental: 1, physical: 1, social: 1 },
            finesse: { mental: 1, physical: 1, social: 1 },
            resistance: { mental: 1, physical: 1, social: 1 }
        };
        const DEFAULT_SKILLS = {
            mental: { Academics: 0, Computer: 0, Crafts: 0, Investigation: 0, Medicine: 0, Occult: 0, Politics: 0, Science: 0 },
            physical: { Athletics: 0, Brawl: 0, Drive: 0, Firearms: 0, Larceny: 0, Stealth: 0, Survival: 0, Weaponry: 0 },
            social: { AnimalKen: 0, Empathy: 0, Expression: 0, Intimidation: 0, Persuasion: 0, Socialize: 0, Streetwise: 0, Subterfuge: 0 }
        };
        const attrs = npc.attributes || DEFAULT_ATTRS;
        const skills = npc.skills || DEFAULT_SKILLS;
        const health = npc.health || { bashing: 0, lethal: 0, aggravated: 0 };
        const healthMax = (attrs.resistance?.physical || 1) + (npc.size || 5);

        return (
            <div style={{ marginTop: '1rem' }}>
                <h3 className="mono-text text-accent" style={{
                    borderBottom: '2px solid var(--accent-primary)',
                    paddingBottom: '0.5rem', marginBottom: '1rem', fontSize: '1.1rem'
                }}>OPERATIVE STATS (ADMIN ONLY)</h3>

                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '1rem', marginBottom: '1rem' }}>
                    <NpcAttributesModule attributes={attrs} update={a => onSave({ attributes: a })} />
                    <NpcSkillsModule skills={skills} update={s => onSave({ skills: s })} />
                </div>

                <NpcDerivedTraitsModule npc={{ ...npc, attributes: attrs }} update={updates => onSave(updates)} />

                <NpcHealthModule
                    health={health}
                    max={healthMax}
                    mentalLoad={npc.mentalLoad || 0}
                    update={h => onSave({ health: h })}
                    onMentalLoadChange={v => onSave({ mentalLoad: v })}
                />

                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '1rem' }}>
                    <NpcExpandableListModule
                        title="MERITS" itemLabel="Merit"
                        items={npc.merits || []}
                        onAdd={() => onSave({ merits: [...(npc.merits || []), { name: '', rating: 1, description: '' }] })}
                        onRemove={idx => onSave({ merits: (npc.merits || []).filter((_, i) => i !== idx) })}
                        onUpdate={(idx, val) => onSave({ merits: (npc.merits || []).map((item, i) => i === idx ? val : item) })}
                    />
                    <NpcExpandableListModule
                        title="FLAWS" itemLabel="Flaw"
                        items={npc.flaws || []}
                        onAdd={() => onSave({ flaws: [...(npc.flaws || []), { name: '', rating: 1, description: '' }] })}
                        onRemove={idx => onSave({ flaws: (npc.flaws || []).filter((_, i) => i !== idx) })}
                        onUpdate={(idx, val) => onSave({ flaws: (npc.flaws || []).map((item, i) => i === idx ? val : item) })}
                    />
                </div>
            </div>
        );
    };

    // --- ADMIN PANEL ---
    const AdminPanel = ({ npc, onSave }) => {
        const [users, setUsers] = useState([]);
        const [agencies, setAgencies] = useState([]);
        const [confirmDelete, setConfirmDelete] = useState(false);
        const [transferMode, setTransferMode] = useState(null); // null, 'player', 'agency'
        const [transferTarget, setTransferTarget] = useState('');
        const [confirmTransfer, setConfirmTransfer] = useState(false);
        const [transferring, setTransferring] = useState(false);

        useEffect(() => {
            fetchUsers();
            fetchAgencies();
        }, []);

        const fetchUsers = async () => {
            try {
                const response = await fetch('/api/comms/users/');
                if (response.ok) {
                    const data = await response.json();
                    setUsers(data);
                }
            } catch (err) {
                console.error('Failed to fetch users:', err);
            }
        };

        const fetchAgencies = async () => {
            try {
                const response = await fetch('/api/agencies/');
                if (response.ok) {
                    const data = await response.json();
                    setAgencies(data.filter(a => !a.isPlayerAgency));
                }
            } catch (err) {
                console.error('Failed to fetch agencies:', err);
            }
        };

        const handleTransfer = async () => {
            if (!transferTarget) return;
            setTransferring(true);
            try {
                const transfer = transferMode === 'player'
                    ? { type: 'player', userId: parseInt(transferTarget) }
                    : { type: 'agency', agencyId: parseInt(transferTarget) };

                const response = await fetch('/api/npcs/' + NPC_ID + '/', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                    body: JSON.stringify({ transfer }),
                });
                if (response.ok) {
                    // Reload page to reflect new dossier type
                    window.location.reload();
                } else {
                    console.error('Transfer failed:', response.status);
                }
            } catch (err) {
                console.error('Transfer error:', err);
            } finally {
                setTransferring(false);
            }
        };

        const resetTransfer = () => {
            setTransferMode(null);
            setTransferTarget('');
            setConfirmTransfer(false);
        };

        const handleDelete = async () => {
            try {
                const response = await fetch('/api/npcs/' + NPC_ID + '/', {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken') || CSRF_TOKEN,
                    },
                });
                if (response.ok) {
                    window.location.href = '/npcs/';
                } else {
                    console.error('Delete failed:', response.status);
                }
            } catch (err) {
                console.error('Delete error:', err);
            }
        };

        if (!IS_ADMIN) return null;

        // Build transfer label for confirmation
        const getTransferLabel = () => {
            if (transferMode === 'player') {
                const u = users.find(u => u.id === parseInt(transferTarget));
                return u ? u.displayName : '?';
            }
            const a = agencies.find(a => a.id === parseInt(transferTarget));
            return a ? a.name : '?';
        };

        return (
            <div className="glass-panel" style={{
                padding: '1.5rem', marginBottom: '1rem',
                border: '1px solid var(--accent-danger)'
            }}>
                <h3 className="mono-text text-danger" style={{
                    borderBottom: '1px solid var(--border-color)',
                    paddingBottom: '0.5rem', marginBottom: '1rem'
                }}>ADMIN PANEL</h3>

                {/* Hidden toggle */}
                <div style={{ marginBottom: '1.5rem' }}>
                    <label style={{
                        display: 'flex', alignItems: 'center', gap: '0.5rem',
                        cursor: 'pointer', fontFamily: 'var(--font-mono)',
                        fontSize: '0.8rem', color: npc.isHidden ? 'var(--accent-danger)' : 'var(--text-secondary)',
                    }}>
                        <input
                            type="checkbox"
                            checked={npc.isHidden || false}
                            onChange={e => onSave({ isHidden: e.target.checked })}
                            style={{ accentColor: 'var(--accent-danger)' }}
                        />
                        HIDDEN (only visible to admins)
                    </label>
                </div>

                {/* Reassign dropdown (player contacts only) */}
                {!npc.isNpcDossier && (
                    <div style={{ marginBottom: '1.5rem' }}>
                        <label className="text-secondary mono-text" style={{ fontSize: '0.8rem' }}>
                            REASSIGN CONTACT
                        </label>
                        <select
                            value={npc.assignedToId || ''}
                            onChange={e => onSave({ assignedToId: parseInt(e.target.value) || null })}
                            style={{
                                display: 'block', marginTop: '0.25rem',
                                background: 'transparent',
                                border: '1px solid var(--accent-primary)',
                                color: 'var(--text-primary)',
                                padding: '0.5rem', width: '100%',
                                fontFamily: 'var(--font-mono)',
                                fontSize: '0.9rem', cursor: 'pointer'
                            }}
                        >
                            <option value="" style={{ background: 'var(--bg-dark)' }}>-- Unassigned --</option>
                            {users.map(user => (
                                <option key={user.id} value={user.id}
                                    style={{ background: 'var(--bg-dark)', color: 'var(--text-primary)' }}>
                                    {user.displayName}
                                </option>
                            ))}
                        </select>
                    </div>
                )}

                {/* Transfer dossier */}
                <div style={{ marginBottom: '1.5rem' }}>
                    <label className="text-secondary mono-text" style={{
                        fontSize: '0.8rem', display: 'block', marginBottom: '0.5rem'
                    }}>
                        TRANSFER DOSSIER
                    </label>

                    {!transferMode ? (
                        <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
                            <button
                                onClick={() => setTransferMode('player')}
                                className="mono-text"
                                style={{
                                    background: 'transparent',
                                    border: '1px solid var(--accent-primary)',
                                    color: 'var(--accent-primary)',
                                    padding: '0.4rem 1rem',
                                    cursor: 'pointer', fontSize: '0.8rem',
                                    fontFamily: 'var(--font-mono)',
                                }}
                            >
                                TO PLAYER
                            </button>
                            <button
                                onClick={() => setTransferMode('agency')}
                                className="mono-text"
                                style={{
                                    background: 'transparent',
                                    border: '1px solid var(--accent-warning)',
                                    color: 'var(--accent-warning)',
                                    padding: '0.4rem 1rem',
                                    cursor: 'pointer', fontSize: '0.8rem',
                                    fontFamily: 'var(--font-mono)',
                                }}
                            >
                                TO AGENCY
                            </button>
                        </div>
                    ) : !confirmTransfer ? (
                        <div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.5rem' }}>
                                <span className="mono-text" style={{
                                    fontSize: '0.75rem',
                                    color: transferMode === 'player' ? 'var(--accent-primary)' : 'var(--accent-warning)',
                                }}>
                                    {transferMode === 'player' ? 'SELECT PLAYER' : 'SELECT AGENCY'}
                                </span>
                            </div>
                            <select
                                value={transferTarget}
                                onChange={e => setTransferTarget(e.target.value)}
                                style={{
                                    display: 'block',
                                    background: 'transparent',
                                    border: `1px solid ${transferMode === 'player' ? 'var(--accent-primary)' : 'var(--accent-warning)'}`,
                                    color: 'var(--text-primary)',
                                    padding: '0.5rem', width: '100%',
                                    fontFamily: 'var(--font-mono)',
                                    fontSize: '0.9rem', cursor: 'pointer',
                                    marginBottom: '0.5rem',
                                }}
                            >
                                <option value="" style={{ background: 'var(--bg-dark)' }}>
                                    -- {transferMode === 'player' ? 'Select Player' : 'Select Agency'} --
                                </option>
                                {transferMode === 'player'
                                    ? users.map(u => (
                                        <option key={u.id} value={u.id}
                                            style={{ background: 'var(--bg-dark)', color: 'var(--text-primary)' }}>
                                            {u.displayName}
                                        </option>
                                    ))
                                    : agencies.map(a => (
                                        <option key={a.id} value={a.id}
                                            style={{ background: 'var(--bg-dark)', color: 'var(--text-primary)' }}>
                                            {a.name}
                                        </option>
                                    ))
                                }
                            </select>
                            <div style={{ display: 'flex', gap: '0.5rem' }}>
                                <button
                                    onClick={() => transferTarget && setConfirmTransfer(true)}
                                    disabled={!transferTarget}
                                    className="mono-text"
                                    style={{
                                        background: transferTarget ? 'var(--accent-warning)' : 'transparent',
                                        border: transferTarget ? 'none' : '1px solid var(--border-color)',
                                        color: transferTarget ? 'var(--bg-dark)' : 'var(--text-muted)',
                                        padding: '0.4rem 1rem',
                                        cursor: transferTarget ? 'pointer' : 'default',
                                        fontSize: '0.8rem', fontWeight: 'bold',
                                        fontFamily: 'var(--font-mono)',
                                    }}
                                >
                                    TRANSFER
                                </button>
                                <button
                                    onClick={resetTransfer}
                                    className="mono-text"
                                    style={{
                                        background: 'transparent',
                                        border: '1px solid var(--border-color)',
                                        color: 'var(--text-muted)',
                                        padding: '0.4rem 1rem',
                                        cursor: 'pointer', fontSize: '0.8rem',
                                        fontFamily: 'var(--font-mono)',
                                    }}
                                >
                                    CANCEL
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div>
                            <p className="mono-text" style={{
                                fontSize: '0.85rem', color: 'var(--accent-warning)',
                                marginBottom: '0.75rem',
                            }}>
                                Transfer "{npc.name}" to {transferMode === 'player' ? 'player' : 'agency'}: <strong>{getTransferLabel()}</strong>?
                                {npc.isNpcDossier && transferMode === 'player' && (
                                    <span style={{ display: 'block', marginTop: '0.25rem', fontSize: '0.75rem', color: 'var(--text-muted)' }}>
                                        This will convert the NPC dossier into a player contact.
                                    </span>
                                )}
                                {!npc.isNpcDossier && transferMode === 'agency' && (
                                    <span style={{ display: 'block', marginTop: '0.25rem', fontSize: '0.75rem', color: 'var(--text-muted)' }}>
                                        This will convert the player contact into an NPC dossier.
                                    </span>
                                )}
                            </p>
                            <div style={{ display: 'flex', gap: '0.5rem' }}>
                                <button
                                    onClick={handleTransfer}
                                    disabled={transferring}
                                    className="mono-text"
                                    style={{
                                        background: 'var(--accent-warning)',
                                        border: 'none',
                                        color: 'var(--bg-dark)',
                                        padding: '0.4rem 1rem',
                                        cursor: transferring ? 'wait' : 'pointer',
                                        fontSize: '0.8rem', fontWeight: 'bold',
                                        fontFamily: 'var(--font-mono)',
                                        opacity: transferring ? 0.6 : 1,
                                    }}
                                >
                                    {transferring ? 'TRANSFERRING...' : 'CONFIRM TRANSFER'}
                                </button>
                                <button
                                    onClick={resetTransfer}
                                    className="mono-text"
                                    style={{
                                        background: 'transparent',
                                        border: '1px solid var(--border-color)',
                                        color: 'var(--text-muted)',
                                        padding: '0.4rem 1rem',
                                        cursor: 'pointer', fontSize: '0.8rem',
                                        fontFamily: 'var(--font-mono)',
                                    }}
                                >
                                    CANCEL
                                </button>
                            </div>
                        </div>
                    )}
                </div>

                {/* Delete button */}
                <div>
                    {!confirmDelete ? (
                        <button
                            onClick={() => setConfirmDelete(true)}
                            className="mono-text"
                            style={{
                                background: 'transparent',
                                border: '1px solid var(--accent-danger)',
                                color: 'var(--accent-danger)',
                                padding: '0.5rem 1rem',
                                cursor: 'pointer', fontSize: '0.9rem',
                                width: '100%'
                            }}
                        >
                            DELETE RECORD
                        </button>
                    ) : (
                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                            <button
                                onClick={handleDelete}
                                className="mono-text"
                                style={{
                                    background: 'var(--accent-danger)',
                                    border: 'none',
                                    color: 'var(--bg-dark)',
                                    padding: '0.5rem 1rem',
