{# Shared terrain visual rendering for spacebattle pages.

   Include this partial inside a <script> block on any page that
   draws the hex grid. It defines a single public function:

       drawTerrainVisual(ctx, cx, cy, size, terrain)

   Each terrain type gets a procedural shape painted onto the canvas
   so you can tell an asteroid field from a nebula at a glance. The
   pattern is deterministic per (q, r) so hexes don't shimmer between
   renders.
#}

// Deterministic PRNG seeded off hex coordinates so a given asteroid
// field always scatters its rocks the same way between redraws.
function sbHashSeed(q, r) {
    var h = ((q | 0) * 73856093) ^ ((r | 0) * 19349663);
    return (h >>> 0) % 2147483647;
}
function sbMulberry32(seed) {
    var s = seed | 0;
    return function() {
        s |= 0; s = s + 0x6D2B79F5 | 0;
        var t = Math.imul(s ^ s >>> 15, 1 | s);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

// --- Individual drawers ---------------------------------------------------

function drawAsteroidField(ctx, cx, cy, size, rng) {
    // Scatter of rocky chunks with highlights.
    var n = 5 + Math.floor(rng() * 4);
    var shapes = [];
    for (var i = 0; i < n; i++) {
        shapes.push({
            r: size * (0.12 + rng() * 0.16),
            a: rng() * Math.PI * 2,
            d: rng() * size * 0.55,
        });
    }
    // Dark base
    ctx.fillStyle = '#3d352e';
    shapes.forEach(function(s) {
        ctx.beginPath();
        ctx.arc(cx + Math.cos(s.a) * s.d, cy + Math.sin(s.a) * s.d, s.r, 0, Math.PI * 2);
        ctx.fill();
    });
    // Mid tone
    ctx.fillStyle = '#6b5c4f';
    shapes.forEach(function(s) {
        ctx.beginPath();
        ctx.arc(
            cx + Math.cos(s.a) * s.d - s.r * 0.25,
            cy + Math.sin(s.a) * s.d - s.r * 0.25,
            s.r * 0.75, 0, Math.PI * 2,
        );
        ctx.fill();
    });
    // Highlight
    ctx.fillStyle = '#b09878';
    shapes.forEach(function(s) {
        ctx.beginPath();
        ctx.arc(
            cx + Math.cos(s.a) * s.d - s.r * 0.45,
            cy + Math.sin(s.a) * s.d - s.r * 0.45,
            s.r * 0.35, 0, Math.PI * 2,
        );
        ctx.fill();
    });
}

function drawNebula(ctx, cx, cy, size, rng) {
    // Soft radial clouds in purples and pinks, three overlapping blobs.
    var blobs = [];
    for (var i = 0; i < 3; i++) {
        blobs.push({
            ox: (rng() - 0.5) * size * 0.6,
            oy: (rng() - 0.5) * size * 0.6,
            r: size * (0.55 + rng() * 0.25),
            color: ['#6b21a8', '#a855f7', '#ec4899'][i],
        });
    }
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    blobs.forEach(function(b) {
        var grad = ctx.createRadialGradient(cx + b.ox, cy + b.oy, 0, cx + b.ox, cy + b.oy, b.r);
        grad.addColorStop(0, b.color + 'cc');
        grad.addColorStop(0.6, b.color + '44');
        grad.addColorStop(1, b.color + '00');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx + b.ox, cy + b.oy, b.r, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.restore();
    // Speckle stars
    ctx.fillStyle = '#ffffff';
    for (var i = 0; i < 4; i++) {
        var a = rng() * Math.PI * 2;
        var d = rng() * size * 0.55;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * d, cy + Math.sin(a) * d, 0.9, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawDebrisField(ctx, cx, cy, size, rng) {
    // Short angled line segments: twisted metal fragments.
    ctx.strokeStyle = '#9ca3af';
    ctx.lineWidth = 1.5;
    var n = 7 + Math.floor(rng() * 4);
    for (var i = 0; i < n; i++) {
        var a = rng() * Math.PI * 2;
        var d = rng() * size * 0.55;
        var len = size * (0.15 + rng() * 0.2);
        var rot = rng() * Math.PI * 2;
        var x = cx + Math.cos(a) * d;
        var y = cy + Math.sin(a) * d;
        ctx.beginPath();
        ctx.moveTo(x - Math.cos(rot) * len / 2, y - Math.sin(rot) * len / 2);
        ctx.lineTo(x + Math.cos(rot) * len / 2, y + Math.sin(rot) * len / 2);
        ctx.stroke();
    }
    // Few brighter flashes
    ctx.fillStyle = '#d1d5db';
    for (var i = 0; i < 3; i++) {
        var a = rng() * Math.PI * 2;
        var d = rng() * size * 0.4;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * d, cy + Math.sin(a) * d, 1.2, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawPlanet(ctx, cx, cy, size, rng, terrain) {
    // Big shaded disc. Colour picks from a palette so sequential
    // planet hexes don't all look the same.
    var palettes = [
        { base: '#2563eb', shade: '#1e3a8a', rim: '#60a5fa' },  // blue
        { base: '#16a34a', shade: '#14532d', rim: '#4ade80' },  // green
        { base: '#a16207', shade: '#78350f', rim: '#facc15' },  // tan
        { base: '#7c3aed', shade: '#4c1d95', rim: '#c084fc' },  // violet
        { base: '#be123c', shade: '#881337', rim: '#fb7185' },  // red
    ];
    var pal = palettes[Math.floor(rng() * palettes.length)];
    var r = size * 0.8;
    // Base disc
    ctx.fillStyle = pal.base;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    // Shadow crescent (clipped half)
    ctx.fillStyle = pal.shade;
    ctx.beginPath();
    ctx.arc(cx + r * 0.35, cy + r * 0.2, r, 0, Math.PI * 2);
    ctx.fill();
    // Highlight rim
    ctx.strokeStyle = pal.rim;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    // Terminator curve
    ctx.strokeStyle = pal.shade;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx - r * 0.1, cy - r * 0.1, r * 0.9, -Math.PI / 2, Math.PI / 2);
    ctx.stroke();
}

function drawSun(ctx, cx, cy, size, rng) {
    // Bright core + radiating rays.
    // Outer glow
    var glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.95);
    glow.addColorStop(0, 'rgba(255,220,100,0.9)');
    glow.addColorStop(0.4, 'rgba(251,191,36,0.6)');
    glow.addColorStop(1, 'rgba(251,191,36,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, size * 0.95, 0, Math.PI * 2); ctx.fill();
    // Core disc
    ctx.fillStyle = '#fff7ae';
    ctx.beginPath(); ctx.arc(cx, cy, size * 0.38, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fcd34d';
    ctx.beginPath(); ctx.arc(cx, cy, size * 0.28, 0, Math.PI * 2); ctx.fill();
    // Rays
    ctx.strokeStyle = 'rgba(255,215,80,0.8)';
    ctx.lineWidth = 1.8;
    for (var i = 0; i < 8; i++) {
        var a = (Math.PI * 2 / 8) * i + rng() * 0.2;
        var r1 = size * 0.5;
        var r2 = size * 0.85;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
        ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
        ctx.stroke();
    }
}

function drawGravityWell(ctx, cx, cy, size, rng) {
    // Concentric arcs getting tighter toward centre, suggesting
    // spacetime curvature.
    ctx.strokeStyle = '#a855f7';
    ctx.lineWidth = 1.2;
    for (var i = 0; i < 5; i++) {
        var r = size * (0.85 - i * 0.16);
        var squish = 1.0 - i * 0.12;
        ctx.beginPath();
        ctx.ellipse(cx, cy, r, r * squish, 0, 0, Math.PI * 2);
        ctx.stroke();
    }
    // Central black dot
    ctx.fillStyle = '#000000';
    ctx.beginPath(); ctx.arc(cx, cy, size * 0.08, 0, Math.PI * 2); ctx.fill();
    // Inner glow
    ctx.strokeStyle = '#c084fc';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, size * 0.15, 0, Math.PI * 2);
    ctx.stroke();
}

function drawMinefield(ctx, cx, cy, size, rng) {
    // Regular grid of small mine markers.
    ctx.fillStyle = '#991b1b';
    ctx.strokeStyle = '#fca5a5';
    ctx.lineWidth = 1;
    var positions = [
        [-0.35, -0.35], [0, -0.4], [0.35, -0.35],
        [-0.4, 0], [0.4, 0],
        [-0.35, 0.35], [0, 0.4], [0.35, 0.35],
    ];
    positions.forEach(function(p) {
        var x = cx + p[0] * size;
        var y = cy + p[1] * size;
        // Body
        ctx.beginPath();
        ctx.arc(x, y, size * 0.08, 0, Math.PI * 2);
        ctx.fill();
        // Spikes (4 short lines)
        ctx.beginPath();
        ctx.moveTo(x - size * 0.12, y); ctx.lineTo(x + size * 0.12, y);
        ctx.moveTo(x, y - size * 0.12); ctx.lineTo(x, y + size * 0.12);
        ctx.stroke();
    });
}

function drawStation(ctx, cx, cy, size, rng) {
    // Central hub + four solar-panel arms.
    var r = size * 0.22;
    // Arms
    ctx.strokeStyle = '#0ea5e9';
    ctx.lineWidth = 2;
    var armLen = size * 0.55;
    ctx.beginPath();
    ctx.moveTo(cx - armLen, cy); ctx.lineTo(cx + armLen, cy);
    ctx.moveTo(cx, cy - armLen); ctx.lineTo(cx, cy + armLen);
    ctx.stroke();
    // Panels
    ctx.fillStyle = '#0369a1';
    ctx.strokeStyle = '#7dd3fc';
    ctx.lineWidth = 1;
    [[armLen - size * 0.05, 0], [-armLen + size * 0.05, 0], [0, armLen - size * 0.05], [0, -armLen + size * 0.05]].forEach(function(p) {
        var w = size * 0.22, h = size * 0.14;
        ctx.fillRect(cx + p[0] - w / 2, cy + p[1] - h / 2, w, h);
        ctx.strokeRect(cx + p[0] - w / 2, cy + p[1] - h / 2, w, h);
    });
    // Hub
    ctx.fillStyle = '#14b8a6';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#a7f3d0';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Hub window
    ctx.fillStyle = '#0f766e';
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2); ctx.fill();
}

function drawZone(ctx, cx, cy, size, rng) {
    // Dashed hex outline + faint centre marker.
    ctx.save();
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
        var a = (Math.PI / 180) * (60 * i - 30);
        var x = cx + size * 0.85 * Math.cos(a);
        var y = cy + size * 0.85 * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
    // Centre Z
    ctx.fillStyle = '#22c55e';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Z', cx, cy);
}

function drawCustomFallback(ctx, cx, cy, size, terrain) {
    // Colored hex fill + centered glyph — the original v0.14.7 look.
    var col = terrain.color || '#94a3b8';
    var icon = terrain.icon || '\u25A2';
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
        var a = (Math.PI / 180) * (60 * i - 30);
        var x = cx + size * Math.cos(a);
        var y = cy + size * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = col;
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = col;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(icon, cx, cy);
}

// --- Public entry point ---------------------------------------------------

function drawTerrainVisual(ctx, cx, cy, size, terrain) {
    var rng = sbMulberry32(sbHashSeed(terrain.q, terrain.r));
    switch (terrain.terrain_type) {
        case 'asteroid':     drawAsteroidField(ctx, cx, cy, size, rng); break;
        case 'nebula':       drawNebula(ctx, cx, cy, size, rng); break;
        case 'debris':       drawDebrisField(ctx, cx, cy, size, rng); break;
        case 'planet':       drawPlanet(ctx, cx, cy, size, rng, terrain); break;
        case 'sun':          drawSun(ctx, cx, cy, size, rng); break;
        case 'gravity_well': drawGravityWell(ctx, cx, cy, size, rng); break;
        case 'minefield':    drawMinefield(ctx, cx, cy, size, rng); break;
        case 'station':      drawStation(ctx, cx, cy, size, rng); break;
        case 'zone':         drawZone(ctx, cx, cy, size, rng); break;
        default:             drawCustomFallback(ctx, cx, cy, size, terrain);
    }
}
