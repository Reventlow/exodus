{% extends "base.html" %}

{% block title %}{{ map_name }} // MAP EDITOR{% endblock %}

{% block content %}
<style>
    .editor-layout { display: grid; grid-template-columns: 240px 1fr; gap: 0.75rem; padding: 0.75rem; min-height: calc(100vh - 80px); }
    .panel { border: 1px solid var(--border-color); padding: 0.75rem; border-radius: var(--radius-sm); overflow: auto; }
    .panel h3 { margin: 0 0 0.5rem 0; font-size: 0.8rem; color: var(--accent-primary); letter-spacing: 1px; }
    #editor-canvas-wrap { border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 0.25rem; background: #04060a; overflow: auto; }
    #editor-canvas { display: block; }
</style>

<div class="editor-layout">
    <div class="panel">
        <h3 id="map-name">Loading…</h3>
        <div style="display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.5rem;">
            <a href="{% url 'spacebattle:maps' %}" class="mono-text" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.3rem 0.6rem; text-decoration: none; font-size: 0.65rem; text-align: center;">← MAPS</a>
            <button onclick="renameMap()" class="mono-text" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.65rem;">RENAME</button>
            <button onclick="resizeMap()" class="mono-text" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.65rem;">RESIZE GRID</button>
            <button onclick="clearMap()" class="mono-text" style="background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.65rem;">CLEAR ALL</button>
            <button onclick="saveMap()" class="mono-text" style="background: var(--accent-primary); border: none; color: var(--bg-dark); padding: 0.4rem 0.6rem; cursor: pointer; font-weight: bold; font-size: 0.72rem; letter-spacing: 1px;">SAVE</button>
        </div>
        <h3 style="margin-top: 1rem;">TERRAIN TYPE</h3>
        <select id="terrain-type-select" class="mono-text" style="width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.35rem; font-size: 0.7rem;">
            <option value="asteroid">Asteroid Field</option>
            <option value="nebula">Nebula</option>
            <option value="debris">Debris Field</option>
            <option value="planet">Planet / Moon</option>
            <option value="sun">Star / Sun Hazard</option>
            <option value="gravity_well">Gravity Well</option>
            <option value="minefield">Minefield</option>
            <option value="station">Station / Platform</option>
            <option value="zone">Scenario Zone</option>
            <option value="custom">Custom</option>
        </select>
        <div class="mono-text text-muted" style="font-size: 0.55rem; margin-top: 0.3rem;">Click empty hex to place. Click existing hex to delete.</div>
    </div>
    <div id="editor-canvas-wrap">
        <canvas id="editor-canvas" width="800" height="600"></canvas>
    </div>
</div>

<script>
{% include "spacebattle/_terrain_render.html" %}

const MAP_ID = {{ map_id }};
var MAP = null;
var CANVAS_EL = null;
var TERRAIN_INDEX = {};

var TERRAIN_DEFAULTS = {
    asteroid:     { color: '#8a7a6a', icon: '\u2689' },
    nebula:       { color: '#9a4aff', icon: '\u2601' },
    debris:       { color: '#6b7280', icon: '\u2699' },
    planet:       { color: '#3b82f6', icon: '\u25CF' },
    sun:          { color: '#fbbf24', icon: '\u2600' },
    gravity_well: { color: '#7c3aed', icon: '\u29BE' },
    minefield:    { color: '#ef4444', icon: '\u2738' },
    station:      { color: '#14b8a6', icon: '\u29C7' },
    zone:         { color: '#22c55e', icon: '\u2B1C' },
    custom:       { color: '#94a3b8', icon: '\u25A2' },
};
function terrainColor(t) { return t.color || (TERRAIN_DEFAULTS[t.terrain_type] || TERRAIN_DEFAULTS.custom).color; }
function terrainIcon(t) { return t.icon || (TERRAIN_DEFAULTS[t.terrain_type] || TERRAIN_DEFAULTS.custom).icon; }

function csrfToken() { return document.cookie.match(/csrftoken=([^;]+)/)?.[1] || ''; }

function api(path, opts) {
    opts = opts || {};
    opts.headers = Object.assign({}, opts.headers || {}, { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken() });
    return fetch(path, opts).then(function(r) { return r.json().then(function(d) { if (!r.ok) { alert((d && d.error) || ('Error ' + r.status)); throw d; } return d; }); });
}

const HEX_SIZE = 24;
function hexToPixel(q, r) {
    var x = HEX_SIZE * Math.sqrt(3) * (q + r / 2);
    var y = HEX_SIZE * 1.5 * r;
    return [x + HEX_SIZE + 4, y + HEX_SIZE + 4];
}
function pixelToHex(px, py) {
    var x = px - (HEX_SIZE + 4);
    var y = py - (HEX_SIZE + 4);
    var q = (Math.sqrt(3) / 3 * x - 1.0 / 3 * y) / HEX_SIZE;
    var r = (2.0 / 3 * y) / HEX_SIZE;
    var s = -q - r;
    var rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
    var dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
    if (dq > dr && dq > ds) rq = -rr - rs;
    else if (dr > ds) rr = -rq - rs;
    return [rq, rr];
}
function drawHex(ctx, cx, cy, size, fill, stroke) {
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
        var a = (Math.PI / 180) * (60 * i - 30);
        var x = cx + size * Math.cos(a);
        var y = cy + size * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.stroke(); }
}

function render() {
    if (!MAP) return;
    var canvas = document.getElementById('editor-canvas');
    var w = Math.ceil(HEX_SIZE * Math.sqrt(3) * (MAP.grid_width + 0.5) + HEX_SIZE);
    var h = Math.ceil(HEX_SIZE * 1.5 * MAP.grid_height + HEX_SIZE * 2);
    canvas.width = w;
    canvas.height = h;
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, w, h);
    // Grid
    for (var r = 0; r < MAP.grid_height; r++) {
        for (var q = 0; q < MAP.grid_width; q++) {
            var p = hexToPixel(q, r);
            drawHex(ctx, p[0], p[1], HEX_SIZE, 'rgba(20,30,50,0.3)', 'rgba(80,100,140,0.35)');
        }
    }
    // Terrain — per-type procedural shapes from the shared partial.
    TERRAIN_INDEX = {};
    (MAP.terrain || []).forEach(function(t) {
        TERRAIN_INDEX[t.q + ',' + t.r] = t;
        var p = hexToPixel(t.q, t.r);
        drawTerrainVisual(ctx, p[0], p[1], HEX_SIZE, t);
    });
}

function onClick(ev) {
    var rect = CANVAS_EL.getBoundingClientRect();
    var hex = pixelToHex(ev.clientX - rect.left, ev.clientY - rect.top);
    var q = hex[0], r = hex[1];
    if (q < 0 || r < 0 || q >= MAP.grid_width || r >= MAP.grid_height) return;
    var key = q + ',' + r;
    if (TERRAIN_INDEX[key]) {
        MAP.terrain = (MAP.terrain || []).filter(function(t) { return !(t.q === q && t.r === r); });
    } else {
        MAP.terrain = MAP.terrain || [];
        MAP.terrain.push({
            q: q, r: r,
            terrain_type: document.getElementById('terrain-type-select').value,
        });
    }
    render();
}

function load() {
    return api('/api/spacebattle/battle-maps/' + MAP_ID + '/').then(function(m) {
        MAP = m;
        document.getElementById('map-name').textContent = m.name;
        render();
        if (!CANVAS_EL) {
            CANVAS_EL = document.getElementById('editor-canvas');
            CANVAS_EL.addEventListener('click', onClick);
        }
    });
}

function saveMap() {
    api('/api/spacebattle/battle-maps/' + MAP_ID + '/', {
        method: 'PUT',
        body: JSON.stringify({ terrain: MAP.terrain || [] }),
    }).then(function() { alert('Saved ' + ((MAP.terrain || []).length) + ' terrain features.'); });
}

function renameMap() {
    var name = prompt('New name:', MAP.name);
    if (!name) return;
    api('/api/spacebattle/battle-maps/' + MAP_ID + '/', {
        method: 'PUT', body: JSON.stringify({ name: name }),
    }).then(function() { load(); });
}

function resizeMap() {
    var w = parseInt(prompt('New grid width:', MAP.grid_width), 10);
    var h = parseInt(prompt('New grid height:', MAP.grid_height), 10);
    if (isNaN(w) || isNaN(h)) return;
    // Trim terrain that falls outside the new bounds.
    MAP.terrain = (MAP.terrain || []).filter(function(t) { return t.q < w && t.r < h; });
    api('/api/spacebattle/battle-maps/' + MAP_ID + '/', {
        method: 'PUT',
        body: JSON.stringify({ grid_width: w, grid_height: h, terrain: MAP.terrain }),
    }).then(load);
}

function clearMap() {
    if (!confirm('Clear all terrain from this map?')) return;
    MAP.terrain = [];
    render();
}

load();
</script>
{% endblock %}
