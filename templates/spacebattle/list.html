{% extends "base.html" %}

{% block title %}BATTLES // BLACKLOG.NET{% endblock %}

{% block content %}
<style>
    /* Battles list: bracket-framed shell with section header. The status
       chip uses the global .status-pill / .s-* tokens so SETUP / ACTIVE /
       CONCLUDED tracks the rest of the clearance-gate aesthetic. */
    .battle-list { padding: 1rem; max-width: 1000px; margin: 1rem auto; }
    .battle-row {
        display: flex; align-items: center; gap: 1rem;
        padding: 0.8rem 1rem; border: 1px solid var(--border-color);
        margin-bottom: 0.5rem;
        cursor: pointer; transition: border-color 0.15s;
    }
    .battle-row:hover { border-color: var(--accent-primary); }
</style>

<div class="battle-list brackets" style="position: relative; padding: 32px 36px;">
    <span class="bk tl"></span><span class="bk tr"></span>
    <span class="bk bl"></span><span class="bk br"></span>

    <header class="block-head">
        <span class="block-bullet">■</span>
        <h3>SPACE BATTLES</h3>
        <span class="block-line"></span>
        <span class="block-badge" id="battle-count-badge">[…]</span>
    </header>

    <div style="display: flex; align-items: center; justify-content: flex-end; margin-bottom: 1rem;">
        {% if is_staff %}
        <button onclick="createBattle()" class="mono-text" style="background: var(--accent-primary); border: none; color: var(--bg-dark); padding: 0.5rem 1rem; cursor: pointer; font-weight: bold; letter-spacing: 1px;">NEW BATTLE</button>
        {% endif %}
    </div>
    <div id="battle-list-body"><span class="mono-text text-muted">Loading…</span></div>
</div>

<script>
function csrfToken() {
    return document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
}

// Map a battle's lifecycle status onto the global .s-* semantic palette.
function statusClass(status) {
    if (status === 'active') return 's-active';
    if (status === 'concluded') return 's-standby';
    return 's-dormant';  // setup / unknown
}

function loadBattles() {
    fetch('/api/spacebattle/battles/').then(function(r) { return r.json(); }).then(function(battles) {
        var html = '';
        battles.forEach(function(b) {
            var sCls = statusClass(b.status);
            var date = b.created_at ? b.created_at.slice(0, 10) : '';
            html += '<div class="battle-row" onclick="window.location = \'/spacebattle/' + b.id + '/\'">';
            html += '<span class="status-pill ' + sCls + '" style="min-width: 5.5rem; text-align: center;">' + b.status.toUpperCase() + '</span>';
            html += '<div style="flex: 1;">';
            html += '<div class="mono-text" style="font-size: 0.95rem; color: var(--text-primary);">' + escapeHtml(b.name) + '</div>';
            html += '<div class="mono-text text-muted" style="font-size: 0.65rem;">round ' + b.round_number + ' · ' + b.grid_width + '×' + b.grid_height + ' grid · created ' + date + '</div>';
            html += '</div>';
            html += '</div>';
        });
        if (!battles.length) {
            html = '<div class="mono-text text-muted" style="text-align: center; padding: 3rem;">No battles yet.</div>';
        }
        document.getElementById('battle-list-body').innerHTML = html;
        var badge = document.getElementById('battle-count-badge');
        if (badge) badge.textContent = '[' + battles.length + ']';
    }).catch(function() {
        document.getElementById('battle-list-body').innerHTML = '<div class="mono-text" style="color: var(--accent-danger);">Failed to load battles.</div>';
    });
}

function createBattle() {
    var name = prompt('Battle name:');
    if (!name) return;
    var width = parseInt(prompt('Grid width (default 20):') || '20', 10);
    var height = parseInt(prompt('Grid height (default 15):') || '15', 10);
    fetch('/api/spacebattle/battles/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken() },
        body: JSON.stringify({ name: name, grid_width: width, grid_height: height }),
    }).then(function(r) { return r.json(); }).then(function(b) {
        if (b.error) { alert(b.error); return; }
        window.location = '/spacebattle/' + b.id + '/';
    });
}

function escapeHtml(s) {
    return (s == null ? '' : String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadBattles();
</script>
{% endblock %}
